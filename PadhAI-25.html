 {id:'thousands',title:'Thousands Around Us',emoji:'🔢',color:C.sky,scenes:[
   {art:emoji("🐘"),cap:"Chapter 4 — Thousands Around Us! Ab bade numbers, hazaar (1000) tak aur aage.",hi:"नमस्ते दोस्तों! आज चौथा चॅप्टर — थाउज़ेंड्स अराउंड अस। अब हम बड़े नंबर सीखेंगे — एक हज़ार और उससे भी आगे। ये सब सिर्फ दस अंकों से बनते हैं — शून्य से नौ तक।",en:"Namaste friends! Today is chapter four, Thousands Around Us. Now we learn big numbers — one thousand and beyond. All of them are made from just ten digits — zero to nine.",mr:"नमस्कार मित्रांनो! आज चौथा धडा — थाउजंड्स अराउंड अस. आता आपण मोठे नंबर शिकू — एक हजार आणि त्यापुढेही. हे सर्व फक्त दहा अंकांनी बनतात — शून्य ते नऊ.",dur:11000},
   {art:place4(0,0,0,0),cap:"Place value ghar yaad hain? Ones, Tens, Hundreds — ab naya ghar: THOUSANDS!",hi:"प्लेस वैल्यू के घर याद हैं? सबसे दाएँ इकाई यानी Ones, फिर दहाई यानी Tens, फिर सैकड़ा यानी Hundreds। और अब एक नया घर जुड़ता है — हज़ार यानी Thousands।",en:"Remember the place value houses? On the far right is Ones, then Tens, then Hundreds. And now a new house joins — Thousands.",mr:"प्लेस व्हॅल्यूची घरं आठवतात? सर्वात उजवीकडे एकक म्हणजे Ones, मग दशक म्हणजे Tens, मग शतक म्हणजे Hundreds. आणि आता एक नवं घर जोडतं — हजार म्हणजे Thousands.",dur:11000},
   {art:bigExpr("10 ones = 1 ten<br>10 tens = 1 hundred<br>10 hundreds = 1 thousand"),cap:"Grouping rule: har 10 chhote milke ek bada ghar bante!",hi:"एक खास नियम — दस इकाई मिलकर एक दहाई, दस दहाई मिलकर एक सैकड़ा, और दस सैकड़ा मिलकर एक हज़ार बनता है। हर बार दस छोटे मिलकर एक बड़ा घर बनाते हैं।",en:"A key rule — ten ones make a ten, ten tens make a hundred, and ten hundreds make a thousand. Every time, ten smaller ones make one bigger house.",mr:"एक खास नियम — दहा एकक मिळून एक दशक, दहा दशक मिळून एक शतक, आणि दहा शतक मिळून एक हजार बनतो. प्रत्येक वेळी दहा लहान मिळून एक मोठं घर बनतं.",dur:11500},
   {art:bigExpr("14 ones = <span style='color:#21C997'>1 ten</span> + 4 ones = 14"),cap:"Grouping: 14 ones ko 1 ten + 4 ones bana sakte.",hi:"मान लो चौदह इकाई हैं। इनमें से दस को एक समूह बनाकर एक दहाई बना लो — तो बचते हैं एक दहाई और चार इकाई, यानी चौदह। इसे grouping कहते हैं।",en:"Suppose there are fourteen ones. Group ten of them into one ten — then you have one ten and four ones, that is fourteen. This is called grouping.",mr:"समजा चौदा एकक आहेत. त्यातले दहा एकत्र करून एक दशक बनवा — मग उरतात एक दशक आणि चार एकक, म्हणजे चौदा. याला grouping म्हणतात.",dur:11500},
   {art:bigExpr("12 tens = <span style='color:#21C997'>1 hundred</span> + 2 tens = 120<br>10 tens 6 ones = 106"),cap:"Regrouping: 12 tens = 1 hundred 2 tens. 10 tens 6 ones = 106.",hi:"इसी तरह बारह दहाई को फिर से समूह बनाओ — दस दहाई मिलकर एक सैकड़ा, बचे दो दहाई। यानी एक सौ बीस। और दस दहाई छह इकाई बराबर एक सौ छह।",en:"In the same way, regroup twelve tens — ten tens make one hundred, leaving two tens. That is one hundred twenty. And ten tens six ones equals one hundred six.",mr:"त्याचप्रमाणे बारा दशक पुन्हा गटवा — दहा दशक मिळून एक शतक, उरले दोन दशक. म्हणजे एकशे वीस. आणि दहा दशक सहा एकक बरोबर एकशे सहा.",dur:12000},
   {art:bigExpr("4 ones + 7 tens = 74<br>100 − 7 = 93<br>'ten more than 312' = 322"),cap:"Ek number, kai roop: blocks, '4 ones+7 tens', '100−7', words.",hi:"एक ही संख्या को कई तरह से दिखा सकते हैं। जैसे चार इकाई और सात दहाई बराबर चौहत्तर। सौ में से सात घटाओ बराबर तिरानवे। और तीन सौ बारह से दस ज़्यादा बराबर तीन सौ बाईस।",en:"The same number can be shown in many ways. Like four ones and seven tens is seventy-four. Hundred minus seven is ninety-three. And ten more than three hundred twelve is three hundred twenty-two.",mr:"एकाच संख्येला अनेक प्रकारे दाखवता येते. जसे चार एकक आणि सात दशक बरोबर चौऱ्याहत्तर. शंभरातून सात वजा बरोबर त्र्याण्णव. आणि तीनशे बारापेक्षा दहा जास्त बरोबर तीनशे बावीस.",dur:12000},
   {art:numline(200,600,[200,333,450,600]),cap:"3-digit numbers ko number line pe rakho. Jaise 333, 450.",hi:"तीन अंकों के नंबरों को नंबर लाइन पर रख सकते हैं। जैसे दो सौ और छह सौ के बीच तीन सौ तैंतीस और चार सौ पचास आते हैं। नंबर लाइन से पता चलता है कौन छोटा, कौन बड़ा।",en:"We can place three-digit numbers on a number line. Between two hundred and six hundred come three hundred thirty-three and four hundred fifty. A number line shows which is smaller and bigger.",mr:"तीन अंकी नंबर नंबर लाइनवर ठेवता येतात. जसे दोनशे आणि सहाशेच्या मध्ये तीनशे तेहतीस आणि चारशे पन्नास येतात. नंबर लाइनवरून कळतं कोण लहान, कोण मोठा.",dur:11000},
   {art:`<div style="font-size:46px">🟫⬜ → 🟦</div>`,cap:"ONE THOUSAND: 10 hundreds (sau-sau ke 10 block) milke 1000 banta!",hi:"अब एक हज़ार सीखते हैं। दस सैकड़ा के ब्लॉक मिलकर एक हज़ार बनाते हैं। डायनस ब्लॉक में यह एक बड़ा घन यानी cube दिखता है। यह हमारा सबसे बड़ा नया घर है।",en:"Now we learn one thousand. Ten hundred-blocks together make one thousand. In Dienes blocks this looks like a big cube. This is our biggest new house.",mr:"आता एक हजार शिकू. दहा शतकाचे ब्लॉक मिळून एक हजार बनतात. डायनेस ब्लॉकमध्ये हा एक मोठा घन म्हणजे cube दिसतो. हे आपलं सर्वात मोठं नवं घर आहे.",dur:11500},
   {art:bigExpr("1 → 10 → 100 → 1000<br>(tokens)"),cap:"Bade numbers ke liye Dienes blocks ki jagah TOKENS use karte.",hi:"बड़े नंबरों के लिए ब्लॉक की जगह टोकन इस्तेमाल करते हैं। एक का टोकन, दस का टोकन, सौ का टोकन और हज़ार का टोकन — हर एक एक घर दिखाता है। इससे गिनती आसान हो जाती है।",en:"For big numbers we use tokens instead of blocks. A ones token, a tens token, a hundreds token and a thousands token — each shows one house. This makes counting easy.",mr:"मोठ्या नंबरांसाठी ब्लॉकऐवजी टोकन वापरतो. एकचं टोकन, दहाचं टोकन, शंभरचं टोकन आणि हजाराचं टोकन — प्रत्येक एक घर दाखवतं. यामुळे मोजणं सोपं होतं.",dur:11500},
   {art:place4(1,0,0,0),cap:"1000 = 1 Thousand, 0 Hundred, 0 Ten, 0 One. Pehla 4-digit number!",hi:"एक हज़ार को घरों में लिखो — एक थाउज़ेंड, शून्य सैकड़ा, शून्य दहाई, शून्य इकाई। यह सबसे पहला चार अंकों वाला नंबर है।",en:"Write one thousand in the houses — one thousand, zero hundred, zero ten, zero one. This is the very first four-digit number.",mr:"एक हजार घरांत लिहा — एक थाउजंड, शून्य शतक, शून्य दशक, शून्य एकक. हा सर्वात पहिला चार अंकी नंबर आहे.",dur:11000},
   {art:place4(1,0,0,1),cap:"1001 = 1 Thousand 0 Hundred 0 Ten 1 One = 'One thousand one'.",hi:"एक हज़ार एक को देखो — एक थाउज़ेंड, शून्य सैकड़ा, शून्य दहाई, एक इकाई। इसे पढ़ते हैं — वन थाउज़ेंड वन यानी एक हज़ार एक।",en:"Look at one thousand one — one thousand, zero hundred, zero ten, one one. We read it as one thousand one.",mr:"एक हजार एक पाहा — एक थाउजंड, शून्य शतक, शून्य दशक, एक एकक. हे वाचतो — वन थाउजंड वन म्हणजे एक हजार एक.",dur:11000},
   {art:bigExpr("1001, 1002, 1003,<br>1004, 1005 ..."),cap:"1000 ke baad ginti chalti rehti: 1001, 1002, 1003...",hi:"एक हज़ार के बाद गिनती ऐसे ही चलती रहती है — एक हज़ार एक, एक हज़ार दो, एक हज़ार तीन। हर बार इकाई में एक जुड़ता जाता है।",en:"After one thousand, counting goes on — one thousand one, one thousand two, one thousand three. Each time one is added to the ones.",mr:"एक हजारानंतर मोजणी अशीच चालू राहते — एक हजार एक, एक हजार दोन, एक हजार तीन. प्रत्येक वेळी एककात एक जोडला जातो.",dur:10500},
   {art:bigExpr("1038 = 1000+0+30+8<br>'One thousand thirty-eight'"),cap:"Tokens → expanded form → number → words. Jaise 1038.",hi:"किसी भी नंबर को टोकन से बना सकते हैं, फिर विस्तारित रूप, फिर नंबर, फिर शब्द। जैसे एक हज़ार अड़तीस बराबर एक हज़ार जोड़ शून्य जोड़ तीस जोड़ आठ।",en:"Any number can be made from tokens, then expanded form, then the number, then words. Like one thousand thirty-eight equals one thousand plus zero plus thirty plus eight.",mr:"कोणताही नंबर टोकनने बनवता येतो, मग विस्तारित रूप, मग नंबर, मग शब्द. जसे एक हजार अडतीस बरोबर एक हजार अधिक शून्य अधिक तीस अधिक आठ.",dur:11500},
   {art:bigExpr("900 + 100 = 1000<br>800 + 200 = 1000<br>850 + 150 = 1000"),cap:"1000 banane ke addition facts: 900+100, 800+200, 850+150.",hi:"हज़ार बनाने के जोड़ याद रखो। नौ सौ में सौ जोड़ो तो हज़ार। आठ सौ में दो सौ जोड़ो तो हज़ार। आठ सौ पचास में डेढ़ सौ जोड़ो तो हज़ार।",en:"Remember the addition facts that make a thousand. Nine hundred plus one hundred is a thousand. Eight hundred plus two hundred is a thousand. Eight hundred fifty plus one hundred fifty is a thousand.",mr:"हजार बनवणारे बेरीज लक्षात ठेवा. नऊशेत शंभर जोडा तर हजार. आठशेत दोनशे जोडा तर हजार. आठशे पन्नासमध्ये दीडशे जोडा तर हजार.",dur:11500},
   {art:bigExpr("1000 − 400 = 600"),cap:"Kitna kam? 1000 mein se 400 nikaalo to 600 bachta.",hi:"उल्टा भी सोचो — चार सौ, हज़ार से कितना कम है? हज़ार में से चार सौ घटाओ तो छह सौ बचता है। यानी चार सौ, हज़ार से छह सौ कम है।",en:"Think the other way too — how much less is four hundred than a thousand? Subtract four hundred from a thousand and six hundred is left. So four hundred is six hundred less than a thousand.",mr:"उलटही विचार करा — चारशे, हजारापेक्षा किती कमी? हजारातून चारशे वजा करा तर सहाशे उरतात. म्हणजे चारशे, हजारापेक्षा सहाशे कमी आहे.",dur:11000},
   {art:bigExpr("1027, 1028, 1029, <span style='color:#21C997'>1030</span>..."),cap:"Sequence aage (forward): har baar 1 jodte jao.",hi:"नंबर क्रम में आगे लिखो — एक हज़ार सत्ताईस, अट्ठाईस, उनतीस, तीस। हर बार एक जोड़ते जाओ। यही आगे की sequence है।",en:"Write numbers forward in order — one thousand twenty-seven, twenty-eight, twenty-nine, thirty. Add one each time. This is the forward sequence.",mr:"नंबर क्रमाने पुढे लिहा — एक हजार सत्तावीस, अठ्ठावीस, एकोणतीस, तीस. प्रत्येक वेळी एक जोडत जा. हीच पुढची sequence.",dur:10500},
   {art:bigExpr("8003, 8002, 8001, <span style='color:#FF7A6B'>8000</span>..."),cap:"Sequence peeche (backward): har baar 1 ghatate jao.",hi:"नंबर क्रम में पीछे भी लिख सकते हैं — आठ हज़ार तीन, दो, एक, हज़ार। हर बार एक घटाते जाओ। यही पीछे की sequence है।",en:"We can also write numbers backward in order — eight thousand three, two, one, thousand. Subtract one each time. This is the backward sequence.",mr:"नंबर क्रमाने मागेही लिहू शकतो — आठ हजार तीन, दोन, एक, हजार. प्रत्येक वेळी एक वजा करत जा. हीच मागची sequence.",dur:10500},
   {art:`<div style="display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap"><span style="background:#D9F7E6;padding:5px 9px;border-radius:6px;font-weight:800">3000</span><span style="background:#FFE4C4;padding:5px 9px;border-radius:6px;font-weight:800">400</span><span style="background:#CDE9FF;padding:5px 9px;border-radius:6px;font-weight:800">50</span><span style="background:#F0D9FF;padding:5px 9px;border-radius:6px;font-weight:800">2</span></div>`,cap:"Arrow cards: 3000, 400, 50, 2 ko jodke 3452 banta.",hi:"एरो कार्ड्स से नंबर बनाते हैं। तीन हज़ार, चार सौ, पचास और दो के कार्ड एक के ऊपर एक रखो तो बनता है तीन हज़ार चार सौ बावन। हर कार्ड एक घर है।",en:"We make numbers with arrow cards. Place the cards three thousand, four hundred, fifty and two over each other and you get three thousand four hundred fifty-two. Each card is one house.",mr:"अॅरो कार्ड्सने नंबर बनवतो. तीन हजार, चारशे, पन्नास आणि दोनची कार्ड एकावर एक ठेवली की होतो तीन हजार चारशे बावन्न. प्रत्येक कार्ड एक घर आहे.",dur:11500},
   {art:bigExpr("3452 = 3000+400+50+2"),cap:"Expanded form: 3452 = 3000 + 400 + 50 + 2.",hi:"तो तीन हज़ार चार सौ बावन का विस्तारित रूप है — तीन हज़ार जोड़ चार सौ जोड़ पचास जोड़ दो। हर अंक की कीमत उसके घर से तय होती है।",en:"So the expanded form of three thousand four hundred fifty-two is three thousand plus four hundred plus fifty plus two. Each digit's value comes from its house.",mr:"तर तीन हजार चारशे बावन्नचं विस्तारित रूप आहे — तीन हजार अधिक चारशे अधिक पन्नास अधिक दोन. प्रत्येक अंकाची किंमत त्याच्या घरावरून ठरते.",dur:11000},
   {art:bigExpr("4085 = 4000 + 0 + 80 + 5<br>'Four thousand eighty-five'"),cap:"Zero placeholder: 4085 mein hundreds khaali, par 0 zaroori!",hi:"चार हज़ार पचासी को देखो — चार हज़ार जोड़ शून्य सौ जोड़ अस्सी जोड़ पाँच। यहाँ सैकड़े का घर खाली है, पर शून्य लिखना ज़रूरी है ताकि बाकी अंक सही घर में रहें।",en:"Look at four thousand eighty-five — four thousand plus zero hundred plus eighty plus five. Here the hundreds house is empty, but writing zero is needed so the other digits stay in their correct houses.",mr:"चार हजार पंच्याऐंशी पाहा — चार हजार अधिक शून्य शतक अधिक ऐंशी अधिक पाच. इथे शतकाचं घर रिकामं आहे, पण शून्य लिहिणं आवश्यक आहे जेणेकरून बाकीचे अंक योग्य घरात राहतील.",dur:12000},
   {art:bigExpr("7Th 0H 2T 4O = <span style='color:#21C997'>7024</span><br>(724 ❌)"),cap:"Dhyan se! 7 Thousand 0 Hundred 2 Ten 4 One = 7024, 724 nahi!",hi:"बहुत ध्यान से — सात हज़ार, शून्य सैकड़ा, दो दहाई, चार इकाई बराबर सात हज़ार चौबीस। अगर शून्य भूल गए तो गलती से सात सौ चौबीस बन जाएगा, जो गलत है।",en:"Very carefully — seven thousand, zero hundred, two ten, four one is seven thousand twenty-four. If you forget the zero, it wrongly becomes seven hundred twenty-four, which is wrong.",mr:"खूप काळजीपूर्वक — सात हजार, शून्य शतक, दोन दशक, चार एकक बरोबर सात हजार चोवीस. शून्य विसरलात तर चुकून सातशे चोवीस होईल, जे चूक आहे.",dur:12000},
   {art:bigExpr("2 Hundreds &gt; 2 Tens &gt; 2 Ones"),cap:"Place ka kamaal: 2 Hundreds (200) > 2 Tens (20) > 2 Ones (2).",hi:"एक ज़रूरी बात — एक ही अंक की कीमत उसके घर से बदलती है। दो सैकड़ा यानी दो सौ, दो दहाई यानी बीस, और दो इकाई यानी दो। तो दो सैकड़ा सबसे बड़ा।",en:"An important thing — the same digit's value changes with its house. Two hundreds is two hundred, two tens is twenty, and two ones is two. So two hundreds is the biggest.",mr:"एक महत्त्वाची गोष्ट — एकाच अंकाची किंमत त्याच्या घरावरून बदलते. दोन शतक म्हणजे दोनशे, दोन दशक म्हणजे वीस, आणि दोन एकक म्हणजे दोन. तर दोन शतक सर्वात मोठं.",dur:11500},
   {art:bigExpr("2 Hundreds (200) &gt; 9 Tens (90)<br>2 Thousands (2000) &gt; 5 Tens (50)"),cap:"2 Hundreds, 9 Tens se bhi bada! Bada ghar = badi keemat.",hi:"देखो — दो सैकड़ा यानी दो सौ, नौ दहाई यानी नब्बे से भी बड़ा है! क्योंकि सैकड़ा, दहाई से बड़ा घर है। इसी तरह दो हज़ार, पाँच दहाई से बहुत बड़ा।",en:"See — two hundreds, that is two hundred, is even bigger than nine tens, which is ninety! Because hundreds is a bigger house than tens. Likewise two thousands is far bigger than five tens.",mr:"पाहा — दोन शतक म्हणजे दोनशे, नऊ दशक म्हणजे नव्वदपेक्षाही मोठं आहे! कारण शतक हे दशकापेक्षा मोठं घर आहे. त्याचप्रमाणे दोन हजार, पाच दशकापेक्षा खूप मोठं.",dur:12000},
   {art:bigExpr("4500 &gt; 3900"),cap:"COMPARING: pehle THOUSANDS ka ghar dekho. 4 > 3, to 4500 bada.",hi:"अब तुलना सीखते हैं। दो नंबरों में पहले सबसे बड़ा घर यानी थाउज़ेंड देखो। चार हज़ार पाँच सौ में चार, और तीन हज़ार नौ सौ में तीन। चार बड़ा है, तो चार हज़ार पाँच सौ बड़ा।",en:"Now we learn comparing. In two numbers, first look at the biggest house, the thousands. Four thousand five hundred has four, three thousand nine hundred has three. Four is bigger, so four thousand five hundred is bigger.",mr:"आता तुलना शिकू. दोन नंबरांत आधी सर्वात मोठं घर म्हणजे थाउजंड पाहा. चार हजार पाचशेमध्ये चार, तीन हजार नऊशेमध्ये तीन. चार मोठा, तर चार हजार पाचशे मोठा.",dur:11500},
   {art:bigExpr("3<span style='color:#FF7A6B'>1</span>02 &gt; 3<span style='color:#FF7A6B'>0</span>12"),cap:"Th same? Agla ghar dekho. 3102 > 3012 (hundreds: 1 > 0).",hi:"अगर थाउज़ेंड समान हों, तो अगला घर सैकड़ा देखो। तीन हज़ार एक सौ दो और तीन हज़ार बारह — दोनों में थाउज़ेंड तीन। पर सैकड़े में एक, दूसरे में शून्य। एक बड़ा, तो तीन हज़ार एक सौ दो बड़ा।",en:"If the thousands are equal, look at the next house, hundreds. Three thousand one hundred two and three thousand twelve — both have three thousands. But hundreds is one versus zero. One is bigger, so three thousand one hundred two is bigger.",mr:"थाउजंड समान असतील तर पुढचं घर शतक पाहा. तीन हजार एकशे दोन आणि तीन हजार बारा — दोन्हीत थाउजंड तीन. पण शतकात एक, दुसऱ्यात शून्य. एक मोठा, तर तीन हजार एकशे दोन मोठा.",dur:12000},
   {art:bigExpr("2190 &lt; 2910<br>9001 &gt; 982"),cap:"Signs: chhota < bada. 2190 < 2910. 9001 > 982 (4-digit > 3-digit).",hi:"चिह्न याद रखो — छोटा वाला मुँह छोटी संख्या की तरफ। दो हज़ार एक सौ नब्बे छोटा है दो हज़ार नौ सौ दस से। और नौ हज़ार एक तो नौ सौ बयासी से बहुत बड़ा, क्योंकि चार अंक वाला हमेशा तीन अंक वाले से बड़ा।",en:"Remember the signs — the small mouth points to the smaller number. Two thousand one hundred ninety is smaller than two thousand nine hundred ten. And nine thousand one is much bigger than nine hundred eighty-two, because a four-digit number is always bigger than a three-digit one.",mr:"चिन्हं लक्षात ठेवा — लहान तोंड लहान संख्येकडे. दोन हजार एकशे नव्वद लहान दोन हजार नऊशे दहापेक्षा. आणि नऊ हजार एक तर नऊशे ब्याऐंशीपेक्षा खूप मोठा, कारण चार अंकी नेहमी तीन अंकीपेक्षा मोठा.",dur:12000},
   {art:bigExpr("1099 &lt; 1899 &lt; 1986<br>(increasing order)"),cap:"Increasing order: chhote se bade. Jaise prices ₹1099 < ₹1899 < ₹1986.",hi:"बढ़ते क्रम का मतलब है छोटे से बड़े की ओर लगाना। जैसे दामों को लगाओ — दस सौ निन्यानवे, फिर अठारह सौ निन्यानवे, फिर उन्नीस सौ छियासी। यही increasing order है।",en:"Increasing order means arranging from small to big. Like arranging prices — ten ninety-nine, then eighteen ninety-nine, then nineteen eighty-six. This is increasing order.",mr:"वाढता क्रम म्हणजे लहानाकडून मोठ्याकडे लावणे. जसे किमती लावा — दहाशे नव्व्याण्णव, मग अठराशे नव्व्याण्णव, मग एकोणीसशे शहाऐंशी. हाच increasing order.",dur:11500},
   {art:bigExpr("8611 &gt; 8586 &gt; 7138...<br>(decreasing order)"),cap:"Decreasing order: bade se chhote. Jaise mountains highest to lowest.",hi:"घटते क्रम का मतलब है बड़े से छोटे की ओर। जैसे पहाड़ों की ऊँचाई सबसे ऊँची से सबसे नीची लगाओ — आठ हज़ार छह सौ ग्यारह, फिर आठ हज़ार पाँच सौ छियासी। यही decreasing order है।",en:"Decreasing order means from big to small. Like arranging mountain heights from tallest to shortest — eight thousand six hundred eleven, then eight thousand five hundred eighty-six. This is decreasing order.",mr:"उतरता क्रम म्हणजे मोठ्याकडून लहानाकडे. जसे पर्वतांची उंची सर्वात उंचाकडून सर्वात कमीकडे लावा — आठ हजार सहाशे अकरा, मग आठ हजार पाचशे शहाऐंशी. हाच decreasing order.",dur:11500},
   {art:numline(1000,1100,[1001,1038,1069,1084]),cap:"Number line pe 4-digit numbers: 1038, 1069, 1084 ko mark karo.",hi:"नंबर लाइन पर चार अंकों के नंबर भी रख सकते हैं। एक हज़ार और ग्यारह सौ के बीच एक हज़ार अड़तीस, उनहत्तर और चौरासी को सही जगह पर निशान लगाओ।",en:"We can place four-digit numbers on a number line too. Between one thousand and eleven hundred, mark one thousand thirty-eight, sixty-nine and eighty-four at the right spots.",mr:"नंबर लाइनवर चार अंकी नंबरही ठेवता येतात. एक हजार आणि अकराशेच्या मध्ये एक हजार अडतीस, एकोणसत्तर आणि चौऱ्याऐंशी योग्य जागी खूण करा.",dur:11500},
   {art:bigExpr("2226 &lt; <span style='color:#21C997'>3126</span> &lt; 3226"),cap:"Beech mein kaun? 3126 aata hai 2226 aur 3226 ke beech.",hi:"किसी रेंज के बीच की संख्याएँ ढूँढो। जैसे दो हज़ार दो सौ छब्बीस और तीन हज़ार दो सौ छब्बीस के बीच तीन हज़ार एक सौ छब्बीस आता है, पर तीन हज़ार तीन सौ सोलह नहीं।",en:"Find numbers between a range. Like between two thousand two hundred twenty-six and three thousand two hundred twenty-six comes three thousand one hundred twenty-six, but not three thousand three hundred sixteen.",mr:"एखाद्या रेंजमधल्या संख्या शोधा. जसे दोन हजार दोनशे सव्वीस आणि तीन हजार दोनशे सव्वीसच्या मध्ये तीन हजार एकशे सव्वीस येतो, पण तीन हजार तीनशे सोळा नाही.",dur:11500},
   {art:bigExpr("1895 <span style='color:#21C997'>+1</span> = 1896<br>5648 <span style='color:#FF7A6B'>−10</span> = 5638"),cap:"Place value slider: number ko 1, 10 ya 20 se badhao/ghatao.",hi:"प्लेस वैल्यू स्लाइडर से नंबर को बढ़ा या घटा सकते हैं। जैसे अठारह सौ पंचानवे में एक जोड़ो तो छियानवे। छप्पन सौ अड़तालीस में से दस घटाओ तो अड़तीस। सिर्फ सही घर का अंक बदलता है।",en:"With a place value slider we can increase or decrease a number. Like eighteen ninety-five plus one is ninety-six. Fifty-six forty-eight minus ten is thirty-eight. Only the digit in the right house changes.",mr:"प्लेस व्हॅल्यू स्लायडरने नंबर वाढवता किंवा कमी करता येतो. जसे अठराशे पंच्याण्णवमध्ये एक जोडा तर शहाण्णव. छप्पन्नशे अठ्ठेचाळीसमधून दहा वजा तर अडतीस. फक्त योग्य घराचा अंक बदलतो.",dur:11500},
   {art:`<div style="font-size:46px">🛕🦏🇮🇳</div>`,cap:"1000s around us: Thousand Pillars Temple (1000 khambe), ~4000 rhino, India ke 788 districts!",hi:"हमारे आसपास भी हज़ारों हैं! कर्नाटक के थाउज़ेंड पिलर्स मंदिर में हज़ार खंभे हैं। भारत में अब लगभग चार हज़ार गैंडे हैं। और हमारे देश में सात सौ अठासी ज़िले और सात हज़ार पाँच सौ किलोमीटर का समुद्र तट है।",en:"There are thousands around us too! The Thousand Pillars Temple in Karnataka has a thousand pillars. India now has about four thousand rhinoceroses. And our country has seven hundred eighty-eight districts and a seven thousand five hundred kilometre coastline.",mr:"आपल्या आजूबाजूलाही हजारो आहेत! कर्नाटकातल्या थाउजंड पिलर्स मंदिरात हजार खांब आहेत. भारतात आता सुमारे चार हजार गेंडे आहेत. आणि आपल्या देशात सातशे अठ्ठ्याऐंशी जिल्हे आणि सात हजार पाचशे किलोमीटरचा समुद्रकिनारा आहे.",dur:12500},
   {art:bigExpr("700–800 → 99 numbers<br>7000–8000 → <span style='color:#21C997'>999</span> numbers"),cap:"Challenge: 700-800 ke beech 99, to 7000-8000 ke beech 999!",hi:"एक चुनौती — जैसे सात सौ और आठ सौ के बीच निन्यानवे संख्याएँ हैं, वैसे ही सात हज़ार और आठ हज़ार के बीच नौ सौ निन्यानवे संख्याएँ होती हैं।",en:"A challenge — just as there are ninety-nine numbers between seven hundred and eight hundred, there are nine hundred ninety-nine numbers between seven thousand and eight thousand.",mr:"एक आव्हान — जसे सातशे आणि आठशेच्या मध्ये नव्व्याण्णव संख्या आहेत, तसेच सात हजार आणि आठ हजाराच्या मध्ये नऊशे नव्व्याण्णव संख्या असतात.",dur:11500},
   {art:emoji("📦"),cap:"Recap: grouping (10→1), 1000=10 hundreds, Th-H-T-O, expanded, words, compare, order, number line.",hi:"चलो सब दोहराते हैं — दस छोटे मिलकर एक बड़ा; हज़ार बराबर दस सैकड़ा; थाउज़ेंड सैकड़ा दहाई इकाई के घर; विस्तारित रूप और शब्द; तुलना और क्रम; और नंबर लाइन।",en:"Let's recap — ten smaller make one bigger; thousand equals ten hundreds; the thousands, hundreds, tens, ones houses; expanded form and words; comparing and ordering; and the number line.",mr:"चला सर्व उजळणी करू — दहा लहान मिळून एक मोठं; हजार बरोबर दहा शतक; थाउजंड शतक दशक एककची घरं; विस्तारित रूप आणि शब्द; तुलना आणि क्रम; आणि नंबर लाइन.",dur:12500},
   {art:emoji("🌟"),cap:"Shabaash! Ab Thousands ka quiz khelo — 60 sawaal — aur perfect bano!",hi:"शाबाश! तुमने यह बड़ा चॅप्टर पूरा सीख लिया। अब थाउज़ेंड्स का क्विज़ खेलो — साठ सवाल हैं — और परफेक्ट बनो!",en:"Well done! You learned this whole big chapter. Now play the Thousands quiz — sixty questions — and become perfect!",mr:"शाब्बास! तू हा मोठा धडा पूर्ण शिकलास. आता थाउजंड्सचा क्विझ खेळ — साठ प्रश्न आहेत — आणि परफेक्ट हो!",dur:8500},

 {id:'frac',title:'Sharing & Measuring',emoji:'🍕',color:C.coral,scenes:[
   {art:emoji("🐘"),cap:"Chapter 5 — Sharing and Measuring! Aaj fractions (hisson) ki duniya.",hi:"नमस्ते दोस्तों! आज पाँचवाँ चॅप्टर — शेयरिंग एंड मेज़रिंग। इसमें हम सीखेंगे कि किसी चीज़ को बराबर हिस्सों में कैसे बाँटते हैं। इन्हीं हिस्सों को fractions यानी भिन्न कहते हैं।",en:"Namaste friends! Today is chapter five, Sharing and Measuring. We will learn how to share a thing into equal parts. These parts are called fractions.",mr:"नमस्कार मित्रांनो! आज पाचवा धडा — शेअरिंग अँड मेजरिंग. यात आपण शिकू की एखादी गोष्ट समान भागांत कशी वाटायची. याच भागांना fractions म्हणजे अपूर्णांक म्हणतात.",dur:11000},
   {art:circleSVG(1,0,false,150),cap:"WHOLE: ek poori cheez = 1. Jaise ek poori dhokla.",hi:"सबसे पहले — पूरी चीज़ को होल यानी एक कहते हैं। जैसे एक पूरा ढोकला या एक पूरी रोटी। अभी इसे किसी ने बाँटा नहीं है।",en:"First — a full thing is called a whole, which is one. Like one full dhokla or one full roti. Nobody has shared it yet.",mr:"सर्वात आधी — पूर्ण वस्तूला होल म्हणजे एक म्हणतात. जसे एक पूर्ण ढोकळा किंवा एक पूर्ण पोळी. अजून कोणी ती वाटलेली नाही.",dur:10000},
   {art:circleSVG(2,1,true,150),cap:"HALF (½): cheez ko 2 BARABAR hisson mein baanto. Ek hissa = ½.",hi:"अब इसे दो बराबर हिस्सों में बाँटो। हर एक हिस्से को आधा यानी half कहते हैं, और लिखते हैं एक बटा दो। दो बराबर होना बहुत ज़रूरी है।",en:"Now share it into two equal parts. Each part is called a half, written as one over two. Being two equal parts is very important.",mr:"आता त्याला दोन समान भागांत वाटा. प्रत्येक भागाला अर्धा म्हणजे half म्हणतात, आणि लिहितो एक भागिले दोन. दोन समान असणं खूप महत्त्वाचं.",dur:11000},
   {art:`<div style="display:flex;flex-direction:column;gap:8px;align-items:center">${barSVG(2,1,true,220)}<div style="font-weight:800;color:${C.mint}">✓ Barabar — yeh HALF hai</div>${barSVG(2,1,false,220)}<div style="font-weight:800;color:${C.coral}">✗ Barabar nahi — yeh half NAHI</div></div>`,cap:"Magic word: EQUAL! Agar tukde barabar nahi, to wo half nahi.",hi:"सबसे ज़रूरी शब्द — बराबर! अगर किसी चीज़ को दो हिस्सों में बाँटा पर वे बराबर नहीं हैं, तो वह आधा नहीं कहलाता। हिस्से एक जैसे साइज़ के होने चाहिए।",en:"The most important word — equal! If a thing is split into two parts but they are not equal, it is not a half. The parts must be the same size.",mr:"सर्वात महत्त्वाचा शब्द — समान! एखादी गोष्ट दोन भागांत वाटली पण ते समान नसतील, तर तो अर्धा नाही. भाग सारख्या आकाराचे असले पाहिजेत.",dur:11000},
   {art:`<div style="display:flex;gap:10px">${barSVG(2,1,true,90)}${circleSVG(2,1,false,80)}${circleSVG(2,1,true,80)}</div>`,cap:"Half banane ke kai tareeke: seedha, aadi, tircha — sab theek agar barabar.",hi:"आधा बनाने के कई तरीके हैं। किसी कागज़ को बीच से सीधा मोड़ो, या आड़ा मोड़ो, या कोने से कोने तक तिरछा मोड़ो — हर तरीके से आधा बनता है, बशर्ते दोनों हिस्से बराबर हों।",en:"There are many ways to make a half. Fold a paper straight down the middle, or across, or diagonally corner to corner — each way makes a half, as long as both parts are equal.",mr:"अर्धा बनवण्याचे अनेक मार्ग आहेत. कागद मधोमध सरळ दुमडा, किंवा आडवा, किंवा कोपऱ्यापासून कोपऱ्यापर्यंत तिरका — प्रत्येक मार्गाने अर्धा होतो, जर दोन्ही भाग समान असतील.",dur:11500},
   {art:circleSVG(4,1,false,150),cap:"QUARTER (¼): cheez ko 4 BARABAR hisson mein baanto. Ek = ¼.",hi:"अब चीज़ को चार बराबर हिस्सों में बाँटो। हर एक हिस्से को क्वार्टर यानी quarter कहते हैं, और लिखते हैं एक बटा चार।",en:"Now share the thing into four equal parts. Each part is called a quarter, written as one over four.",mr:"आता गोष्ट चार समान भागांत वाटा. प्रत्येक भागाला क्वार्टर म्हणतात, आणि लिहितो एक भागिले चार.",dur:10500},
   {art:`<div style="display:flex;gap:14px;align-items:center">${circleSVG(2,1,true,90)}<div style="font-size:22px;color:#6B5E94">=</div>${circleSVG(4,2,false,90)}</div>`,cap:"Ikra-Samina: 2 QUARTERS milke 1 HALF! To dono barabar.",hi:"किताब की कहानी — समीना को लगा कि दो क्वार्टर, एक हाफ से बड़े हैं। पर असल में दो क्वार्टर मिलकर एक हाफ ही बनते हैं! यानी दोनों बराबर हैं। समीना धोखे में आ गई।",en:"The book's story — Samina thought two quarters were bigger than one half. But really, two quarters together make exactly one half! So both are equal. Samina was tricked.",mr:"पुस्तकातली गोष्ट — समीनाला वाटलं दोन क्वार्टर, एका हाफपेक्षा मोठे आहेत. पण खरंतर दोन क्वार्टर मिळून एक हाफच होतो! म्हणजे दोन्ही समान आहेत. समीना फसली.",dur:12000},
   {art:circleSVG(4,4,false,150),cap:"4 quarters = 1 whole. Saare hisse milke poori cheez!",hi:"चार क्वार्टर मिलकर एक पूरा होल बनाते हैं। यानी सारे हिस्से वापस जोड़ दो तो पूरी चीज़ बन जाती है।",en:"Four quarters make one whole. That is, join all the parts back and you get the full thing.",mr:"चार क्वार्टर मिळून एक पूर्ण होल बनतात. म्हणजे सर्व भाग पुन्हा जोडले की पूर्ण गोष्ट होते.",dur:10000},
   {art:`<div style="display:flex;gap:8px">${barSVG(4,1,true,90)}${circleSVG(4,1,false,80)}</div>`,cap:"Quarter banane ke bhi kai tareeke — bas 4 hisse barabar hon.",hi:"क्वार्टर बनाने के भी कई तरीके हैं — कागज़ को दो बार मोड़ो, या चार बराबर पट्टियों में, या चार बराबर चौकोरों में। बस चारों हिस्से बराबर होने चाहिए।",en:"There are many ways to make quarters too — fold the paper twice, or into four equal strips, or four equal squares. Just all four parts must be equal.",mr:"क्वार्टर बनवण्याचेही अनेक मार्ग आहेत — कागद दोनदा दुमडा, किंवा चार समान पट्ट्यांत, किंवा चार समान चौकोनांत. फक्त चारही भाग समान असावेत.",dur:11500},
   {art:circleSVG(5,1,false,150),cap:"5 barabar hisse = ⅕ (one-fifth). Aur jitne hisse, utna naam.",hi:"अगर चीज़ को पाँच बराबर हिस्सों में बाँटो, तो हर हिस्सा एक बटा पाँच यानी one-fifth कहलाता है। जितने बराबर हिस्से करोगे, नीचे उतनी संख्या लिखोगे।",en:"If you share a thing into five equal parts, each part is one over five, called one-fifth. The more equal parts you make, the bigger the number written below.",mr:"गोष्ट पाच समान भागांत वाटली, तर प्रत्येक भाग एक भागिले पाच म्हणजे one-fifth. जितके समान भाग कराल, खाली तितकी संख्या लिहाल.",dur:11000},
   {art:`<div style="display:flex;gap:6px;align-items:center">${circleSVG(2,1,true,62)}${circleSVG(3,1,false,62)}${circleSVG(4,1,false,62)}${circleSVG(5,1,false,62)}</div>`,cap:"Ding Dong dhokla: 2 log=½, 3 log=⅓, 4 log=¼, 5 log=⅕!",hi:"ढोकला वाली कहानी — जैसे-जैसे मेहमान आते गए, ढोकला और हिस्सों में बँटता गया। दो लोग तो आधा-आधा, तीन लोग एक-तिहाई, चार लोग एक-चौथाई, और पाँच लोग एक-पाँचवाँ हिस्सा।",en:"The dhokla story — as more guests arrived, the dhokla was shared into more parts. Two people get a half each, three people one-third, four people one-quarter, and five people one-fifth each.",mr:"ढोकळ्याची गोष्ट — जसजसे पाहुणे आले, तसतसा ढोकळा अधिक भागांत वाटला गेला. दोन लोक अर्धा-अर्धा, तीन लोक एक-तृतीयांश, चार लोक एक-चतुर्थांश, आणि पाच लोक एक-पंचमांश.",dur:12000},
   {art:`<div style="display:flex;gap:6px;align-items:center">${circleSVG(2,1,true,62)}<span style="color:#6B5E94">&gt;</span>${circleSVG(3,1,false,62)}<span style="color:#6B5E94">&gt;</span>${circleSVG(5,1,false,62)}</div>`,cap:"BADA IDEA: jitne ZYADA log/hisse, utna CHHOTA hissa! ½ > ⅓ > ⅕.",hi:"यह चॅप्टर का सबसे बड़ा विचार है — किसी चीज़ को जितने ज़्यादा लोगों में बाँटोगे, हर एक का हिस्सा उतना छोटा होगा। इसलिए आधा, एक-तिहाई से बड़ा है, और एक-तिहाई, एक-पाँचवें से बड़ा।",en:"This is the biggest idea of the chapter — the more people you share a thing among, the smaller each one's part. So a half is bigger than a third, and a third is bigger than a fifth.",mr:"हा धड्याचा सर्वात मोठा विचार आहे — एखादी गोष्ट जितक्या जास्त लोकांत वाटाल, प्रत्येकाचा भाग तितका लहान. म्हणून अर्धा, एक-तृतीयांशपेक्षा मोठा, आणि एक-तृतीयांश, एक-पंचमांशपेक्षा मोठा.",dur:12500},
   {art:bigExpr("Jitna bada neeche wala<br>number, utna CHHOTA hissa"),cap:"Trick: ½, ⅓, ¼, ⅕ — neeche ka number bada to piece chhota.",hi:"एक आसान ट्रिक — फ्रैक्शन में नीचे वाला नंबर देखो। नीचे जितना बड़ा नंबर, हर हिस्सा उतना छोटा। जैसे एक बटा आठ, एक बटा दो से बहुत छोटा होता है।",en:"An easy trick — look at the bottom number in a fraction. The bigger the bottom number, the smaller each part. Like one over eight is much smaller than one over two.",mr:"एक सोपी युक्ती — अपूर्णांकात खालचा नंबर पाहा. खालचा नंबर जितका मोठा, प्रत्येक भाग तितका लहान. जसे एक भागिले आठ, एक भागिले दोनपेक्षा खूप लहान.",dur:11500},
   {art:`<div style="display:flex;gap:6px;align-items:center">${circleSVG(3,3,false,80)}<span style="color:#6B5E94">=</span><span style="font-size:30px">1</span></div>`,cap:"n pieces of 1/n = 1 whole! 3 pieces of ⅓ = poora.",hi:"एक मज़ेदार बात — किसी फ्रैक्शन के उतने ही टुकड़े जोड़ो जितना नीचे का नंबर है, तो पूरा होल बन जाता है। जैसे एक-तिहाई के तीन टुकड़े मिलकर एक पूरा, और एक-पाँचवें के पाँच टुकड़े मिलकर एक पूरा।",en:"A fun fact — join as many pieces of a fraction as the bottom number, and you get one whole. Like three pieces of one-third make a whole, and five pieces of one-fifth make a whole.",mr:"एक मजेशीर गोष्ट — अपूर्णांकाचे जितके खालचा नंबर तितके तुकडे जोडा, तर एक पूर्ण होल होतो. जसे एक-तृतीयांशचे तीन तुकडे मिळून एक पूर्ण, आणि एक-पंचमांशचे पाच तुकडे मिळून एक पूर्ण.",dur:12000},
   {art:bigExpr("10 pieces of 1/10 = 1<br>5 pieces of ⅕ = 1"),cap:"10 tukde 1/10 ke = 1 whole. 5 tukde ⅕ ke = 1 whole.",hi:"इसी तरह एक बटा दस के दस टुकड़े मिलकर एक पूरा बनते हैं। और एक बटा पाँच के पाँच टुकड़े मिलकर एक पूरा। नीचे का नंबर बताता है कि कितने टुकड़े चाहिए।",en:"Likewise, ten pieces of one-tenth make a whole. And five pieces of one-fifth make a whole. The bottom number tells how many pieces are needed.",mr:"त्याचप्रमाणे एक भागिले दहाचे दहा तुकडे मिळून एक पूर्ण होतात. आणि एक भागिले पाचचे पाच तुकडे मिळून एक पूर्ण. खालचा नंबर सांगतो किती तुकडे हवेत.",dur:11500},
   {art:bigExpr("<span style='font-size:34px'>3</span> ← upar (kitne liye)<br>—<br><span style='font-size:34px'>5</span> ← neeche (total parts)"),cap:"Fraction ke 2 number: upar = kitne liye, neeche = total barabar parts.",hi:"फ्रैक्शन में दो नंबर होते हैं। ऊपर वाला बताता है हमने कितने हिस्से लिए। नीचे वाला बताता है पूरी चीज़ कुल कितने बराबर हिस्सों में बँटी है। जैसे तीन बटा पाँच — पाँच में से तीन हिस्से लिए।",en:"A fraction has two numbers. The top one tells how many parts we took. The bottom one tells how many equal parts the whole is split into. Like three over five — we took three out of five parts.",mr:"अपूर्णांकात दोन नंबर असतात. वरचा सांगतो आपण किती भाग घेतले. खालचा सांगतो पूर्ण गोष्ट एकूण किती समान भागांत वाटली. जसे तीन भागिले पाच — पाचपैकी तीन भाग घेतले.",dur:12000},
   {art:`<div style="display:flex;gap:6px;align-items:center">${barSVG(5,1,true,80)}${barSVG(5,2,true,80)}${barSVG(5,3,true,80)}</div>`,cap:"Flower garden: ⅕, ⅖, ⅗... numerator badhe to zyada hissa.",hi:"इधा के फूलों के बगीचे में — एक हिस्से में फूल हो तो एक-पाँचवाँ, दो हिस्सों में हो तो दो-पाँचवाँ, तीन में हो तो तीन-पाँचवाँ। ऊपर का नंबर जितना बड़ा, उतना ज़्यादा हिस्सा।",en:"In Idha's flower garden — flowers in one part is one-fifth, in two parts is two-fifths, in three parts is three-fifths. The bigger the top number, the more the share.",mr:"इधाच्या फुलांच्या बागेत — एका भागात फुलं असतील तर एक-पंचमांश, दोन भागांत तर दोन-पंचमांश, तीन भागांत तर तीन-पंचमांश. वरचा नंबर जितका मोठा, तितका जास्त भाग.",dur:11500},
   {art:`<div style="display:flex;gap:6px;align-items:center">${barSVG(5,5,true,120)}<span style="color:#6B5E94">=</span><span style="font-size:28px">1</span></div>`,cap:"5/5 = poora garden = 1 whole. Saare hisse = whole.",hi:"और अगर पाँचों हिस्सों में फूल हों, यानी पाँच बटा पाँच, तो पूरा बगीचा भर जाता है — यानी एक पूरा होल। जब ऊपर और नीचे का नंबर बराबर हो, तो वह एक पूरा होता है।",en:"And if all five parts have flowers, that is five over five, the whole garden is full — one whole. When the top and bottom numbers are equal, it is one whole.",mr:"आणि पाचही भागांत फुलं असतील, म्हणजे पाच भागिले पाच, तर पूर्ण बाग भरते — एक पूर्ण होल. वरचा आणि खालचा नंबर समान असेल, तर तो एक पूर्ण असतो.",dur:11500},
   {art:`<div style="display:flex;gap:6px;align-items:center">${circleSVG(4,1,false,80)}<span style="color:#6B5E94">→ ¼</span></div>`,cap:"Picture se fraction padho: kitne shaded / kitne total.",hi:"किसी चित्र से फ्रैक्शन पढ़ना आसान है — गिनो कुल कितने बराबर हिस्से हैं (नीचे), और कितने रंगे हुए हैं (ऊपर)। जैसे चार में से एक रंगा हो तो एक बटा चार।",en:"Reading a fraction from a picture is easy — count how many equal parts in total (bottom), and how many are coloured (top). Like one coloured out of four is one over four.",mr:"चित्रावरून अपूर्णांक वाचणं सोपं — मोजा एकूण किती समान भाग आहेत (खाली), आणि किती रंगवलेले आहेत (वर). जसे चारपैकी एक रंगवलेला तर एक भागिले चार.",dur:11500},
   {art:`<div style="display:flex;gap:10px;align-items:center">${barSVG(2,1,true,100)}<span style="color:#6B5E94">=</span>${barSVG(4,2,true,100)}</div>`,cap:"EQUIVALENT: ½ = 2/4! Alag dikhte, par barabar hissa.",hi:"एक खास बात — कुछ अलग-दिखने वाले फ्रैक्शन असल में बराबर होते हैं। जैसे एक बटा दो और दो बटा चार बिल्कुल बराबर हैं। कागज़ को आधा मोड़ो फिर दोबारा आधा — दोनों एक ही हिस्सा दिखाते हैं।",en:"A special thing — some fractions that look different are actually equal. Like one over two and two over four are exactly equal. Fold a paper in half then in half again — both show the same share.",mr:"एक खास गोष्ट — काही वेगळे दिसणारे अपूर्णांक खरंतर समान असतात. जसे एक भागिले दोन आणि दोन भागिले चार अगदी समान आहेत. कागद अर्धा दुमडा मग पुन्हा अर्धा — दोन्ही एकच भाग दाखवतात.",dur:12000},
   {art:`<div style="display:flex;gap:10px;align-items:center">${barSVG(3,1,true,90)}<span style="color:#6B5E94">=</span>${barSVG(6,2,true,90)}</div>`,cap:"⅓ = 2/6. Teen ka fold phir aadha → same hissa.",hi:"इसी तरह एक बटा तीन और दो बटा छह भी बराबर हैं। कागज़ को तीन बराबर हिस्सों में मोड़ो, फिर आधा मोड़ो, तो वही एक-तिहाई हिस्सा अब दो बटा छह दिखता है।",en:"Likewise one over three and two over six are equal. Fold a paper into three equal parts, then in half, and the same one-third now shows as two over six.",mr:"त्याचप्रमाणे एक भागिले तीन आणि दोन भागिले सहा समान आहेत. कागद तीन समान भागांत दुमडा, मग अर्धा, तर तोच एक-तृतीयांश आता दोन भागिले सहा दिसतो.",dur:11500},
   {art:bigExpr("2 quarters (¼) = 1 half (½)<br>2 pieces of 1/8 = ¼"),cap:"Kitne ¼ = ½? → 2. Kitne 1/8 = ¼? → 2.",hi:"फ्रैक्शन चार्ट से पता चलता है — दो क्वार्टर मिलकर एक हाफ बनाते हैं। और एक बटा आठ के दो टुकड़े मिलकर एक क्वार्टर बनाते हैं। छोटे टुकड़े जोड़कर बड़े टुकड़े बनते हैं।",en:"The fraction chart shows — two quarters make one half. And two pieces of one-eighth make one quarter. Joining small pieces makes bigger pieces.",mr:"फ्रॅक्शन चार्टवरून कळतं — दोन क्वार्टर मिळून एक हाफ बनतो. आणि एक भागिले आठचे दोन तुकडे मिळून एक क्वार्टर बनतो. लहान तुकडे जोडून मोठे तुकडे बनतात.",dur:12000},
   {art:`<div style="display:flex;gap:8px;align-items:center">${barSVG(5,3,true,100)}<span style="color:#6B5E94">&gt;</span>${barSVG(5,2,true,100)}</div>`,cap:"Same neeche number ho to: upar bada = bada fraction. ⅗ > ⅖.",hi:"अगर दो फ्रैक्शन में नीचे का नंबर एक जैसा हो, तो ऊपर का नंबर देखो। ऊपर जितना बड़ा, फ्रैक्शन उतना बड़ा। जैसे तीन बटा पाँच, दो बटा पाँच से बड़ा।",en:"If two fractions have the same bottom number, look at the top number. The bigger the top, the bigger the fraction. Like three over five is bigger than two over five.",mr:"दोन अपूर्णांकांत खालचा नंबर सारखा असेल, तर वरचा नंबर पाहा. वरचा जितका मोठा, अपूर्णांक तितका मोठा. जसे तीन भागिले पाच, दोन भागिले पाचपेक्षा मोठा.",dur:11500},
   {art:`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap">🪔🪔🪔🪔<br>🪔🪔🪔🪔</div>`,cap:"Fraction of a COLLECTION: cheezon ke group ko bhi baant sakte.",hi:"फ्रैक्शन सिर्फ एक चीज़ का नहीं, चीज़ों के समूह का भी होता है। जैसे आठ दीयों का एक-चौथाई निकालना हो, तो आठ दीयों को चार बराबर समूहों में बाँटो।",en:"A fraction can be of a group of things too, not just one thing. Like to find one-quarter of eight diyas, share the eight diyas into four equal groups.",mr:"अपूर्णांक फक्त एका गोष्टीचा नाही, गोष्टींच्या गटाचाही असतो. जसे आठ दिव्यांचा एक-चतुर्थांश काढायचा असेल, तर आठ दिवे चार समान गटांत वाटा.",dur:11500},
   {art:bigExpr("¼ of 8 = 2"),cap:"Meena ke 8 diye: ¼ red = 8 ko 4 groups = har group 2 diye!",hi:"मीना के पास आठ दीये हैं, उसे एक-चौथाई लाल करने हैं। आठ दीयों को चार बराबर समूहों में बाँटो — हर समूह में दो दीये। तो एक-चौथाई बराबर दो दीये। यही एक समूह लाल करो।",en:"Meena has eight diyas, she colours one-quarter red. Share the eight diyas into four equal groups — two diyas in each group. So one-quarter equals two diyas. Colour that one group red.",mr:"मीनाकडे आठ दिवे आहेत, तिला एक-चतुर्थांश लाल करायचे आहेत. आठ दिवे चार समान गटांत वाटा — प्रत्येक गटात दोन दिवे. तर एक-चतुर्थांश बरोबर दोन दिवे. तोच एक गट लाल करा.",dur:12000},
   {art:bigExpr("⅓ of 12 = 4<br>¼ of 16 = 4"),cap:"⅓ of 12 cookies = 4. ¼ of 16 barfis = 4. Group baant ke gino!",hi:"और उदाहरण — बारह कुकीज़ का एक-तिहाई निकालना हो तो बारह को तीन बराबर समूहों में बाँटो, हर समूह चार। तो एक-तिहाई बराबर चार। इसी तरह सोलह बर्फी का एक-चौथाई बराबर चार बर्फी।",en:"More examples — to find one-third of twelve cookies, share twelve into three equal groups, each group four. So one-third equals four. Likewise one-quarter of sixteen barfis equals four barfis.",mr:"आणखी उदाहरणं — बारा कुकीजचा एक-तृतीयांश काढायचा तर बारा तीन समान गटांत वाटा, प्रत्येक गट चार. तर एक-तृतीयांश बरोबर चार. त्याचप्रमाणे सोळा बर्फीचा एक-चतुर्थांश बरोबर चार बर्फी.",dur:12500},
   {art:`<div style="font-size:46px">🍕🍞🎀🕐</div>`,cap:"Fractions har jagah: pizza ke slice, roti, ribbon, aadha ghanta!",hi:"फ्रैक्शन हमारे रोज़ के जीवन में हर जगह हैं — पिज़्ज़ा के स्लाइस, रोटी के टुकड़े, रिबन का हिस्सा, आधा घंटा, आधा गिलास पानी। ध्यान से देखोगे तो हर जगह दिखेंगे।",en:"Fractions are everywhere in daily life — pizza slices, pieces of roti, a part of ribbon, half an hour, half a glass of water. Look carefully and you'll see them everywhere.",mr:"अपूर्णांक आपल्या रोजच्या जीवनात सगळीकडे आहेत — पिझ्झाचे स्लाइस, पोळीचे तुकडे, रिबनचा भाग, अर्धा तास, अर्धा ग्लास पाणी. नीट पाहाल तर सगळीकडे दिसतील.",dur:11500},
   {art:emoji("📦"),cap:"Recap: whole, half (½), quarter (¼), ⅕; equal parts zaroori; zyada parts=chhota; n pieces of 1/n=whole; equivalent (½=2/4); fraction of group.",hi:"चलो सब दोहराते हैं — पूरा, आधा, चौथाई, पाँचवाँ; बराबर हिस्से ज़रूरी; ज़्यादा हिस्से तो छोटा भाग; नीचे जितने टुकड़े मिलकर एक पूरा; बराबर फ्रैक्शन जैसे आधा बराबर दो बटा चार; और समूह का फ्रैक्शन।",en:"Let's recap — whole, half, quarter, fifth; equal parts are needed; more parts means smaller share; that many pieces make a whole; equivalent fractions like half equals two over four; and fraction of a group.",mr:"चला सर्व उजळणी करू — पूर्ण, अर्धा, चतुर्थांश, पंचमांश; समान भाग आवश्यक; जास्त भाग म्हणजे लहान वाटा; तितके तुकडे मिळून एक पूर्ण; समान अपूर्णांक जसे अर्धा बरोबर दोन भागिले चार; आणि गटाचा अपूर्णांक.",dur:13000},
   {art:emoji("🌟"),cap:"Shabaash! Ab Sharing & Measuring ka quiz khelo aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब शेयरिंग एंड मेज़रिंग का क्विज़ खेलो और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play the Sharing and Measuring quiz and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता शेअरिंग अँड मेजरिंगचा क्विझ खेळ आणि परफेक्ट हो!",dur:8500},

 {id:'length',title:'Measuring Length',emoji:'📏',color:C.mint,scenes:[
   {art:emoji("🐘"),cap:"Chapter 6 — Measuring Length! Lambai naapna seekhenge: cm aur m.",hi:"नमस्ते दोस्तों! आज छठा चॅप्टर — मेज़रिंग लेंथ। इसमें हम सीखेंगे कि किसी चीज़ की लंबाई कैसे नापते हैं। इसके लिए हम सेंटीमीटर और मीटर का इस्तेमाल करते हैं।",en:"Namaste friends! Today is chapter six, Measuring Length. We will learn how to measure how long a thing is. For this we use centimetres and metres.",mr:"नमस्कार मित्रांनो! आज सहावा धडा — मेजरिंग लेंथ. यात आपण शिकू की एखाद्या गोष्टीची लांबी कशी मोजायची. यासाठी आपण सेंटीमीटर आणि मीटर वापरतो.",dur:11000},
   {art:`<div style="font-size:40px">📏 📐 🚪</div>`,cap:"Height, width, depth, breadth — yeh sab LENGTH hi hote hain.",hi:"एक ज़रूरी बात — ऊँचाई यानी height, चौड़ाई यानी width, गहराई यानी depth — ये सब असल में लंबाई यानी length ही नापते हैं। बस जगह और दिशा के हिसाब से अलग नाम देते हैं।",en:"An important thing — height, width, depth, breadth — all of these actually measure length. We just give them different names depending on place and direction.",mr:"एक महत्त्वाची गोष्ट — उंची म्हणजे height, रुंदी म्हणजे width, खोली म्हणजे depth — हे सर्व खरंतर लांबी म्हणजे length च मोजतात. फक्त जागा आणि दिशेनुसार वेगळी नावं देतो.",dur:11500},
   {art:bigExpr("Length ⏤ kitni LAMBI cheez hai"),cap:"Length = koi cheez kitni lambi hai. Tall, wide, deep — sab length.",hi:"तो जब हम कहते हैं कोई लंबा है, चौड़ा है, या गहरा है — हर बार हम लंबाई की ही बात कर रहे होते हैं। लंबाई बताती है कि कोई चीज़ कितनी बड़ी है एक सीध में।",en:"So when we say something is tall, wide, or deep — every time we are talking about length. Length tells how big a thing is in a straight line.",mr:"तर जेव्हा आपण म्हणतो काही उंच आहे, रुंद आहे, किंवा खोल आहे — प्रत्येक वेळी आपण लांबीचीच गोष्ट करत असतो. लांबी सांगते की एखादी गोष्ट एका सरळ रेषेत किती मोठी आहे.",dur:11000},
   {art:bigExpr("1 m (metre)<br>bada length naapne ke liye"),cap:"METRE (m): badi cheezein naapne ka unit. Rope se yaad karo.",hi:"बड़ी चीज़ों की लंबाई नापने के लिए हम मीटर इस्तेमाल करते हैं, जिसे छोटे m से लिखते हैं। जैसे कमरे की लंबाई, कपड़े का टुकड़ा, या रस्सी। एक मीटर की रस्सी से इसे समझ सकते हैं।",en:"To measure the length of big things, we use the metre, written as a small m. Like the length of a room, a piece of cloth, or a rope. A one-metre rope helps us understand it.",mr:"मोठ्या गोष्टींची लांबी मोजण्यासाठी आपण मीटर वापरतो, जो लहान m ने लिहितो. जसे खोलीची लांबी, कापडाचा तुकडा, किंवा दोरी. एक मीटरच्या दोरीने हे समजू शकतो.",dur:11500},
   {art:bigExpr("1 m = ½ m + ½ m"),cap:"1 metre = aadha + aadha metre. Do half ropes milke 1m.",hi:"एक मीटर की रस्सी को बीच से बाँटो तो दो आधे-मीटर बनते हैं। यानी आधा मीटर और आधा मीटर मिलकर एक पूरा मीटर बनाते हैं। यह बिल्कुल फ्रैक्शन जैसा है।",en:"Cut a one-metre rope in the middle and you get two half-metres. So half a metre plus half a metre make one full metre. This is just like fractions.",mr:"एक मीटरची दोरी मधोमध वाटली तर दोन अर्धा-मीटर होतात. म्हणजे अर्धा मीटर आणि अर्धा मीटर मिळून एक पूर्ण मीटर बनतात. हे अगदी अपूर्णांकासारखं आहे.",dur:11000},
   {art:bigExpr("1 m = ¼ + ¼ + ¼ + ¼ m<br>½ m = ¼ + ¼ m"),cap:"1m = 4 quarter-metre. ½m = 2 quarter-metre. Ropes jodke banao.",hi:"इसी तरह एक मीटर में चार चौथाई-मीटर होते हैं। और आधे मीटर में दो चौथाई-मीटर। चौथाई-मीटर की रस्सियाँ जोड़कर आधा या पूरा मीटर बना सकते हैं।",en:"Likewise, one metre has four quarter-metres. And half a metre has two quarter-metres. By joining quarter-metre ropes you can make half or a full metre.",mr:"त्याचप्रमाणे एक मीटरमध्ये चार चतुर्थांश-मीटर असतात. आणि अर्ध्या मीटरमध्ये दोन चतुर्थांश-मीटर. चतुर्थांश-मीटरच्या दोऱ्या जोडून अर्धा किंवा पूर्ण मीटर बनवता येतो.",dur:11500},
   {art:`<div style="font-size:40px">🐋 🚌 🐊</div>`,cap:"Bade lengths estimate karo: whale ~30m, bus ~10m, crocodile ~6m.",hi:"बहुत बड़ी चीज़ों की लंबाई हम अंदाज़े से बताते हैं। जैसे नीली व्हेल लगभग तीस मीटर, एक बस लगभग दस मीटर, और मगरमच्छ लगभग छह मीटर लंबा होता है।",en:"For very big things we estimate the length. Like a blue whale is about thirty metres, a bus about ten metres, and a crocodile about six metres long.",mr:"खूप मोठ्या गोष्टींची लांबी आपण अंदाजाने सांगतो. जसे निळा व्हेल सुमारे तीस मीटर, एक बस सुमारे दहा मीटर, आणि मगर सुमारे सहा मीटर लांब असतो.",dur:11500},
   {art:bigExpr("2 whale = ? bus<br>30+30 = 60m ÷ 10 = 6 bus"),cap:"Comparison: 2 whale (60m) = 6 bus. Bade cheezon ko jodke socho.",hi:"बड़ी चीज़ों की तुलना भी कर सकते हैं। जैसे दो व्हेल मिलकर साठ मीटर, और एक बस दस मीटर — तो दो व्हेल की लंबाई बराबर छह बस। इस तरह बिना नापे अंदाज़ा लगाते हैं।",en:"We can compare big things too. Like two whales make sixty metres, and one bus is ten metres — so two whales equal six buses in length. This way we estimate without measuring.",mr:"मोठ्या गोष्टींची तुलनाही करता येते. जसे दोन व्हेल मिळून साठ मीटर, आणि एक बस दहा मीटर — तर दोन व्हेलची लांबी बरोबर सहा बस. अशा प्रकारे न मोजता अंदाज लावतो.",dur:11500},
   {art:`<div style="font-size:44px">📏 vs 🌾</div>`,cap:"Chhoti cheezein (eraser, rice) ke liye metre bada pad jata hai!",hi:"पर रबड़ या चावल के दाने जैसी छोटी चीज़ों के लिए मीटर बहुत बड़ा पड़ जाता है। इतनी छोटी चीज़ को मीटर में नापना मुश्किल है। इसके लिए हमें एक छोटा यूनिट चाहिए।",en:"But for small things like an eraser or a grain of rice, a metre is too big. It is hard to measure such a small thing in metres. For this we need a smaller unit.",mr:"पण खोडरबर किंवा तांदळाच्या दाण्यासारख्या लहान गोष्टींसाठी मीटर खूप मोठा पडतो. इतकी लहान गोष्ट मीटरमध्ये मोजणं कठीण आहे. यासाठी आपल्याला एक लहान एकक हवं.",dur:11500},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><svg width="260" height="44" viewBox="0 0 260 44"><rect x="2" y="8" width="256" height="28" rx="4" fill="#FFE9B0" stroke="#C99A2E" stroke-width="2"/>${Array.from({length:11},(_,i)=>`<line x1="${4+i*25}" y1="8" x2="${4+i*25}" y2="${i%5===0?36:26}" stroke="#7a5b18" stroke-width="2"/><text x="${4+i*25}" y="${i%5===0?6:7}" font-size="8" text-anchor="middle" fill="#5b430f">${i}</text>`).join('')}</svg><div style="font-weight:800;color:#5b430f">scale: chhoti markings = cm</div></div>`,cap:"CENTIMETRE (cm): chhota unit. Scale par chhoti-chhoti markings.",hi:"छोटी चीज़ों के लिए सेंटीमीटर इस्तेमाल करते हैं, जिसे cm लिखते हैं। तुम्हारी फुट-पट्टी यानी scale पर जो छोटी-छोटी लाइनें हैं, दो लाइनों के बीच की दूरी एक सेंटीमीटर होती है।",en:"For small things we use the centimetre, written as cm. On your scale, the small lines you see — the gap between two lines is one centimetre.",mr:"लहान गोष्टींसाठी सेंटीमीटर वापरतो, ज्याला cm लिहितो. तुमच्या मोजपट्टीवर ज्या लहान रेषा आहेत, दोन रेषांमधलं अंतर एक सेंटीमीटर असतं.",dur:11500},
   {art:bigExpr("1 m = 100 cm"),cap:"BADA RISHTA: 1 metre = 100 centimetre! Scale 100 baar = 1m.",hi:"यह चॅप्टर का सबसे ज़रूरी रिश्ता है — एक मीटर बराबर सौ सेंटीमीटर। यानी एक सेंटीमीटर की लंबाई सौ बार लगाओ तो एक मीटर बनता है। इसे हमेशा याद रखो।",en:"This is the most important relation of the chapter — one metre equals one hundred centimetres. That is, place one centimetre a hundred times and you get one metre. Always remember this.",mr:"हा धड्याचा सर्वात महत्त्वाचा संबंध आहे — एक मीटर बरोबर शंभर सेंटीमीटर. म्हणजे एक सेंटीमीटरची लांबी शंभर वेळा लावली तर एक मीटर बनतो. हे नेहमी लक्षात ठेवा.",dur:11500},
   {art:bigExpr("½ m = 50 cm<br>¼ m = 25 cm"),cap:"Aadha metre = 50 cm. Chauthai metre = 25 cm.",hi:"अब आसान — आधा मीटर बराबर पचास सेंटीमीटर, क्योंकि सौ का आधा पचास। और चौथाई मीटर बराबर पच्चीस सेंटीमीटर, क्योंकि सौ का चौथाई पच्चीस।",en:"Now easy — half a metre is fifty centimetres, because half of hundred is fifty. And a quarter metre is twenty-five centimetres, because a quarter of hundred is twenty-five.",mr:"आता सोपं — अर्धा मीटर बरोबर पन्नास सेंटीमीटर, कारण शंभरचा अर्धा पन्नास. आणि चतुर्थांश मीटर बरोबर पंचवीस सेंटीमीटर, कारण शंभरचा चतुर्थांश पंचवीस.",dur:11500},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="200" height="40"><rect x="2" y="6" width="196" height="24" rx="3" fill="#FFE9B0" stroke="#C99A2E" stroke-width="2"/><line x1="20" y1="6" x2="20" y2="34" stroke="#d33" stroke-width="2.5"/><text x="20" y="4" font-size="9" text-anchor="middle">0</text><line x1="180" y1="6" x2="180" y2="34" stroke="#d33" stroke-width="2.5"/><text x="180" y="4" font-size="9" text-anchor="middle">8</text></svg></div>`,cap:"Scale se naapo: object ko 0 pe rakho, doosra sira padho.",hi:"स्केल से नापने का तरीका — चीज़ का एक सिरा स्केल के शून्य पर रखो। फिर दूसरा सिरा जिस नंबर पर खत्म हो, वही उसकी लंबाई सेंटीमीटर में है। हमेशा शून्य से शुरू करना ज़रूरी है।",en:"How to measure with a scale — place one end of the thing at zero on the scale. Then the number where the other end stops is its length in centimetres. Always starting from zero is important.",mr:"मोजपट्टीने मोजण्याची पद्धत — गोष्टीचं एक टोक मोजपट्टीच्या शून्यावर ठेवा. मग दुसरं टोक ज्या नंबरवर संपतं, तीच त्याची लांबी सेंटीमीटरमध्ये. नेहमी शून्यापासून सुरुवात करणं आवश्यक.",dur:12000},
   {art:bigExpr("8 se 14 tak = 14−8 = 6 cm"),cap:"Tooti scale (Ashwin): 8 se 14 = ginti se 6 cm. Difference nikalo!",hi:"अश्विन की स्केल टूटी है और शून्य नहीं दिखता। कोई बात नहीं — अगर चीज़ आठ से शुरू होकर चौदह पर खत्म होती है, तो लंबाई बराबर चौदह घटा आठ, यानी छह सेंटीमीटर। बस दोनों नंबरों का अंतर निकालो।",en:"Ashwin's scale is broken and zero is missing. No problem — if the thing starts at eight and ends at fourteen, the length is fourteen minus eight, that is six centimetres. Just find the difference of the two numbers.",mr:"अश्विनची मोजपट्टी तुटली आहे आणि शून्य दिसत नाही. हरकत नाही — गोष्ट आठपासून सुरू होऊन चौदावर संपत असेल, तर लांबी बरोबर चौदा वजा आठ, म्हणजे सहा सेंटीमीटर. फक्त दोन नंबरांचा फरक काढा.",dur:12000},
   {art:bigExpr("120 cm = 1 m 20 cm"),cap:"Ramu-Shamu DONO sahi! 120 cm aur 1m 20cm barabar hote.",hi:"रामू ने अपनी ऊँचाई एक सौ बीस सेंटीमीटर पढ़ी, और शामू ने एक मीटर बीस सेंटीमीटर। दोनों सही हैं! क्योंकि सौ सेंटीमीटर का एक मीटर, और बचे बीस सेंटीमीटर। यानी एक सौ बीस सेंटीमीटर बराबर एक मीटर बीस सेंटीमीटर।",en:"Ramu read his height as one hundred twenty centimetres, and Shamu as one metre twenty centimetres. Both are correct! Because hundred centimetres make one metre, and twenty centimetres are left. So one hundred twenty centimetres equals one metre twenty centimetres.",mr:"रामूने आपली उंची एकशे वीस सेंटीमीटर वाचली, आणि शामूने एक मीटर वीस सेंटीमीटर. दोघेही बरोबर! कारण शंभर सेंटीमीटरचा एक मीटर, आणि उरले वीस सेंटीमीटर. म्हणजे एकशे वीस सेंटीमीटर बरोबर एक मीटर वीस सेंटीमीटर.",dur:12500},
   {art:bigExpr("2 m = 200 cm<br>6 m = 600 cm"),cap:"m ko cm banao: ×100. 2m=200cm, 6m=600cm.",hi:"मीटर को सेंटीमीटर में बदलने के लिए सौ से गुणा करो। जैसे दो मीटर बराबर दो सौ सेंटीमीटर, और छह मीटर बराबर छह सौ सेंटीमीटर। क्योंकि हर मीटर में सौ सेंटीमीटर होते हैं।",en:"To change metres into centimetres, multiply by hundred. Like two metres is two hundred centimetres, and six metres is six hundred centimetres. Because each metre has a hundred centimetres.",mr:"मीटरला सेंटीमीटरमध्ये बदलण्यासाठी शंभरने गुणा. जसे दोन मीटर बरोबर दोनशे सेंटीमीटर, आणि सहा मीटर बरोबर सहाशे सेंटीमीटर. कारण प्रत्येक मीटरमध्ये शंभर सेंटीमीटर असतात.",dur:11500},
   {art:bigExpr("1 m 40 cm = 140 cm<br>2 m 30 cm = 230 cm"),cap:"Mixed → cm: metre ko 100 se, phir cm jodo.",hi:"अगर मीटर और सेंटीमीटर दोनों हों, तो मीटर को सौ से गुणा करके बचे सेंटीमीटर जोड़ो। जैसे एक मीटर चालीस सेंटीमीटर बराबर एक सौ चालीस सेंटीमीटर। और दो मीटर तीस सेंटीमीटर बराबर दो सौ तीस सेंटीमीटर।",en:"If there are both metres and centimetres, multiply the metres by hundred and add the leftover centimetres. Like one metre forty centimetres is one hundred forty centimetres. And two metres thirty centimetres is two hundred thirty centimetres.",mr:"मीटर आणि सेंटीमीटर दोन्ही असतील, तर मीटरला शंभरने गुणून उरलेले सेंटीमीटर जोडा. जसे एक मीटर चाळीस सेंटीमीटर बरोबर एकशे चाळीस सेंटीमीटर. आणि दोन मीटर तीस सेंटीमीटर बरोबर दोनशे तीस सेंटीमीटर.",dur:12500},
   {art:numline(0,100,[0,25,50,75,100]),cap:"Number line: 0cm se 100cm = 1m. 25cm=¼m, 50cm=½m, 75cm=¾m.",hi:"नंबर लाइन पर देखो — शून्य से सौ सेंटीमीटर तक एक मीटर। बीच में पच्चीस सेंटीमीटर चौथाई मीटर, पचास सेंटीमीटर आधा मीटर, और पचहत्तर सेंटीमीटर तीन-चौथाई मीटर दिखाते हैं।",en:"Look at the number line — zero to hundred centimetres is one metre. In between, twenty-five centimetres shows a quarter metre, fifty centimetres half a metre, and seventy-five centimetres three-quarters of a metre.",mr:"नंबर लाइनवर पाहा — शून्य ते शंभर सेंटीमीटर म्हणजे एक मीटर. मध्ये पंचवीस सेंटीमीटर चतुर्थांश मीटर, पन्नास सेंटीमीटर अर्धा मीटर, आणि पंच्याहत्तर सेंटीमीटर तीन-चतुर्थांश मीटर दाखवतात.",dur:12000},
   {art:bigExpr("Board 2m = 200cm<br>Sticker 20cm<br>200 ÷ 20 = 10 stickers"),cap:"Sonu ka board: 2m (200cm), sticker 20cm → 10 stickers chahiye.",hi:"सोनू का बोर्ड दो मीटर यानी दो सौ सेंटीमीटर लंबा है। हर स्टिकर बीस सेंटीमीटर का है। तो पूरे बोर्ड को ढकने के लिए दो सौ में बीस का भाग दो — दस स्टिकर चाहिए।",en:"Sonu's board is two metres, that is two hundred centimetres long. Each sticker is twenty centimetres. So to cover the whole board, divide two hundred by twenty — ten stickers are needed.",mr:"सोनूचा बोर्ड दोन मीटर म्हणजे दोनशे सेंटीमीटर लांब आहे. प्रत्येक स्टिकर वीस सेंटीमीटरचं आहे. तर पूर्ण बोर्ड झाकण्यासाठी दोनशेला वीसने भागा — दहा स्टिकर हवीत.",dur:12000},
   {art:bigExpr("4 m 60 cm = 460 cm<br>5 m 50 cm = 550 cm"),cap:"Wells ki depth: same dhundo. 4m60cm=460cm, 5m50cm=550cm.",hi:"कुओं की गहराई भी लंबाई की तरह नापते हैं। दो अलग-अलग तरीके से लिखी गहराई बराबर हो सकती है। जैसे चार मीटर साठ सेंटीमीटर बराबर चार सौ साठ सेंटीमीटर। पहले सब एक यूनिट में बदलो, फिर मिलाओ।",en:"The depth of wells is also measured like length. Depths written in two different ways can be equal. Like four metres sixty centimetres is four hundred sixty centimetres. First change all to one unit, then match.",mr:"विहिरींची खोलीही लांबीसारखी मोजतात. दोन वेगवेगळ्या प्रकारे लिहिलेली खोली समान असू शकते. जसे चार मीटर साठ सेंटीमीटर बरोबर चारशे साठ सेंटीमीटर. आधी सर्व एका एककात बदला, मग जुळवा.",dur:12000},
   {art:`<div style="font-size:40px">🧱🧱🧱🧱</div>`,cap:"PERIMETER: kisi shape ki boundary (chaaron taraf) ki length!",hi:"अब एक नया शब्द — perimeter यानी परिमाप। किसी आकृति की चारों तरफ की सीमा यानी boundary की कुल लंबाई को परिमाप कहते हैं। जैसे बगीचे के चारों ओर की दीवार की लंबाई।",en:"Now a new word — perimeter. The total length of the boundary all around a shape is called the perimeter. Like the length of the wall all around a garden.",mr:"आता एक नवा शब्द — perimeter म्हणजे परिमिती. एखाद्या आकृतीच्या चारही बाजूंच्या सीमेची म्हणजे boundaryची एकूण लांबी म्हणजे परिमिती. जसे बागेभोवतीच्या भिंतीची लांबी.",dur:11500},
   {art:bigExpr("Saari sides jodo<br>= perimeter"),cap:"Perimeter nikalne ka tareeka: saari sides ki length jodo.",hi:"परिमाप निकालना आसान है — आकृति की सारी भुजाओं यानी sides की लंबाई जोड़ दो। जोड़ का जो जवाब आता है, वही पूरे आकार का परिमाप है। दीवार पर चलकर देखो तो यही दूरी तय होती है।",en:"Finding the perimeter is easy — add up the lengths of all the sides of the shape. The total you get is the perimeter of the whole shape. If you walk along the boundary, this is the distance covered.",mr:"परिमिती काढणं सोपं आहे — आकृतीच्या सर्व बाजूंची म्हणजे sides ची लांबी जोडा. बेरजेचं जे उत्तर येतं, तीच पूर्ण आकाराची परिमिती. सीमेवरून चालून पाहिलं तर हेच अंतर होतं.",dur:12000},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="130" height="90"><rect x="15" y="15" width="100" height="60" fill="#CDE9FF" stroke="#5B3FD6" stroke-width="3"/><text x="65" y="11" font-size="11" text-anchor="middle">10 cm</text><text x="65" y="88" font-size="11" text-anchor="middle">10 cm</text><text x="8" y="48" font-size="11" text-anchor="middle" transform="rotate(-90 8 48)">5</text><text x="122" y="48" font-size="11" text-anchor="middle" transform="rotate(90 122 48)">5</text></svg></div>`,cap:"Dot grid (1cm): sides gino. 10+5+10+5 = 30 cm perimeter.",hi:"डॉट ग्रिड में हर खाना एक सेंटीमीटर का होता है। आकृति की हर भुजा के खाने गिनो। जैसे एक आयत की भुजाएँ दस, पाँच, दस, पाँच — सब जोड़ो तो परिमाप तीस सेंटीमीटर।",en:"In a dot grid, each box is one centimetre. Count the boxes along each side of the shape. Like a rectangle with sides ten, five, ten, five — add them all and the perimeter is thirty centimetres.",mr:"डॉट ग्रिडमध्ये प्रत्येक खाना एक सेंटीमीटरचा असतो. आकृतीच्या प्रत्येक बाजूचे खाने मोजा. जसे एका आयताच्या बाजू दहा, पाच, दहा, पाच — सर्व जोडा तर परिमिती तीस सेंटीमीटर.",dur:12000},
   {art:bigExpr("Choti boundary = chhota perimeter<br>Lambi boundary = bada perimeter"),cap:"Longest/shortest perimeter compare: jiski boundary lambi, perimeter bada.",hi:"अलग-अलग आकृतियों के परिमाप की तुलना कर सकते हैं। जिस आकृति की सीमा सबसे लंबी, उसका परिमाप सबसे बड़ा। जिसकी सबसे छोटी, उसका परिमाप सबसे छोटा।",en:"We can compare the perimeters of different shapes. The shape with the longest boundary has the biggest perimeter. The one with the shortest has the smallest perimeter.",mr:"वेगवेगळ्या आकृतींच्या परिमितीची तुलना करता येते. ज्या आकृतीची सीमा सर्वात लांब, तिची परिमिती सर्वात मोठी. जिची सर्वात लहान, तिची परिमिती सर्वात लहान.",dur:11500},
   {art:bigExpr("Alag shapes,<br>SAME perimeter ho sakta!"),cap:"Do alag dikhne wale shapes ka perimeter same ho sakta hai.",hi:"एक मज़ेदार बात — दो आकृतियाँ देखने में बिलकुल अलग हो सकती हैं, पर उनका परिमाप एक जैसा हो सकता है। इसलिए हमेशा भुजाएँ जोड़कर ही पक्का करो, सिर्फ देखकर नहीं।",en:"A fun fact — two shapes can look completely different, but their perimeter can be the same. So always confirm by adding the sides, not just by looking.",mr:"एक मजेशीर गोष्ट — दोन आकृती दिसायला पूर्णपणे वेगळ्या असू शकतात, पण त्यांची परिमिती सारखी असू शकते. म्हणून नेहमी बाजू जोडूनच खात्री करा, फक्त बघून नाही.",dur:11500},
   {art:bigExpr("Perimeter 20 cm ke<br>kai shapes ban sakte"),cap:"Ek hi perimeter (20cm) ke kai alag-alag shapes ban sakte hain.",hi:"एक ही परिमाप के कई अलग-अलग आकार बना सकते हैं। जैसे बीस सेंटीमीटर परिमाप के लिए — एक आयत जिसकी भुजाएँ छह, चार, छह, चार; या कोई और आकार जिसकी सब भुजाएँ मिलकर बीस हों।",en:"We can make many different shapes with the same perimeter. Like for a perimeter of twenty centimetres — a rectangle with sides six, four, six, four; or any other shape whose sides add up to twenty.",mr:"एकाच परिमितीचे अनेक वेगवेगळे आकार बनवता येतात. जसे वीस सेंटीमीटर परिमितीसाठी — एक आयत ज्याच्या बाजू सहा, चार, सहा, चार; किंवा दुसरा कोणताही आकार ज्याच्या सर्व बाजू मिळून वीस होतात.",dur:12000},
   {art:bigExpr("Footstep, thumb se bhi naap sakte<br>par scale = accurate"),cap:"Boundary footstep/angootha se bhi nap sakte, par scale sabse sahi.",hi:"परिमाप को पैरों के कदम, अंगूठे की छाप, या ब्लॉक से भी नाप सकते हैं — पर ये अंदाज़े होते हैं। सबसे सही नाप स्केल या मेज़रिंग टेप से मिलती है, क्योंकि उसमें बराबर सेंटीमीटर होते हैं।",en:"The perimeter can be measured with footsteps, thumb prints, or blocks too — but these are rough estimates. The most accurate measure comes from a scale or measuring tape, because it has equal centimetres.",mr:"परिमिती पावलं, अंगठ्याचा ठसा, किंवा ठोकळ्यानेही मोजता येते — पण हे अंदाज असतात. सर्वात अचूक माप मोजपट्टी किंवा मापन टेपने मिळतं, कारण त्यात समान सेंटीमीटर असतात.",dur:12000},
   {art:emoji("📦"),cap:"Recap: length (height/width/depth); m aur cm; 1m=100cm; m↔cm; perimeter = saari sides ka jod.",hi:"चलो सब दोहराते हैं — लंबाई में ऊँचाई-चौड़ाई-गहराई सब आते हैं; बड़ी चीज़ मीटर में, छोटी सेंटीमीटर में; एक मीटर बराबर सौ सेंटीमीटर; मीटर-सेंटीमीटर बदलना; और परिमाप बराबर सारी भुजाओं का जोड़।",en:"Let's recap — length includes height, width, depth; big things in metres, small in centimetres; one metre equals hundred centimetres; changing metres and centimetres; and perimeter equals the sum of all sides.",mr:"चला सर्व उजळणी करू — लांबीत उंची-रुंदी-खोली सर्व येतात; मोठी गोष्ट मीटरमध्ये, लहान सेंटीमीटरमध्ये; एक मीटर बरोबर शंभर सेंटीमीटर; मीटर-सेंटीमीटर बदलणं; आणि परिमिती बरोबर सर्व बाजूंची बेरीज.",dur:13000},
   {art:emoji("🌟"),cap:"Shabaash! Ab Measuring Length ka quiz khelo aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब मेज़रिंग लेंथ का क्विज़ खेलो और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play the Measuring Length quiz and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता मेजरिंग लेंथचा क्विझ खेळ आणि परफेक्ट हो!",dur:8500},
