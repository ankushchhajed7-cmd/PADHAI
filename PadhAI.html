 {id:'cleanest',title:'The Cleanest Village',emoji:'🧹',color:C.sky,scenes:[
   {art:emoji("🐘"),cap:"Chapter 7 — The Cleanest Village! Add aur subtract regrouping ke saath.",hi:"नमस्ते दोस्तों! आज सातवाँ चॅप्टर — द क्लीनेस्ट विलेज। डेज़ी और लू मेघालय के मॉलिनॉन्ग गाँव की यात्रा पर जाते हैं। इस सफर में हम बड़ी संख्याओं का जोड़ और घटाव सीखेंगे — कैरी और बॉरो के साथ।",en:"Namaste friends! Today is chapter seven, The Cleanest Village. Daisy and Lou go on a trip to Mawlynnong village in Meghalaya. On this journey we will learn addition and subtraction of big numbers — with carry and borrow.",mr:"नमस्कार मित्रांनो! आज सातवा धडा — द क्लीनेस्ट व्हिलेज. डेझी आणि लू मेघालयातल्या मॉलिनॉन्ग गावाच्या सहलीला जातात. या प्रवासात आपण मोठ्या संख्यांची बेरीज आणि वजाबाकी शिकू — कॅरी आणि बॉरोसह.",dur:11500},
   {art:`<div style="font-size:38px">🏘️🌿🧹</div>`,cap:"Mawlynnong — Asia ka sabse saaf gaon (Meghalaya). 414 log, 77 families.",hi:"मॉलिनॉन्ग एशिया का सबसे साफ-सुथरा गाँव है, जो मेघालय के पूर्वी खासी हिल्स में है। यहाँ खासी जनजाति के लगभग चार सौ चौदह लोग, सतहत्तर परिवारों में रहते हैं। यह शिलॉन्ग से उन्यासी किलोमीटर दूर है।",en:"Mawlynnong is Asia's cleanest village, in the East Khasi Hills of Meghalaya. About four hundred fourteen people of the Khasi tribe live here, in seventy-seven families. It is seventy-nine kilometres from Shillong.",mr:"मॉलिनॉन्ग आशियातलं सर्वात स्वच्छ गाव आहे, मेघालयातल्या पूर्व खासी हिल्समध्ये. इथे खासी जमातीचे सुमारे चारशे चौदा लोक, सत्त्याहत्तर कुटुंबांत राहतात. हे शिलाँगपासून एकोणऐंशी किलोमीटर दूर आहे.",dur:12000},
   {art:bigExpr("Custard apple ₹45<br>Beans ₹95 · Onion ₹32"),cap:"Shopping: 1kg ke daam diye. 2kg ke liye daam jodo ya guna.",hi:"डेज़ी और लू माँ के साथ शॉपिंग करते हैं। सपन दादा की गाड़ी पर एक किलो के दाम लिखे हैं। दो किलो चाहिए तो दाम दो बार जोड़ो या दो से गुणा करो।",en:"Daisy and Lou go shopping with their mother. On Sapan Dada's cart, prices for one kilogram are written. If you need two kilograms, add the price twice or multiply by two.",mr:"डेझी आणि लू आईसोबत खरेदीला जातात. सपन दादाच्या गाडीवर एक किलोचे भाव लिहिले आहेत. दोन किलो हवं असेल तर भाव दोनदा जोडा किंवा दोनने गुणा.",dur:11500},
   {art:bigExpr("1kg custard apple ₹45<br>+ 1kg sapota ₹70<br>= ₹115"),cap:"Alag cheezein: daam jodo. ₹45 + ₹70 = ₹115.",hi:"अलग-अलग चीज़ों के दाम जोड़ने हों तो सीधा जोड़ो। जैसे एक किलो शरीफा पैंतालीस रुपये और एक किलो चीकू सत्तर रुपये — दोनों मिलाकर एक सौ पंद्रह रुपये।",en:"To add prices of different things, just add them. Like one kilogram custard apple is forty-five rupees and one kilogram sapota is seventy rupees — together one hundred fifteen rupees.",mr:"वेगवेगळ्या गोष्टींचे भाव जोडायचे असतील तर सरळ जोडा. जसे एक किलो सीताफळ पंचेचाळीस रुपये आणि एक किलो चिकू सत्तर रुपये — दोन्ही मिळून एकशे पंधरा रुपये.",dur:11500},
   {art:bigExpr("185 + 125 = ?"),cap:"ADD (jodna) shuru: Ones se Tens se Hundreds. Daayein se baayein!",hi:"अब बड़ी संख्याओं का जोड़। हमेशा सबसे दाईं ओर से शुरू करो — पहले इकाई जोड़ो, फिर दहाई, फिर सैकड़ा। यानी दाएँ से बाएँ चलो।",en:"Now adding big numbers. Always start from the far right — first add the ones, then the tens, then the hundreds. That is, go from right to left.",mr:"आता मोठ्या संख्यांची बेरीज. नेहमी सर्वात उजवीकडून सुरुवात करा — आधी एकक जोडा, मग दशक, मग शतक. म्हणजे उजवीकडून डावीकडे जा.",dur:11500},
   {art:bigExpr("10 ones = 1 ten<br>(carry / regroup)"),cap:"CARRY ka rule: 10 ones jamaa ho to 1 TEN bana ke aage le jao.",hi:"जोड़ का सबसे ज़रूरी नियम — अगर इकाई जोड़ने पर दस या ज़्यादा हो जाएँ, तो दस इकाई को एक दहाई बना लो और उसे दहाई के घर में आगे ले जाओ। इसे कैरी या regrouping कहते हैं।",en:"The most important rule of addition — if the ones add up to ten or more, make ten ones into one ten and carry it forward to the tens place. This is called carry or regrouping.",mr:"बेरजेचा सर्वात महत्त्वाचा नियम — एकक जोडल्यावर दहा किंवा जास्त झाले, तर दहा एककाचा एक दशक बनवा आणि तो दशकाच्या घरात पुढे न्या. याला कॅरी किंवा regrouping म्हणतात.",dur:12500},
   {art:column("24","28","+","52","1"),cap:"24 + 28: 4+8=12 → 2 likho, 1 carry. 1+2+2=5. Jawab 52.",hi:"देखो — चौबीस और अट्ठाईस। पहले इकाई — चार और आठ बराबर बारह। दो लिखो, एक दहाई कैरी करो। अब दहाई — एक कैरी और दो और दो बराबर पाँच। तो जवाब बावन।",en:"See — twenty-four plus twenty-eight. First the ones — four plus eight is twelve. Write two, carry one ten. Now the tens — one carried plus two plus two is five. So the answer is fifty-two.",mr:"पाहा — चोवीस आणि अठ्ठावीस. आधी एकक — चार आणि आठ बरोबर बारा. दोन लिहा, एक दशक कॅरी करा. आता दशक — एक कॅरी आणि दोन आणि दोन बरोबर पाच. तर उत्तर बावन्न.",dur:12500},
   {art:column("185","125","+","310","1 1"),cap:"185+125: 5+5=10 carry. 8+2+1=11 carry. 1+1+1=3. = 310.",hi:"अब तीन अंकों का जोड़ — एक सौ पचासी और एक सौ पच्चीस। इकाई पाँच और पाँच बराबर दस, शून्य लिखो एक कैरी। दहाई आठ और दो और कैरी एक बराबर ग्यारह, एक लिखो एक कैरी। सैकड़ा एक और एक और कैरी एक बराबर तीन। जवाब तीन सौ दस।",en:"Now three-digit addition — one hundred eighty-five plus one hundred twenty-five. Ones five and five is ten, write zero carry one. Tens eight and two and carry one is eleven, write one carry one. Hundreds one and one and carry one is three. Answer three hundred ten.",mr:"आता तीन अंकी बेरीज — एकशे पंच्याऐंशी आणि एकशे पंचवीस. एकक पाच आणि पाच बरोबर दहा, शून्य लिहा एक कॅरी. दशक आठ आणि दोन आणि कॅरी एक बरोबर अकरा, एक लिहा एक कॅरी. शतक एक आणि एक आणि कॅरी एक बरोबर तीन. उत्तर तीनशे दहा.",dur:13500},
   {art:bigExpr("10 tens = 1 hundred"),cap:"Dhyan: 10 tens jamaa ho to 1 HUNDRED ban ke aage jaata hai.",hi:"जैसे दस इकाई से एक दहाई बनता है, वैसे ही दस दहाई जमा होने पर एक सैकड़ा बनता है, जो सैकड़े के घर में आगे जाता है। यही नियम हर घर में लगता है।",en:"Just as ten ones make one ten, in the same way ten tens add up to make one hundred, which goes forward to the hundreds place. This rule applies at every place.",mr:"जसे दहा एककाचा एक दशक बनतो, तसेच दहा दशक जमा झाल्यावर एक शतक बनतो, जो शतकाच्या घरात पुढे जातो. हाच नियम प्रत्येक घरात लागू होतो.",dur:11500},
   {art:column("438","476","+","914","1 1"),cap:"438+476: 8+6=14 carry. 3+7+1=11 carry. 4+4+1=9. = 914.",hi:"एक और — चार सौ अड़तीस और चार सौ छिहत्तर। इकाई आठ और छह बराबर चौदह, चार लिखो कैरी एक। दहाई तीन और सात और एक बराबर ग्यारह, एक लिखो कैरी एक। सैकड़ा चार और चार और एक बराबर नौ। जवाब नौ सौ चौदह बच्चे ट्रिप पर जा रहे हैं।",en:"One more — four hundred thirty-eight plus four hundred seventy-six. Ones eight and six is fourteen, write four carry one. Tens three and seven and one is eleven, write one carry one. Hundreds four and four and one is nine. Answer nine hundred fourteen children are going on the trip.",mr:"आणखी एक — चारशे अडतीस आणि चारशे शहात्तर. एकक आठ आणि सहा बरोबर चौदा, चार लिहा कॅरी एक. दशक तीन आणि सात आणि एक बरोबर अकरा, एक लिहा कॅरी एक. शतक चार आणि चार आणि एक बरोबर नऊ. उत्तर नऊशे चौदा मुलं सहलीला जात आहेत.",dur:13500},
   {art:bigExpr("Estimate: 438 ≈ 440<br>476 ≈ 480 → ~920"),cap:"Estimate: round karke jaldi andaaza lagao. 438+476 ≈ 920.",hi:"जोड़ने से पहले अंदाज़ा लगाना अच्छा होता है। संख्याओं को नज़दीकी दहाई या सैकड़े तक गोल करो। जैसे चार सौ अड़तीस लगभग चार सौ चालीस, और चार सौ छिहत्तर लगभग चार सौ अस्सी — तो जवाब लगभग नौ सौ बीस होगा।",en:"It is good to estimate before adding. Round the numbers to the nearest ten or hundred. Like four hundred thirty-eight is about four hundred forty, and four hundred seventy-six is about four hundred eighty — so the answer will be about nine hundred twenty.",mr:"बेरीज करण्याआधी अंदाज लावणं चांगलं. संख्या जवळच्या दशक किंवा शतकापर्यंत गोल करा. जसे चारशे अडतीस सुमारे चारशे चाळीस, आणि चारशे शहात्तर सुमारे चारशे ऐंशी — तर उत्तर सुमारे नऊशे वीस असेल.",dur:12500},
   {art:bigExpr("Column mein likho:<br>ek ke neeche ek (O,T,H seedh mein)"),cap:"Column rule: O ke neeche O, T ke neeche T, H ke neeche H.",hi:"जोड़ या घटाव लिखते समय अंकों को सही घर में सीध में रखो। इकाई के नीचे इकाई, दहाई के नीचे दहाई, सैकड़ा के नीचे सैकड़ा। तभी जवाब सही आता है।",en:"When writing addition or subtraction, line up the digits in the correct place. Ones under ones, tens under tens, hundreds under hundreds. Only then the answer is correct.",mr:"बेरीज किंवा वजाबाकी लिहिताना अंक योग्य घरात रांगेत ठेवा. एककाखाली एकक, दशकाखाली दशक, शतकाखाली शतक. तरच उत्तर बरोबर येतं.",dur:11500},
   {art:bigExpr("83 − 46 = ?"),cap:"SUBTRACT (ghatana): bhi Ones se shuru. Daayein se baayein.",hi:"अब घटाव सीखते हैं। घटाव में भी सबसे दाईं ओर इकाई से शुरू करो, फिर दहाई, फिर सैकड़ा। बड़ी संख्या में से छोटी संख्या घटाते हैं।",en:"Now we learn subtraction. In subtraction too, start from the ones on the far right, then tens, then hundreds. We take the smaller number away from the bigger one.",mr:"आता वजाबाकी शिकू. वजाबाकीतही सर्वात उजवीकडे एककापासून सुरुवात करा, मग दशक, मग शतक. मोठ्या संख्येतून लहान संख्या वजा करतो.",dur:11500},
   {art:bigExpr("Ones kam? → 1 ten ko<br>10 ones banao (BORROW)"),cap:"BORROW ka rule: agar upar ke ones kam ho, 1 ten udhaar lo = 10 ones.",hi:"घटाव का ज़रूरी नियम — अगर ऊपर वाले इकाई के अंक छोटे हों और घटा न सकें, तो साथ वाले दहाई से एक उधार लो। वह एक दहाई दस इकाई बन जाता है। इसे बॉरो या regrouping कहते हैं।",en:"The important rule of subtraction — if the top ones digit is small and you cannot subtract, borrow one from the next-door tens. That one ten becomes ten ones. This is called borrow or regrouping.",mr:"वजाबाकीचा महत्त्वाचा नियम — वरचा एककाचा अंक लहान असेल आणि वजा करता येत नसेल, तर शेजारच्या दशकातून एक उधार घ्या. तो एक दशक दहा एकक बनतो. याला बॉरो किंवा regrouping म्हणतात.",dur:13000},
   {art:column("8¹3","46","−","37"),cap:"83−46: 3 se 6 nahi ghata → 1 ten borrow, 13−6=7. 7−4=3. = 37.",hi:"देखो — तिरासी में से छियालीस। इकाई तीन में से छह नहीं घटता। तो दहाई से एक उधार लो — तीन तेरह बन गया, दहाई आठ से सात बचा। अब तेरह में से छह बराबर सात। दहाई सात में से चार बराबर तीन। जवाब सैंतीस।",en:"See — eighty-three minus forty-six. From three ones you cannot take six. So borrow one from the tens — three becomes thirteen, and eight tens become seven. Now thirteen minus six is seven. Seven tens minus four is three. Answer thirty-seven.",mr:"पाहा — त्र्याऐंशीतून सेहेचाळीस. एकक तीनातून सहा वजा होत नाही. तर दशकातून एक उधार घ्या — तीनचे तेरा झाले, दशक आठातून सात उरले. आता तेरातून सहा बरोबर सात. दशक सातातून चार बरोबर तीन. उत्तर सदतीस.",dur:13500},
   {art:column("438","215","−","223"),cap:"438−215: 8−5=3, 3−1=2, 4−2=2. Bina borrow = 223.",hi:"कभी-कभी उधार की ज़रूरत नहीं होती। जैसे चार सौ अड़तीस में से दो सौ पंद्रह। इकाई आठ में से पाँच बराबर तीन। दहाई तीन में से एक बराबर दो। सैकड़ा चार में से दो बराबर दो। जवाब दो सौ तेईस बच्चे इंतज़ार कर रहे हैं।",en:"Sometimes no borrow is needed. Like four hundred thirty-eight minus two hundred fifteen. Ones eight minus five is three. Tens three minus one is two. Hundreds four minus two is two. Answer two hundred twenty-three children are waiting.",mr:"कधीकधी उधाराची गरज नसते. जसे चारशे अडतीसातून दोनशे पंधरा. एकक आठातून पाच बरोबर तीन. दशक तीनातून एक बरोबर दोन. शतक चारातून दोन बरोबर दोन. उत्तर दोनशे तेवीस मुलं वाट पाहत आहेत.",dur:13000},
   {art:bigExpr("310 − 179<br>Ones aur Tens dono borrow"),cap:"Double borrow: jab Ones aur Tens dono kam ho. 310−179=131.",hi:"कभी एक से ज़्यादा बार उधार लेना पड़ता है। जैसे तीन सौ दस में से एक सौ उन्यासी। इकाई शून्य में से नौ नहीं घटता, दहाई से उधार — पर दहाई भी एक है। पहले सैकड़े से दहाई उधार लो, फिर दहाई से इकाई। ध्यान से करने पर जवाब एक सौ इकतीस।",en:"Sometimes you must borrow more than once. Like three hundred ten minus one hundred seventy-nine. From zero ones you cannot take nine, borrow from tens — but tens is only one. First borrow a ten from the hundreds, then a one from the tens. Done carefully, the answer is one hundred thirty-one.",mr:"कधी एकापेक्षा जास्त वेळा उधार घ्यावं लागतं. जसे तीनशे दहातून एकशे एकोणऐंशी. एकक शून्यातून नऊ वजा होत नाही, दशकातून उधार — पण दशकही एकच आहे. आधी शतकातून दशक उधार घ्या, मग दशकातून एकक. काळजीपूर्वक केल्यास उत्तर एकशे एकतीस.",dur:13500},
   {art:bigExpr("Cost − Paid = Balance<br>185 − 150 = ₹35"),cap:"Balance (change): cost mein se paid ghatao. ₹185−₹150 = ₹35.",hi:"दुकान पर बैलेंस यानी बचा पैसा निकालना भी घटाव है। चीज़ का दाम में से जितना दिया उसे घटाओ। जैसे एक सौ पचासी का सामान, दो सौ दिए — तो बैलेंस पंद्रह रुपये। यहाँ उल्टा भी सोचा — दाम में से बैलेंस घटाकर दिया हुआ पैसा भी निकाल सकते हैं।",en:"At a shop, finding the balance, the money left, is also subtraction. Subtract the money paid from the cost. Like an item of one hundred eighty-five, paid two hundred — so balance is fifteen rupees. We can also think backwards to find amounts.",mr:"दुकानात बॅलन्स म्हणजे उरलेले पैसे काढणंही वजाबाकी आहे. वस्तूच्या भावातून दिलेले पैसे वजा करा. जसे एकशे पंच्याऐंशीची वस्तू, दोनशे दिले — तर बॅलन्स पंधरा रुपये. उलटही विचार करता येतो.",dur:13000},
   {art:bigExpr("'kitne zyada' / 'difference'<br>→ ghatao (subtract)"),cap:"Word problem clue: 'kitne zyada', 'difference', 'kitne bache' → subtract.",hi:"कहानी वाले सवालों में शब्द देखो। जब पूछें कितने ज़्यादा, कितना अंतर, कितने बचे, या कितने कम — तो घटाव करते हैं। जैसे तिरासी बच्चों ने पुसाव खाया, छियालीस ने फ्रूट — तो कितने ज़्यादा? घटाओ।",en:"In word problems, look at the words. When asked how many more, what difference, how many left, or how many less — we subtract. Like eighty-three children ate pusaw, forty-six ate fruit — so how many more? Subtract.",mr:"गोष्टीवाल्या प्रश्नांत शब्द पाहा. किती जास्त, किती फरक, किती उरले, किंवा किती कमी विचारलं तर वजाबाकी करतो. जसे त्र्याऐंशी मुलांनी पुसाव खाल्लं, सेहेचाळीसने फळ — तर किती जास्त? वजा करा.",dur:12500},
   {art:bigExpr("'total' / 'kul' / 'aur'<br>→ jodo (add)"),cap:"Word problem clue: 'total', 'kul milake', 'aur aaye' → add.",hi:"और जब पूछें कुल कितने, मिलाकर कितने, या और जुड़ गए — तो जोड़ करते हैं। पर सिर्फ शब्दों पर मत जाओ। सवाल को समझो, चाहे तो चित्र बनाओ, फिर तय करो जोड़ना है या घटाना।",en:"And when asked how many in total, altogether, or how many more joined — we add. But don't go only by words. Understand the problem, draw a picture if needed, then decide whether to add or subtract.",mr:"आणि एकूण किती, मिळून किती, किंवा आणखी जोडले विचारलं तर बेरीज करतो. पण फक्त शब्दांवर जाऊ नका. प्रश्न समजून घ्या, हवं तर चित्र काढा, मग ठरवा बेरीज की वजाबाकी.",dur:12500},
   {art:bigExpr("Train: boarded jodo (+),<br>alighted ghatao (−)"),cap:"Train problem: chadhe (boarded) jodo, utre (alighted) ghatao.",hi:"ट्रेन वाले सवाल में — जितने लोग चढ़े उन्हें जोड़ो, जितने उतरे उन्हें घटाओ। हर स्टेशन पर ऐसा करते जाओ, तो पता चलता है ट्रेन में अब कितने लोग हैं।",en:"In a train problem — add the people who boarded, subtract the people who got off. Do this at every station, and you find how many people are now on the train.",mr:"ट्रेनच्या प्रश्नात — जितके लोक चढले त्यांना जोडा, जितके उतरले त्यांना वजा करा. प्रत्येक स्टेशनवर असं करत जा, तर कळतं ट्रेनमध्ये आता किती लोक आहेत.",dur:12000},
   {art:bigExpr("204 − 10 = 194<br>(jaldi: 200−10=190, +4)"),cap:"Quick strategy: 99 jodna = 100 jodo phir 1 ghatao. Aasaan trick!",hi:"कुछ जल्दी तरीके भी हैं। जैसे निन्यानवे जोड़ना हो तो सौ जोड़ो फिर एक घटा दो। और चार सौ दस में से दस घटाना हो तो सीधा चार सौ, फिर दो कम बराबर तीन सौ अट्ठानवे। दिमाग़ में जल्दी हो जाता है।",en:"There are some quick tricks too. Like to add ninety-nine, add a hundred then subtract one. And to subtract ten from four hundred ten, just four hundred, then two less is three hundred ninety-eight. It's quick in your head.",mr:"काही जलद युक्त्याही आहेत. जसे नव्व्याण्णव जोडायचं असेल तर शंभर जोडा मग एक वजा करा. आणि चारशे दहातून दहा वजा करायचं तर सरळ चारशे, मग दोन कमी बरोबर तीनशे अठ्ठ्याण्णव. मनात पटकन होतं.",dur:12500},
   {art:bigExpr("856 = 600 + 256<br>563 = 900 − 337"),cap:"Ek number ko jod/ghatav mein todna: 856 = __+__, 563 = __−__.",hi:"किसी एक संख्या को दो संख्याओं के जोड़ या घटाव से बना सकते हैं, कई तरह से। जैसे आठ सौ छप्पन बराबर छह सौ और दो सौ छप्पन। और पाँच सौ तिरसठ बराबर नौ सौ में से तीन सौ सैंतीस। इससे जोड़-घटाव की समझ पक्की होती है।",en:"Any single number can be made from the sum or difference of two numbers, in many ways. Like eight hundred fifty-six is six hundred plus two hundred fifty-six. And five hundred sixty-three is nine hundred minus three hundred thirty-seven. This strengthens understanding.",mr:"कोणतीही एक संख्या दोन संख्यांच्या बेरीज किंवा वजाबाकीने बनवता येते, अनेक प्रकारे. जसे आठशे छप्पन्न बरोबर सहाशे आणि दोनशे छप्पन्न. आणि पाचशे त्रेसष्ट बरोबर नऊशेतून तीनशे सदतीस. यामुळे समज पक्की होते.",dur:13000},
   {art:bigExpr("Check: jod ka jawab<br>−ek number = doosra number"),cap:"Check karo: addition ka jawab sahi? Jod mein se ek hatao, doosra aana chahiye.",hi:"जोड़ का जवाब सही है या नहीं, यह घटाव से जाँच सकते हैं। जोड़ के जवाब में से एक संख्या घटाओ, तो दूसरी संख्या आनी चाहिए। ऐसे ही घटाव को जोड़ से जाँचते हैं।",en:"You can check whether an addition answer is right using subtraction. Subtract one number from the sum, and the other number should come. Likewise, check subtraction using addition.",mr:"बेरजेचं उत्तर बरोबर आहे की नाही, हे वजाबाकीने तपासता येतं. बेरजेच्या उत्तरातून एक संख्या वजा करा, तर दुसरी संख्या यायला हवी. तसंच वजाबाकी बेरजेने तपासतात.",dur:12500},
   {art:`<div class="fred" style="font-size:40px;color:#5B3FD6;text-align:center">3 _ <br>+ _ 4<br>——<br>5 0</div>`,cap:"Missing digits: ulta sochke khaali jagah bharo. (3_ + _4 = 50)",hi:"कुछ पहेलियों में जोड़ या घटाव के अंक गायब होते हैं। इन्हें उल्टा सोचकर भरते हैं। जैसे कोई संख्या और चार जोड़कर इकाई शून्य आए, तो वह अंक छह होगा। सोच-समझकर हर खाली जगह भरो।",en:"In some puzzles, digits of an addition or subtraction are missing. We fill them by thinking backwards. Like if some digit plus four gives ones zero, that digit is six. Fill each blank by reasoning carefully.",mr:"काही कोड्यांत बेरीज किंवा वजाबाकीचे अंक गायब असतात. ते उलट विचार करून भरतो. जसे एखादा अंक आणि चार जोडून एकक शून्य आलं, तर तो अंक सहा असेल. विचारपूर्वक प्रत्येक रिकामी जागा भरा.",dur:13000},
   {art:emoji("📦"),cap:"Recap: add (Ones→Tens→Hundreds), 10 jamaa=carry; subtract, kam ho=borrow; word problems samjho; estimate aur check.",hi:"चलो सब दोहराते हैं — जोड़ में दाएँ से शुरू, दस जमा हो तो कैरी; घटाव में कम पड़े तो उधार यानी बॉरो; कहानी वाले सवाल समझकर तय करो जोड़ना या घटाना; और अंदाज़ा लगाकर जवाब जाँचो।",en:"Let's recap — in addition start from the right, carry when ten gathers; in subtraction borrow when short; understand word problems to decide add or subtract; and estimate and check the answer.",mr:"चला सर्व उजळणी करू — बेरजेत उजवीकडून सुरुवात, दहा जमा झाले तर कॅरी; वजाबाकीत कमी पडलं तर उधार म्हणजे बॉरो; गोष्टीवाले प्रश्न समजून ठरवा बेरीज की वजाबाकी; आणि अंदाज लावून उत्तर तपासा.",dur:13500},
   {art:emoji("🌟"),cap:"Shabaash! Ab The Cleanest Village ka quiz khelo aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब द क्लीनेस्ट विलेज का क्विज़ खेलो और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play The Cleanest Village quiz and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता द क्लीनेस्ट व्हिलेजचा क्विझ खेळ आणि परफेक्ट हो!",dur:8500},

 {id:'weigh',title:'Weigh It, Pour It',emoji:'⚖️',color:C.purple,scenes:[
   {art:emoji("🐘"),cap:"Chapter 8 — Weigh It, Pour It! Weight (kg, g) aur Capacity (litre, ml).",hi:"नमस्ते दोस्तों! आज आठवाँ चॅप्टर — वेय इट, पोर इट। इसमें हम दो चीज़ें सीखेंगे — वज़न यानी weight, जो किलोग्राम और ग्राम में नापते हैं; और मात्रा यानी capacity, जो लीटर और मिलीलीटर में नापते हैं।",en:"Namaste friends! Today is chapter eight, Weigh It, Pour It. We will learn two things — weight, measured in kilograms and grams; and capacity, measured in litres and millilitres.",mr:"नमस्कार मित्रांनो! आज आठवा धडा — वे इट, पोर इट. यात आपण दोन गोष्टी शिकू — वजन म्हणजे weight, जे किलोग्रॅम आणि ग्रॅममध्ये मोजतो; आणि क्षमता म्हणजे capacity, जे लिटर आणि मिलिलिटरमध्ये मोजतो.",dur:12000},
   {art:`<div style="font-size:38px">🐘 🦒 🐕 🐿️</div>`,cap:"WEIGHT: cheez kitni BHAARI hai. Heavy se light: elephant > giraffe > dog > squirrel.",hi:"वज़न बताता है कोई चीज़ कितनी भारी या हल्की है। जानवरों को सबसे भारी से सबसे हल्के तक लगाओ — हाथी सबसे भारी, फिर जिराफ़, फिर कुत्ता, और गिलहरी सबसे हल्की।",en:"Weight tells how heavy or light a thing is. Arrange animals from heaviest to lightest — the elephant is heaviest, then the giraffe, then the dog, and the squirrel is lightest.",mr:"वजन सांगतं एखादी गोष्ट किती जड किंवा हलकी आहे. प्राण्यांना सर्वात जड ते सर्वात हलक्यापर्यंत लावा — हत्ती सर्वात जड, मग जिराफ, मग कुत्रा, आणि खार सर्वात हलकी.",dur:11500},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="190" height="80" viewBox="0 0 190 80"><line x1="95" y1="20" x2="95" y2="48" stroke="#7a5b18" stroke-width="4"/><line x1="35" y1="30" x2="155" y2="14" stroke="#5B3FD6" stroke-width="4"/><rect x="18" y="30" width="34" height="14" rx="3" fill="#CDE9FF" stroke="#5B3FD6"/><rect x="138" y="14" width="34" height="14" rx="3" fill="#FFE9B0" stroke="#C99A2E"/><polygon points="85,48 105,48 95,64" fill="#7a5b18"/></svg><div style="font-weight:800;color:#5b430f;font-size:13px">Bhaari side NEECHE jhukta hai</div></div>`,cap:"Pan balance: bhaari cheez wala palla NEECHE jaata hai. Light side upar.",hi:"तराज़ू यानी pan balance से वज़न की तुलना करते हैं। जिस पलड़े में भारी चीज़ हो वह नीचे झुक जाता है, और हल्की चीज़ वाला पलड़ा ऊपर उठ जाता है। दोनों बराबर हों तो तराज़ू सीधा रहता है।",en:"We compare weight using a pan balance. The pan with the heavier thing goes down, and the pan with the lighter thing rises up. If both are equal, the balance stays level.",mr:"तराजू म्हणजे pan balance ने वजनाची तुलना करतो. ज्या पारड्यात जड गोष्ट असेल ते खाली झुकतं, आणि हलक्या गोष्टीचं पारडं वर उठतं. दोन्ही समान असतील तर तराजू सरळ राहतो.",dur:12000},
   {art:bigExpr("kg = kilogram (bada)<br>g = gram (chhota)"),cap:"Weight ke 2 units: KILOGRAM (kg) bade ke liye, GRAM (g) chhote ke liye.",hi:"वज़न के दो यूनिट हैं। भारी चीज़ों के लिए किलोग्राम, जिसे kg लिखते हैं — जैसे आटा, चावल, तरबूज़। और हल्की चीज़ों के लिए ग्राम, जिसे g लिखते हैं — जैसे रबड़, हल्दी का पैकेट, एक पेन।",en:"Weight has two units. For heavy things we use kilogram, written kg — like flour, rice, a watermelon. And for light things we use gram, written g — like an eraser, a packet of turmeric, a pen.",mr:"वजनाचे दोन एकक आहेत. जड गोष्टींसाठी किलोग्रॅम, ज्याला kg लिहितो — जसे पीठ, तांदूळ, टरबूज. आणि हलक्या गोष्टींसाठी ग्रॅम, ज्याला g लिहितो — जसे खोडरबर, हळदीचं पाकीट, एक पेन.",dur:12500},
   {art:bigExpr("1 kg = 1000 g"),cap:"BADA RISHTA: 1 kilogram = 1000 gram! Hamesha yaad rakho.",hi:"यह चॅप्टर का सबसे ज़रूरी रिश्ता है — एक किलोग्राम बराबर एक हज़ार ग्राम। यानी हज़ार ग्राम मिलकर एक किलो बनाते हैं। यह बिलकुल वैसा ही है जैसे सौ सेंटीमीटर का एक मीटर।",en:"This is the most important relation of the chapter — one kilogram equals one thousand grams. That is, a thousand grams make one kilo. It's just like a hundred centimetres making one metre.",mr:"हा धड्याचा सर्वात महत्त्वाचा संबंध आहे — एक किलोग्रॅम बरोबर एक हजार ग्रॅम. म्हणजे हजार ग्रॅम मिळून एक किलो बनतो. हे अगदी शंभर सेंटीमीटरचा एक मीटर बनतो तसंच आहे.",dur:12000},
   {art:bigExpr("500 g + 500 g = 1000 g = 1 kg<br>500 g = ½ kg"),cap:"2 packet × 500g = 1kg. To 500g = aadha kilo (½ kg).",hi:"देखो — पाँच सौ ग्राम के दो पैकेट मिलकर एक हज़ार ग्राम यानी एक किलो बनाते हैं। इसका मतलब पाँच सौ ग्राम बराबर आधा किलो। जैसे दो आधे मिलकर एक पूरा।",en:"See — two packets of five hundred grams make one thousand grams, that is one kilo. This means five hundred grams equals half a kilo. Like two halves making one whole.",mr:"पाहा — पाचशे ग्रॅमची दोन पाकिटं मिळून एक हजार ग्रॅम म्हणजे एक किलो बनतात. म्हणजे पाचशे ग्रॅम बरोबर अर्धा किलो. जसे दोन अर्धे मिळून एक पूर्ण.",dur:12000},
   {art:bigExpr("4 packet × 250 g = 1 kg<br>250 g = ¼ kg"),cap:"4 packet × 250g = 1kg. To 250g = chauthai kilo (¼ kg).",hi:"इसी तरह दो सौ पचास ग्राम के चार पैकेट मिलकर एक किलो बनाते हैं। तो दो सौ पचास ग्राम बराबर चौथाई किलो। और दो ऐसे पैकेट मिलकर आधा किलो यानी पाँच सौ ग्राम।",en:"Likewise, four packets of two hundred fifty grams make one kilo. So two hundred fifty grams equals a quarter kilo. And two such packets make half a kilo, that is five hundred grams.",mr:"त्याचप्रमाणे दोनशे पन्नास ग्रॅमची चार पाकिटं मिळून एक किलो बनतात. तर दोनशे पन्नास ग्रॅम बरोबर चतुर्थांश किलो. आणि अशी दोन पाकिटं मिळून अर्धा किलो म्हणजे पाचशे ग्रॅम.",dur:12000},
   {art:bigExpr("10 packet × 100 g = 1 kg"),cap:"10 packet × 100g = 1kg. Chhote packets ginke 1 kilo banao.",hi:"और सौ ग्राम के दस पैकेट मिलकर एक किलो बनाते हैं, क्योंकि सौ दस बार बराबर हज़ार। इसी तरह पचास ग्राम के बीस पैकेट मिलकर एक किलो। छोटे पैकेट गिनकर हम बड़ा वज़न बना सकते हैं।",en:"And ten packets of one hundred grams make one kilo, because hundred ten times is a thousand. Likewise twenty packets of fifty grams make one kilo. By counting small packets we can make a big weight.",mr:"आणि शंभर ग्रॅमची दहा पाकिटं मिळून एक किलो बनतात, कारण शंभर दहा वेळा बरोबर हजार. त्याचप्रमाणे पन्नास ग्रॅमची वीस पाकिटं मिळून एक किलो. लहान पाकिटं मोजून आपण मोठं वजन बनवू शकतो.",dur:12500},
   {art:bigExpr("1 kg Kaju-katli<br>500g→2 box · 250g→4 box<br>100g→10 box · 50g→20 box"),cap:"Mr Shrinathan ki mithai: 1kg ko alag boxes mein. Bada box = kam, chhota = zyada.",hi:"मिठाई वाले श्रीनाथन एक किलो काजू-कतली को अलग-अलग डिब्बों में पैक करते हैं। पाँच सौ ग्राम के दो डिब्बे, दो सौ पचास के चार, सौ ग्राम के दस, और पचास ग्राम के बीस डिब्बे। डिब्बा जितना छोटा, उतने ज़्यादा डिब्बे चाहिए।",en:"Shrinathan the sweet-seller packs one kilo of kaju-katli in different boxes. Two boxes of five hundred grams, four of two hundred fifty, ten of hundred grams, and twenty of fifty grams. The smaller the box, the more boxes are needed.",mr:"मिठाईवाले श्रीनाथन एक किलो काजू-कतली वेगवेगळ्या डब्यांत पॅक करतात. पाचशे ग्रॅमचे दोन डबे, दोनशे पन्नासचे चार, शंभर ग्रॅमचे दहा, आणि पन्नास ग्रॅमचे वीस डबे. डबा जितका लहान, तितके जास्त डबे लागतात.",dur:13000},
   {art:`<div style="font-size:40px">⚖️ 🪟 🧈</div>`,cap:"Weighing machines kai tarah: pan balance, kitchen scale, bathroom scale, big spring.",hi:"वज़न नापने की कई मशीनें होती हैं। तराज़ू यानी pan balance छोटी चीज़ों के लिए, रसोई का काँटा सब्ज़ी के लिए, बाथरूम वाला काँटा शरीर का वज़न नापने के लिए, और बड़ा स्प्रिंग काँटा भारी बोरों के लिए।",en:"There are many machines to measure weight. A pan balance for small things, a kitchen scale for vegetables, a bathroom scale to measure body weight, and a big spring scale for heavy sacks.",mr:"वजन मोजण्याच्या अनेक मशीन्स असतात. तराजू म्हणजे pan balance लहान गोष्टींसाठी, स्वयंपाकघरातला काटा भाजीसाठी, बाथरूमचा काटा शरीराचं वजन मोजण्यासाठी, आणि मोठा स्प्रिंग काटा जड पोत्यांसाठी.",dur:12500},
   {art:bigExpr("Cat → 3-5 kg<br>Pen → 10-15 g<br>Elephant → 1000+ kg"),cap:"Estimate weight: billi ~kg mein, pen ~g mein, hathi ~bahut kg.",hi:"रोज़ की चीज़ों का वज़न अंदाज़े से बता सकते हैं। बिल्ली का वज़न कुछ किलो में, पेन या पत्ती का कुछ ग्राम में, और हाथी का हज़ार किलो से भी ज़्यादा। अंदाज़ा लगाना एक अच्छी आदत है।",en:"We can estimate the weight of everyday things. A cat weighs a few kilos, a pen or a leaf a few grams, and an elephant more than a thousand kilos. Estimating is a good habit.",mr:"रोजच्या गोष्टींचं वजन अंदाजाने सांगता येतं. मांजराचं वजन काही किलोत, पेन किंवा पानाचं काही ग्रॅमत, आणि हत्तीचं हजार किलोपेक्षाही जास्त. अंदाज लावणं चांगली सवय आहे.",dur:12500},
   {art:bigExpr("50g Haldi = 5 erasers<br>(har eraser 10g)"),cap:"Balance puzzle: 50g Haldi = kitne 10g eraser? → 5 erasers.",hi:"तराज़ू वाली पहेली — अगर एक रबड़ का वज़न दस ग्राम है, तो पचास ग्राम हल्दी के बराबर कितने रबड़? पचास में दस का भाग बराबर पाँच रबड़। ऐसे ही सौ ग्राम साबुन बराबर दस रबड़।",en:"A balance puzzle — if one eraser weighs ten grams, how many erasers equal fifty grams of turmeric? Fifty divided by ten is five erasers. Likewise a hundred-gram soap equals ten erasers.",mr:"तराजूचं कोडं — एका खोडरबराचं वजन दहा ग्रॅम असेल, तर पन्नास ग्रॅम हळदीबरोबर किती खोडरबर? पन्नासला दहाने भाग बरोबर पाच खोडरबर. तसंच शंभर ग्रॅम साबण बरोबर दहा खोडरबर.",dur:12500},
   {art:bigExpr("Mirabai Chanu<br>202 kg uthaaya! 🏋️"),cap:"Do You Know: Mirabai Chanu ne Olympics mein 202 kg uthaya (silver medal)!",hi:"क्या तुम जानते हो — मीराबाई चानू एक भारतीय वेटलिफ़्टर हैं। उन्होंने दो हज़ार बीस टोक्यो ओलंपिक में महिलाओं के उनतालीस किलो वर्ग में सिल्वर मेडल जीता, और कुल दो सौ दो किलो वज़न उठाया।",en:"Did you know — Mirabai Chanu is an Indian weightlifter. She won the silver medal at the twenty-twenty Tokyo Olympics in the women's forty-nine kilo event, and lifted a total of two hundred two kilograms.",mr:"तुला माहीत आहे का — मीराबाई चानू एक भारतीय वेटलिफ्टर आहेत. त्यांनी दोन हजार वीस टोक्यो ऑलिंपिकमध्ये महिलांच्या एकोणपन्नास किलो गटात सिल्व्हर मेडल जिंकलं, आणि एकूण दोनशे दोन किलो वजन उचललं.",dur:13000},
   {art:emoji("🫙💧"),cap:"Ab CAPACITY: bartan mein kitna liquid (paani, doodh, tel) aata hai.",hi:"अब मात्रा यानी capacity सीखते हैं। यह बताती है कि किसी बर्तन या बोतल में कितना तरल यानी liquid आ सकता है — जैसे पानी, दूध, तेल या जूस। यानी बर्तन कितना भर सकता है।",en:"Now we learn capacity. It tells how much liquid a vessel or bottle can hold — like water, milk, oil or juice. That is, how much the vessel can be filled.",mr:"आता क्षमता म्हणजे capacity शिकू. ती सांगते की एखाद्या भांड्यात किंवा बाटलीत किती द्रव म्हणजे liquid मावू शकतो — जसे पाणी, दूध, तेल किंवा रस. म्हणजे भांडं किती भरू शकतं.",dur:12000},
   {art:bigExpr("l = litre (bada)<br>ml = millilitre (chhota)"),cap:"Capacity ke 2 units: LITRE (l) bade ke liye, MILLILITRE (ml) chhote ke liye.",hi:"मात्रा के दो यूनिट हैं। ज़्यादा तरल के लिए लीटर, जिसे छोटे l से लिखते हैं — जैसे पानी की बड़ी बोतल, दूध, तेल का डिब्बा। और थोड़े तरल के लिए मिलीलीटर, जिसे ml लिखते हैं — जैसे दवा, आई-ड्रॉप, परफ्यूम।",en:"Capacity has two units. For more liquid we use litre, written with a small l — like a big water bottle, milk, an oil can. And for little liquid we use millilitre, written ml — like medicine, eye drops, perfume.",mr:"क्षमतेचे दोन एकक आहेत. जास्त द्रवासाठी लिटर, ज्याला लहान l ने लिहितो — जसे पाण्याची मोठी बाटली, दूध, तेलाचा डबा. आणि थोड्या द्रवासाठी मिलिलिटर, ज्याला ml ने लिहितो — जसे औषध, आय-ड्रॉप, परफ्यूम.",dur:12500},
   {art:bigExpr("1 litre = 1000 ml"),cap:"BADA RISHTA: 1 litre = 1000 ml! (jaise 1kg=1000g, 1m=100cm)",hi:"यह भी ज़रूरी रिश्ता है — एक लीटर बराबर एक हज़ार मिलीलीटर। यानी हज़ार मिलीलीटर मिलकर एक लीटर बनाते हैं। याद रखो — एक किलो हज़ार ग्राम, और एक लीटर हज़ार मिलीलीटर।",en:"This is also an important relation — one litre equals one thousand millilitres. That is, a thousand millilitres make one litre. Remember — one kilo is a thousand grams, and one litre is a thousand millilitres.",mr:"हाही महत्त्वाचा संबंध आहे — एक लिटर बरोबर एक हजार मिलिलिटर. म्हणजे हजार मिलिलिटर मिळून एक लिटर बनतो. लक्षात ठेवा — एक किलो हजार ग्रॅम, आणि एक लिटर हजार मिलिलिटर.",dur:12500},
   {art:bigExpr("500 ml + 500 ml = 1000 ml = 1 l<br>500 ml = ½ l"),cap:"2 bottle × 500ml = 1 litre. To 500ml = aadha litre (½ l).",hi:"देखो — पाँच सौ मिलीलीटर की दो बोतलें मिलकर एक हज़ार मिलीलीटर यानी एक लीटर बनाती हैं। तो पाँच सौ मिलीलीटर बराबर आधा लीटर। एक लीटर की बोतल भरने के लिए दो ऐसी बोतलें चाहिए।",en:"See — two bottles of five hundred millilitres make one thousand millilitres, that is one litre. So five hundred millilitres equals half a litre. To fill a one-litre bottle, two such bottles are needed.",mr:"पाहा — पाचशे मिलिलिटरच्या दोन बाटल्या मिळून एक हजार मिलिलिटर म्हणजे एक लिटर बनतात. तर पाचशे मिलिलिटर बरोबर अर्धा लिटर. एक लिटरची बाटली भरण्यासाठी अशा दोन बाटल्या लागतात.",dur:12500},
   {art:bigExpr("4 bottle × 250 ml = 1 l<br>250 ml = ¼ l"),cap:"4 bottle × 250ml = 1 litre. To 250ml = chauthai litre (¼ l).",hi:"इसी तरह दो सौ पचास मिलीलीटर की चार बोतलें मिलकर एक लीटर बनाती हैं। तो दो सौ पचास मिलीलीटर बराबर चौथाई लीटर। और सौ मिलीलीटर की दस बोतलें मिलकर एक लीटर।",en:"Likewise, four bottles of two hundred fifty millilitres make one litre. So two hundred fifty millilitres equals a quarter litre. And ten bottles of a hundred millilitres make one litre.",mr:"त्याचप्रमाणे दोनशे पन्नास मिलिलिटरच्या चार बाटल्या मिळून एक लिटर बनतात. तर दोनशे पन्नास मिलिलिटर बरोबर चतुर्थांश लिटर. आणि शंभर मिलिलिटरच्या दहा बाटल्या मिळून एक लिटर.",dur:12500},
   {art:bigExpr("1 litre perfume:<br>500ml→2 · 200ml→5<br>100ml→10 · 50ml→20"),cap:"Mr Krishna ka perfume: 1 litre ko chhoti bottles mein. Chhoti = zyada bottles.",hi:"मिस्टर कृष्णा एक लीटर परफ्यूम को अलग-अलग बोतलों में भरते हैं। पाँच सौ मिलीलीटर की दो बोतलें, दो सौ की पाँच, सौ की दस, और पचास की बीस बोतलें। जितनी छोटी बोतल, उतनी ज़्यादा बोतलें चाहिए।",en:"Mr Krishna fills one litre of perfume into different bottles. Two bottles of five hundred millilitres, five of two hundred, ten of a hundred, and twenty of fifty. The smaller the bottle, the more bottles are needed.",mr:"मिस्टर कृष्णा एक लिटर परफ्यूम वेगवेगळ्या बाटल्यांत भरतात. पाचशे मिलिलिटरच्या दोन बाटल्या, दोनशेच्या पाच, शंभरच्या दहा, आणि पन्नासच्या वीस बाटल्या. बाटली जितकी लहान, तितक्या जास्त बाटल्या लागतात.",dur:13000},
   {art:bigExpr("Dropper = 1 ml<br>Dosing cup = 10 ml"),cap:"Chhoti maatra: dropper ~1ml, dosing cup ~10ml. 10 cup = 100ml.",hi:"बहुत थोड़ी मात्रा भी नापते हैं। एक ड्रॉपर में लगभग एक मिलीलीटर, और दवा वाले छोटे कप में लगभग दस मिलीलीटर आता है। तो दस ऐसे कप मिलकर सौ मिलीलीटर भरते हैं, और सौ कप मिलकर एक लीटर।",en:"We measure very small amounts too. A dropper holds about one millilitre, and a medicine dosing cup about ten millilitres. So ten such cups make a hundred millilitres, and a hundred cups make one litre.",mr:"खूप थोडी मात्राही मोजतो. एका ड्रॉपरमध्ये सुमारे एक मिलिलिटर, आणि औषधाच्या लहान कपमध्ये सुमारे दहा मिलिलिटर मावतं. तर असे दहा कप मिळून शंभर मिलिलिटर भरतात, आणि शंभर कप मिळून एक लिटर.",dur:13000},
   {art:bigExpr("Eye drops → bahut kam (1ml se kam)<br>Cooking oil → zyada"),cap:"Kab kitna liquid: eye drops bahut kam (boond), cooking oil zyada.",hi:"अलग-अलग तरल अलग मात्रा में इस्तेमाल होते हैं। आई-ड्रॉप एक बार में एक मिलीलीटर से भी कम, यानी कुछ बूँदें। शहद या कफ सिरप थोड़ा ज़्यादा। और खाना पकाने का तेल सबसे ज़्यादा। ज़रूरत के हिसाब से मात्रा बदलती है।",en:"Different liquids are used in different amounts. Eye drops, less than one millilitre at a time, just a few drops. Honey or cough syrup a bit more. And cooking oil the most. The amount changes according to need.",mr:"वेगवेगळे द्रव वेगवेगळ्या मात्रेत वापरतात. आय-ड्रॉप एका वेळी एक मिलिलिटरपेक्षाही कमी, म्हणजे काही थेंब. मध किंवा कफ सिरप थोडं जास्त. आणि स्वयंपाकाचं तेल सर्वात जास्त. गरजेनुसार मात्रा बदलते.",dur:13000},
   {art:`<div style="font-size:38px">🥛 🪣 🛢️</div>`,cap:"Less/more than 1 litre: cup/glass < 1 litre; bucket/drum > 1 litre.",hi:"बर्तनों को एक लीटर से कम या ज़्यादा में बाँट सकते हैं। एक कप, गिलास या मग में एक लीटर से कम पानी आता है। और बाल्टी, ड्रम या बड़ी टंकी में एक लीटर से ज़्यादा। एक पानी की बोतल में अक्सर ठीक एक लीटर।",en:"We can sort vessels into less than or more than one litre. A cup, glass or mug holds less than a litre of water. And a bucket, drum or big tank holds more than a litre. A water bottle often holds exactly one litre.",mr:"भांडी एक लिटरपेक्षा कमी किंवा जास्त मध्ये वाटता येतात. एक कप, ग्लास किंवा मगमध्ये एक लिटरपेक्षा कमी पाणी मावतं. आणि बादली, ड्रम किंवा मोठी टाकी एक लिटरपेक्षा जास्त. पाण्याच्या बाटलीत बहुधा बरोबर एक लिटर.",dur:12500},
   {art:bigExpr("Doodh ke cans:<br>50, 100, 200, 500, 1000 ml"),cap:"Doodh naapne ke cans: 50ml se 1000ml tak. Sahi can se sahi maatra.",hi:"दूध नापने के लिए खास कैन होते हैं — पचास, सौ, दो सौ, पाँच सौ, और हज़ार मिलीलीटर के। जितना दूध चाहिए, उतने वाला कैन इस्तेमाल करते हैं। ऐसे ही सही माप मिलता है।",en:"There are special cans to measure milk — of fifty, hundred, two hundred, five hundred, and thousand millilitres. We use the can that matches how much milk is needed. This way we get the right measure.",mr:"दूध मोजण्यासाठी खास कॅन असतात — पन्नास, शंभर, दोनशे, पाचशे, आणि हजार मिलिलिटरचे. जितकं दूध हवं, तेवढ्याचा कॅन वापरतात. अशा प्रकारे योग्य माप मिळतं.",dur:12500},
   {art:`<div style="font-size:40px">🚰💧</div>`,cap:"Water conservation: tapakta nal thoda-thoda paani roz barbaad karta hai. Paani bachao!",hi:"पानी बचाना ज़रूरी है। अगर नल से धीरे-धीरे बूँद-बूँद पानी टपकता रहे, तो दिन भर में बहुत सारा पानी बरबाद हो जाता है। ज़रा सी बूँद भी हफ्ते भर में बहुत हो जाती है। इसलिए नल बंद रखो और पानी बचाओ।",en:"Saving water is important. If water keeps dripping drop by drop from a tap, a lot of water is wasted over a day. Even a tiny drip adds up to a lot over a week. So keep taps closed and save water.",mr:"पाणी वाचवणं महत्त्वाचं आहे. नळातून थेंब-थेंब पाणी गळत राहिलं, तर दिवसभरात खूप पाणी वाया जातं. थोडासा थेंबही आठवड्याभरात खूप होतो. म्हणून नळ बंद ठेवा आणि पाणी वाचवा.",dur:13000},
   {art:bigExpr("Weight: kg, g (1kg=1000g)<br>Capacity: l, ml (1l=1000ml)"),cap:"Dono alag: WEIGHT bhaaripan (kg/g), CAPACITY kitna liquid (l/ml).",hi:"ध्यान रखो — वज़न और मात्रा अलग-अलग चीज़ें हैं। वज़न बताता है कोई चीज़ कितनी भारी है, किलोग्राम और ग्राम में। और मात्रा बताती है बर्तन में कितना तरल आता है, लीटर और मिलीलीटर में।",en:"Remember — weight and capacity are different things. Weight tells how heavy a thing is, in kilograms and grams. And capacity tells how much liquid a vessel holds, in litres and millilitres.",mr:"लक्षात ठेवा — वजन आणि क्षमता वेगवेगळ्या गोष्टी आहेत. वजन सांगतं एखादी गोष्ट किती जड आहे, किलोग्रॅम आणि ग्रॅममध्ये. आणि क्षमता सांगते भांड्यात किती द्रव मावतो, लिटर आणि मिलिलिटरमध्ये.",dur:13000},
   {art:emoji("📦"),cap:"Recap: weight (kg/g, 1kg=1000g, balance); capacity (l/ml, 1l=1000ml); ½ aur ¼; right unit; paani bachao.",hi:"चलो सब दोहराते हैं — वज़न किलोग्राम और ग्राम में, एक किलो बराबर हज़ार ग्राम, तराज़ू से तुलना; मात्रा लीटर और मिलीलीटर में, एक लीटर बराबर हज़ार मिलीलीटर; आधा और चौथाई; सही यूनिट चुनो; और पानी बचाओ।",en:"Let's recap — weight in kilograms and grams, one kilo is a thousand grams, compare with a balance; capacity in litres and millilitres, one litre is a thousand millilitres; half and quarter; choose the right unit; and save water.",mr:"चला सर्व उजळणी करू — वजन किलोग्रॅम आणि ग्रॅममध्ये, एक किलो बरोबर हजार ग्रॅम, तराजूने तुलना; क्षमता लिटर आणि मिलिलिटरमध्ये, एक लिटर बरोबर हजार मिलिलिटर; अर्धा आणि चतुर्थांश; योग्य एकक निवडा; आणि पाणी वाचवा.",dur:13500},
   {art:emoji("🌟"),cap:"Shabaash! Ab Weigh It, Pour It ka quiz khelo aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब वेय इट, पोर इट का क्विज़ खेलो और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play the Weigh It, Pour It quiz and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता वे इट, पोर इटचा क्विझ खेळ आणि परफेक्ट हो!",dur:8500},

 {id:'equal',title:'Equal Groups',emoji:'✖️',color:C.coral,scenes:[
   {art:emoji("🐸"),cap:"Chapter 9 — Equal Groups! Multiplication (guna) aur Division (bhaag).",hi:"नमस्ते दोस्तों! आज नौवाँ चॅप्टर — इक्वल ग्रुप्स यानी बराबर समूह। इसमें हम गुणा यानी multiplication और भाग यानी division सीखेंगे। दोनों बराबर समूहों पर आधारित हैं।",en:"Namaste friends! Today is chapter nine, Equal Groups. We will learn multiplication and division. Both are based on equal groups.",mr:"नमस्कार मित्रांनो! आज नववा धडा — इक्वल ग्रुप्स म्हणजे समान गट. यात आपण गुणाकार म्हणजे multiplication आणि भागाकार म्हणजे division शिकू. दोन्ही समान गटांवर आधारित आहेत.",dur:11500},
   {art:`<div style="display:flex;gap:8px;font-size:30px">🟢🟢🟢 🟢🟢🟢 🟢🟢🟢 🟢🟢🟢</div>`,cap:"Equal groups: barabar-barabar dher. 4 group, har mein 3 = 4×3.",hi:"बराबर समूह का मतलब — हर ढेर में एक जैसी गिनती। जैसे चार समूह, हर समूह में तीन चीज़ें। इन्हें बार-बार जोड़ने की जगह हम गुणा करते हैं — चार गुना तीन।",en:"Equal groups means — each pile has the same count. Like four groups, each with three things. Instead of adding again and again, we multiply — four times three.",mr:"समान गट म्हणजे — प्रत्येक ढिगात सारखीच संख्या. जसे चार गट, प्रत्येक गटात तीन गोष्टी. पुन्हा पुन्हा जोडण्याऐवजी आपण गुणतो — चार गुणिले तीन.",dur:12000},
   {art:bigExpr("Frog 3-3 koodta: 0,3,6,9,12...<br>= 3 ke multiples"),cap:"Animal Jumps: frog 3-3 koodta (multiples of 3). Skip counting!",hi:"मेंढक तीन-तीन कदम कूदता है — शून्य, तीन, छह, नौ, बारह। ये सब तीन के पहाड़े यानी multiples हैं। इसी तरह गिलहरी चार-चार कूदती है। बार-बार एक जैसा कूदना ही गुणा की शुरुआत है।",en:"The frog jumps three steps at a time — zero, three, six, nine, twelve. These are all multiples of three. Likewise the squirrel jumps four at a time. Jumping the same amount repeatedly is the start of multiplication.",mr:"बेडूक तीन-तीन पावलं उडी मारतो — शून्य, तीन, सहा, नऊ, बारा. हे सर्व तीनचे पाढे म्हणजे multiples आहेत. तसंच खार चार-चार उडी मारते. पुन्हा पुन्हा सारखी उडी मारणं हीच गुणाकाराची सुरुवात.",dur:12500},
   {art:bigExpr("67 → 3 ka multiple nahi<br>(frog 67 ko touch nahi karega)"),cap:"Will frog touch 67? Nahi! 67, 3 ka multiple nahi (66 aur 69 hai).",hi:"क्या मेंढक सरसठ को छुएगा? नहीं! क्योंकि सरसठ तीन का पहाड़ा नहीं है। तीन के पहाड़े में छियासठ और उनहत्तर आते हैं, पर सरसठ नहीं। तो मेंढक उसे नहीं छुएगा।",en:"Will the frog touch sixty-seven? No! Because sixty-seven is not a multiple of three. In the three table come sixty-six and sixty-nine, but not sixty-seven. So the frog won't touch it.",mr:"बेडूक सदुसष्ट स्पर्श करेल का? नाही! कारण सदुसष्ट तीनचा पाढा नाही. तीनच्या पाढ्यात सहासष्ट आणि एकोणसत्तर येतात, पण सदुसष्ट नाही. तर बेडूक त्याला स्पर्श करणार नाही.",dur:12500},
   {art:bigExpr("Squirrel 4-4: 60 tak<br>60 ÷ 4 = 15 jumps"),cap:"Squirrel 60 tak pahunchne ke liye? 60÷4 = 15 jumps.",hi:"गिलहरी चार-चार कूदते हुए साठ तक कितनी छलांग में पहुँचेगी? साठ में चार का भाग बराबर पंद्रह। यानी पंद्रह छलांग। यहीं भाग की शुरुआत हुई — कितने बराबर समूह बनेंगे।",en:"How many jumps does the squirrel take to reach sixty, jumping four at a time? Sixty divided by four is fifteen. That is fifteen jumps. Here division begins — how many equal groups will be made.",mr:"खार चार-चार उडी मारत साठपर्यंत किती उड्यांत पोहोचेल? साठला चारने भाग बरोबर पंधरा. म्हणजे पंधरा उड्या. इथेच भागाकाराची सुरुवात — किती समान गट बनतील.",dur:12500},
   {art:bigExpr("Common multiples of 3 & 4:<br>12, 24, 36..."),cap:"Common multiples: 3 aur 4 dono ke multiples — 12, 24, 36.",hi:"कुछ संख्याएँ दो पहाड़ों में आती हैं। जैसे बारह तीन के पहाड़े में भी, और चार के पहाड़े में भी। ऐसी संख्याओं को सार्व-गुणज यानी common multiples कहते हैं। तीन और चार के लिए — बारह, चौबीस, छत्तीस।",en:"Some numbers come in two tables. Like twelve is in the three table and also in the four table. Such numbers are called common multiples. For three and four — twelve, twenty-four, thirty-six.",mr:"काही संख्या दोन पाढ्यांत येतात. जसे बारा तीनच्या पाढ्यात आणि चारच्याही पाढ्यात. अशा संख्यांना सामायिक गुणक म्हणजे common multiples म्हणतात. तीन आणि चारसाठी — बारा, चोवीस, छत्तीस.",dur:13000},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">${gridDots(3,12)}<div class="fred" style="font-size:30px;color:#5B3FD6">12 × 3 = 36 petals</div></div>`,cap:"Gulabo's garden: 12 lily, har mein 3 petal = 12×3 = 36 petals.",hi:"गुलाबो के बगीचे में लिली के फूल हैं, हर फूल में तीन पंखुड़ियाँ। बारह फूलों में कितनी पंखुड़ियाँ? बारह गुना तीन बराबर छत्तीस। दस फूलों में तीस, और दो में छह — मिलाकर भी छत्तीस।",en:"Gulabo's garden has lily flowers, each with three petals. How many petals in twelve flowers? Twelve times three is thirty-six. Ten flowers have thirty, and two have six — together also thirty-six.",mr:"गुलाबोच्या बागेत लिलीची फुलं आहेत, प्रत्येक फुलात तीन पाकळ्या. बारा फुलांत किती पाकळ्या? बारा गुणिले तीन बरोबर छत्तीस. दहा फुलांत तीस, आणि दोनात सहा — मिळूनही छत्तीस.",dur:13000},
   {art:bigExpr("12 × 3 = 36<br>↑multiplier  ↑group size  ↑product"),cap:"Multiplication ke naam: 12=multiplier (groups), 3=group size, 36=product.",hi:"गुणा के हर हिस्से का नाम है। बारह यानी कितने समूह — multiplier। तीन यानी हर समूह में कितने — group size या multiplicand। और जवाब छत्तीस — product यानी गुणनफल। इसे multiplication statement कहते हैं।",en:"Each part of multiplication has a name. Twelve, how many groups — the multiplier. Three, how many in each group — the group size or multiplicand. And the answer thirty-six — the product. This is called a multiplication statement.",mr:"गुणाकाराच्या प्रत्येक भागाचं नाव आहे. बारा म्हणजे किती गट — multiplier. तीन म्हणजे प्रत्येक गटात किती — group size किंवा multiplicand. आणि उत्तर छत्तीस — product म्हणजे गुणाकार. याला multiplication statement म्हणतात.",dur:13500},
   {art:bigExpr("80 petals, 5 per flower<br>80 ÷ 5 = 16 flowers"),cap:"Ulta bhi: 80 petal, har flower mein 5 → 80÷5 = 16 flowers.",hi:"उल्टा भी सोच सकते हैं। हिबिस्कस के हर फूल में पाँच पंखुड़ियाँ। कुल अस्सी पंखुड़ियाँ हैं तो कितने फूल? अस्सी में पाँच का भाग बराबर सोलह फूल। गुणा और भाग एक-दूसरे के उल्टे हैं।",en:"We can think backwards too. Each hibiscus flower has five petals. If there are eighty petals in all, how many flowers? Eighty divided by five is sixteen flowers. Multiplication and division are opposites of each other.",mr:"उलटही विचार करता येतो. जास्वंदाच्या प्रत्येक फुलात पाच पाकळ्या. एकूण ऐंशी पाकळ्या असतील तर किती फुलं? ऐंशीला पाचने भाग बरोबर सोळा फुलं. गुणाकार आणि भागाकार एकमेकांचे उलट आहेत.",dur:13000},
   {art:`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">${gridDots(4,6)}<div class="fred" style="font-size:28px;color:#5B3FD6">4 rows × 6 = 24 (array)</div></div>`,cap:"ARRAY: rows aur columns mein chizein. 4 row × 6 = 24. Ginna aasaan!",hi:"जब चीज़ें कतारों और खानों में सजी हों, उसे array कहते हैं। जैसे चार कतार, हर कतार में छह। कुल बराबर चार गुना छह यानी चौबीस। array से गुणा समझना और गिनना आसान हो जाता है।",en:"When things are arranged in rows and columns, it's called an array. Like four rows, each with six. The total equals four times six, that is twenty-four. Arrays make multiplication easy to see and count.",mr:"जेव्हा गोष्टी रांगा आणि स्तंभांत मांडलेल्या असतात, त्याला array म्हणतात. जसे चार रांगा, प्रत्येक रांगेत सहा. एकूण बरोबर चार गुणिले सहा म्हणजे चोवीस. array मुळे गुणाकार समजणं आणि मोजणं सोपं होतं.",dur:13000},
   {art:bigExpr("Double = 2 times<br>Double of 23 = 46"),cap:"Doubling Magic: double matlab 2 guna. Anvi ne 23 phool → 46 kiye!",hi:"जादूगर अनवी ने डबलिंग का जादू दिखाया। डबल यानी दो गुना। तेईस फूल को डबल किया तो छियालीस। किसी भी संख्या को डबल करने के लिए उसे खुद में जोड़ो, या दो से गुणा करो।",en:"Magician Anvi showed the doubling trick. Double means two times. Doubling twenty-three flowers gives forty-six. To double any number, add it to itself, or multiply by two.",mr:"जादूगार अन्वीने डबलिंगची जादू दाखवली. डबल म्हणजे दोन पट. तेवीस फुलं डबल केली तर सेहेचाळीस. कोणत्याही संख्येला डबल करण्यासाठी ती स्वतःत जोडा, किंवा दोनने गुणा.",dur:12500},
   {art:bigExpr("Double of 32=64<br>Double of 45=90<br>Hamesha EVEN!"),cap:"Double karne par jawab hamesha EVEN (even) hota hai!",hi:"डबल करने पर एक मज़ेदार बात — जवाब हमेशा सम यानी even होता है। बत्तीस का डबल चौंसठ, पैंतालीस का डबल नब्बे। चाहे संख्या सम हो या विषम, डबल करने पर इकाई का अंक हमेशा शून्य, दो, चार, छह या आठ आता है।",en:"When doubling, a fun fact — the answer is always even. Double of thirty-two is sixty-four, double of forty-five is ninety. Whether the number is even or odd, on doubling the ones digit is always zero, two, four, six or eight.",mr:"डबल केल्यावर एक मजेशीर गोष्ट — उत्तर नेहमी सम म्हणजे even असतं. बत्तीसचा डबल चौसष्ट, पंचेचाळीसचा डबल नव्वद. संख्या सम असो की विषम, डबल केल्यावर एककाचा अंक नेहमी शून्य, दोन, चार, सहा किंवा आठ येतो.",dur:13500},
   {art:bigExpr("Multiples of 3:<br>3,6,9,...,27,30 (kabhi 3,5,7,9 ones nahi double se)"),cap:"Double se kabhi 3,5,7,9 ones digit nahi aata (sirf even).",hi:"इसीलिए डबल करने पर इकाई में तीन, पाँच, सात या नौ कभी नहीं आता। ये सब विषम अंक हैं, और डबल हमेशा सम देता है। यह पैटर्न पहाड़ों में भी दिखता है।",en:"That's why on doubling, the ones digit is never three, five, seven or nine. These are all odd digits, and doubling always gives an even number. This pattern shows in the tables too.",mr:"म्हणूनच डबल केल्यावर एककात तीन, पाच, सात किंवा नऊ कधीच येत नाही. हे सर्व विषम अंक आहेत, आणि डबल नेहमी सम देतो. हा पॅटर्न पाढ्यांतही दिसतो.",dur:12500},
   {art:bigExpr("10 × 3 = 30<br>20 × 3 = 60"),cap:"Multiples of Tens: 10 group × 3 = 30. 20 × 3 = 60. Aasaan!",hi:"अब दहाई से गुणा। दस ट्राइसिकल, हर में तीन पहिये — दस गुना तीन बराबर तीस। बीस ट्राइसिकल तो बीस गुना तीन बराबर साठ। जब समूहों की गिनती दस का गुणा हो, तो गुणा बहुत आसान हो जाता है।",en:"Now multiplying by tens. Ten tricycles, each with three wheels — ten times three is thirty. Twenty tricycles, so twenty times three is sixty. When the number of groups is a multiple of ten, multiplying becomes very easy.",mr:"आता दहाने गुणाकार. दहा ट्रायसिकल, प्रत्येकात तीन चाकं — दहा गुणिले तीन बरोबर तीस. वीस ट्रायसिकल तर वीस गुणिले तीन बरोबर साठ. गटांची संख्या दहाचा गुणाकार असेल, तर गुणाकार खूप सोपा होतो.",dur:13000},
   {art:bigExpr("6 × 8 = 48<br>10 × 8 = 80<br>(10-times: pehle 6×8, phir...)"),cap:"Pattern: 6×8=48, to 10×8=80, 60×8=480. Zero badhta jaata!",hi:"एक सुंदर पैटर्न — छह गुना आठ बराबर अड़तालीस। तो दस गुना आठ बराबर अस्सी, और साठ गुना आठ बराबर चार सौ अस्सी। जैसे-जैसे दस का गुणा बढ़ता है, जवाब में शून्य जुड़ता जाता है।",en:"A beautiful pattern — six times eight is forty-eight. So ten times eight is eighty, and sixty times eight is four hundred eighty. As the multiple of ten grows, a zero gets added to the answer.",mr:"एक सुंदर पॅटर्न — सहा गुणिले आठ बरोबर अठ्ठेचाळीस. तर दहा गुणिले आठ बरोबर ऐंशी, आणि साठ गुणिले आठ बरोबर चारशे ऐंशी. दहाचा गुणाकार वाढत जातो, तसा उत्तरात शून्य जोडला जातो.",dur:13000},
   {art:bigExpr("18 × 4 = (10×4) + (8×4)<br>= 40 + 32 = 72"),cap:"Multiplying using 10s: bade ko todo. 18×4 = 10×4 + 8×4 = 72.",hi:"बड़ी संख्या से गुणा करना हो तो उसे तोड़ लो। जैसे अठारह गुना चार। अठारह को दस और आठ में तोड़ो। दस गुना चार बराबर चालीस, और आठ गुना चार बराबर बत्तीस। दोनों जोड़ो — बहत्तर। तोड़कर गुणा करना आसान है।",en:"To multiply a big number, break it down. Like eighteen times four. Break eighteen into ten and eight. Ten times four is forty, and eight times four is thirty-two. Add both — seventy-two. Breaking down makes multiplication easy.",mr:"मोठ्या संख्येने गुणाकार करायचा असेल तर ती तोडा. जसे अठरा गुणिले चार. अठराला दहा आणि आठमध्ये तोडा. दहा गुणिले चार बरोबर चाळीस, आणि आठ गुणिले चार बरोबर बत्तीस. दोन्ही जोडा — बाहत्तर. तोडून गुणाकार सोपा होतो.",dur:13500},
   {art:bigExpr("23 × 8 = (20×8) + (3×8)<br>= 160 + 24 = 184"),cap:"Bullock cart: 23 cart × 8 rod = 20×8 + 3×8 = 160+24 = 184 rods.",hi:"एक और — तेईस बैलगाड़ियों के लिए कितने बाँस? हर गाड़ी में आठ बाँस। तेईस को बीस और तीन में तोड़ो। बीस गुना आठ बराबर एक सौ साठ, तीन गुना आठ बराबर चौबीस। जोड़ो — एक सौ चौरासी बाँस।",en:"One more — how many bamboo rods for twenty-three bullock carts? Each cart needs eight rods. Break twenty-three into twenty and three. Twenty times eight is one hundred sixty, three times eight is twenty-four. Add — one hundred eighty-four rods.",mr:"आणखी एक — तेवीस बैलगाड्यांसाठी किती बांबू? प्रत्येक गाडीत आठ बांबू. तेवीसला वीस आणि तीनमध्ये तोडा. वीस गुणिले आठ बरोबर एकशे साठ, तीन गुणिले आठ बरोबर चोवीस. जोडा — एकशे चौऱ्याऐंशी बांबू.",dur:13500},
   {art:bigExpr("100 × 2 = 200<br>100 × 4 = 400"),cap:"Multiples of 100: 100 bike × 2 = 200. 100 car × 4 = 400.",hi:"सौ से गुणा और भी आसान। सौ बाइक, हर में दो लोग — सौ गुना दो बराबर दो सौ। सौ कार, हर में चार — सौ गुना चार बराबर चार सौ। जब गुणा सौ के पहाड़े में हो, तो जवाब में दो शून्य जुड़ते हैं।",en:"Multiplying by a hundred is even easier. A hundred bikes, two people each — a hundred times two is two hundred. A hundred cars, four each — a hundred times four is four hundred. When multiplying by a hundred, two zeros are added.",mr:"शंभरने गुणाकार आणखी सोपा. शंभर बाईक, प्रत्येकात दोन लोक — शंभर गुणिले दोन बरोबर दोनशे. शंभर कार, प्रत्येकात चार — शंभर गुणिले चार बरोबर चारशे. शंभराच्या पाढ्यात गुणाकार असेल, तर उत्तरात दोन शून्य जोडतात.",dur:13000},
   {art:bigExpr("125 × 8 = (100×8)+(20×8)+(5×8)<br>= 800+160+40 = 1000"),cap:"Autorickshaw: 125 auto × 8 = 100×8 + 20×8 + 5×8 = 1000 log!",hi:"बड़ी संख्या को सैकड़ा, दहाई, इकाई में तोड़ो। एक सौ पच्चीस ऑटो, हर में आठ लोग। सौ गुना आठ बराबर आठ सौ, बीस गुना आठ बराबर एक सौ साठ, पाँच गुना आठ बराबर चालीस। सब जोड़ो — एक हज़ार लोग।",en:"Break a big number into hundreds, tens, ones. One hundred twenty-five autos, eight people each. Hundred times eight is eight hundred, twenty times eight is one hundred sixty, five times eight is forty. Add all — one thousand people.",mr:"मोठ्या संख्येला शतक, दशक, एककात तोडा. एकशे पंचवीस ऑटो, प्रत्येकात आठ लोक. शंभर गुणिले आठ बरोबर आठशे, वीस गुणिले आठ बरोबर एकशे साठ, पाच गुणिले आठ बरोबर चाळीस. सर्व जोडा — एक हजार लोक.",dur:14000},
   {art:bigExpr("439 × 4 = (400×4)+(30×4)+(9×4)<br>= 1600+120+36 = 1756"),cap:"Bade guna: 439×4 ko todo — 400×4 + 30×4 + 9×4 = 1756.",hi:"इसी तरीके से कोई भी बड़ी संख्या गुणा कर सकते हो। चार सौ उनतालीस गुना चार। चार सौ गुना चार बराबर सोलह सौ, तीस गुना चार बराबर एक सौ बीस, नौ गुना चार बराबर छत्तीस। सब जोड़ो — सत्रह सौ छप्पन।",en:"Using this method you can multiply any big number. Four hundred thirty-nine times four. Four hundred times four is sixteen hundred, thirty times four is one hundred twenty, nine times four is thirty-six. Add all — seventeen hundred fifty-six.",mr:"याच पद्धतीने कोणतीही मोठी संख्या गुणता येते. चारशे एकोणचाळीस गुणिले चार. चारशे गुणिले चार बरोबर सोळाशे, तीस गुणिले चार बरोबर एकशे वीस, नऊ गुणिले चार बरोबर छत्तीस. सर्व जोडा — सतराशे छप्पन्न.",dur:14000},
   {art:emoji("➗"),cap:"Ab DIVISION (bhaag): cheezein barabar baant na. Multiplication ka ulta.",hi:"अब भाग यानी division सीखते हैं। भाग का मतलब है चीज़ों को बराबर-बराबर बाँटना, या कितने बराबर समूह बनेंगे यह पता करना। भाग गुणा का बिलकुल उल्टा है।",en:"Now we learn division. Division means sharing things equally, or finding how many equal groups will be made. Division is exactly the opposite of multiplication.",mr:"आता भागाकार म्हणजे division शिकू. भागाकार म्हणजे गोष्टी समान वाटणं, किंवा किती समान गट बनतील हे शोधणं. भागाकार गुणाकाराच्या अगदी उलट आहे.",dur:12000},
   {art:bigExpr("58 wheels, 3 per tempo<br>58 ÷ 3 = 19 tempo, 1 baacha"),cap:"58 wheel, har tempo 3 wheel → 58÷3 = 19 tempo, 1 wheel bacha.",hi:"एक फैक्ट्री में अट्ठावन पहिये, हर टेम्पो में तीन पहिये। कितने टेम्पो बनेंगे? अट्ठावन में तीन का भाग। बड़े समूह निकालो — दस टेम्पो के तीस, फिर और। आख़िर में उन्नीस टेम्पो बनते हैं, और एक पहिया बच जाता है। बचे को remainder कहते हैं।",en:"A factory has fifty-eight wheels, three per tempo. How many tempos? Fifty-eight divided by three. Take out big groups — ten tempos use thirty, then more. Finally nineteen tempos are made, and one wheel is left over. The leftover is called the remainder.",mr:"एका फॅक्टरीत अठ्ठावन्न चाकं, प्रत्येक टेम्पोत तीन चाकं. किती टेम्पो बनतील? अठ्ठावन्नला तीनने भाग. मोठे गट काढा — दहा टेम्पोचे तीस, मग आणखी. शेवटी एकोणीस टेम्पो बनतात, आणि एक चाक उरतं. उरलेल्याला remainder म्हणतात.",dur:14000},
   {art:bigExpr("88 legs, cow ke 4 legs<br>88 ÷ 4 = 22 cows"),cap:"88 legs, har cow 4 legs → 88÷4 = 22 cows. Groups of 10 nikalo.",hi:"एक डेयरी में अट्ठासी टाँगें दिखीं। हर गाय की चार टाँगें। कितनी गायें? अट्ठासी में चार का भाग। पहले दस गायों की चालीस टाँगें निकालो, फिर और दस की चालीस — बची आठ, यानी दो गायें। कुल बाईस गायें।",en:"At a dairy, eighty-eight legs were seen. Each cow has four legs. How many cows? Eighty-eight divided by four. First take out forty legs for ten cows, then forty more for ten — eight left, that's two cows. Total twenty-two cows.",mr:"एका डेअरीत अठ्ठ्याऐंशी पाय दिसले. प्रत्येक गायीचे चार पाय. किती गायी? अठ्ठ्याऐंशीला चारने भाग. आधी दहा गायींचे चाळीस पाय काढा, मग आणखी दहाचे चाळीस — आठ उरले, म्हणजे दोन गायी. एकूण बावीस गायी.",dur:14000},
   {art:bigExpr("Partial quotient: bade groups<br>nikaalte jao (10s, 5s)"),cap:"Division ka tareeka: groups of 10, 5 nikalte jao, phir jodo.",hi:"भाग करने का आसान तरीका — बड़े-बड़े बराबर समूह निकालते जाओ। जैसे दस के समूह, फिर पाँच के, फिर जो बचे। हर बार कितने समूह निकले गिनते जाओ, आख़िर में सब जोड़ दो। इसे partial quotient कहते हैं।",en:"An easy way to divide — keep taking out big equal groups. Like groups of ten, then five, then whatever is left. Each time count how many groups came out, and add them all at the end. This is called partial quotient.",mr:"भागाकाराची सोपी पद्धत — मोठमोठे समान गट काढत जा. जसे दहाचे गट, मग पाचचे, मग जे उरतील. प्रत्येक वेळी किती गट निघाले मोजत जा, शेवटी सर्व जोडा. याला partial quotient म्हणतात.",dur:13500},
   {art:bigExpr("3÷3=1, 30÷3=10, 300÷3=100"),cap:"Patterns in division: 3÷3=1, 30÷3=10, 300÷3=100. Zero badhta!",hi:"भाग में भी सुंदर पैटर्न है। तीन में तीन का भाग बराबर एक। तीस में तीन बराबर दस। तीन सौ में तीन बराबर सौ। जैसे-जैसे बँटने वाली संख्या में शून्य बढ़ता है, जवाब में भी शून्य बढ़ता जाता है।",en:"Division has a beautiful pattern too. Three divided by three is one. Thirty divided by three is ten. Three hundred divided by three is a hundred. As zeros grow in the number being divided, zeros grow in the answer too.",mr:"भागाकारातही सुंदर पॅटर्न आहे. तीनला तीनने भाग बरोबर एक. तीसला तीन बरोबर दहा. तीनशेला तीन बरोबर शंभर. वाटल्या जाणाऱ्या संख्येत शून्य वाढतात, तसे उत्तरातही शून्य वाढतात.",dur:13000},
   {art:bigExpr("108 people, 9 boats<br>108 ÷ 9 = 12 per boat"),cap:"108 log, 9 boat → 108÷9 = 12 log har boat mein.",hi:"एक सौ आठ लोगों को नौ नावों में बराबर बाँटना है। हर नाव में कितने? एक सौ आठ में नौ का भाग। पाँच-पाँच बैठाओ तो पैंतालीस, फिर पाँच और तो नब्बे, बचे अठारह यानी दो और। कुल हर नाव में बारह लोग।",en:"One hundred eight people must be shared equally among nine boats. How many in each? One hundred eight divided by nine. Seat five each, that's forty-five, five more is ninety, eighteen left means two more. Total twelve people per boat.",mr:"एकशे आठ लोकांना नऊ नावांत समान वाटायचं आहे. प्रत्येक नावेत किती? एकशे आठला नऊने भाग. पाच-पाच बसवा तर पंचेचाळीस, मग पाच आणखी तर नव्वद, अठरा उरले म्हणजे दोन आणखी. एकूण प्रत्येक नावेत बारा लोक.",dur:14000},
   {art:bigExpr("Share: kitne har ek ko<br>Measure: kitne groups"),cap:"Division 2 tarah: SHARE (har ek ko kitne) aur MEASURE (kitne groups).",hi:"भाग दो तरह का होता है। एक — बराबर बाँटना, जैसे तीस रुपये तीन बच्चों में, हर एक को कितने। दूसरा — कितने समूह बनेंगे, जैसे साठ पहिये में हर ट्रक के छह, कितने ट्रक। दोनों में भाग ही लगता है।",en:"Division is of two kinds. One — sharing equally, like thirty rupees among three children, how much each. Two — how many groups, like sixty wheels with six per truck, how many trucks. Both use division.",mr:"भागाकार दोन प्रकारचा असतो. एक — समान वाटणं, जसे तीस रुपये तीन मुलांत, प्रत्येकाला किती. दुसरा — किती गट बनतील, जसे साठ चाकं प्रत्येक ट्रकला सहा, किती ट्रक. दोन्हीत भागाकारच लागतो.",dur:13500},
   {art:bigExpr("Guna ⟷ Bhaag<br>4×6=24, to 24÷6=4, 24÷4=6"),cap:"Multiplication aur division dost hain: 4×6=24 → 24÷6=4, 24÷4=6.",hi:"गुणा और भाग एक-दूसरे के दोस्त हैं, उल्टे काम करते हैं। अगर चार गुना छह बराबर चौबीस, तो चौबीस में छह का भाग बराबर चार, और चौबीस में चार का भाग बराबर छह। एक से दूसरे को जाँच सकते हैं।",en:"Multiplication and division are friends, doing opposite jobs. If four times six is twenty-four, then twenty-four divided by six is four, and twenty-four divided by four is six. You can check one using the other.",mr:"गुणाकार आणि भागाकार एकमेकांचे मित्र आहेत, उलट काम करतात. चार गुणिले सहा बरोबर चोवीस, तर चोवीसला सहाने भाग बरोबर चार, आणि चोवीसला चारने भाग बरोबर सहा. एकाने दुसरं तपासता येतं.",dur:13500},
   {art:bigExpr("×10 → ones digit 0 (always)<br>×2 → even (always)"),cap:"Always/Sometimes/Never: ×10 se ones 0 (always), ×2 se even (always).",hi:"कुछ बातें हमेशा सच होती हैं। किसी संख्या को दस से गुणा करो तो इकाई में हमेशा शून्य आता है। दो से गुणा करो तो जवाब हमेशा सम। पर 'दो से गुणा विषम देता है' — यह कभी सच नहीं। ऐसे कथन सोच-समझकर परखो।",en:"Some statements are always true. Multiply any number by ten, the ones digit is always zero. Multiply by two, the answer is always even. But 'multiplying by two gives odd' — this is never true. Test such statements by reasoning.",mr:"काही गोष्टी नेहमी खऱ्या असतात. कोणत्याही संख्येला दहाने गुणा तर एककात नेहमी शून्य येतं. दोनने गुणा तर उत्तर नेहमी सम. पण 'दोनने गुणल्यास विषम येतं' — हे कधीच खरं नाही. अशी विधानं विचार करून तपासा.",dur:14000},
   {art:emoji("📦"),cap:"Recap: equal groups; guna (multiplier×group=product); ×10,×100; bada todo; bhaag (groups nikalo); guna⟷bhaag.",hi:"चलो सब दोहराते हैं — बराबर समूह; गुणा यानी कितने समूह गुना हर में कितने बराबर गुणनफल; दस और सौ से गुणा आसान; बड़ी संख्या तोड़कर गुणा; भाग यानी बराबर बाँटना या समूह गिनना; और गुणा-भाग एक-दूसरे के उल्टे।",en:"Let's recap — equal groups; multiplication is how many groups times how many in each equals product; multiplying by ten and hundred is easy; break big numbers to multiply; division is sharing equally or counting groups; and multiplication and division are opposites.",mr:"चला सर्व उजळणी करू — समान गट; गुणाकार म्हणजे किती गट गुणिले प्रत्येकात किती बरोबर गुणाकार; दहा आणि शंभरने गुणाकार सोपा; मोठी संख्या तोडून गुणाकार; भागाकार म्हणजे समान वाटणं किंवा गट मोजणं; आणि गुणाकार-भागाकार एकमेकांचे उलट.",dur:14500},

 {id:'add',title:'Jodna — Addition (Carry)',emoji:'➕',color:C.mint,scenes:[
   {art:emoji("🐘"),cap:"Aaj seekhenge JODNA — carrying ke saath!",hi:"नमस्ते! आज हम सीखेंगे जोड़ना, यानी एडिशन, कैरी के साथ।",en:"Today we learn addition with carrying!",mr:"नमस्कार! आज आपण शिकणार आहोत बेरीज, म्हणजे ॲडिशन, कॅरीसह.",dur:5800},
   {art:bigExpr("🍎🍎 + 🍎🍎🍎 = 5"),cap:"Jodna matlab cheezein milana. 2 + 3 = 5",hi:"जोड़ना मतलब चीज़ों को मिलाना। दो सेब और तीन सेब बराबर पाँच सेब।",en:"Adding means putting together. Two and three make five.",mr:"बेरीज म्हणजे वस्तू एकत्र करणे. दोन सफरचंद आणि तीन सफरचंद मिळून पाच.",dur:6300},
   {art:pv(2,3),cap:"Bade number mein TENS aur ONES. 23 = 2 tens + 3 ones",hi:"बड़े नंबर में दहाई और इकाई होते हैं। तेईस मतलब दो दहाई और तीन इकाई।",en:"Big numbers have tens and ones. 23 is 2 tens and 3 ones.",mr:"मोठ्या संख्येत दशक आणि एकक असतात. तेवीस म्हणजे दोन दशक आणि तीन एकक.",dur:7200},
   {art:column("23","14","+","37"),cap:"ONES jodo: 3+4=7. TENS: 2+1=3. Answer 37",hi:"पहले इकाई जोड़ो, तीन और चार बराबर सात। फिर दहाई, दो और एक बराबर तीन। जवाब सैंतीस।",en:"Add ones: 3 plus 4 is 7. Then tens: 2 plus 1 is 3. Answer 37.",mr:"आधी एकक जोडा, तीन अधिक चार बरोबर सात. मग दशक, दोन अधिक एक बरोबर तीन. उत्तर सदतीस.",dur:7800},
   {art:column("45","38","+",""),cap:"Ab carrying! 45 + 38. ONES: 5+8 = 13",hi:"अब कैरी वाला! पैंतालीस जोड़ अड़तीस। इकाई जोड़ो, पाँच और आठ बराबर तेरह।",en:"Now carrying! 45 plus 38. Add ones: 5 plus 8 is 13.",mr:"आता कॅरी! पंचेचाळीस अधिक अडतीस. एकक जोडा, पाच अधिक आठ बरोबर तेरा.",dur:6800},
   {art:pv(1,3),cap:"13 = 1 ten + 3 ones. 3 niche, 1 ten upar carry ⬆️",hi:"तेरह मतलब एक दहाई और तीन इकाई। तीन नीचे लिखो और एक दहाई ऊपर कैरी करो।",en:"13 is 1 ten and 3 ones. Write 3 below, carry 1 ten on top.",mr:"तेरा म्हणजे एक दशक आणि तीन एकक. तीन खाली लिहा आणि एक दशक वर कॅरी करा.",dur:7200},
   {art:column("45","38","+","83","1"),cap:"TENS jodo: 1(carry)+4+3 = 8. Answer = 83 🎉",hi:"अब दहाई जोड़ो, कैरी का एक और चार और तीन बराबर आठ। जवाब तिरासी।",en:"Add tens: carried 1 plus 4 plus 3 is 8. Answer 83.",mr:"आता दशक जोडा, कॅरीचा एक अधिक चार अधिक तीन बरोबर आठ. उत्तर त्र्याऐंशी.",dur:7200},
   {art:emoji("🌟"),cap:"Yaad rakho: ONES se shuru, 10+ ho to carry!",hi:"याद रखो, हमेशा इकाई से शुरू करो, और दस या ज़्यादा हो तो कैरी करो।",en:"Remember: start from ones, carry when it's ten or more.",mr:"लक्षात ठेवा, नेहमी एककापासून सुरुवात करा, आणि दहा किंवा जास्त असेल तर कॅरी करा.",dur:6800},

 {id:'sub',title:'Ghatana — Subtraction (Borrow)',emoji:'➖',color:C.coral,scenes:[
   {art:emoji("🐘"),cap:"Aaj seekhenge GHATANA — borrowing ke saath!",hi:"नमस्ते! आज हम सीखेंगे घटाना, यानी सबट्रैक्शन, उधार के साथ।",en:"Today we learn subtraction with borrowing!",mr:"नमस्कार! आज आपण शिकणार आहोत वजाबाकी, म्हणजे सबट्रॅक्शन, उसनवारीसह.",dur:5800},
   {art:bigExpr("🎈🎈🎈🎈🎈<br>− 2 = 3"),cap:"Ghatana matlab nikalna. 5 mein se 2 = 3 bache",hi:"घटाना मतलब निकालना या कम करना। पाँच में से दो गए तो तीन बचे।",en:"Subtracting means taking away. Five take away two leaves three.",mr:"वजाबाकी म्हणजे काढून घेणे. पाचातून दोन गेले तर तीन उरले.",dur:6500},
   {art:column("48","23","−","25"),cap:"Easy: ONES 8−3=5. TENS 4−2=2. Answer 25",hi:"आसान वाला, इकाई घटाओ आठ में से तीन बराबर पाँच। दहाई घटाओ चार में से दो बराबर दो। जवाब पच्चीस।",en:"First ones: 8 minus 3 is 5. Then tens: 4 minus 2 is 2. Answer 25.",mr:"सोपे वाले, एकक वजा करा आठातून तीन बरोबर पाच. दशक वजा करा चारातून दोन बरोबर दोन. उत्तर पंचवीस.",dur:7800},
   {art:column("52","27","−",""),cap:"Ab borrowing! 52 − 27. ONES: 2 − 7 nahi hota (2 chhota)",hi:"अब उधार वाला! बावन में से सत्ताईस। इकाई देखो, दो में से सात नहीं घटा सकते, दो छोटा है।",en:"Now borrowing! 52 minus 27. Ones: 2 minus 7 can't be done, 2 is smaller.",mr:"आता उसनवारी! बावन्नातून सत्तावीस. एकक बघा, दोनातून सात वजा होत नाही, दोन लहान आहे.",dur:7200},
   {art:column("5̶12","27","−","","4"),cap:"TENS se 1 udhaar: 5→4. Ones 2 → 12. 12−7=5",hi:"दहाई से एक उधार लो, पाँच में से एक गया तो चार बचा। अब इकाई दो बन गई बारह। बारह में से सात बराबर पाँच।",en:"Borrow 1 from tens: 5 becomes 4. Ones 2 becomes 12. 12 minus 7 is 5.",mr:"दशकातून एक उसने घ्या, पाचातून एक गेला तर चार उरला. आता एकक दोनचे बारा झाले. बारातून सात बरोबर पाच.",dur:8200},
   {art:column("4","2","−","2"),cap:"TENS ghatao: 4 − 2 = 2. Answer = 25 🎉",hi:"अब बची हुई दहाई घटाओ, चार में से दो बराबर दो। पूरा जवाब पच्चीस।",en:"Now tens: 4 minus 2 is 2. Full answer is 25.",mr:"आता उरलेले दशक वजा करा, चारातून दोन बरोबर दोन. पूर्ण उत्तर पंचवीस.",dur:7000},
   {art:emoji("🌟"),cap:"Yaad rakho: upar chhota ho to TENS se udhaar lo!",hi:"याद रखो, ऊपर वाला अंक छोटा हो तो दहाई से एक उधार ले लो।",en:"Remember: if the top digit is smaller, borrow one from the tens!",mr:"लक्षात ठेवा, वरचा अंक लहान असेल तर दशकातून एक उसने घ्या.",dur:6800},
  ],quiz:[
   {q:"9 − 4 = ?",opts:["6","5","4"],ans:1},
   {q:"Upar ka ones chhota ho to hum?",opts:["Aage badh jaate","Plus karte","Tens se borrow karte"],ans:2},

   {art:bigExpr("3 × 4 = 4+4+4 = 12"),cap:"3 × 4 matlab 4 ko 3 baar jodo = 12",hi:"तीन गुणा चार का मतलब, चार को तीन बार जोड़ो, बराबर बारह।",en:"3 times 4 means add 4 three times, which is 12.",mr:"तीन गुणिले चार म्हणजे, चार तीन वेळा जोडा, बरोबर बारा.",dur:7200},
   {art:groupsView("🍎",2,3),cap:"2 groups, har mein 3 = 2 × 3 = 6",hi:"दो समूह, हर एक में तीन सेब, यानी दो गुणा तीन बराबर छह।",en:"Two groups of three apples, two times three is six.",mr:"दोन गट, प्रत्येकात तीन सफरचंद, म्हणजे दोन गुणिले तीन बरोबर सहा.",dur:6800},
   {art:bigExpr("2 ka table:<br>2,4,6,8,10,12..."),cap:"Yaad karne ke liye TABLE (2 ka table)",hi:"गुणा जल्दी करने के लिए पहाड़े यानी टेबल याद करते हैं। यह दो का पहाड़ा है।",en:"To multiply fast we learn tables. This is the table of two.",mr:"गुणाकार लवकर करण्यासाठी पाढे पाठ करतो. हा दोनचा पाढा आहे.",dur:7200},
   {art:bigExpr("1 × 7 = 7<br>0 × 5 = 0"),cap:"Trick: ×1 = wahi number. ×0 = 0",hi:"एक ट्रिक, किसी को एक से गुणा करो तो वही रहता है। और शून्य से गुणा करो तो जवाब शून्य।",en:"Trick: times one stays the same. Times zero is always zero.",mr:"एक युक्ती, कोणत्याही संख्येला एकने गुणा तर तीच राहते. आणि शून्याने गुणा तर उत्तर शून्य.",dur:7500},
   {art:emoji("🌟"),cap:"Guna = barabar groups. Tables yaad karo!",hi:"याद रखो, गुणा मतलब बराबर समूह या बार बार जोड़ना। पहाड़े याद करो!",en:"Remember: multiplication is equal groups. Learn your tables!",mr:"लक्षात ठेवा, गुणाकार म्हणजे सारखे गट किंवा वारंवार बेरीज. पाढे पाठ करा!",dur:6800},
  ],quiz:[
   {q:"2 × 3 = ?",opts:["5","8","6"],ans:2},
