 {id:'c_windows',title:'More About Windows 10',emoji:'🪟',color:C.purple,scenes:[
   {art:emoji("🪟"),cap:"Computer Chapter 2 — More About Windows 10! Computer chalane wala software.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम कंप्यूटर का दूसरा चॅप्टर सीखेंगे — मोर अबाउट विंडोज़ टेन। यानी वह सॉफ्टवेयर जो हमारा पूरा कंप्यूटर चलाता है।",en:"Namaste friends! I am Gattu. Today we learn computer chapter two, More About Windows 10. That is, the software that runs our whole computer.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण संगणकाचा दुसरा धडा शिकू — मोअर अबाउट विंडोज टेन. म्हणजे ते सॉफ्टवेअर जे आपला संपूर्ण संगणक चालवते.",dur:12500},
   {art:bigExpr("Windows = Operating System"),cap:"WINDOWS ek OPERATING SYSTEM hai — sabse popular, kyunki user-friendly hai.",hi:"विंडोज़ एक ऑपरेटिंग सिस्टम है — यानी वह मुख्य सॉफ्टवेयर जो कंप्यूटर को चलाता है। यह सबसे लोकप्रिय है क्योंकि इसे इस्तेमाल करना बहुत आसान यानी user-friendly है।",en:"Windows is an operating system — the main software that runs the computer. It is the most popular because it is very easy to use, or user-friendly.",mr:"विंडोज एक ऑपरेटिंग सिस्टम आहे — म्हणजे ते मुख्य सॉफ्टवेअर जे संगणक चालवते. ते सर्वात लोकप्रिय आहे कारण ते वापरायला खूप सोपे म्हणजे user-friendly आहे.",dur:14000},
   {art:emoji("🖱️"),cap:"Windows mein maus se saving, opening, deleting sab kaam kar sakte hain.",hi:"विंडोज़ में हम माउस की मदद से कई काम कर सकते हैं — जैसे फाइल सेव करना, खोलना, और मिटाना। यही इसे बहुत आसान बनाता है।",en:"In Windows, we can do many tasks with the mouse — like saving, opening, and deleting files. This is what makes it so easy.",mr:"विंडोजमध्ये आपण माउसच्या मदतीने अनेक कामे करू शकतो — जसे फाइल सेव्ह करणे, उघडणे, आणि मिटवणे. हेच ते खूप सोपे बनवते.",dur:13000},
   {art:bigExpr("Lock screen → Sign-in → DESKTOP"),cap:"Computer ON karo: pehle lock screen, phir sign-in, phir DESKTOP dikhta hai.",hi:"जब कंप्यूटर चालू करते हैं, तो पहले लॉक स्क्रीन आती है, फिर साइन-इन स्क्रीन। साइन-इन करने के बाद जो स्क्रीन दिखती है, उसे डेस्कटॉप कहते हैं।",en:"When we switch on the computer, first the lock screen appears, then the sign-in screen. After signing in, the screen we see is called the desktop.",mr:"जेव्हा संगणक चालू करतो, तेव्हा आधी लॉक स्क्रीन येते, मग साइन-इन स्क्रीन. साइन-इन केल्यानंतर जी स्क्रीन दिसते, तिला डेस्कटॉप म्हणतात.",dur:14000},
   {art:emoji("🖥️"),cap:"DESKTOP par chhoti tasveerein hoti hain jinhe ICONS kehte hain.",hi:"डेस्कटॉप पर छोटी-छोटी तस्वीरें होती हैं जिनके नाम भी होते हैं, जैसे This PC और Recycle Bin। इन छोटी तस्वीरों को आइकन यानी icons कहते हैं।",en:"On the desktop there are small pictures with names, like This PC and Recycle Bin. These small pictures are called icons.",mr:"डेस्कटॉपवर लहान लहान चित्रे असतात ज्यांना नावेही असतात, जसे This PC आणि Recycle Bin. या लहान चित्रांना आयकॉन म्हणजे icons म्हणतात.",dur:13500},
   {art:bigExpr("Icon → double-click → khulta hai"),cap:"Icons programs, files, ya folders dikhate hain. Double-click karke kholo.",hi:"हर आइकन किसी प्रोग्राम, फाइल, या फोल्डर को दर्शाता है। किसी आइकन को खोलने के लिए उस पर दो बार जल्दी-जल्दी क्लिक करते हैं, जिसे double-click कहते हैं।",en:"Each icon represents a program, file, or folder. To open an icon, we click on it twice quickly, which is called a double-click.",mr:"प्रत्येक आयकॉन एखादा प्रोग्राम, फाइल, किंवा फोल्डर दर्शवतो. एखादा आयकॉन उघडण्यासाठी त्यावर दोनदा पटकन क्लिक करतो, ज्याला double-click म्हणतात.",dur:14000},
   {art:emoji("🖥️"),cap:"THIS PC icon: isse computer ka SAB kuch access kar sakte ho.",hi:"This PC एक खास आइकन है। तुम्हारे कंप्यूटर में जो कुछ भी रखा है, वह सब This PC आइकन से एक्सेस किया जा सकता है। इस पर double-click करने से This PC विंडो खुलती है।",en:"This PC is a special icon. Whatever is stored in your computer can all be accessed from the This PC icon. Double-clicking it opens the This PC window.",mr:"This PC एक खास आयकॉन आहे. तुमच्या संगणकात जे काही ठेवले आहे, ते सर्व This PC आयकॉनवरून अॅक्सेस करता येते. यावर double-click केल्याने This PC विंडो उघडते.",dur:14000},
   {art:bigExpr("C: drive → sab kaam yahin store"),cap:"Hard disk drives dikhte hain: Windows (C:), Recovery (D:), New Volume (F:).",hi:"This PC विंडो में हार्ड डिस्क के हिस्से दिखते हैं, जिन्हें ड्राइव कहते हैं — जैसे विंडोज़ सी ड्राइव, रिकवरी डी ड्राइव, और न्यू वॉल्यूम एफ ड्राइव। हमारा सारा काम इन्हीं में store होता है।",en:"In the This PC window, parts of the hard disk called drives are shown — like Windows C drive, Recovery D drive, and New Volume F drive. All our work is stored in these.",mr:"This PC विंडोमध्ये हार्ड डिस्कचे भाग दिसतात, ज्यांना ड्राइव्ह म्हणतात — जसे विंडोज सी ड्राइव्ह, रिकव्हरी डी ड्राइव्ह, आणि न्यू व्हॉल्यूम एफ ड्राइव्ह. आपले सर्व काम याच मध्ये store होते.",dur:15000},
   {art:bigExpr("FILE = data ka collection"),cap:"FILE = data ya information ka collection. Har file ka apna naam hota hai.",hi:"फाइल क्या है? फाइल डेटा या जानकारी का एक संग्रह है। हर फाइल का अपना एक नाम होता है, और उसमें कुछ भी हो सकता है — जैसे चित्र, टेक्स्ट, या ड्रॉइंग।",en:"What is a file? A file is a collection of data or information. Each file has its own name, and it can contain anything — like pictures, text, or drawings.",mr:"फाइल म्हणजे काय? फाइल डेटा किंवा माहितीचा संग्रह आहे. प्रत्येक फाइलचे स्वतःचे एक नाव असते, आणि त्यात काहीही असू शकते — जसे चित्रे, मजकूर, किंवा रेखाचित्रे.",dur:14000},
   {art:bigExpr("FOLDER = files ka ghar"),cap:"FOLDER = files rakhne ki jagah. Ek jaisi files ek saath rakhta hai.",hi:"फोल्डर क्या है? फोल्डर एक जगह है जहाँ फाइलें व्यवस्थित करके रखी जाती हैं। एक जैसी फाइलों को एक साथ एक फोल्डर में रखा जाता है, ताकि उन्हें ढूँढना आसान हो।",en:"What is a folder? A folder is a place where files are organised and kept. Similar files are kept together in one folder, so they are easy to find.",mr:"फोल्डर म्हणजे काय? फोल्डर एक जागा आहे जिथे फाइल्स व्यवस्थित ठेवल्या जातात. सारख्या फाइल्स एकत्र एका फोल्डरमध्ये ठेवल्या जातात, जेणेकरून त्या शोधणे सोपे होते.",dur:14500},
   {art:emoji("🏁"),cap:"START button: Start menu aur Start screen kholta hai. Ismein apps hote hain.",hi:"स्टार्ट बटन पर क्लिक करने से स्टार्ट मेन्यू और स्टार्ट स्क्रीन खुलती है। यहाँ से हम ऐप्स और सेटिंग्स तक पहुँच सकते हैं। ऐप एक ऐसा सॉफ्टवेयर है जो हम डिवाइस पर डाउनलोड करते हैं।",en:"Clicking the Start button opens the Start menu and Start screen. From here we can access apps and settings. An app is a software that we download to a device.",mr:"स्टार्ट बटणावर क्लिक केल्याने स्टार्ट मेन्यू आणि स्टार्ट स्क्रीन उघडते. इथून आपण अॅप्स आणि सेटिंग्जपर्यंत पोहोचू शकतो. अॅप एक असे सॉफ्टवेअर आहे जे आपण डिव्हाइसवर डाउनलोड करतो.",dur:14500},
   {art:bigExpr("Start screen = TILES"),cap:"Start screen par apps TILES ke roop mein dikhte hain.",hi:"स्टार्ट स्क्रीन पर ऐप्स टाइल्स के रूप में दिखते हैं। हर टाइल किसी ऐप का शॉर्टकट होता है। टाइल पर क्लिक करके सीधे वह ऐप खोल सकते हैं।",en:"On the Start screen, apps appear as tiles. Each tile is a shortcut to an app. By clicking a tile, we can directly open that app.",mr:"स्टार्ट स्क्रीनवर अॅप्स टाइल्सच्या रूपात दिसतात. प्रत्येक टाइल एखाद्या अॅपचा शॉर्टकट असतो. टाइलवर क्लिक करून थेट तो अॅप उघडता येतो.",dur:14000},
   {art:bigExpr("LIVE TILES"),cap:"LIVE TILES: khud update hote rehte hain — news, weather, calendar dikhate hain.",hi:"कुछ टाइल्स को लाइव टाइल्स कहते हैं। ये खुद-ब-खुद अपडेट होती रहती हैं और ताज़ा जानकारी दिखाती हैं — जैसे समाचार, मौसम, कैलेंडर, और संदेश। यह जानकारी ऑनलाइन आती है।",en:"Some tiles are called live tiles. These keep updating on their own and show fresh information — like news, weather, calendar, and messages. This information comes from online.",mr:"काही टाइल्सना लाइव्ह टाइल्स म्हणतात. या स्वतःहून अपडेट होत राहतात आणि ताजी माहिती दाखवतात — जसे बातम्या, हवामान, कॅलेंडर, आणि संदेश. ही माहिती ऑनलाइन येते.",dur:15000},
   {art:bigExpr("Tile: move • resize • pin"),cap:"Tile ko move (drag), resize (chhota/bada), ya pin/unpin kar sakte ho.",hi:"टाइल्स के साथ कई काम कर सकते हैं। टाइल को खींचकर दूसरी जगह ले जा सकते हैं यानी move। राइट-क्लिक करके उसका साइज़ बदल सकते हैं — small, medium, wide, या large। किसी ऐप को Pin to Start से टाइल बना सकते हैं, और Unpin से हटा सकते हैं।",en:"We can do many things with tiles. We can drag a tile to another place, that is move. Right-clicking changes its size — small, medium, wide, or large. We can make any app a tile with Pin to Start, and remove it with Unpin.",mr:"टाइल्ससोबत अनेक कामे करता येतात. टाइल ओढून दुसऱ्या जागी नेता येते म्हणजे move. राइट-क्लिक करून तिचा आकार बदलता येतो — small, medium, wide, किंवा large. एखादा अॅप Pin to Start ने टाइल बनवता येतो, आणि Unpin ने काढता येतो.",dur:16000},
   {art:bigExpr("Wallpaper = desktop background"),cap:"WALLPAPER = desktop ke peeche ki background image.",hi:"डेस्कटॉप के पीछे जो तस्वीर दिखती है, उसे वॉलपेपर कहते हैं। हम इसे अपनी पसंद की कोई भी तस्वीर बना सकते हैं।",en:"The picture that shows behind the desktop is called the wallpaper. We can make it any picture of our choice.",mr:"डेस्कटॉपच्या मागे जे चित्र दिसते, त्याला वॉलपेपर म्हणतात. आपण ते आपल्या आवडीचे कोणतेही चित्र बनवू शकतो.",dur:12500},
   {art:bigExpr("Screen saver = idle screen image"),cap:"SCREEN SAVER = jab computer kuch der khali (idle) rehta hai to dikhne wali image.",hi:"जब कंप्यूटर कुछ देर तक इस्तेमाल नहीं होता यानी idle रहता है, तब जो चलती-फिरती तस्वीर दिखती है, उसे स्क्रीन सेवर कहते हैं।",en:"When the computer is not used for some time, that is stays idle, the moving picture that appears is called a screen saver.",mr:"जेव्हा संगणक काही वेळ वापरला जात नाही म्हणजे idle राहतो, तेव्हा जे हलणारे चित्र दिसते, त्याला स्क्रीन सेव्हर म्हणतात.",dur:13500},
   {art:bigExpr("Right-click desktop → Personalize"),cap:"Wallpaper/screen saver badalne ke liye: PERSONALIZATION page kholo.",hi:"वॉलपेपर और स्क्रीन सेवर बदलने के लिए हम पर्सनलाइज़ेशन पेज खोलते हैं। इसके लिए Start फिर Settings फिर Personalization पर जाओ, या फिर सीधे डेस्कटॉप पर राइट-क्लिक करके Personalize चुनो।",en:"To change the wallpaper and screen saver, we open the Personalization page. For this go to Start then Settings then Personalization, or directly right-click the desktop and choose Personalize.",mr:"वॉलपेपर आणि स्क्रीन सेव्हर बदलण्यासाठी आपण पर्सनलायझेशन पेज उघडतो. यासाठी Start मग Settings मग Personalization वर जा, किंवा थेट डेस्कटॉपवर राइट-क्लिक करून Personalize निवडा.",dur:15500},
   {art:bigExpr("Background: Picture • Solid color • Slideshow"),cap:"Wallpaper 3 tarah ka: Picture, Solid color, ya Slideshow.",hi:"वॉलपेपर तीन तरह का चुन सकते हैं। पिक्चर — कोई एक तस्वीर। सॉलिड कलर — कोई एक रंग, चौबीस रंगों में से। और स्लाइडशो — कई तस्वीरें जो तय समय पर अपने आप बदलती रहती हैं।",en:"We can choose three types of wallpaper. Picture — one single image. Solid color — one single colour, from twenty-four colours. And Slideshow — many pictures that change automatically at a set time.",mr:"वॉलपेपर तीन प्रकारे निवडता येतो. पिक्चर — एक चित्र. सॉलिड कलर — एक रंग, चोवीस रंगांपैकी. आणि स्लाइडशो — अनेक चित्रे जी ठराविक वेळेला आपोआप बदलत राहतात.",dur:15500},
   {art:bigExpr("Screen saver → Lock screen → settings → Wait time"),cap:"Screen saver set karo: Lock screen → Screen saver settings → time chuno.",hi:"स्क्रीन सेवर सेट करने के लिए Personalization में Lock screen चुनो, फिर Screen saver settings पर क्लिक करो। वहाँ मनपसंद स्क्रीन सेवर चुनो, और Wait box में समय डालो कि कितनी देर बाद चालू हो।",en:"To set a screen saver, choose Lock screen in Personalization, then click Screen saver settings. There choose your favourite screen saver, and in the Wait box put the time after which it should start.",mr:"स्क्रीन सेव्हर सेट करण्यासाठी Personalization मध्ये Lock screen निवडा, मग Screen saver settings वर क्लिक करा. तिथे आवडता स्क्रीन सेव्हर निवडा, आणि Wait box मध्ये किती वेळाने सुरू व्हावा ती वेळ टाका.",dur:16000},
   {art:bigExpr("THEME = background + color + sound"),cap:"THEME = desktop background + color + sound effects, sab ek saath.",hi:"थीम क्या है? थीम डेस्कटॉप बैकग्राउंड, रंग, और आवाज़ के असर — इन सबका एक मेल है। एक थीम चुनने से ये सब एक साथ बदल जाते हैं।",en:"What is a theme? A theme is a combination of desktop background, colour, and sound effects — all together. Choosing one theme changes all of these at once.",mr:"थीम म्हणजे काय? थीम डेस्कटॉप बॅकग्राउंड, रंग, आणि आवाजाचे परिणाम — या सर्वांचे एकत्रित मिश्रण आहे. एक थीम निवडल्याने हे सर्व एकाच वेळी बदलतात.",dur:15000},
   {art:emoji("📁"),cap:"FILE EXPLORER: files aur folders dekhne aur manage karne ka program.",hi:"फाइल एक्सप्लोरर एक ऐसा प्रोग्राम है जो फाइलों और फोल्डरों को देखने और व्यवस्थित करने में मदद करता है। इसे खोलने के लिए Windows बटन और E एक साथ दबाओ, या टास्कबार पर फोल्डर आइकन पर क्लिक करो।",en:"File Explorer is a program that helps view and manage files and folders. To open it, press the Windows button and E together, or click the folder icon on the taskbar.",mr:"फाइल एक्सप्लोरर एक असा प्रोग्राम आहे जो फाइल्स आणि फोल्डर्स पाहण्यात आणि व्यवस्थित करण्यात मदत करतो. तो उघडण्यासाठी Windows बटण आणि E एकत्र दाबा, किंवा टास्कबारवर फोल्डर आयकॉनवर क्लिक करा.",dur:15500},
   {art:bigExpr("2 Panes:<br>Navigation (left) • Content (right)"),cap:"File Explorer ke 2 hisse: Navigation pane (left) aur Content pane (right).",hi:"फाइल एक्सप्लोरर की स्क्रीन दो हिस्सों में बँटी होती है। बायाँ हिस्सा नेविगेशन पेन कहलाता है, जो ड्राइव और फोल्डर दिखाता है। दायाँ हिस्सा कंटेंट पेन कहलाता है, जो चुने हुए फोल्डर की फाइलें दिखाता है।",en:"The File Explorer screen is divided into two parts. The left part is called the navigation pane, which shows drives and folders. The right part is called the content pane, which shows the files of the selected folder.",mr:"फाइल एक्सप्लोररची स्क्रीन दोन भागांत विभागलेली असते. डावा भाग नेव्हिगेशन पेन म्हणतात, जो ड्राइव्ह आणि फोल्डर दाखवतो. उजवा भाग कंटेंट पेन म्हणतात, जो निवडलेल्या फोल्डरच्या फाइल्स दाखवतो.",dur:16000},
   {art:bigExpr("LIBRARIES = virtual folders"),cap:"LIBRARIES: special virtual folders jo ek type ka content ek jagah dikhate hain.",hi:"लाइब्रेरीज़ खास तरह के वर्चुअल फोल्डर होते हैं। ये असल में हार्ड डिस्क पर नहीं होते, पर कई अलग-अलग फोल्डरों का एक ही तरह का सामान एक जगह दिखा देते हैं। जैसे सारे गानों के फोल्डर Music लाइब्रेरी में।",en:"Libraries are special virtual folders. They are not actually on the hard disk, but they show the same type of content from many different folders in one place. Like all song folders in the Music library.",mr:"लायब्ररीज खास प्रकारचे व्हर्च्युअल फोल्डर असतात. ते प्रत्यक्षात हार्ड डिस्कवर नसतात, पण अनेक वेगवेगळ्या फोल्डर्सचे एकाच प्रकारचे सामान एका जागी दाखवतात. जसे सर्व गाण्यांचे फोल्डर Music लायब्ररीमध्ये.",dur:16500},
   {art:bigExpr("4 Libraries:<br>Camera Roll • Documents • Music • Videos"),cap:"Windows 10 mein 4 standard Libraries: Camera Roll, Documents, Music, Videos.",hi:"विंडोज़ टेन में चार तयशुदा लाइब्रेरीज़ होती हैं — कैमरा रोल, डॉक्यूमेंट्स, म्यूज़िक, और वीडियोज़। लाइब्रेरीज़ असल में फोल्डरों के शॉर्टकट होते हैं।",en:"In Windows 10 there are four standard libraries — Camera Roll, Documents, Music, and Videos. Libraries are actually shortcuts to folders.",mr:"विंडोज टेनमध्ये चार ठराविक लायब्ररीज असतात — कॅमेरा रोल, डॉक्युमेंट्स, म्युझिक, आणि व्हिडिओज. लायब्ररीज प्रत्यक्षात फोल्डर्सचे शॉर्टकट असतात.",dur:14500},
   {art:bigExpr("New Folder → Ctrl+Shift+N"),cap:"NAYA FOLDER banao: Home tab → New Folder, ya Ctrl+Shift+N. Naam do, Enter.",hi:"नया फोल्डर कैसे बनाएँ? फाइल एक्सप्लोरर में जगह चुनो, फिर Home टैब पर New Folder पर क्लिक करो, या Ctrl Shift N दबाओ। एक नया फोल्डर बन जाएगा। उसका नाम टाइप करो और Enter दबाओ।",en:"How to make a new folder? In File Explorer choose a location, then click New Folder on the Home tab, or press Ctrl Shift N. A new folder is created. Type its name and press Enter.",mr:"नवा फोल्डर कसा बनवायचा? फाइल एक्सप्लोररमध्ये जागा निवडा, मग Home टॅबवर New Folder वर क्लिक करा, किंवा Ctrl Shift N दाबा. एक नवा फोल्डर बनतो. त्याचे नाव टाइप करा आणि Enter दाबा.",dur:16000},
   {art:bigExpr("Rename → F2"),cap:"Folder ka naam BADLO (rename): folder chuno, F2 dabao (ya Rename), naya naam do.",hi:"फोल्डर का नाम कैसे बदलें यानी rename करें? फोल्डर चुनो, फिर Home टैब पर Rename पर क्लिक करो, या F2 दबाओ, या राइट-क्लिक करके Rename चुनो। फिर नया नाम टाइप करके Enter दबाओ।",en:"How to change a folder's name, that is rename? Select the folder, then click Rename on the Home tab, or press F2, or right-click and choose Rename. Then type the new name and press Enter.",mr:"फोल्डरचे नाव कसे बदलायचे म्हणजे rename? फोल्डर निवडा, मग Home टॅबवर Rename वर क्लिक करा, किंवा F2 दाबा, किंवा राइट-क्लिक करून Rename निवडा. मग नवे नाव टाइप करून Enter दाबा.",dur:16000},
   {art:bigExpr("Select All → Ctrl+A"),cap:"Ek folder ki SAARI files select karo: Select All, ya Ctrl+A.",hi:"किसी फोल्डर की सारी फाइलें एक साथ चुनने के लिए Home टैब पर Select All पर क्लिक करो, या Ctrl A दबाओ।",en:"To select all files of a folder together, click Select All on the Home tab, or press Ctrl A.",mr:"एखाद्या फोल्डरच्या सर्व फाइल्स एकत्र निवडण्यासाठी Home टॅबवर Select All वर क्लिक करा, किंवा Ctrl A दाबा.",dur:12500},
   {art:bigExpr("Shift = contiguous<br>Ctrl = non-contiguous"),cap:"Multiple files: paas-paas ke liye SHIFT, alag-alag ke liye CTRL.",hi:"कई फाइलें चुनने के दो तरीके हैं। अगर फाइलें आस-पास हैं यानी contiguous, तो पहली पर क्लिक करो, फिर Shift दबाकर आखिरी पर क्लिक करो। अगर फाइलें अलग-अलग जगह हैं यानी non-contiguous, तो Ctrl दबाकर एक-एक करके क्लिक करो।",en:"There are two ways to select multiple files. If the files are next to each other, that is contiguous, click the first, then hold Shift and click the last. If the files are at different places, that is non-contiguous, hold Ctrl and click each one.",mr:"अनेक फाइल्स निवडण्याचे दोन मार्ग आहेत. जर फाइल्स शेजारी असतील म्हणजे contiguous, तर पहिलीवर क्लिक करा, मग Shift दाबून शेवटच्यावर क्लिक करा. जर फाइल्स वेगवेगळ्या जागी असतील म्हणजे non-contiguous, तर Ctrl दाबून एक-एक क्लिक करा.",dur:17000},
   {art:bigExpr("COPY = duplicate banao<br>MOVE = shift karo"),cap:"COPY: file ki nakal doosri jagah (original wahin rehti hai). MOVE: file ko utha ke le jaana.",hi:"कॉपी और मूव में फर्क समझो। कॉपी करने का मतलब है फाइल की एक नकल दूसरी जगह बनाना, असली फाइल अपनी जगह रहती है। मूव करने का मतलब है फाइल को उसकी जगह से उठाकर पूरी तरह दूसरी जगह ले जाना।",en:"Understand the difference between copy and move. Copy means making a duplicate of the file in another place, the original stays in its place. Move means picking up the file from its place and shifting it completely to another place.",mr:"कॉपी आणि मूव्हमधला फरक समजा. कॉपी म्हणजे फाइलची एक नक्कल दुसऱ्या जागी बनवणे, मूळ फाइल आपल्या जागी राहते. मूव्ह म्हणजे फाइल तिच्या जागेवरून उचलून पूर्णपणे दुसऱ्या जागी नेणे.",dur:17000},
   {art:bigExpr("Copy=Ctrl+C • Cut=Ctrl+X • Paste=Ctrl+V"),cap:"Shortcuts: Copy=Ctrl+C, Cut=Ctrl+X (move ke liye), Paste=Ctrl+V.",hi:"इसके शॉर्टकट याद रखो। कॉपी करने के लिए Ctrl C। मूव करने के लिए Cut यानी Ctrl X। और जहाँ रखना है वहाँ Paste यानी Ctrl V। पहले फाइल चुनो, कॉपी या कट करो, फिर मंज़िल पर जाकर पेस्ट करो।",en:"Remember the shortcuts. To copy, Ctrl C. To move, Cut which is Ctrl X. And where to place it, Paste which is Ctrl V. First select the file, copy or cut, then go to the destination and paste.",mr:"याचे शॉर्टकट लक्षात ठेवा. कॉपी करण्यासाठी Ctrl C. मूव्ह करण्यासाठी Cut म्हणजे Ctrl X. आणि जिथे ठेवायचे तिथे Paste म्हणजे Ctrl V. आधी फाइल निवडा, कॉपी किंवा कट करा, मग ठिकाणी जाऊन पेस्ट करा.",dur:16500},
   {art:bigExpr("Delete → Recycle Bin"),cap:"File DELETE karo: Delete button ya Delete key. File Recycle Bin mein jaati hai.",hi:"फाइल या फोल्डर कैसे मिटाएँ यानी delete करें? उसे चुनो, फिर Home टैब पर Delete बटन दबाओ, या राइट-क्लिक करके Delete चुनो, या कीबोर्ड की Delete की दबाओ। मिटाई गई फाइल Recycle Bin में चली जाती है।",en:"How to delete a file or folder? Select it, then click the Delete button on the Home tab, or right-click and choose Delete, or press the Delete key. The deleted file goes into the Recycle Bin.",mr:"फाइल किंवा फोल्डर कसे मिटवायचे म्हणजे delete? ते निवडा, मग Home टॅबवर Delete बटण दाबा, किंवा राइट-क्लिक करून Delete निवडा, किंवा कीबोर्डची Delete की दाबा. मिटवलेली फाइल Recycle Bin मध्ये जाते.",dur:16500},
   {art:emoji("🗑️"),cap:"RECYCLE BIN: mitayi hui files yahan aati hain. Empty karke poora hata sakte ho.",hi:"रीसायकल बिन एक तरह का कूड़ेदान है जहाँ मिटाई गई फाइलें जाती हैं। अगर गलती से कुछ मिट जाए, तो वहाँ से वापस भी ला सकते हैं। और अगर पक्का हटाना हो, तो Empty Recycle Bin से पूरा खाली कर सकते हैं।",en:"The Recycle Bin is a kind of dustbin where deleted files go. If something is deleted by mistake, we can bring it back from there. And if we want to remove it permanently, we can empty it completely with Empty Recycle Bin.",mr:"रीसायकल बिन एक प्रकारचा कचरापेटी आहे जिथे मिटवलेल्या फाइल्स जातात. जर चुकून काही मिटले, तर तिथून परतही आणता येते. आणि जर कायमचे काढायचे असेल, तर Empty Recycle Bin ने पूर्ण रिकामे करता येते.",dur:16500},
   {art:bigExpr("Control Panel"),cap:"CONTROL PANEL: computer ki settings badalne wala app.",hi:"कंट्रोल पैनल एक ऐसा ऐप है जिससे हम कंप्यूटर की तरह-तरह की सेटिंग्स बदल सकते हैं।",en:"The Control Panel is an app from which we can change various settings of the computer.",mr:"कंट्रोल पॅनेल एक असा अॅप आहे ज्याने आपण संगणकाच्या विविध सेटिंग्ज बदलू शकतो.",dur:11500},
   {art:emoji("🎯"),cap:"Yaad karo: Icon (double-click), File (data), Folder (files ka ghar), Copy vs Move.",hi:"चलो याद करते हैं — आइकन को double-click से खोलते हैं। फाइल डेटा का संग्रह है। फोल्डर फाइलों का घर है। और कॉपी में नकल बनती है, मूव में फाइल जगह बदलती है।",en:"Let's recap — an icon opens with a double-click. A file is a collection of data. A folder is the home of files. And copy makes a duplicate, move changes the file's place.",mr:"चला आठवूया — आयकॉन double-click ने उघडतो. फाइल डेटाचा संग्रह आहे. फोल्डर फाइल्सचे घर आहे. आणि कॉपीमध्ये नक्कल बनते, मूव्हमध्ये फाइल जागा बदलते.",dur:15500},
   {art:emoji("🏆🪟"),cap:"Shabaash! Ab tum Windows 10 ke expert ho!",hi:"शाबाश दोस्तों! अब तुम विंडोज़ टेन के बारे में सब कुछ जान गए हो — डेस्कटॉप, आइकन, स्टार्ट स्क्रीन, वॉलपेपर, फाइल एक्सप्लोरर, कॉपी-मूव-डिलीट, सब कुछ। बहुत बढ़िया!",en:"Well done friends! Now you know everything about Windows 10 — desktop, icons, Start screen, wallpaper, File Explorer, copy-move-delete, everything. Excellent!",mr:"शाब्बास मित्रांनो! आता तुम्हाला विंडोज टेनबद्दल सर्व काही माहित झाले — डेस्कटॉप, आयकॉन, स्टार्ट स्क्रीन, वॉलपेपर, फाइल एक्सप्लोरर, कॉपी-मूव्ह-डिलीट, सर्व काही. खूप छान!",dur:15000},

let VOICES=[];
function loadVoices(){if('speechSynthesis' in window)VOICES=speechSynthesis.getVoices()||[];}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function findV(re){return VOICES.find(v=>re.test(v.lang));}
function getVoice(lang){
  if(lang==='mr')return findV(/mr-IN/i)||findV(/^mr/i)||findV(/hi-IN/i)||findV(/^hi/i)||null;
  if(lang==='hi')return findV(/hi-IN/i)||findV(/^hi/i)||null;
  return findV(/en-IN/i)||findV(/en-GB/i)||findV(/^en/i)||null;
}
let SPEED=load("padhai_speed","normal");
function curRate(){return SPEED==='slow'?0.6:0.8;}
function speakOne(text,lang,onend){
  if(!('speechSynthesis' in window)){if(onend)onend();return;}
  const u=new SpeechSynthesisUtterance(text);const v=getVoice(lang);
  if(v)u.voice=v;
  u.lang=(lang==='mr')?((v&&/mr/i.test(v.lang))?'mr-IN':'hi-IN'):(lang==='hi')?'hi-IN':'en-IN';
  u.rate=curRate();u.pitch=1.05;
  u.onend=()=>{if(onend)onend();};u.onerror=()=>{if(onend)onend();};
  speechSynthesis.speak(u);
}
function shutup(){if('speechSynthesis' in window)speechSynthesis.cancel();}

    bonus=`<div class="card" style="margin-top:14px"><div class="fred" style="font-weight:700;font-size:16px;color:${C.purpleDark};margin-bottom:10px">🎯 Is chapter ki extra practice:</div>`;
    c.bonus.forEach(b=>{ bonus+=`<div class="row" style="margin-bottom:9px">
        <button class="btn" style="background:${C.purple};flex:2;font-size:15px;padding:11px" onclick="playLesson('${b.id}')">▶ ${b.label}</button>
        <button class="btn" style="background:${C.mint};flex:1;font-size:15px;padding:11px" onclick="playQuiz('${b.id}')">📝</button></div>`;});
    bonus+=`</div>`;
  }
  app.innerHTML=`
    <div class="topbar"><button class="link" onclick="go('home')">← Saare chapters</button></div>
    <div class="card" style="text-align:center">
      <div style="font-size:60px">${c.emoji}</div>
      <div style="font-size:12px;font-weight:800;color:${c.color};margin-top:4px">CHAPTER ${c.n}</div>
      <div class="fred" style="font-weight:700;font-size:25px;color:${C.purpleDark}">${c.title}</div>
      ${c.ready?`<div style="color:${C.soft};font-weight:800;font-size:13px;margin-top:8px">${p.lesson?'✅ Lesson dekha':'⬜ Lesson baaki'} &nbsp;•&nbsp; ${p.best!=null?('⭐ Quiz best: '+p.best+'/'+content(c.id).quiz.length):'⬜ Quiz baaki'}</div>`:''}
    </div>
    <div class="card" style="margin-top:14px">
      <div class="fred" style="font-weight:700;font-size:17px;color:${C.purpleDark};margin-bottom:12px">📖 Is chapter mein kya seekhoge:</div>
      ${topics}
    </div>
    ${action}
    ${bonus}`;
}
function playLesson(id){state.cid=id;go('lesson');}
function playQuiz(id){state.cid=id;startQuiz();}


/* ---------- LESSON ---------- */
function lesson(){
  state.scene=0;state.playing=true;
  app.innerHTML=`
    <div class="topbar"><button class="link" onclick="go('chapter')">← Band</button>
      <span class="fred" style="color:${C.purpleDark};font-weight:700;font-size:14px">${content(state.cid).emoji} ${content(state.cid).title}</span>
      <span style="color:${C.soft};font-weight:800;font-size:14px" id="sc"></span></div>
    <div class="seg" style="margin-bottom:7px">
      <button id="lmr" onclick="setLang('mr')">मराठी</button>
      <button id="lhi" onclick="setLang('hi')">हिंदी</button>
      <button id="len" onclick="setLang('en')">English</button>
      <button id="lboth" onclick="setLang('both')">दोनों</button></div>
    <div class="seg" style="margin-bottom:12px;max-width:230px;margin-left:auto;margin-right:auto">
      <button id="sp_normal" onclick="setSpeed('normal')">🚶 Normal</button>
      <button id="sp_slow" onclick="setSpeed('slow')">🐢 Dheere</button></div>
    <div class="bar" style="margin-bottom:14px"><i id="prog"></i></div>
    <div class="card">
      <div class="stage"><div class="float" id="stage"></div></div>
      <div class="mascot" id="masc">🐘</div>
      <div class="caption" id="cap" style="margin-top:8px"></div></div>
    <div class="row" style="margin-top:16px">
      <button class="btn" style="background:#B6ABDB;flex:1" onclick="prevScene()">⏮</button>
      <button class="btn" style="background:${C.purple};flex:2" id="pp" onclick="togglePlay()">⏸ Pause</button>
      <button class="btn" style="background:#B6ABDB;flex:1" onclick="nextScene(true)">⏭</button></div>
    <div id="voiceNote" style="text-align:center;color:${C.coral};font-weight:800;font-size:12px;margin-top:10px;line-height:1.4"></div>
    <div style="text-align:center;margin-top:8px">
      <button class="btn" id="qbtn" style="background:${C.mint};width:auto;display:inline-block">Quiz pe jao 📝</button></div>`;
  document.getElementById("qbtn").setAttribute("onclick","playQuiz('"+state.cid+"')");
  markLang();markSpeed();checkVoice();showScene();
}
function markLang(){["mr","hi","en","both"].forEach(l=>{const b=document.getElementById("l"+l);if(b)b.className=(LANG===l?"on":"");});}
function markSpeed(){["normal","slow"].forEach(s=>{const b=document.getElementById("sp_"+s);if(b)b.className=(SPEED===s?"on":"");});}
function setLang(l){LANG=l;save("padhai_lang",l);markLang();checkVoice();restart();}
function setSpeed(s){SPEED=s;save("padhai_speed",s);markSpeed();restart();}
function restart(){shutup();clearTimeout(state.timer);state.token++;setCaption();if(state.playing)runScene();}
function checkVoice(){const n=document.getElementById("voiceNote");if(!n)return;let m='';
  if(LANG==='mr'&&!findV(/^mr/i))m='ℹ Marathi awaaz ke liye phone mein Marathi TTS install karo (Settings → Text-to-speech). Tab tak Hindi awaaz se padhega.';
  else if((LANG==='hi'||LANG==='both')&&!findV(/^hi/i))m='ℹ Hindi awaaz ke liye phone mein Hindi TTS install karo.';
  n.textContent=m;}
function setCaption(){const s=S()[state.scene];const txt=(LANG==='mr'?s.mr:LANG==='hi'?s.hi:LANG==='en'?s.en:s.cap);const el=document.getElementById("cap");if(el)el.innerHTML=`<span class="fade">${txt}</span>`;}
function showScene(){const s=S()[state.scene];document.getElementById("stage").innerHTML=`<div class="pop">${s.art}</div>`;setCaption();document.getElementById("prog").style.width=((state.scene+1)/S().length*100)+"%";document.getElementById("sc").textContent=(state.scene+1)+" / "+S().length;if(state.playing)runScene();}
function talk(on){const m=document.getElementById("masc");if(m)m.className="mascot"+(on?" talk":"");}
function runScene(){
  const s=S()[state.scene];const tok=++state.token;state.sceneStart=Date.now();clearTimeout(state.timer);talk(true);
  if(!('speechSynthesis' in window)){state.timer=setTimeout(()=>finishScene(tok),s.dur*(LANG==='both'?1.4:1));return;}
  const factor=(LANG==='both'?1.95:1);
  state.timer=setTimeout(()=>finishScene(tok),s.dur*factor+(SPEED==='slow'?9000:6000));
  const done=()=>finishScene(tok);
  if(LANG==='mr')speakOne(s.mr,'mr',done);
  else if(LANG==='hi')speakOne(s.hi,'hi',done);
  else if(LANG==='en')speakOne(s.en,'en',done);
  else speakOne(s.hi,'hi',()=>{if(tok===state.token&&state.playing)speakOne(s.en,'en',done);});
}
function finishScene(tok){
  if(tok!==state.token||!state.playing)return;
  clearTimeout(state.timer);talk(false);
  const s=S()[state.scene];
  const elapsed=Date.now()-state.sceneStart;
  const minShow=s.dur*(LANG==='both'?1.0:0.85);
  const wait=Math.max(900,minShow-elapsed); // pause so kid can absorb
  state.timer=setTimeout(()=>{if(tok===state.token&&state.playing)nextScene();},wait);
}
function nextScene(manual){shutup();clearTimeout(state.timer);state.token++;talk(false);if(state.scene>=S().length-1){const pr=load("padhai_prog",{});pr[state.cid]=pr[state.cid]||{};pr[state.cid].lesson=true;save("padhai_prog",pr);if(manual)return;state.playing=false;setPP();return;}state.scene++;if(manual&&!state.playing){showScene();}else{state.playing=true;setPP();showScene();}}
function prevScene(){shutup();clearTimeout(state.timer);state.token++;talk(false);state.scene=Math.max(0,state.scene-1);showScene();}
function togglePlay(){state.playing=!state.playing;setPP();if(state.playing)runScene();else{shutup();clearTimeout(state.timer);state.token++;talk(false);}}
function setPP(){const b=document.getElementById("pp");if(b)b.textContent=state.playing?"⏸ Pause":"▶ Chalao";}

/* ---------- QUIZ ---------- */
function startQuiz(){state.qi=0;state.picked=null;state.score=0;go('quiz');}
function quiz(){const q=Q()[state.qi];let optsHTML="";if(q.visual){q.visual.forEach((o,i)=>{optsHTML+=`<button class="opt" id="o${i}" onclick="pick(${i})">${circleSVG(o.p,o.s,o.v,70)}</button>`;});}else{q.opts.forEach((o,i)=>{optsHTML+=`<button class="opt" id="o${i}" onclick="pick(${i})">${o}</button>`;});}
  app.innerHTML=`<div class="topbar"><button class="link" onclick="go('chapter')">← Band</button>
      <span style="color:${C.soft};font-weight:800">${content(state.cid).emoji} Sawaal ${state.qi+1}/${Q().length}</span>
      <span style="color:${C.mint};font-weight:800">⭐ ${state.score}</span></div>
    <div class="card">${q.tag?`<div style="display:inline-block;background:#EFEAFF;color:${C.purpleDark};font-weight:800;font-size:12px;padding:5px 12px;border-radius:20px;margin-bottom:10px">${q.tag}</div>`:''}<div class="fred" style="font-weight:700;font-size:20px;color:${C.purpleDark};margin-bottom:16px">${q.q}</div>
      <div>${optsHTML}</div><div id="next"></div></div>`;
}
function pick(i){if(state.picked!==null)return;state.picked=i;const q=Q()[state.qi];const n=q.visual?q.visual.length:q.opts.length;for(let k=0;k<n;k++){const el=document.getElementById("o"+k);el.onclick=null;if(k===q.ans){el.style.background="#E3FBF1";el.style.borderColor=C.mint;el.innerHTML+='<span style="margin-left:auto;font-size:22px">✅</span>';}else if(k===i){el.style.background="#FFEAE6";el.style.borderColor=C.coral;el.innerHTML+='<span style="margin-left:auto;font-size:22px">❌</span>';}}
  if(i===q.ans){state.score++;if(LANG==='en')speakOne("Correct! Well done!","en");else if(LANG==='mr')speakOne("शाब्बास! एकदम बरोबर!","mr");else speakOne("शाबाश! बिलकुल सही!","hi");}
  else{if(LANG==='en')speakOne("The right answer is in green.","en");else if(LANG==='mr')speakOne("बरोबर उत्तर हिरव्या रंगात आहे.","mr");else speakOne("सही जवाब हरे रंग में है।","hi");}
  const last=state.qi===Q().length-1;document.getElementById("next").innerHTML=`<button class="btn" style="background:${C.purple};margin-top:6px" onclick="${last?"finishQuiz()":"nextQ()"}">${last?"Result dekho 🎉":"Agla sawaal →"}</button>`;}
function nextQ(){shutup();state.qi++;state.picked=null;quiz();}
function finishQuiz(){shutup();const pr=load("padhai_prog",{});pr[state.cid]=pr[state.cid]||{};pr[state.cid].best=Math.max(pr[state.cid].best==null?0:pr[state.cid].best,state.score);save("padhai_prog",pr);go('result');}
function result(){const tot=Q().length;const pct=state.score/tot,icon=pct===1?"🏆":pct>=.5?"🌟":"🌱";const msg=pct===1?"Perfect! Tum champion ho!":pct>=.5?"Bahut achhe! Thodi aur practice 💪":"Koi baat nahi, phir se try karo 🌱";
  app.innerHTML=`<div style="height:24px"></div><div class="card" style="text-align:center">
      <div class="pop" style="font-size:74px">${icon}</div>
      <div class="fred" style="font-weight:700;font-size:27px;color:${C.purpleDark}">${state.score} / ${tot} sahi!</div>
      <div style="font-weight:800;color:${C.soft};margin:10px 0 22px;font-size:18px">${msg}</div>
      <div class="row"><button class="btn" style="background:${C.coral};flex:1" onclick="startQuiz()">🔁 Phir se</button>
        <button class="btn" style="background:${C.purple};flex:1" onclick="go('home')">🏠 Home</button></div></div>`;}

/* ---------- Q&A (Sawaal-Jawab: padhne/yaad karne ke liye) ---------- */
function openQA(id){state.cid=id;state.qaOpen=-1;if(!state.qaLang)state.qaLang='hi';go('qa');}
function qaToggle(i){state.qaOpen=(state.qaOpen===i)?-1:i;render();}
function qaSetLang(l){state.qaLang=l;render();}
function qaScreen(){
  const cn=content(state.cid);const list=cn.qa||[];
  const lang=state.qaLang||'hi';
  let items='';
  list.forEach((qa,i)=>{
    const open=state.qaOpen===i;
    const qText=(lang==='en'&&qa.qe)?qa.qe:qa.q;
    const aText=(lang==='en'&&qa.ae)?qa.ae:qa.a;
    items+=`<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
      <div onclick="qaToggle(${i})" style="cursor:pointer;padding:14px;display:flex;gap:10px;align-items:flex-start;background:${open?C.sky+'22':'#fff'}">
        <span style="font-weight:900;color:${C.purple};font-size:15px">Q${i+1}.</span>
        <span style="flex:1;font-weight:800;color:${C.ink};font-size:15px">${qText}</span>
        <span style="color:${C.soft};font-size:18px">${open?'▲':'▼'}</span>
      </div>
      ${open?`<div style="padding:0 14px 14px 40px;color:${C.ink};font-size:15px;line-height:1.5;border-top:1px dashed ${C.soft}55"><div style="height:8px"></div><b style="color:${C.mint}">${lang==='en'?'✓ Answer:':'✓ Jawab:'}</b> ${aText}</div>`:''}
    </div>`;
  });
  const btn=(l,label)=>`<button onclick="qaSetLang('${l}')" style="border:none;padding:7px 16px;border-radius:20px;font-weight:800;font-size:13px;cursor:pointer;${lang===l?'background:'+C.purple+';color:#fff':'background:#fff;color:'+C.soft+';border:1.5px solid '+C.soft+'55'}">${label}</button>`;
  app.innerHTML=`
    <div class="topbar"><button class="link" onclick="go('chapter')">← Chapter</button></div>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:40px">💬</div>
      <div class="fred" style="font-weight:700;font-size:22px;color:${C.purpleDark}">Sawaal-Jawab</div>
      <div style="color:${C.soft};font-weight:800;font-size:13px;margin-bottom:10px">Sawaal pe tap karke jawab dekho • ${list.length} sawaal</div>
      <div class="row" style="justify-content:center;gap:8px">${btn('hi','🇮🇳 Hinglish')} ${btn('en','🔤 English')}</div>
    </div>
    ${items}
    <div style="height:20px"></div>`;
}

/* ---------- MATCH & FILL (interactive practice) ---------- */
function openMatch(id){state.cid=id;setupMatch();go('match');}
function setupMatch(){
  const cn=content(state.cid);
  state.matchSel=null;state.matchDone={};state.matchWrong=null;
  // shuffle right column order
  const pairs=(cn.match||[]);
  state.matchRight=pairs.map((p,i)=>i);
  for(let i=state.matchRight.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[state.matchRight[i],state.matchRight[j]]=[state.matchRight[j],state.matchRight[i]];}
}
function matchPickLeft(i){if(state.matchDone[i]!=null)return;state.matchSel=i;state.matchWrong=null;render();}
function matchPickRight(ri){
  if(state.matchSel==null)return;
  const already=Object.values(state.matchDone).includes(ri);if(already)return;
  if(ri===state.matchSel){state.matchDone[state.matchSel]=ri;state.matchSel=null;state.matchWrong=null;}
  else{state.matchWrong=ri;}
  render();
}
function matchScreen(){
  const cn=content(state.cid);const pairs=cn.match||[];
  const total=pairs.length;const done=Object.keys(state.matchDone).length;
  let left='',right='';
  pairs.forEach((p,i)=>{
    const solved=state.matchDone[i]!=null;const sel=state.matchSel===i;
    left+=`<button class="opt" onclick="matchPickLeft(${i})" style="display:block;width:100%;margin-bottom:8px;text-align:left;${solved?'background:'+C.mint+'33;border-color:'+C.mint+';opacity:.7':sel?'background:'+C.sky+'44;border-color:'+C.sky:''}">${solved?'✓ ':''}${p.l}</button>`;
  });
  state.matchRight.forEach(ri=>{
    const p=pairs[ri];const solved=Object.values(state.matchDone).includes(ri);const wrong=state.matchWrong===ri;
    right+=`<button class="opt" onclick="matchPickRight(${ri})" style="display:block;width:100%;margin-bottom:8px;text-align:left;${solved?'background:'+C.mint+'33;border-color:'+C.mint+';opacity:.7':wrong?'background:'+C.coral+'44;border-color:'+C.coral:''}">${solved?'✓ ':''}${p.r}</button>`;
  });
  const finished=done===total;
  app.innerHTML=`
    <div class="topbar"><button class="link" onclick="go('chapter')">← Chapter</button></div>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:38px">🔗</div>
      <div class="fred" style="font-weight:700;font-size:22px;color:${C.purpleDark}">Match the Pairs</div>
      <div style="color:${C.soft};font-weight:800;font-size:13px">Left se ek chuno, phir uska sahi joda Right mein tap karo</div>
      <div style="color:${C.mint};font-weight:900;font-size:14px;margin-top:4px">${done} / ${total} sahi jode ✓</div>
    </div>
    ${finished?`<div class="card pop" style="text-align:center;background:${C.mint}22;margin-bottom:12px"><div style="font-size:40px">🎉</div><div class="fred" style="font-weight:700;font-size:20px;color:${C.purpleDark}">Shabaash! Saare jode sahi!</div><button class="btn" style="background:${C.coral};margin-top:10px" onclick="setupMatch();render()">🔁 Phir se</button></div>`:''}
    <div class="row" style="align-items:flex-start;gap:10px">
      <div style="flex:1"><div style="font-weight:900;color:${C.purple};font-size:13px;margin-bottom:8px;text-align:center">👉 Column A</div>${left}</div>
      <div style="flex:1"><div style="font-weight:900;color:${C.coral};font-size:13px;margin-bottom:8px;text-align:center">Column B</div>${right}</div>
    </div>
    ${state.matchWrong!=null?`<div style="text-align:center;color:${C.coral};font-weight:800;font-size:14px;margin-top:8px">❌ Galat jodi! Phir se try karo</div>`:''}
    <div style="height:20px"></div>`;
}
render();
</script>
</body>
</html>
