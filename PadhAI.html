   {q:"5 × 1 = ?",opts:["1","5","0"],ans:1},
   {q:"4 × 2 = ?",opts:["6","42","8"],ans:2},
  ]},

 {id:'div',title:'Bhaag — Division',emoji:'➗',color:C.sky,scenes:[
   {art:emoji("🐘"),cap:"Aaj seekhenge BHAAG — barabar baatna!",hi:"नमस्ते! आज हम सीखेंगे भाग, यानी डिवीज़न, बराबर बाँटना।",en:"Today we learn division, sharing equally!",mr:"नमस्कार! आज आपण शिकणार आहोत भागाकार, म्हणजे सारखे वाटणे.",dur:5800},
   {art:groupsView("🍫",3,2),cap:"6 🍫 ko 3 doston mein baato = har ko 2",hi:"छह चॉकलेट को तीन दोस्तों में बराबर बाँटो, तो हर एक को दो मिलेंगी।",en:"Share six chocolates among three friends, each gets two.",mr:"सहा चॉकलेट तीन मित्रांमध्ये सारखे वाटा, प्रत्येकाला दोन मिळतील.",dur:7200},
   {art:bigExpr("6 ÷ 3 = 2"),cap:"6 cheezein, 3 hisse, har mein 2. 6 ÷ 3 = 2",hi:"छह चीज़ें, तीन हिस्से, हर हिस्से में दो। छह बटा तीन बराबर दो।",en:"Six things, three groups, two each. Six divided by three is two.",mr:"सहा वस्तू, तीन भाग, प्रत्येक भागात दोन. सहा भागिले तीन बरोबर दोन.",dur:7200},
   {art:bigExpr("3 × 2 = 6<br>6 ÷ 3 = 2"),cap:"Bhaag GUNA ka ulta! 3×2=6 to 6÷3=2",hi:"भाग गुणा का उल्टा है। तीन गुणा दो छह, तो छह बटा तीन बराबर दो।",en:"Division is the opposite of multiplication. Three times two is six, so six divided by three is two.",mr:"भागाकार हा गुणाकाराच्या उलट आहे. तीन गुणिले दोन सहा, म्हणून सहा भागिले तीन बरोबर दोन.",dur:8000},
   {art:groupsView("🍎",2,4),cap:"8 🍎 ko 2 baskets mein = har mein 4. 8 ÷ 2 = 4",hi:"आठ सेब को दो टोकरियों में बाँटो, हर में चार। आठ बटा दो बराबर चार।",en:"Eight apples in two baskets, four each. Eight divided by two is four.",mr:"आठ सफरचंद दोन टोपल्यांमध्ये वाटा, प्रत्येकात चार. आठ भागिले दोन बरोबर चार.",dur:7200},
   {art:bigExpr("5 ÷ 1 = 5<br>4 ÷ 4 = 1"),cap:"Trick: ÷1 = wahi. Khud ÷ khud = 1",hi:"ट्रिक, किसी को एक से भाग दो तो वही रहता है। और किसी को खुद से भाग दो तो एक आता है।",en:"Trick: divide by one stays same. A number divided by itself is one.",mr:"युक्ती, कोणत्याही संख्येला एकने भागा तर तीच राहते. आणि स्वतःला स्वतःने भागा तर एक येते.",dur:7600},
   {art:emoji("🌟"),cap:"Bhaag = barabar baatna. Guna ka ulta!",hi:"याद रखो, भाग मतलब बराबर हिस्सों में बाँटना। यह गुणा का उल्टा है।",en:"Remember: division is sharing into equal groups, opposite of multiplication!",mr:"लक्षात ठेवा, भागाकार म्हणजे सारख्या भागांत वाटणे. हा गुणाकाराच्या उलट आहे!",dur:6800},
  ],quiz:[
   {q:"6 ÷ 3 = ?",opts:["2","3","9"],ans:0},
   {q:"Bhaag kiska ulta hai?",opts:["Ghatana (−)","Guna (×)","Jodna (+)"],ans:1},
   {q:"8 ÷ 2 = ?",opts:["2","6","4"],ans:2},
   {q:"5 ÷ 1 = ?",opts:["5","1","0"],ans:0},
  ]},
 {id:'animals',title:'Elephants, Tigers & Leopards',emoji:'🐯',color:C.mint,scenes:[
   {art:`<div style="font-size:64px">🐘 🐯 🐆</div>`,cap:"Chapter 10 — Elephants, Tigers & Leopards! Bade numbers ke saath jaanwar ginna.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम दसवाँ चॅप्टर सीखेंगे — एलिफेंट्स, टाइगर्स एंड लेपर्ड्स। भारत के जंगलों में हज़ारों जानवर रहते हैं, और आज हम उनकी गिनती के साथ बड़ी संख्याओं का जोड़-घटाव सीखेंगे।",en:"Namaste friends! I am Gattu. Today we learn chapter ten, Elephants, Tigers and Leopards. Thousands of animals live in India's forests, and today we will learn addition and subtraction of big numbers using their counts.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण दहावा धडा शिकू — एलिफंट्स, टायगर्स अँड लेपर्ड्स. भारताच्या जंगलांत हजारो प्राणी राहतात, आणि आज आपण त्यांच्या मोजणीसह मोठ्या संख्यांची बेरीज-वजाबाकी शिकू.",dur:11500},
   {art:`<div style="font-size:60px">🌳🐘🌳🐯🌳</div>`,cap:"India rich hai biodiversity mein — elephants, tigers, leopards sab milte hain.",hi:"भारत जैव विविधता यानी biodiversity में बहुत समृद्ध है। यहाँ हाथी, बाघ और तेंदुए जैसे कई लुप्तप्राय जानवर पाए जाते हैं।",en:"India is very rich in biodiversity. Many endangered animals like elephants, tigers and leopards are found here.",mr:"भारत जैवविविधतेमध्ये खूप समृद्ध आहे. इथे हत्ती, वाघ आणि बिबट्यासारखे अनेक धोक्यात असलेले प्राणी आढळतात.",dur:9500},
   {art:bigExpr("Th &nbsp;&nbsp; H &nbsp;&nbsp; T &nbsp;&nbsp; O"),cap:"Yaad karo — bade number 4 columns mein banta hai: Th, H, T, O.",hi:"याद करो — बड़ी संख्या चार कॉलम से बनती है — हज़ार यानी Th, सैकड़ा यानी H, दहाई यानी T, और इकाई यानी O।",en:"Remember — a big number is made of four columns: thousands (Th), hundreds (H), tens (T), and ones (O).",mr:"आठवा — मोठी संख्या चार स्तंभांची बनते — हजार म्हणजे Th, शतक म्हणजे H, दशक म्हणजे T, आणि एकक म्हणजे O.",dur:9500},
   {art:place4(9,1,0,3),cap:"Karnataka mein 9103 elephants hain = 9Th + 1H + 0T + 3O",hi:"कर्नाटक में नौ हज़ार एक सौ तीन हाथी हैं। इसे लिखेंगे — नौ हज़ार, एक सौ, शून्य दहाई, तीन इकाई।",en:"Karnataka has nine thousand one hundred three elephants. We write it as nine thousand, one hundred, zero tens, three ones.",mr:"कर्नाटकमध्ये नऊ हजार एकशे तीन हत्ती आहेत. आपण हे नऊ हजार, एकशे, शून्य दशक, तीन एकक असे लिहू.",dur:10500},
   {art:column(6049,3054,'+',''),cap:"Karnataka (6049) + Kerala (3054) elephants — total kitne?",hi:"कर्नाटक में छह हज़ार उनचास हाथी हैं और केरल में तीन हज़ार चौवन। दोनों राज्यों में मिलाकर कितने हाथी हैं?",en:"Karnataka has six thousand forty-nine elephants and Kerala has three thousand fifty-four. How many elephants are there in both states together?",mr:"कर्नाटकमध्ये सहा हजार एकोणपन्नास हत्ती आहेत आणि केरळमध्ये तीन हजार चौपन्न. दोन्ही राज्यांत मिळून किती हत्ती आहेत?",dur:10500},
   {art:column(6049,3054,'+',9103,'1&nbsp;&nbsp;1'),cap:"6049 + 3054 = 9103. Ones se shuru karke, carry ke saath add karo.",hi:"इकाई यानी ones से शुरू करो — नौ जोड़ चार बराबर तेरह, तीन लिखो एक कैरी करो। इस तरह आगे बढ़ते हुए जवाब आता है नौ हज़ार एक सौ तीन।",en:"Start from the ones column — nine plus four is thirteen, write three, carry one. Continuing this way, the answer comes to nine thousand one hundred three.",mr:"एकक स्तंभापासून सुरुवात करा — नऊ अधिक चार बरोबर तेरा, तीन लिहा एक कॅरी करा. अशाच पद्धतीने पुढे जाऊन उत्तर येते नऊ हजार एकशे तीन.",dur:12000},
   {art:bigExpr("1355<br>1131<br>+ 1817"),cap:"3 states ke leopards add karo: Gujarat 1355, MP 1817, Karnataka 1131.",hi:"अब तीन राज्यों को मिलाकर जोड़ेंगे। गुजरात में एक हज़ार तीन सौ पचपन, मध्य प्रदेश में एक हज़ार आठ सौ सत्रह, और कर्नाटक में एक हज़ार एक सौ इकतीस तेंदुए हैं।",en:"Now we will add three states together. Gujarat has one thousand three hundred fifty-five, Madhya Pradesh has one thousand eight hundred seventeen, and Karnataka has one thousand one hundred thirty-one leopards.",mr:"आता तीन राज्ये मिळून बेरीज करू. गुजरातमध्ये एक हजार तीनशे पंचावन्न, मध्य प्रदेशात एक हजार आठशे सतरा, आणि कर्नाटकात एक हजार एकशे एकतीस बिबटे आहेत.",dur:12500},
   {art:bigExpr("1355+1131+1817<br>= 4303"),cap:"1355 + 1131 + 1817 = 4303 leopards teeno states mein.",hi:"तीनों को जोड़ने पर जवाब आता है चार हज़ार तीन सौ तीन तेंदुए। तीन से ज़्यादा संख्याओं को भी हम उसी तरह column में जोड़ सकते हैं।",en:"Adding all three gives four thousand three hundred three leopards. We can add even more than two numbers the same way, in columns.",mr:"तिन्ही जोडल्यावर उत्तर येते चार हजार तीनशे तीन बिबटे. दोनपेक्षा जास्त संख्याही आपण त्याच पद्धतीने स्तंभात जोडू शकतो.",dur:11000},
   {art:emoji("🤔"),cap:"Estimate karna matlab — jaldi se andaza lagana, round karke.",hi:"एस्टिमेट यानी अनुमान लगाना। इसमें हम संख्याओं को गोल यानी round करके जल्दी से जवाब का अंदाज़ा लगाते हैं — सटीक जवाब बाद में निकालते हैं।",en:"Estimate means to guess quickly. We round the numbers to quickly guess the answer, and find the exact answer later.",mr:"एस्टिमेट म्हणजे अंदाज लावणे. यात आपण संख्या गोल करून पटकन उत्तराचा अंदाज लावतो — नेमके उत्तर नंतर काढतो.",dur:10000},
   {art:bigExpr("6049 ≈ 6000<br>3054 ≈ 3000<br>Total ≈ 9000"),cap:"6049 ≈ 6000, aur 3054 ≈ 3000. Estimate total ≈ 9000.",hi:"छह हज़ार उनचास को गोल करेंगे छह हज़ार, और तीन हज़ार चौवन को गोल करेंगे तीन हज़ार। तो अनुमानित जवाब है लगभग नौ हज़ार।",en:"We round six thousand forty-nine to six thousand, and three thousand fifty-four to three thousand. So the estimated answer is about nine thousand.",mr:"सहा हजार एकोणपन्नास गोल करू सहा हजार, आणि तीन हजार चौपन्न गोल करू तीन हजार. तर अंदाजे उत्तर आहे सुमारे नऊ हजार.",dur:11000},
   {art:emoji("⚖️"),cap:"More ya Less pata karne ke liye hum SUBTRACT karte hain.",hi:"किसी में कितना ज़्यादा या कितना कम है, यह पता लगाने के लिए हम घटाव यानी subtraction का इस्तेमाल करते हैं।",en:"To find out how much more or less something has, we use subtraction.",mr:"एखाद्यात किती जास्त किंवा कमी आहे हे शोधण्यासाठी आपण वजाबाकी म्हणजे subtraction वापरतो.",dur:9000},
   {art:column(5719,3965,'−',1754),cap:"Assam: 5719 elephants. Meghalaya se kitne zyada? 5719 − 3965 = 1754",hi:"असम में पाँच हज़ार सात सौ उन्नीस हाथी हैं। मेघालय में तीन हज़ार नौ सौ पैंसठ। असम में मेघालय से कितने ज़्यादा हाथी हैं? पाँच हज़ार सात सौ उन्नीस में से तीन हज़ार नौ सौ पैंसठ घटाओ, जवाब आता है एक हज़ार सात सौ चौवन।",en:"Assam has five thousand seven hundred nineteen elephants. Meghalaya has three thousand nine hundred sixty-five. How many more does Assam have than Meghalaya? Subtract three thousand nine hundred sixty-five from five thousand seven hundred nineteen, the answer is one thousand seven hundred fifty-four.",mr:"आसाममध्ये पाच हजार सातशे एकोणीस हत्ती आहेत. मेघालयात तीन हजार नऊशे पासष्ट. आसाममध्ये मेघालयपेक्षा किती जास्त हत्ती आहेत? पाच हजार सातशे एकोणीसमधून तीन हजार नऊशे पासष्ट वजा करा, उत्तर येते एक हजार सातशे चोपन्न.",dur:14000},
   {art:emoji("🔄"),cap:"REVERSE AND ADD: 2-digit number lo, digits ulta karo, phir add karo!",hi:"एक मज़ेदार activity — रिवर्स एंड ऐड। कोई भी दो अंकों की संख्या लो, उसके अंक उल्टे करो, और फिर दोनों को जोड़ दो।",en:"A fun activity — Reverse and Add. Take any two-digit number, reverse its digits, and then add both numbers.",mr:"एक मजेशीर activity — रिव्हर्स अँड अॅड. कोणतीही दोन अंकी संख्या घ्या, तिचे अंक उलटे करा, आणि मग दोन्ही जोडा.",dur:10000},
   {art:bigExpr("27 → 72<br>27 + 72 = 99"),cap:"27 ko ulta karo = 72. Ab add karo: 27 + 72 = 99",hi:"सत्ताईस को उल्टा करो तो बनता है बहत्तर। अब दोनों को जोड़ो — सत्ताईस जोड़ बहत्तर बराबर निन्यानवे।",en:"Reverse twenty-seven to get seventy-two. Now add both — twenty-seven plus seventy-two equals ninety-nine.",mr:"सत्तावीस उलटे केले तर होते बहात्तर. आता दोन्ही जोडा — सत्तावीस अधिक बहात्तर बरोबर नव्याण्णव.",dur:10500},
   {art:bigExpr("Row + Column = Cell<br>3 + 4 = 7"),cap:"Addition chart mein har cell = row number + column number.",hi:"एडिशन चार्ट में हर खाने की संख्या row के नंबर और column के नंबर को जोड़कर बनती है। इसमें diagonal यानी तिरछी रेखा में एक पैटर्न दिखता है।",en:"In an addition chart, every cell's number is made by adding the row number and column number. A pattern shows up along the diagonals.",mr:"अॅडिशन चार्टमध्ये प्रत्येक खान्याची संख्या row क्रमांक आणि column क्रमांक जोडून बनते. यात diagonal म्हणजे तिरप्या रेषेत एक पॅटर्न दिसतो.",dur:11000},
   {art:`<div style="font-size:60px">🎯</div>${bigExpr("Target = 10")}`,cap:"NIM GAME: 2 players, target 10. Har baari 1 ya 2 add karo.",hi:"अब खेलते हैं निम गेम। इसमें दो खिलाड़ी होते हैं, और लक्ष्य होता है दस तक पहुँचना। हर बारी में या तो एक जोड़ो या दो, अपनी पसंद से।",en:"Now let's play the NIM game. It has two players, and the target is to reach ten. Each turn you add either one or two, your choice.",mr:"आता खेळू निम गेम. यात दोन खेळाडू असतात, आणि लक्ष्य असते दहापर्यंत पोहोचणे. प्रत्येक फेरीत एक किंवा दोन जोडा, आपल्या आवडीनुसार.",dur:11500},
   {art:bigExpr("3 → 6 → 9 → 10<br>Tum jeetoge! 🏆"),cap:"Trick: agar tum 3, 6, 9 pe pahunch jao, tum jeet jaoge!",hi:"एक चतुराई भरी ट्रिक — अगर तुम तीन, छह, या नौ तक पहुँच जाओ, तो तुम्हारी जीत पक्की है। क्योंकि उसके बाद जो भी करे, तुम हमेशा दस तक पहले पहुँच जाओगे।",en:"A clever trick — if you manage to reach three, six, or nine, your win is certain. Because after that, no matter what the other player does, you will always reach ten first.",mr:"एक हुशार युक्ती — जर तुम्ही तीन, सहा, किंवा नऊ पर्यंत पोहोचलात, तर तुमचा विजय नक्की. कारण त्यानंतर दुसरा खेळाडू काहीही करो, तुम्ही नेहमी दहापर्यंत आधी पोहोचाल.",dur:13000},
   {art:emoji("🗺️"),cap:"Map se data padho — har state ka apna number hota hai.",hi:"नक्शे यानी map से डेटा पढ़ना भी एक ज़रूरी skill है। हर राज्य के पास जानवरों की अपनी अलग संख्या होती है, और हम उन्हें जोड़ या घटा सकते हैं।",en:"Reading data from a map is an important skill too. Every state has its own number of animals, and we can add or subtract them.",mr:"नकाशावरून म्हणजे map वरून डेटा वाचणे हेही एक महत्त्वाचे कौशल्य आहे. प्रत्येक राज्याकडे प्राण्यांची स्वतःची वेगळी संख्या असते, आणि आपण त्या जोडू किंवा वजा करू शकतो.",dur:11000},
   {art:bigExpr("6304 + 253 = 6557"),cap:"Jeeps: 6304. Buses = Jeeps se 253 zyada. Kitni buses?",hi:"एक छोटे शहर में छह हज़ार तीन सौ चार जीप हैं। बसें जीप से दो सौ तिरपन ज़्यादा हैं। तो बसें कितनी हैं? छह हज़ार तीन सौ चार जोड़ दो सौ तिरपन बराबर छह हज़ार पाँच सौ सत्तावन।",en:"A small town has six thousand three hundred four jeeps. Buses are two hundred fifty-three more than jeeps. So how many buses? Six thousand three hundred four plus two hundred fifty-three equals six thousand five hundred fifty-seven.",mr:"एका लहान शहरात सहा हजार तीनशे चार जीप आहेत. बसेस जीपपेक्षा दोनशे त्रेपन्न जास्त आहेत. तर बसेस किती? सहा हजार तीनशे चार अधिक दोनशे त्रेपन्न बरोबर सहा हजार पाचशे सत्तावन्न.",dur:14000},
   {art:emoji("🏦"),cap:"Bank deposit slip mein amount NUMBERS aur WORDS dono mein likhte hain.",hi:"बैंक में पैसे जमा करते समय एक deposit slip भरनी होती है, जिसमें रकम अंकों में भी लिखी जाती है और शब्दों में भी — ताकि कोई गलती न हो।",en:"When depositing money in a bank, we fill a deposit slip, where the amount is written both in numbers and in words — so that there is no mistake.",mr:"बँकेत पैसे जमा करताना एक deposit slip भरावी लागते, ज्यात रक्कम अंकांतही लिहितात आणि शब्दांतही — जेणेकरून कोणतीही चूक होऊ नये.",dur:11500},
   {art:emoji("🌟"),cap:"Shabaash! Ab tum bade numbers ka add-subtract, estimate sab kar sakte ho!",hi:"शाबाश दोस्तों! अब तुम बड़ी संख्याओं का जोड़, घटाव, और अनुमान लगाना — सब कुछ सीख चुके हो। जानवरों की गिनती करते-करते बहुत कुछ सीखा!",en:"Well done friends! Now you know how to add, subtract, and estimate with big numbers. You learned so much while counting animals!",mr:"शाब्बास मित्रांनो! आता तुम्हाला मोठ्या संख्यांची बेरीज, वजाबाकी, आणि अंदाज लावणे — सगळे येते. प्राण्यांची मोजणी करता करता खूप काही शिकलात!",dur:11000},
   {art:bigExpr("6049 > 3054"),cap:"Bade numbers compare karo signs se: <, =, >",hi:"अब बड़ी संख्याओं की तुलना यानी compare करना सीखते हैं। इसके लिए हम तीन चिह्न इस्तेमाल करते हैं — छोटा है, बराबर है, या बड़ा है।",en:"Now let's learn to compare big numbers. For this we use three signs — less than, equal to, or greater than.",mr:"आता मोठ्या संख्यांची तुलना म्हणजे compare करणे शिकू. यासाठी आपण तीन चिन्हे वापरतो — लहान आहे, बरोबर आहे, किंवा मोठे आहे.",dur:10000},
   {art:bigExpr("Th → H → T → O"),cap:"Compare karte waqt pehle Th (thousands) dekho, phir H, T, O.",hi:"तुलना करते समय हमेशा सबसे बड़े कॉलम से शुरू करो — पहले हज़ार, फिर सैकड़ा, फिर दहाई, फिर इकाई। जहाँ पहला फर्क मिले, वहीं जवाब मिल जाता है।",en:"When comparing, always start from the biggest column — first thousands, then hundreds, then tens, then ones. Wherever you find the first difference, that gives you the answer.",mr:"तुलना करताना नेहमी सर्वात मोठ्या स्तंभापासून सुरुवात करा — आधी हजार, मग शतक, मग दशक, मग एकक. जिथे पहिला फरक सापडतो, तिथेच उत्तर मिळते.",dur:11500},
   {art:column(6557,5247,'−',1310),cap:"Buses 6557. Tractors = Buses − 5247 = ? Compute karo!",hi:"शहर में छह हज़ार पाँच सौ सत्तावन बसें हैं। ट्रैक्टर बसों से पाँच हज़ार दो सौ सैंतालीस कम हैं। तो ट्रैक्टर कितने हैं? घटाने पर जवाब आता है एक हज़ार तीन सौ दस।",en:"The city has six thousand five hundred fifty-seven buses. Tractors are five thousand two hundred forty-seven less than buses. So how many tractors? Subtracting gives one thousand three hundred ten.",mr:"शहरात सहा हजार पाचशे सत्तावन्न बसेस आहेत. ट्रॅक्टर बसेसपेक्षा पाच हजार दोनशे सत्तेचाळीस कमी आहेत. तर ट्रॅक्टर किती? वजाबाकीने उत्तर येते एक हजार तीनशे दहा.",dur:13500},
   {art:bigExpr("1310 + 1579 = 2889"),cap:"Tractors 1310. Taxis = Tractors + 1579 = 2889",hi:"ट्रैक्टर एक हज़ार तीन सौ दस हैं। टैक्सी ट्रैक्टर से एक हज़ार पाँच सौ उनासी ज़्यादा हैं। जोड़ने पर टैक्सी की संख्या आती है दो हज़ार आठ सौ नवासी।",en:"Tractors are one thousand three hundred ten. Taxis are one thousand five hundred seventy-nine more than tractors. Adding, the number of taxis comes to two thousand eight hundred eighty-nine.",mr:"ट्रॅक्टर एक हजार तीनशे दहा आहेत. टॅक्सी ट्रॅक्टरपेक्षा एक हजार पाचशे एकोणऐंशी जास्त आहेत. जोडल्यावर टॅक्सींची संख्या येते दोन हजार आठशे एकोणनव्वद.",dur:13000},
   {art:bigExpr("1348 + 1257 = 2605"),cap:"Juice factory: Pineapple 1348 bottles. Guava 1257 zyada. Guava = ?",hi:"एक जूस फैक्ट्री में एक हज़ार तीन सौ अड़तालीस बोतलें पाइनएप्पल जूस की हैं। अमरूद यानी guava जूस पाइनएप्पल से एक हज़ार दो सौ सत्तावन ज़्यादा हैं। तो guava की बोतलें दो हज़ार छह सौ पाँच हैं।",en:"A juice factory has one thousand three hundred forty-eight bottles of pineapple juice. Guava juice bottles are one thousand two hundred fifty-seven more than pineapple. So guava bottles are two thousand six hundred five.",mr:"एका ज्यूस फॅक्टरीत एक हजार तीनशे अठ्ठेचाळीस बाटल्या पाइनॲपल ज्यूसच्या आहेत. पेरू म्हणजे guava ज्यूस पाइनॲपलपेक्षा एक हजार दोनशे सत्तावन्न जास्त आहेत. तर guava बाटल्या दोन हजार सहाशे पाच आहेत.",dur:14000},
   {art:bigExpr("2605 − 485 = 2120"),cap:"Guava 2605. Orange juice 485 kam hai. Orange = ?",hi:"अमरूद जूस की दो हज़ार छह सौ पाँच बोतलें हैं। संतरे यानी orange जूस इससे चार सौ पचासी कम है। तो orange जूस की बोतलें दो हज़ार एक सौ बीस हैं।",en:"There are two thousand six hundred five bottles of guava juice. Orange juice is four hundred eighty-five less than that. So orange juice bottles are two thousand one hundred twenty.",mr:"पेरू ज्यूसच्या दोन हजार सहाशे पाच बाटल्या आहेत. संत्रे म्हणजे orange ज्यूस त्यापेक्षा चारशे पंचाऐंशी कमी आहे. तर orange ज्यूस बाटल्या दोन हजार एकशे वीस आहेत.",dur:12500},
   {art:bigExpr("4828 + 1587 = 6415"),cap:"Kaziranga Park: October 4828 visitors. November 1587 zyada. November = ?",hi:"काज़ीरंगा नेशनल पार्क में अक्टूबर में चार हज़ार आठ सौ अट्ठाईस विज़िटर आए। नवंबर में इससे एक हज़ार पाँच सौ सत्तासी ज़्यादा आए। तो नवंबर में विज़िटर हुए छह हज़ार चार सौ पंद्रह।",en:"Kaziranga National Park had four thousand eight hundred twenty-eight visitors in October. November had one thousand five hundred eighty-seven more than that. So November had six thousand four hundred fifteen visitors.",mr:"काझीरंगा नॅशनल पार्कमध्ये ऑक्टोबरमध्ये चार हजार आठशे अठ्ठावीस भेट देणारे आले. नोव्हेंबरमध्ये त्यापेक्षा एक हजार पाचशे सत्त्याऐंशी जास्त आले. तर नोव्हेंबरमध्ये भेट देणारे झाले सहा हजार चारशे पंधरा.",dur:14000},
   {art:bigExpr("8591 − 6415 = 2176"),cap:"December 8591 visitors. November se kitne zyada? = 2176",hi:"दिसंबर में आठ हज़ार पाँच सौ इक्यानवे विज़िटर आए। नवंबर से कितने ज़्यादा? घटाने पर जवाब आता है दो हज़ार एक सौ छिहत्तर।",en:"December had eight thousand five hundred ninety-one visitors. How many more than November? Subtracting gives two thousand one hundred seventy-six.",mr:"डिसेंबरमध्ये आठ हजार पाचशे एकोणनव्वद भेट देणारे आले. नोव्हेंबरपेक्षा किती जास्त? वजाबाकीने उत्तर येते दोन हजार एकशे शहात्तर.",dur:11500},
   {art:bigExpr("3+6=9<br>4+5=9<br>2+7=9"),cap:"Addition chart ki diagonal mein sabka SUM same hota hai!",hi:"एडिशन चार्ट में एक तिरछी रेखा यानी diagonal पर चलो, तो देखोगे कि हर जोड़ का जवाब एक जैसा ही आता है। यही उसका जादुई पैटर्न है।",en:"Walk along a diagonal in the addition chart, and you will see that every sum comes out the same. That is its magical pattern.",mr:"अॅडिशन चार्टमध्ये एका तिरप्या रेषेवर म्हणजे diagonal वर चाला, तर दिसेल की प्रत्येक बेरीज सारखीच येते. हाच त्याचा जादूचा पॅटर्न आहे.",dur:11000},
   {art:bigExpr("14+41=55<br>23+32=55"),cap:"Reverse-Add puzzle: kai numbers jinka reverse-sum 55 hota hai!",hi:"एक मज़ेदार पहेली — कई अलग-अलग दो अंकों की संख्याएँ हैं, जिन्हें उल्टा करके जोड़ने पर जवाब पचपन ही आता है। जैसे चौदह और तेईस।",en:"A fun puzzle — many different two-digit numbers give fifty-five when reversed and added. Like fourteen and twenty-three.",mr:"एक मजेशीर कोडे — अनेक वेगवेगळ्या दोन अंकी संख्या आहेत, ज्यांना उलटे करून जोडल्यावर उत्तर पंचावन्नच येते. जसे चौदा आणि तेवीस.",dur:11500},
   {art:bigExpr("26+62=88<br>35+53=88"),cap:"Aur example: 26 aur 35 dono ka reverse-sum 88 aata hai.",hi:"एक और उदाहरण — छब्बीस और पैंतीस, दोनों को उल्टा करके जोड़ने पर जवाब अठासी आता है। खुद भी कई numbers try करके देखो!",en:"Another example — twenty-six and thirty-five, when reversed and added, both give eighty-eight. Try many numbers yourself and see!",mr:"आणखी एक उदाहरण — सव्वीस आणि पस्तीस, दोन्ही उलटे करून जोडल्यावर उत्तर अठ्ठ्याऐंशी येते. स्वतः अनेक संख्या करून पाहा!",dur:11500},
   {art:emoji("🎉"),cap:"Bahut practice ho gayi! Ab tum quiz ke liye poori tarah ready ho!",hi:"बहुत सारी practice हो गई! अब तुम place value, addition, subtraction, estimate, compare — सब कुछ में एकदम एक्सपर्ट हो गए हो। क्विज़ के लिए तैयार हो जाओ!",en:"That was a lot of practice! Now you are a complete expert in place value, addition, subtraction, estimating, and comparing. Get ready for the quiz!",mr:"खूप सराव झाला! आता तुम्ही place value, बेरीज, वजाबाकी, अंदाज, तुलना — सगळ्यात एकदम तज्ज्ञ झाला आहात. क्विझसाठी तयार व्हा!",dur:11000},

 {id:'symmetry',title:'Fun with Symmetry',emoji:'🦋',color:C.purple,scenes:[
   {art:emoji("🦋"),cap:"Chapter 11 — Fun with Symmetry! Shapes ke do barabar hisse dhundo.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम ग्यारहवाँ चॅप्टर सीखेंगे — फन विद सिमेट्री। इसमें हम सीखेंगे कि कोई shape बीच से बराबर दो हिस्सों में कैसे बँटती है।",en:"Namaste friends! I am Gattu. Today we learn chapter eleven, Fun with Symmetry. We will learn how a shape can be divided into two equal halves from the middle.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण अकरावा धडा शिकू — फन विथ सिमेट्री. यात आपण शिकू की एखादा आकार मधोमध दोन समान भागांत कसा विभागला जातो.",dur:11500},
   {art:bigExpr("Symmetry = 2 Equal Halves"),cap:"SYMMETRY: jab ek line shape ko 2 EQUAL, MATCHING halves mein baante.",hi:"सिमेट्री यानी सममिति — जब कोई एक रेखा किसी shape को दो बराबर और एक जैसे हिस्सों में बाँट दे, तो उसे symmetrical कहते हैं।",en:"Symmetry — when a line divides a shape into two equal and matching halves, we call it symmetrical.",mr:"सिमेट्री म्हणजे सममिती — जेव्हा एखादी रेषा आकाराला दोन समान आणि सारख्या भागांत विभागते, तेव्हा त्याला symmetrical म्हणतात.",dur:11000},
   {art:sqDiag(),cap:"Us line ko LINE OF SYMMETRY kehte hain.",hi:"जो रेखा shape को बराबर हिस्सों में बाँटती है, उसे line of symmetry कहते हैं।",en:"The line that divides the shape into equal halves is called the line of symmetry.",mr:"जी रेषा आकाराला समान भागांत विभागते, तिला line of symmetry म्हणतात.",dur:9000},
   {art:emoji("🦋"),cap:"Titli (butterfly) ek perfect example hai symmetry ka!",hi:"तितली प्रकृति में symmetry का एक बेहतरीन उदाहरण है। इसके दोनों पंख बिल्कुल एक जैसे होते हैं।",en:"A butterfly is a wonderful example of symmetry in nature. Both its wings are exactly alike.",mr:"फुलपाखरू निसर्गातील symmetry चे एक सुंदर उदाहरण आहे. त्याचे दोन्ही पंख अगदी सारखे असतात.",dur:10000},
   {art:emoji("📄"),cap:"Symmetry test karne ka tareeka: shape ko FOLD karo!",hi:"किसी shape में symmetry है या नहीं, यह जानने का एक आसान तरीका है — उसे बीच से मोड़ो। अगर दोनों तरफ बिल्कुल एक जैसे मिलें, तो वह symmetrical है।",en:"An easy way to check if a shape has symmetry is to fold it in the middle. If both sides match exactly, it is symmetrical.",mr:"आकारात symmetry आहे की नाही हे तपासण्याचा सोपा मार्ग म्हणजे तो मधोमध दुमडणे. जर दोन्ही बाजू अगदी जुळल्या, तर तो symmetrical आहे.",dur:11000},
   {art:emoji("🍃"),cap:"Agar dono halves match NA karein, to shape ASYMMETRICAL hai.",hi:"अगर मोड़ने पर दोनों हिस्से एक जैसे न मिलें, तो वह shape असममित यानी asymmetrical कहलाती है।",en:"If the two halves do not match when folded, the shape is called asymmetrical.",mr:"जर दुमडल्यावर दोन्ही भाग जुळले नाहीत, तर त्या आकाराला असममित म्हणजे asymmetrical म्हणतात.",dur:9500},
   {art:bigExpr("Square = 4 lines"),cap:"SQUARE mein 4 lines of symmetry hoti hain!",hi:"वर्ग यानी square में चार लाइनें symmetry की होती हैं — दो सीधी, दो तिरछी।",en:"A square has four lines of symmetry — two straight, two diagonal.",mr:"चौरसात चार symmetry च्या रेषा असतात — दोन सरळ, दोन तिरप्या.",dur:10000},
   {art:bigExpr("Circle = ∞ lines"),cap:"CIRCLE mein INFINITE (anant) lines of symmetry hoti hain!",hi:"वृत्त यानी circle में तो अनगिनत यानी infinite लाइनें symmetry की होती हैं — केंद्र से गुज़रने वाली हर रेखा एक line of symmetry है।",en:"A circle has infinite lines of symmetry — every line passing through its centre is a line of symmetry.",mr:"वर्तुळात अगणित म्हणजे infinite symmetry च्या रेषा असतात — केंद्रातून जाणारी प्रत्येक रेषा एक line of symmetry आहे.",dur:11500},
   {art:bigExpr("Rectangle = 2 lines"),cap:"RECTANGLE mein sirf 2 lines of symmetry hoti hain.",hi:"आयत यानी rectangle में सिर्फ दो लाइनें symmetry की होती हैं — दोनों सीधी, बीचोंबीच से।",en:"A rectangle has only two lines of symmetry — both straight, through the middle.",mr:"आयतात फक्त दोन symmetry च्या रेषा असतात — दोन्ही सरळ, मधोमधून.",dur:9500},
   {art:bigExpr("Triangle = 3 lines"),cap:"Equilateral TRIANGLE (saari sides equal) mein 3 lines hoti hain.",hi:"समबाहु त्रिकोण, जिसकी सभी भुजाएँ बराबर होती हैं, उसमें तीन लाइनें symmetry की होती हैं — हर कोने से।",en:"An equilateral triangle, with all sides equal, has three lines of symmetry — one from each corner.",mr:"समभुज त्रिकोण, ज्याच्या सर्व बाजू समान असतात, त्यात तीन symmetry च्या रेषा असतात — प्रत्येक कोपऱ्यातून.",dur:11000},
   {art:bigExpr("A H M T U V W X Y"),cap:"Letters jaise A, H, M, T, U, V, W, X, Y mein VERTICAL line of symmetry hai.",hi:"अंग्रेज़ी के कुछ अक्षर जैसे A, H, M, T, U, V, W, X, Y में एक सीधी खड़ी यानी vertical रेखा से symmetry होती है।",en:"Some English letters like A, H, M, T, U, V, W, X, Y have a vertical line of symmetry.",mr:"काही इंग्रजी अक्षरे जसे A, H, M, T, U, V, W, X, Y मध्ये एक उभी म्हणजे vertical रेषेने symmetry असते.",dur:11000},
   {art:bigExpr("B C D E K"),cap:"B, C, D, E, K jaise letters mein HORIZONTAL line of symmetry hai.",hi:"B, C, D, E, K जैसे अक्षरों में एक आड़ी यानी horizontal रेखा से symmetry होती है।",en:"Letters like B, C, D, E, K have a horizontal line of symmetry.",mr:"B, C, D, E, K सारख्या अक्षरांमध्ये एक आडवी म्हणजे horizontal रेषेने symmetry असते.",dur:10000},
   {art:bigExpr("F G J L N — No symmetry"),cap:"F, G, J, L, N, P, Q, R, S, Z mein KOI line of symmetry NAHI hai!",hi:"पर F, G, J, L, N, P, Q, R, S, Z जैसे अक्षरों में कोई भी symmetry की लाइन नहीं होती।",en:"But letters like F, G, J, L, N, P, Q, R, S, Z have no line of symmetry at all.",mr:"पण F, G, J, L, N, P, Q, R, S, Z सारख्या अक्षरांना कोणतीही symmetry ची रेषा नसते.",dur:10500},
   {art:emoji("🪞"),cap:"MIRROR IMAGE: shape ko mirror mein dekho, ulta reflection milta hai.",hi:"मिरर इमेज यानी दर्पण प्रतिबिंब — किसी चीज़ को शीशे के सामने रखो, तो उसका उल्टा प्रतिबिंब दिखता है।",en:"A mirror image — place something in front of a mirror, and you see its reversed reflection.",mr:"मिरर इमेज म्हणजे आरशातील प्रतिबिंब — एखादी गोष्ट आरशासमोर ठेवा, तिचे उलटे प्रतिबिंब दिसते.",dur:10000},
   {art:emoji("🪞✨"),cap:"Mirror ko line of symmetry pe rakho — poori shape dikh jaati hai!",hi:"अगर आधी shape दी हो, तो mirror को उसकी line of symmetry पर रखो — पूरी shape दिख जाएगी!",en:"If half a shape is given, place the mirror on its line of symmetry — the complete shape appears!",mr:"जर अर्धा आकार दिलेला असेल, तर आरसा त्याच्या line of symmetry वर ठेवा — पूर्ण आकार दिसतो!",dur:10500},
   {art:bigExpr("0, 1, 8 — same in mirror"),cap:"Digits 0, 1, aur 8 ka mirror image SAME rehta hai!",hi:"अंकों में से शून्य, एक, और आठ — इन तीनों का मिरर इमेज बिल्कुल वही रहता है, बदलता नहीं।",en:"Among digits, zero, one, and eight — the mirror image of these three stays exactly the same, it does not change.",mr:"अंकांपैकी शून्य, एक, आणि आठ — या तिघांची मिरर इमेज अगदी तशीच राहते, बदलत नाही.",dur:11000},
   {art:bigExpr("2,3,4,5,6,7,9 — different!"),cap:"Baaki digits (2,3,4,5,6,7,9) ka mirror image DIFFERENT dikhta hai.",hi:"बाकी अंक जैसे दो, तीन, चार, पाँच, छह, सात, नौ — इनका मिरर इमेज अलग दिखता है, असली अंक जैसा नहीं लगता।",en:"The other digits like two, three, four, five, six, seven, nine — their mirror image looks different, not like the real digit.",mr:"बाकीचे अंक जसे दोन, तीन, चार, पाच, सहा, सात, नऊ — त्यांची मिरर इमेज वेगळी दिसते, खऱ्या अंकासारखी दिसत नाही.",dur:11500},
   {art:bigExpr("989 → mirror → 989"),cap:"989 ka mirror image bhi 989 hi hai — kyunki sab digits same-mirror hain!",hi:"नौ सौ नवासी यानी 989 का मिरर इमेज भी 989 ही रहता है, क्योंकि इसके सभी अंक — नौ, आठ, नौ — मिरर में वैसे ही रहते हैं।",en:"The mirror image of nine hundred eighty-nine, that is 989, also stays 989, because all its digits nine, eight, nine stay the same in the mirror.",mr:"नऊशे एकोणनव्वद म्हणजे 989 ची मिरर इमेजही 989च राहते, कारण त्याचे सर्व अंक — नऊ, आठ, नऊ — आरशात तसेच राहतात.",dur:12000},
   {art:bigExpr("WOW 🪞 WOW"),cap:"CAT jaise words mirror mein ulte dikhte hain, kuch words symmetrical bhi lagte hain!",hi:"कुछ शब्द शीशे में उल्टे दिखते हैं, पर कुछ खास शब्द ऐसे भी होते हैं जो mirror में लगभग वैसे ही दिखते हैं — जैसे WOW।",en:"Some words look reversed in a mirror, but some special words look almost the same in a mirror — like WOW.",mr:"काही शब्द आरशात उलटे दिसतात, पण काही खास शब्द असे असतात जे आरशात जवळजवळ तसेच दिसतात — जसे WOW.",dur:11000},
   {art:emoji("🎨"),cap:"INK BLOT design: paper fold karo, color dalo, phir press karo!",hi:"एक मज़ेदार activity — कागज़ को आधा मोड़ो, बीच में रंग की कुछ बूँदें डालो, फिर उसे दबा दो।",en:"A fun activity — fold a paper in half, put a few drops of colour in the middle, then press it down.",mr:"एक मजेशीर activity — कागद अर्धा दुमडा, मध्ये रंगाचे काही थेंब टाका, मग तो दाबा.",dur:10500},
   {art:emoji("🦋🎨"),cap:"Paper kholo — ek KHOOBSURAT symmetrical design ban jaata hai!",hi:"अब कागज़ को खोलो — दोनों तरफ एक जैसा एक बेहद खूबसूरत symmetrical डिज़ाइन बन चुका होगा!",en:"Now open the paper — a beautiful symmetrical design has formed, the same on both sides!",mr:"आता कागद उघडा — दोन्ही बाजूंना सारखा एक अतिशय सुंदर symmetrical डिझाइन तयार झाला असेल!",dur:10500},
   {art:emoji("✈️"),cap:"Paper airplane bhi symmetrical hona chahiye taaki sahi ude!",hi:"कागज़ का हवाई जहाज़ भी symmetrical होना चाहिए, तभी वह सीधा और अच्छे से उड़ता है।",en:"A paper airplane should also be symmetrical, only then does it fly straight and well.",mr:"कागदाचे विमानही symmetrical असावे लागते, तेव्हाच ते सरळ आणि नीट उडते.",dur:10000},
   {art:emoji("✈️💥"),cap:"Asymmetrical airplane TEDHA udega ya theek se nahi udega!",hi:"अगर हवाई जहाज़ symmetrical न हो, तो वह टेढ़ा उड़ेगा या ठीक से उड़ेगा ही नहीं।",en:"If the airplane is not symmetrical, it will fly crookedly or may not fly well at all.",mr:"जर विमान symmetrical नसेल, तर ते वाकडे उडेल किंवा नीट उडणारच नाही.",dur:10000},
   {art:emoji("🔷🔶🔷🔶"),cap:"TILING: ek hi shape (tile) baar-baar repeat karke pattern banana.",hi:"टाइलिंग यानी एक ही shape को बार-बार दोहराकर एक बड़ा pattern बनाना — जैसे फर्श की टाइलें।",en:"Tiling means repeating the same shape again and again to make a bigger pattern — like floor tiles.",mr:"टाइलिंग म्हणजे एकाच आकाराला वारंवार पुनरावृत्ती करून मोठा pattern बनवणे — जसे फरशीच्या टाइल्स.",dur:10500},
   {art:emoji("🟦🟦🟦"),cap:"Tiling mein koi GAPS ya OVERLAPS nahi hone chahiye.",hi:"टाइलिंग करते समय ध्यान रखो कि टाइलों के बीच कोई खाली जगह यानी gap न हो, और वे एक-दूसरे पर overlap भी न करें।",en:"While tiling, make sure there are no gaps between the tiles, and they should not overlap each other.",mr:"टाइलिंग करताना लक्षात ठेवा की टाइल्समध्ये कोणतीही रिकामी जागा म्हणजे gap नसावी, आणि त्या एकमेकांवर overlap ही होऊ नयेत.",dur:11000},
   {art:emoji("🔺🔷⬡"),cap:"Square, triangle, hexagon — sab tiling ke liye use hote hain.",hi:"वर्ग, त्रिकोण, षट्कोण — ये सभी shapes टाइलिंग के लिए इस्तेमाल होती हैं, क्योंकि ये बिना गैप के फिट हो जाती हैं।",en:"Square, triangle, hexagon — all these shapes are used for tiling, because they fit together without gaps.",mr:"चौरस, त्रिकोण, षटकोन — या सर्व आकारांचा टाइलिंगसाठी वापर होतो, कारण ते गॅपशिवाय एकत्र बसतात.",dur:10500},
   {art:emoji("🟣🟡🟢"),cap:"Kuch tiles khud SYMMETRICAL hoti hain, kuch nahi.",hi:"कुछ टाइलें खुद अपने आप में symmetrical होती हैं, और कुछ नहीं होतीं — दोनों तरह से सुंदर pattern बनते हैं।",en:"Some tiles are themselves symmetrical, and some are not — beautiful patterns are made with both kinds.",mr:"काही टाइल्स स्वतःच symmetrical असतात, आणि काही नसतात — दोन्ही प्रकारे सुंदर pattern तयार होतात.",dur:10500},
   {art:emoji("⚫⚫⚫"),cap:"Dot grid pe adhoori shape di jaati hai — usse symmetrical banao!",hi:"डॉट ग्रिड पर आधी shape दी जाती है — तुम्हें दूसरी आधी बनानी होती है ताकि पूरी shape symmetrical बन जाए।",en:"On a dot grid, half a shape is given — you have to draw the other half so the whole shape becomes symmetrical.",mr:"डॉट ग्रिडवर अर्धा आकार दिलेला असतो — तुम्हाला दुसरा अर्धा काढायचा असतो जेणेकरून पूर्ण आकार symmetrical होईल.",dur:11000},
   {art:emoji("🏛️🎭"),cap:"Symmetry hume rangoli, masks, buildings, aur strings mein bhi dikhti hai.",hi:"सिमेट्री हमें रोज़मर्रा की चीज़ों में भी दिखती है — रंगोली में, मास्क में, इमारतों में, और तोरण जैसी लड़ियों में।",en:"We see symmetry in everyday things too — in rangoli, masks, buildings, and decorative strings.",mr:"आपल्याला रोजच्या गोष्टींमध्येही symmetry दिसते — रांगोळीत, मुखवट्यांत, इमारतींत, आणि तोरणासारख्या माळांत.",dur:11500},
   {art:emoji("🍃🌸"),cap:"PROJECT TIME: nature walk pe jaakar leaves, petals, flowers collect karo!",hi:"अब एक प्रोजेक्ट टाइम है — अपने स्कूल के आसपास या किसी पार्क में टहलने जाओ और पत्तियाँ, पंखुड़ियाँ, और फूल इकट्ठा करो।",en:"Now it's project time — go for a walk around your school or a nearby park, and collect leaves, petals, and flowers.",mr:"आता एक प्रोजेक्ट टाइम आहे — तुमच्या शाळेभोवती किंवा जवळच्या पार्कमध्ये फिरायला जा आणि पाने, पाकळ्या, आणि फुले गोळा करा.",dur:12000},
   {art:emoji("🍁🍂"),cap:"Leaves ko SYMMETRICAL aur NON-SYMMETRICAL mein categorize karo.",hi:"इकट्ठा की गई पत्तियों को दो हिस्सों में बाँटो — symmetrical और non-symmetrical। ज़्यादातर पत्तियाँ symmetrical होती हैं!",en:"Divide the collected leaves into two groups — symmetrical and non-symmetrical. Most leaves turn out to be symmetrical!",mr:"गोळा केलेल्या पानांचे दोन गट करा — symmetrical आणि non-symmetrical. बहुतेक पाने symmetrical असतात!",dur:11000},
   {art:emoji("🌟🦋"),cap:"Yaad karo: line of symmetry, mirror image, aur tiling patterns!",hi:"चलो याद करते हैं — line of symmetry यानी सममिति रेखा, mirror image यानी दर्पण प्रतिबिंब, और tiling patterns।",en:"Let's recap — line of symmetry, mirror image, and tiling patterns.",mr:"चला आठवूया — line of symmetry म्हणजे सममिती रेषा, mirror image म्हणजे आरशातील प्रतिबिंब, आणि tiling patterns.",dur:10000},
   {art:emoji("🏆"),cap:"Shabaash! Ab tum symmetry expert ho gaye ho!",hi:"शाबाश दोस्तों! अब तुम symmetry के एक्सपर्ट बन गए हो। अपने आसपास symmetry ढूँढना कभी मत भूलना!",en:"Well done friends! Now you have become an expert in symmetry. Never forget to look for symmetry around you!",mr:"शाब्बास मित्रांनो! आता तुम्ही symmetry चे तज्ज्ञ झाला आहात. तुमच्या आजूबाजूला symmetry शोधायला कधीही विसरू नका!",dur:10500},
   {art:emoji("🎭"),cap:"Masks banate waqt bhi symmetry ka dhyan rakha jata hai.",hi:"मास्क बनाते समय भी कारीगर symmetry का ध्यान रखते हैं — दोनों तरफ की आँखें, कान बिल्कुल एक जैसे होने चाहिए।",en:"Even while making masks, artisans keep symmetry in mind — the eyes and ears on both sides should be exactly alike.",mr:"मुखवटे बनवतानाही कारागीर symmetry लक्षात ठेवतात — दोन्ही बाजूंचे डोळे, कान अगदी सारखे असावे लागतात.",dur:10500},
   {art:`<div style="font-size:60px">🕌</div>`,cap:"Taj Mahal duniya ki sabse mashhoor SYMMETRICAL building hai!",hi:"ताज महल दुनिया की सबसे मशहूर symmetrical इमारतों में से एक है। इसका बायाँ हिस्सा और दायाँ हिस्सा बिल्कुल एक जैसे हैं।",en:"The Taj Mahal is one of the most famous symmetrical buildings in the world. Its left side and right side are exactly alike.",mr:"ताजमहाल जगातील सर्वात प्रसिद्ध symmetrical इमारतींपैकी एक आहे. त्याची डावी बाजू आणि उजवी बाजू अगदी सारख्या आहेत.",dur:11500},
   {art:emoji("🌸"),cap:"Flower rangoli mein KAI (multiple) lines of symmetry hoti hain!",hi:"फूल के आकार वाली रंगोली में कई-कई लाइनें symmetry की होती हैं — जितनी पंखुड़ियाँ, उतनी लाइनें!",en:"A flower-shaped rangoli has many lines of symmetry — as many petals, that many lines!",mr:"फुलाच्या आकाराच्या रांगोळीत अनेक symmetry च्या रेषा असतात — जेवढ्या पाकळ्या, तेवढ्या रेषा!",dur:10500},
   {art:emoji("🪁"),cap:"Patang (kite) ki shape mein bhi symmetry dikhti hai.",hi:"पतंग यानी kite की shape में भी एक सीधी line of symmetry होती है — इसीलिए यह हवा में सीधी उड़ती है।",en:"The shape of a kite also has a straight line of symmetry — that is why it flies straight in the air.",mr:"पतंगाच्या आकारातही एक सरळ line of symmetry असते — म्हणूनच ते हवेत सरळ उडते.",dur:10500},
   {art:bigExpr("11, 18, 81, 88"),cap:"Numbers jinke sab digits 0,1,8 se bane hon, unka mirror image bhi wahi rehta hai.",hi:"जिन संख्याओं के सभी अंक शून्य, एक, या आठ से बने होते हैं, उनका मिरर इमेज भी वैसा ही रहता है — जैसे ग्यारह, अठारह।",en:"Numbers made entirely of the digits zero, one, or eight keep the same mirror image — like eleven, eighteen.",mr:"ज्या संख्यांचे सर्व अंक शून्य, एक, किंवा आठने बनलेले असतात, त्यांची मिरर इमेजही तशीच राहते — जसे अकरा, अठरा.",dur:12000},
   {art:emoji("📐"),cap:"SCALENE triangle (teeno sides alag) mein ZERO lines of symmetry hoti hain.",hi:"स्केलीन त्रिकोण, जिसकी तीनों भुजाएँ अलग-अलग होती हैं, उसमें symmetry की कोई भी लाइन नहीं होती — शून्य लाइनें!",en:"A scalene triangle, with all three sides different, has no line of symmetry at all — zero lines!",mr:"स्केलीन त्रिकोण, ज्याच्या तिन्ही बाजू वेगवेगळ्या असतात, त्याला symmetry ची एकही रेषा नसते — शून्य रेषा!",dur:11500},
   {art:bigExpr("Symmetry ≠ Just Pattern"),cap:"Symmetrical shape mein EQUAL MATCHING halves hote hain — har pattern symmetrical nahi hota.",hi:"याद रखो — symmetrical shape में दोनों हिस्से बिल्कुल बराबर और matching होते हैं। हर pattern symmetrical नहीं होता।",en:"Remember — a symmetrical shape has two halves that are exactly equal and matching. Not every pattern is symmetrical.",mr:"लक्षात ठेवा — symmetrical आकाराचे दोन्ही भाग अगदी समान आणि जुळणारे असतात. प्रत्येक pattern symmetrical नसतो.",dur:11500},
   {art:emoji("🎉🦋"),cap:"Bahut practice ho gayi! Ab symmetry ke saare concepts pakke hain!",hi:"बहुत सारी practice हो गई! अब symmetry के सारे concepts — lines, mirror, tiling, sab कुछ पक्का हो गया है!",en:"That was a lot of practice! Now all the concepts of symmetry — lines, mirrors, tiling, everything is solid!",mr:"खूप सराव झाला! आता symmetry चे सर्व concepts — रेषा, आरसा, टाइलिंग, सगळे पक्के झाले आहे!",dur:11000},

 {id:'clocks',title:'Ticking Clocks and Turning Calendar',emoji:'🕐',color:C.sky,scenes:[
   {art:emoji("🕐📅"),cap:"Chapter 12 — Ticking Clocks and Turning Calendar! Time aur dates ki duniya.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम बारहवाँ चॅप्टर सीखेंगे — टिकिंग क्लॉक्स एंड टर्निंग कैलेंडर। इसमें हम कैलेंडर और घड़ी दोनों के बारे में गहराई से सीखेंगे।",en:"Namaste friends! I am Gattu. Today we learn chapter twelve, Ticking Clocks and Turning Calendar. We will learn deeply about both calendars and clocks.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण बारावा धडा शिकू — टिकिंग क्लॉक्स अँड टर्निंग कॅलेंडर. यात आपण कॅलेंडर आणि घड्याळ दोन्हींबद्दल सखोल शिकू.",dur:11500},
   {art:bigExpr("7 Days<br>12 Months"),cap:"Calendar mein hote hain: 7 din, 12 mahine, aur ek saal.",hi:"कैलेंडर में होते हैं — सात दिन एक हफ्ते में, बारह महीने एक साल में।",en:"A calendar has seven days in a week, twelve months in a year.",mr:"कॅलेंडरमध्ये असतात — सात दिवस एका आठवड्यात, बारा महिने एका वर्षात.",dur:9500},
   {art:bigExpr("29 February"),cap:"LEAP YEAR: jis saal mein 29 February hoti hai!",hi:"लीप ईयर यानी अधिवर्ष — वह साल जिसमें उनतीस फरवरी की तारीख होती है।",en:"A leap year is a year that has the date twenty-nine February.",mr:"लीप ईयर म्हणजे अधिवर्ष — असे वर्ष ज्यात एकोणतीस फेब्रुवारी ही तारीख असते.",dur:9500},
   {art:bigExpr("365 + 1 = 366 days"),cap:"Leap year mein 1 EXTRA din hota hai — total 366 din!",hi:"लीप ईयर में एक अतिरिक्त दिन होता है, यानी उस साल में कुल तीन सौ छियासठ दिन होते हैं, न कि तीन सौ पैंसठ।",en:"A leap year has one extra day, meaning that year has three hundred sixty-six days in total, not three hundred sixty-five.",mr:"लीप ईयरमध्ये एक जास्तीचा दिवस असतो, म्हणजे त्या वर्षात एकूण तीनशे सहासष्ट दिवस असतात, तीनशे पासष्ट नाही.",dur:12000},
   {art:bigExpr("2016 → 2020 → 2024"),cap:"Leap years HAR 4 SAAL mein aate hain.",hi:"लीप ईयर हर चार साल में आते हैं — जैसे दो हज़ार सोलह, दो हज़ार बीस, दो हज़ार चौबीस।",en:"Leap years come every four years — like two thousand sixteen, two thousand twenty, two thousand twenty-four.",mr:"लीप ईयर दर चार वर्षांनी येतात — जसे दोन हजार सोळा, दोन हजार वीस, दोन हजार चोवीस.",dur:10500},
   {art:bigExpr("Feb 2024 = 29 days"),cap:"February 2024 mein 29 din the — kyunki 2024 leap year hai!",hi:"फरवरी दो हज़ार चौबीस में उनतीस दिन थे, क्योंकि दो हज़ार चौबीस एक लीप ईयर है।",en:"February two thousand twenty-four had twenty-nine days, because two thousand twenty-four is a leap year.",mr:"फेब्रुवारी दोन हजार चोवीसमध्ये एकोणतीस दिवस होते, कारण दोन हजार चोवीस हे लीप ईयर आहे.",dur:11000},
   {art:bigExpr("Feb 2025 = 28 days"),cap:"February 2025 mein sirf 28 din hain — normal year hai.",hi:"फरवरी दो हज़ार पच्चीस में सिर्फ अट्ठाईस दिन हैं, क्योंकि यह एक सामान्य साल है, लीप ईयर नहीं।",en:"February two thousand twenty-five has only twenty-eight days, because it is a normal year, not a leap year.",mr:"फेब्रुवारी दोन हजार पंचवीसमध्ये फक्त अठ्ठावीस दिवस आहेत, कारण हे एक सामान्य वर्ष आहे, लीप ईयर नाही.",dur:10500},
   {art:bigExpr("2016, 2020, 2024, 2028, 2032"),cap:"Consecutive leap years: 2016, 2020, 2024, 2028, 2032",hi:"लगातार आने वाले लीप ईयर हैं — दो हज़ार सोलह, बीस, चौबीस, अट्ठाईस, बत्तीस — हर बार चार जोड़ो।",en:"Consecutive leap years are two thousand sixteen, twenty, twenty-four, twenty-eight, thirty-two — add four each time.",mr:"सलग येणारी लीप ईयर्स आहेत — दोन हजार सोळा, वीस, चोवीस, अठ्ठावीस, बत्तीस — प्रत्येक वेळी चार जोडा.",dur:11500},
   {art:bigExpr("Sun Mon Tue Wed Thu Fri Sat"),cap:"Hafte ke 7 din: Sun, Mon, Tue, Wed, Thu, Fri, Sat.",hi:"हफ्ते के सात दिन होते हैं — रविवार, सोमवार, मंगलवार, बुधवार, गुरुवार, शुक्रवार, शनिवार।",en:"There are seven days in a week — Sunday, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday.",mr:"आठवड्यात सात दिवस असतात — रविवार, सोमवार, मंगळवार, बुधवार, गुरुवार, शुक्रवार, शनिवार.",dur:11000},
   {art:emoji("📅"),cap:"AAJ, KAL (yesterday), aur KAL (tomorrow) — Hindi mein dono 'kal'!",hi:"आज, बीता हुआ कल यानी yesterday, और आने वाला कल यानी tomorrow — इन तीनों को पहचानना सीखो।",en:"Today, yesterday, and tomorrow — learn to identify all three.",mr:"आज, गेलेला काल म्हणजे yesterday, आणि येणारा उद्या म्हणजे tomorrow — हे तिन्ही ओळखायला शिका.",dur:10500},
   {art:bigExpr("Today ± 2 days"),cap:"Day after tomorrow = aaj + 2 din. Day before yesterday = aaj − 2 din.",hi:"परसों यानी day after tomorrow का मतलब है आज से दो दिन आगे। और उससे पहले वाला परसों यानी day before yesterday, आज से दो दिन पीछे।",en:"Day after tomorrow means two days ahead of today. And day before yesterday means two days before today.",mr:"परवा म्हणजे day after tomorrow म्हणजे आजपासून दोन दिवस पुढे. आणि त्याआधीचा परवा म्हणजे day before yesterday, आजपासून दोन दिवस मागे.",dur:11500},
   {art:bigExpr("July 1 → +7 → July 8 → +7 → July 15"),cap:"July 1 Monday hai. Agla Monday? +7 din karo = July 8!",hi:"अगर एक जुलाई सोमवार है, तो अगला सोमवार कब होगा? सात दिन जोड़ो — आठ जुलाई! उसके बाद पंद्रह जुलाई।",en:"If July first is a Monday, when is the next Monday? Add seven days — July eighth! After that, July fifteenth.",mr:"जर एक जुलै सोमवार असेल, तर पुढचा सोमवार कधी? सात दिवस जोडा — आठ जुलै! त्यानंतर पंधरा जुलै.",dur:12500},
   {art:bigExpr("04/07/2024 = 4th July 2024"),cap:"Date likhne ka format: DD/MM/YYYY (Din/Mahina/Saal).",hi:"तारीख लिखने का तरीका है डी-डी स्लैश एम-एम स्लैश वाई-वाई-वाई-वाई, यानी पहले दिन, फिर महीना, फिर साल।",en:"The way to write a date is DD slash MM slash YYYY, meaning first the day, then the month, then the year.",mr:"तारीख लिहिण्याची पद्धत आहे DD स्लॅश MM स्लॅश YYYY, म्हणजे आधी दिवस, मग महिना, मग वर्ष.",dur:11000},
   {art:bigExpr("Laali: 2014<br>Chotu: 2019"),cap:"Laali born 04/07/2014, Chotu born 04/12/2019. Kaun bada hai?",hi:"लाली का जन्म चार जुलाई दो हज़ार चौदह को हुआ, और छोटू का जन्म चार दिसंबर दो हज़ार उन्नीस को। लाली बड़ी है, क्योंकि उसका जन्म पहले हुआ।",en:"Laali was born on the fourth of July two thousand fourteen, and Chotu was born on the fourth of December two thousand nineteen. Laali is older, since she was born earlier.",mr:"लालीचा जन्म चार जुलै दोन हजार चौदा रोजी झाला, आणि छोटूचा जन्म चार डिसेंबर दोन हजार एकोणीस रोजी. लाली मोठी आहे, कारण तिचा जन्म आधी झाला.",dur:13000},
   {art:emoji("🗓️"),cap:"Same date agle mahine mein different DAY pe padti hai!",hi:"अगर आज पंद्रह जुलाई एक खास दिन है, तो पंद्रह अगस्त उसी दिन नहीं पड़ेगा — क्योंकि हर महीने के दिनों की संख्या अलग होती है।",en:"If the fifteenth of July falls on a particular day, the fifteenth of August will not fall on the same day — because the number of days in each month is different.",mr:"जर आज पंधरा जुलै एक विशिष्ट दिवस आहे, तर पंधरा ऑगस्ट त्याच दिवशी येणार नाही — कारण प्रत्येक महिन्यातल्या दिवसांची संख्या वेगळी असते.",dur:12500},
   {art:emoji("📜"),cap:"India mein Hindu, Islamic, Sikh, aur kai calendars follow hote hain.",hi:"भारत में हिंदू, इस्लामिक, सिख, और कई अन्य कैलेंडर भी इस्तेमाल होते हैं — हर एक के अपने महीनों के नाम होते हैं।",en:"In India, Hindu, Islamic, Sikh, and many other calendars are also followed — each has its own month names.",mr:"भारतात हिंदू, इस्लामिक, शीख, आणि इतर अनेक कॅलेंडर वापरले जातात — प्रत्येकाची स्वतःची महिन्यांची नावे असतात.",dur:11500},
   {art:emoji("🌑🌕"),cap:"Kai calendars CHAND (moon) ke phases se chalte hain — naya chand, poora chand.",hi:"कई कैलेंडर चाँद के चरणों पर आधारित होते हैं — नया चाँद और पूरा चाँद, इनका एक तयशुदा पैटर्न होता है हर महीने।",en:"Many calendars are based on the phases of the moon — new moon and full moon follow a set pattern every month.",mr:"अनेक कॅलेंडर चंद्राच्या टप्प्यांवर आधारित असतात — नवा चंद्र आणि पूर्ण चंद्र, यांचा दर महिन्याला ठराविक पॅटर्न असतो.",dur:11500},
   {art:emoji("🍪"),cap:"Biscuit packet pe MANUFACTURING aur EXPIRY dates hoti hain.",hi:"किसी भी बिस्किट के पैकेट पर बनने की तारीख यानी manufacturing date, और खत्म होने की तारीख यानी expiry date लिखी होती है।",en:"Every biscuit packet has a manufacturing date and an expiry date written on it.",mr:"कोणत्याही बिस्किटाच्या पाकिटावर बनवण्याची तारीख म्हणजे manufacturing date, आणि संपण्याची तारीख म्हणजे expiry date लिहिलेली असते.",dur:11000},
   {art:emoji("📆➖"),cap:"In dono dates ko subtract karke pata karo packet kitna PURANA hai.",hi:"दोनों तारीखों को घटाकर हम पता लगा सकते हैं कि पैकेट कितना पुराना है, और खाने के लिए कितने दिन बाकी हैं।",en:"By subtracting the two dates, we can find out how old the packet is, and how many days are left to eat it.",mr:"दोन्ही तारखा वजा करून आपण शोधू शकतो की पाकिट किती जुने आहे, आणि खाण्यासाठी किती दिवस बाकी आहेत.",dur:11500},
   {art:bigExpr("Jan → Dec (12 months)"),cap:"12 mahine yaad karo: Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec.",hi:"साल के बारह महीने याद करो — जनवरी से लेकर दिसंबर तक।",en:"Remember the twelve months of the year — from January to December.",mr:"वर्षातील बारा महिने आठवा — जानेवारी ते डिसेंबरपर्यंत.",dur:10000},
   {art:bigExpr("1 Day = 24 Hours"),cap:"Ek din mein 24 GHANTE (hours) hote hain.",hi:"एक पूरे दिन में चौबीस घंटे होते हैं — आधी रात से लेकर अगली आधी रात तक।",en:"There are twenty-four hours in one full day — from midnight to the next midnight.",mr:"एका पूर्ण दिवसात चोवीस तास असतात — मध्यरात्रीपासून पुढच्या मध्यरात्रीपर्यंत.",dur:10500},
   {art:emoji("🕐👩‍⚕️"),cap:"Doctor ka pura din: wake up, hospital, dinner — sab ek circular clock mein!",hi:"किसी डॉक्टर का पूरा दिन एक गोल घड़ी पर दिखाया जा सकता है — जागना, अस्पताल जाना, खाना, सोना — हर गतिविधि का अपना समय।",en:"A doctor's whole day can be shown on a circular clock — waking up, going to hospital, eating, sleeping — each activity has its own time.",mr:"डॉक्टरचा पूर्ण दिवस एका गोल घड्याळावर दाखवता येतो — उठणे, हॉस्पिटलला जाणे, जेवणे, झोपणे — प्रत्येक कृतीची स्वतःची वेळ.",dur:12500},
   {art:bigExpr("AM = Midnight → Noon"),cap:"AM = midnight se noon tak (12:00 raat se 12:00 dopahar tak).",hi:"ए-एम यानी AM का मतलब है आधी रात से दोपहर तक का समय — जैसे सुबह के आठ बजे।",en:"AM means the time from midnight to noon — like eight o'clock in the morning.",mr:"AM म्हणजे मध्यरात्रीपासून दुपारपर्यंतची वेळ — जसे सकाळचे आठ वाजता.",dur:10500},
   {art:bigExpr("PM = Noon → Midnight"),cap:"PM = noon se midnight tak (12:00 dopahar se 12:00 raat tak).",hi:"पी-एम यानी PM का मतलब है दोपहर से आधी रात तक का समय — जैसे शाम के आठ बजे।",en:"PM means the time from noon to midnight — like eight o'clock in the evening.",mr:"PM म्हणजे दुपारपासून मध्यरात्रीपर्यंतची वेळ — जसे संध्याकाळचे आठ वाजता.",dur:10500},
   {art:bigExpr("8:00 AM ≠ 8:00 PM"),cap:"8:00 AM (subah) aur 8:00 PM (raat) — clock pe SAME dikhta hai, par alag hota hai!",hi:"सुबह के आठ बजे और रात के आठ बजे — घड़ी पर दोनों एक जैसे दिखते हैं, पर असल में बिल्कुल अलग समय हैं।",en:"Eight in the morning and eight at night — both look the same on the clock, but are actually completely different times.",mr:"सकाळचे आठ वाजता आणि रात्रीचे आठ वाजता — घड्याळावर दोन्ही सारखेच दिसतात, पण प्रत्यक्षात पूर्णपणे वेगळी वेळ आहे.",dur:11500},
   {art:emoji("⏰"),cap:"DIGITAL clocks 24-hour format use karti hain — confusion khatam!",hi:"डिजिटल घड़ियाँ चौबीस घंटे वाला फॉर्मेट इस्तेमाल करती हैं, जिससे AM-PM का कोई कन्फ्यूज़न नहीं रहता।",en:"Digital clocks use the twenty-four-hour format, so there is no confusion between AM and PM.",mr:"डिजिटल घड्याळे चोवीस तासांचे फॉरमॅट वापरतात, त्यामुळे AM-PM चा कोणताही गोंधळ राहत नाही.",dur:11000},
   {art:bigExpr("08:00 = 8AM<br>20:00 = 8PM"),cap:"08:00 = 8 AM (subah). 20:00 = 8 PM (raat)!",hi:"चौबीस घंटे वाली घड़ी में शून्य आठ शून्य शून्य का मतलब सुबह के आठ बजे, और बीस शून्य शून्य का मतलब रात के आठ बजे।",en:"On a twenty-four-hour clock, zero-eight-zero-zero means eight in the morning, and twenty-zero-zero means eight at night.",mr:"चोवीस तासांच्या घड्याळात शून्य-आठ-शून्य-शून्य म्हणजे सकाळचे आठ वाजता, आणि वीस-शून्य-शून्य म्हणजे रात्रीचे आठ वाजता.",dur:12000},
   {art:bigExpr("12:00 AM = 00:00"),cap:"MIDNIGHT (raat 12 baje) = 12:00 AM = 00:00 hours",hi:"आधी रात यानी बारह बजे रात को कहते हैं बारह बजे ए-एम, या चौबीस घंटे वाली घड़ी में शून्य-शून्य शून्य-शून्य।",en:"Midnight, that is twelve o'clock at night, is called twelve AM, or zero-zero-zero-zero in the twenty-four-hour clock.",mr:"मध्यरात्र म्हणजे रात्री बारा वाजता याला म्हणतात बारा AM, किंवा चोवीस तासांच्या घड्याळात शून्य-शून्य-शून्य-शून्य.",dur:12000},
   {art:bigExpr("12:00 PM = 12:00"),cap:"NOON (dopahar 12 baje) = 12:00 PM = 12:00 hours",hi:"दोपहर के बारह बजे को कहते हैं बारह बजे पी-एम, और चौबीस घंटे वाली घड़ी में भी यह बारह-शून्य-शून्य ही रहता है।",en:"Twelve o'clock in the afternoon is called twelve PM, and in the twenty-four-hour clock it also stays twelve-zero-zero.",mr:"दुपारी बारा वाजता याला म्हणतात बारा PM, आणि चोवीस तासांच्या घड्याळातही ते बारा-शून्य-शून्यच राहते.",dur:11500},
   {art:bigExpr("1:00 PM + 12 = 13:00"),cap:"PM times ke liye 24-hour format mein 12 JODO (except 12 PM)!",hi:"पी-एम वाले समय को चौबीस घंटे वाले फॉर्मेट में बदलने के लिए, बारह जोड़ दो — जैसे एक बजे पी-एम बनता है तेरह बजे। सिर्फ बारह बजे पी-एम वैसा ही रहता है।",en:"To convert PM times into twenty-four-hour format, add twelve — for example, one PM becomes thirteen hundred. Only twelve PM stays the same.",mr:"PM वेळ चोवीस तासांच्या फॉरमॅटमध्ये बदलण्यासाठी, बारा जोडा — उदाहरणार्थ, एक PM होते तेरा. फक्त बारा PM तसेच राहते.",dur:13000},
   {art:bigExpr("3PM=15:00<br>5:20PM=17:20<br>11:45PM=23:45"),cap:"3:00 PM = 15:00. 5:20 PM = 17:20. 11:45 PM = 23:45.",hi:"तीन बजे पी-एम बनता है पंद्रह बजे। पाँच बीस पी-एम बनता है सत्रह बीस। और ग्यारह पैंतालीस पी-एम बनता है तेईस पैंतालीस।",en:"Three PM becomes fifteen hundred. Five twenty PM becomes seventeen twenty. And eleven forty-five PM becomes twenty-three forty-five.",mr:"तीन PM होते पंधरा. पाच वीस PM होते सतरा वीस. आणि अकरा पंचेचाळीस PM होते तेवीस पंचेचाळीस.",dur:13000},
   {art:bigExpr("1 Hour = 60 Minutes"),cap:"1 HOUR = 60 MINUTES — yaad rakhna zaroori hai!",hi:"एक घंटा बराबर होता है साठ मिनट के — यह याद रखना बहुत ज़रूरी है।",en:"One hour equals sixty minutes — this is very important to remember.",mr:"एक तास म्हणजे साठ मिनिटे — हे लक्षात ठेवणे खूप महत्त्वाचे आहे.",dur:9500},
   {art:bigExpr("½ Hour = 30 Minutes"),cap:"HALF HOUR = 30 MINUTES (aadha ghanta)",hi:"आधा घंटा बराबर होता है तीस मिनट के।",en:"Half an hour equals thirty minutes.",mr:"अर्धा तास म्हणजे तीस मिनिटे.",dur:8500},
   {art:bigExpr("¼ Hour = 15 Minutes"),cap:"QUARTER HOUR = 15 MINUTES (ek chauthai ghanta)",hi:"एक चौथाई घंटा बराबर होता है पंद्रह मिनट के।",en:"A quarter of an hour equals fifteen minutes.",mr:"एक चतुर्थांश तास म्हणजे पंधरा मिनिटे.",dur:8500},
   {art:bigExpr("¾ Hour = 45 Minutes"),cap:"THREE QUARTERS = 45 MINUTES (teen chauthai ghanta)",hi:"तीन चौथाई घंटा बराबर होता है पैंतालीस मिनट के।",en:"Three quarters of an hour equals forty-five minutes.",mr:"तीन चतुर्थांश तास म्हणजे पंचेचाळीस मिनिटे.",dur:8500},
   {art:bigExpr("8:35 − 8:20 = 15 min"),cap:"Raghav 8:20 pe nikla, 8:35 pe wapas aaya. Kitna time laga?",hi:"राघव सुबह आठ बीस पर घर से निकला और आठ पैंतीस पर वापस आया। उसे कितना समय लगा? पंद्रह मिनट!",en:"Raghav left at eight twenty and returned at eight thirty-five. How much time did he take? Fifteen minutes!",mr:"राघव सकाळी आठ वीसला निघाला आणि आठ पस्तीसला परत आला. त्याला किती वेळ लागला? पंधरा मिनिटे!",dur:11500},
   {art:bigExpr("10:20 + 25 min = 10:45"),cap:"Homework 10:20 AM shuru, 25 min laga. Khatam kab hua?",hi:"होमवर्क सुबह दस बीस पर शुरू हुआ, और पूरा होने में पच्चीस मिनट लगे। तो होमवर्क कब खत्म हुआ? दस पैंतालीस पर!",en:"Homework started at ten twenty AM, and took twenty-five minutes to finish. So when did the homework finish? At ten forty-five!",mr:"होमवर्क सकाळी दहा वीसला सुरू झाले, आणि पूर्ण होण्यास पंचवीस मिनिटे लागली. तर होमवर्क कधी संपले? दहा पंचेचाळीसला!",dur:12500},
   {art:bigExpr("4:15 PM + 45 min = 5:00 PM"),cap:"Story 4:15 PM shuru, 45 min laga. Khatam kab hua?",hi:"कहानी पढ़ना शाम चार पंद्रह पर शुरू हुआ, और पैंतालीस मिनट लगे। तो कहानी कब खत्म हुई? पाँच बजे शाम को!",en:"Story reading started at four fifteen PM, and took forty-five minutes. So when did the story finish? At five o'clock in the evening!",mr:"गोष्ट वाचणे संध्याकाळी चार पंधराला सुरू झाले, आणि पंचेचाळीस मिनिटे लागली. तर गोष्ट कधी संपली? संध्याकाळी पाच वाजता!",dur:12500},
   {art:bigExpr("8:00 → +15 → 8:15 → +15 → 8:30"),cap:"School journey: 8:00 start, +15 min reach, +15 min assembly khatam...",hi:"स्कूल जाने में — आठ बजे निकलना, पंद्रह मिनट बाद स्कूल पहुँचना, फिर पंद्रह मिनट बाद असेंबली खत्म होना — हर step में समय जोड़ते जाओ।",en:"For the school journey — leaving at eight, reaching school after fifteen minutes, then assembly finishing fifteen minutes after that — keep adding time at each step.",mr:"शाळेत जाण्यासाठी — आठ वाजता निघणे, पंधरा मिनिटांनी शाळेत पोहोचणे, मग पंधरा मिनिटांनी असेंब्ली संपणे — प्रत्येक टप्प्यावर वेळ जोडत जा.",dur:13000},
   {art:emoji("🕐❓"),cap:"Clock padhne mein GALTI ho sakti hai — minute hand ko dhyan se dekho!",hi:"घड़ी पढ़ते समय गलती हो सकती है — minute hand यानी मिनट की सुई को ध्यान से देखो, वह किस अंक के पास है।",en:"Mistakes can happen while reading a clock — look carefully at the minute hand, which number it is close to.",mr:"घड्याळ वाचताना चूक होऊ शकते — मिनिट काटा नीट पाहा, तो कोणत्या आकड्याजवळ आहे.",dur:11500},
   {art:emoji("🤔🕐"),cap:"3 dost ek clock alag padhte hain — sirf EK sahi hai!",hi:"तीन दोस्त एक ही घड़ी को अलग-अलग तरीके से पढ़ते हैं — पर सही जवाब सिर्फ एक ही होता है, ध्यान से देखने पर पता चलता है।",en:"Three friends read the same clock differently — but only one answer is correct, which you find by looking carefully.",mr:"तीन मित्र एकाच घड्याळाला वेगवेगळ्या पद्धतीने वाचतात — पण बरोबर उत्तर फक्त एकच असते, नीट पाहिल्यावर कळते.",dur:12000},
   {art:bigExpr("1 Hour ≡ 60 Min"),cap:"1 GHANTA aur 60 MINUTES — ye dono SAME cheez hain!",hi:"एक घंटा और साठ मिनट — ये दोनों एक ही समय दर्शाते हैं, बस लिखने का तरीका अलग है।",en:"One hour and sixty minutes — both represent the same amount of time, just written differently.",mr:"एक तास आणि साठ मिनिटे — दोन्ही एकाच वेळेचे प्रतिनिधित्व करतात, फक्त लिहिण्याची पद्धत वेगळी आहे.",dur:10500},
   {art:emoji("🥛⏱️"),cap:"Roz ki activities ka time estimate karo — doodh ubalna, bucket bharna.",hi:"रोज़ की गतिविधियों का समय अंदाज़ा लगाना सीखो — जैसे दूध उबालने में कितना समय लगता है, या बाल्टी भरने में।",en:"Learn to estimate the time for everyday activities — like how long it takes to boil milk, or fill a bucket.",mr:"रोजच्या कृतींसाठी वेळेचा अंदाज लावायला शिका — जसे दूध उकळायला किती वेळ लागतो, किंवा बादली भरायला.",dur:11500},
   {art:emoji("⏱️🤔"),cap:"5 minute mein kya-kya kar sakte ho? Sochkar batao!",hi:"पाँच मिनट में तुम कौन-कौन सी गतिविधियाँ कर सकते हो? सोचकर बताओ!",en:"What all activities can you do in five minutes? Think and tell!",mr:"पाच मिनिटांत तुम्ही कोणकोणत्या कृती करू शकता? विचार करून सांगा!",dur:9500},
   {art:emoji("🌟⏰"),cap:"Yaad karo: AM = subah, PM = shaam-raat. 24-hour clock mein PM = +12.",hi:"चलो याद करते हैं — ए-एम मतलब सुबह, पी-एम मतलब शाम-रात। चौबीस घंटे वाली घड़ी में पी-एम के लिए बारह जोड़ो।",en:"Let's recap — AM means morning, PM means evening-night. In the twenty-four-hour clock, add twelve for PM.",mr:"चला आठवूया — AM म्हणजे सकाळ, PM म्हणजे संध्याकाळ-रात्र. चोवीस तासांच्या घड्याळात PM साठी बारा जोडा.",dur:11000},
   {art:emoji("🌟📅"),cap:"Yaad karo: leap year = 366 din, har 4 saal mein aata hai.",hi:"चलो याद करते हैं — लीप ईयर में तीन सौ छियासठ दिन होते हैं, और यह हर चार साल में आता है।",en:"Let's recap — a leap year has three hundred sixty-six days, and it comes every four years.",mr:"चला आठवूया — लीप ईयरमध्ये तीनशे सहासष्ट दिवस असतात, आणि ते दर चार वर्षांनी येते.",dur:10500},
   {art:bigExpr("60, 30, 15 min"),cap:"Yaad karo: 1 hour=60 min, ½ hour=30 min, ¼ hour=15 min.",hi:"चलो याद करते हैं — एक घंटा साठ मिनट का, आधा घंटा तीस मिनट का, और एक चौथाई घंटा पंद्रह मिनट का।",en:"Let's recap — one hour is sixty minutes, half an hour is thirty minutes, and a quarter hour is fifteen minutes.",mr:"चला आठवूया — एक तास साठ मिनिटांचा, अर्धा तास तीस मिनिटांचा, आणि पाव तास पंधरा मिनिटांचा.",dur:11000},
   {art:emoji("🏆🕐📅"),cap:"Shabaash! Ab tum clocks aur calendars dono ke expert ho gaye ho!",hi:"शाबाश दोस्तों! अब तुम घड़ी और कैलेंडर, दोनों के एक्सपर्ट बन गए हो। समय और तारीखों का हिसाब अब तुम्हें आ गया है!",en:"Well done friends! Now you have become an expert in both clocks and calendars. You now know how to work out time and dates!",mr:"शाब्बास मित्रांनो! आता तुम्ही घड्याळ आणि कॅलेंडर, दोन्हींचे तज्ज्ञ झाला आहात. वेळ आणि तारखांचा हिशोब आता तुम्हाला येतो!",dur:11500},
