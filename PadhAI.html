 {id:'transport',title:'The Transport Museum',emoji:'🚂',color:C.coral,scenes:[
   {art:emoji("🚂"),cap:"Chapter 13 — The Transport Museum! Multiplication aur division ke saath safar.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम तेरहवाँ चॅप्टर सीखेंगे — द ट्रांसपोर्ट म्यूज़ियम। अमाला, राही और फ़रज़ान एक ट्रांसपोर्ट म्यूज़ियम घूमने जाते हैं, और इस सफर में हम गुणा और भाग सीखेंगे।",en:"Namaste friends! I am Gattu. Today we learn chapter thirteen, The Transport Museum. Amala, Raahi and Farzan visit a transport museum, and on this journey we will learn multiplication and division.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण तेरावा धडा शिकू — द ट्रान्सपोर्ट म्युझियम. अमाला, राही आणि फरझान एक ट्रान्सपोर्ट म्युझियम पाहायला जातात, आणि या प्रवासात आपण गुणाकार आणि भागाकार शिकू.",dur:12500},
   {art:emoji("🚌✈️🚢"),cap:"Transport museum mein purane zamane ki gaadiyan, plane, ship sab hain.",hi:"इस म्यूज़ियम में भारत में इस्तेमाल हुए अलग-अलग तरह के वाहन रखे हैं — पुराने ज़माने की गाड़ियाँ, हवाई जहाज़, और जहाज़ भी।",en:"This museum has different modes of transport used in India — old vehicles, aeroplanes, and even ships.",mr:"या म्युझियममध्ये भारतात वापरलेली वेगवेगळी वाहने ठेवली आहेत — जुन्या काळातल्या गाड्या, विमाने, आणि जहाजेही.",dur:10500},
   {art:emoji("🔢"),cap:"Yaad karo: MULTIPLICATION = barabar groups ka fatafat jod.",hi:"याद करो — गुणा यानी multiplication का मतलब है बराबर समूहों को जल्दी से जोड़ना।",en:"Remember — multiplication means quickly adding equal groups.",mr:"आठवा — गुणाकार म्हणजे multiplication म्हणजे समान गटांना पटकन जोडणे.",dur:9000},
   {art:bigExpr("Times-15 table"),cap:"Times-15 table banao: 1×15=15, 2×15=30, 3×15=45...",hi:"पंद्रह का पहाड़ा बनाते हैं — एक पंद्रहा पंद्रह, दो पंद्रहा तीस, तीन पंद्रहा पैंतालीस, और ऐसे ही आगे।",en:"Let's build the fifteen times table — one fifteen is fifteen, two fifteens are thirty, three fifteens are forty-five, and so on.",mr:"पंधराचा पाढा बनवू — एक पंधरा पंधरा, दोन पंधरा तीस, तीन पंधरा पंचेचाळीस, आणि असेच पुढे.",dur:11500},
   {art:bigExpr("15 = 10 + 5"),cap:"Trick: 15 ko 10 aur 5 mein todo — counting aasan!",hi:"एक आसान तरीका — पंद्रह को दस और पाँच में बाँट दो। फिर दस का पहाड़ा और पाँच का पहाड़ा जोड़कर पंद्रह का पहाड़ा बन जाता है।",en:"An easy way — split fifteen into ten and five. Then add the ten times table and five times table to make the fifteen times table.",mr:"एक सोपा मार्ग — पंधराला दहा आणि पाच मध्ये विभागा. मग दहाचा पाढा आणि पाचचा पाढा जोडून पंधराचा पाढा बनतो.",dur:12000},
   {art:bigExpr("15-table = 5-table doubled + more"),cap:"Times-15 aur Times-5 compare karo — pattern dikhega!",hi:"पंद्रह के पहाड़े को पाँच के पहाड़े से मिलाओ — तुम्हें एक मज़ेदार पैटर्न दिखेगा। पंद्रह के जवाब हमेशा पाँच के जवाब से तीन गुना होते हैं।",en:"Compare the fifteen times table with the five times table — you'll see a fun pattern. The fifteen answers are always three times the five answers.",mr:"पंधराचा पाढा पाचच्या पाढ्याशी तुलना करा — तुम्हाला एक मजेशीर पॅटर्न दिसेल. पंधराची उत्तरे नेहमी पाचच्या उत्तरांच्या तिप्पट असतात.",dur:12500},
   {art:bigExpr("3×14 = 3×7 + 3×7"),cap:"SPLITTING: 3×14 ko 2 barabar groups mein todo = 3×7 + 3×7.",hi:"बड़े गुणा को आसान बनाने का तरीका — बाँटना यानी splitting। तीन गुणा चौदह को दो बराबर हिस्सों में बाँटो — तीन गुणा सात, और फिर तीन गुणा सात।",en:"A way to make big multiplication easy — splitting. Split three times fourteen into two equal parts — three times seven, and again three times seven.",mr:"मोठा गुणाकार सोपा करण्याचा मार्ग — विभागणे म्हणजे splitting. तीन गुणिले चौदाला दोन समान भागांत विभागा — तीन गुणिले सात, आणि पुन्हा तीन गुणिले सात.",dur:13000},
   {art:bigExpr("3×14 = 21 + 21 = 42"),cap:"3×7=21, to 3×14 = 21+21 = 42. Double of 21!",hi:"तीन गुणा सात बराबर इक्कीस। तो तीन गुणा चौदह बराबर इक्कीस जोड़ इक्कीस, यानी बयालीस। यह इक्कीस का दोगुना है!",en:"Three times seven is twenty-one. So three times fourteen is twenty-one plus twenty-one, which is forty-two. It is the double of twenty-one!",mr:"तीन गुणिले सात बरोबर एकवीस. तर तीन गुणिले चौदा बरोबर एकवीस अधिक एकवीस, म्हणजे बेचाळीस. हे एकविसाच्या दुप्पट आहे!",dur:12500},
   {art:bigExpr("6×14 = double of 6×7"),cap:"6×14 = 6×7 ka double = 84. Splitting aur doubling saath!",hi:"इसी तरह छह गुणा चौदह, छह गुणा सात का दोगुना होता है। छह गुणा सात बराबर बयालीस, तो छह गुणा चौदह बराबर चौरासी।",en:"Similarly, six times fourteen is the double of six times seven. Six times seven is forty-two, so six times fourteen is eighty-four.",mr:"त्याचप्रमाणे सहा गुणिले चौदा, सहा गुणिले सातच्या दुप्पट असतो. सहा गुणिले सात बरोबर बेचाळीस, तर सहा गुणिले चौदा बरोबर चौऱ्याऐंशी.",dur:12500},
   {art:bigExpr("10 Tens = 100"),cap:"MULTIPLES OF 10: 10 Tens ko jodo = 1 Hundred = 100!",hi:"दस के गुणज सीखते हैं। जब दस दहाई को जोड़ते हैं, तो बनता है एक सैकड़ा, यानी सौ।",en:"Let's learn multiples of ten. When we put ten tens together, it makes one hundred.",mr:"दहाचे गुणक शिकू. जेव्हा दहा दशक एकत्र करतो, तेव्हा बनतो एक शतक, म्हणजे शंभर.",dur:10500},
   {art:bigExpr("14×10 = 14 Tens = 140"),cap:"14×10 = 14 Tens = 140. Number ke aage ek 0 lagao!",hi:"चौदह गुणा दस बराबर चौदह दहाई, यानी एक सौ चालीस। किसी भी संख्या को दस से गुणा करने पर, बस उसके आगे एक शून्य लगा दो।",en:"Fourteen times ten is fourteen tens, which is one hundred forty. To multiply any number by ten, just add a zero after it.",mr:"चौदा गुणिले दहा बरोबर चौदा दशक, म्हणजे एकशे चाळीस. कोणत्याही संख्येला दहाने गुणण्यासाठी, फक्त तिच्या पुढे एक शून्य लावा.",dur:12500},
   {art:bigExpr("26×10 = 260"),cap:"26×10 = 26 Tens = 20 Tens + 6 Tens = 200 + 60 = 260",hi:"छब्बीस गुणा दस बराबर छब्बीस दहाई। इसे तोड़ो — बीस दहाई और छह दहाई, यानी दो सौ और साठ, बराबर दो सौ साठ।",en:"Twenty-six times ten is twenty-six tens. Split it — twenty tens and six tens, that is two hundred and sixty, equals two hundred sixty.",mr:"सव्वीस गुणिले दहा बरोबर सव्वीस दशक. याला विभागा — वीस दशक आणि सहा दशक, म्हणजे दोनशे आणि साठ, बरोबर दोनशे साठ.",dur:13000},
   {art:bigExpr("12×20 = 240"),cap:"12×20: 20 = 2 Tens. 12×20 = 12×2 Tens = 24 Tens = 240.",hi:"बारह गुणा बीस। बीस बराबर दो दहाई। तो बारह गुणा बीस बराबर बारह गुणा दो दहाई, यानी चौबीस दहाई, यानी दो सौ चालीस।",en:"Twelve times twenty. Twenty is two tens. So twelve times twenty is twelve times two tens, that is twenty-four tens, which is two hundred forty.",mr:"बारा गुणिले वीस. वीस म्हणजे दोन दशक. तर बारा गुणिले वीस बरोबर बारा गुणिले दोन दशक, म्हणजे चोवीस दशक, म्हणजे दोनशे चाळीस.",dur:13000},
   {art:bigExpr("10 Hundreds = 1000"),cap:"MULTIPLES OF 100: 10 Hundreds ko jodo = 1000!",hi:"अब सौ के गुणज। जब दस सैकड़ा जोड़ते हैं, तो बनता है एक हज़ार।",en:"Now multiples of hundred. When we put ten hundreds together, it makes one thousand.",mr:"आता शंभरचे गुणक. जेव्हा दहा शतक एकत्र करतो, तेव्हा बनतो एक हजार.",dur:9500},
   {art:bigExpr("20×100 = 2000"),cap:"20×100 = 20 Hundreds = 2×1000 = 2000",hi:"बीस गुणा सौ बराबर बीस सैकड़ा। दस सैकड़ा एक हज़ार होता है, तो बीस सैकड़ा बराबर दो हज़ार।",en:"Twenty times hundred is twenty hundreds. Ten hundreds make one thousand, so twenty hundreds is two thousand.",mr:"वीस गुणिले शंभर बरोबर वीस शतक. दहा शतक एक हजार होतो, तर वीस शतक बरोबर दोन हजार.",dur:11500},
   {art:bigExpr("N×100 = N ke aage do 0"),cap:"Trick: kisi number ko 100 se guna karo = aage do zero lagao!",hi:"एक आसान ट्रिक — किसी भी संख्या को सौ से गुणा करने के लिए, बस उसके आगे दो शून्य लगा दो। जैसे तीस गुणा सौ बराबर तीन हज़ार।",en:"An easy trick — to multiply any number by hundred, just add two zeros after it. Like thirty times hundred is three thousand.",mr:"एक सोपी युक्ती — कोणत्याही संख्येला शंभरने गुणण्यासाठी, फक्त तिच्या पुढे दोन शून्य लावा. जसे तीस गुणिले शंभर बरोबर तीन हजार.",dur:12000},
   {art:bigExpr("80×100 = 8000"),cap:"80×100 = 8000. 40×50 = 2000. Zeros ka kamaal!",hi:"अस्सी गुणा सौ बराबर आठ हज़ार। और चालीस गुणा पचास बराबर दो हज़ार। शून्यों का इस्तेमाल करके बड़े गुणा भी आसान हो जाते हैं।",en:"Eighty times hundred is eight thousand. And forty times fifty is two thousand. Using zeros, even big multiplications become easy.",mr:"ऐंशी गुणिले शंभर बरोबर आठ हजार. आणि चाळीस गुणिले पन्नास बरोबर दोन हजार. शून्यांचा वापर करून मोठे गुणाकारही सोपे होतात.",dur:12500},
   {art:bigExpr("11×200 = 2200"),cap:"11×200 = 11×2 Hundreds = 22 Hundreds = 2200",hi:"ग्यारह गुणा दो सौ। दो सौ बराबर दो सैकड़ा। तो ग्यारह गुणा दो सैकड़ा बराबर बाईस सैकड़ा, यानी दो हज़ार दो सौ।",en:"Eleven times two hundred. Two hundred is two hundreds. So eleven times two hundreds is twenty-two hundreds, which is two thousand two hundred.",mr:"अकरा गुणिले दोनशे. दोनशे म्हणजे दोन शतक. तर अकरा गुणिले दोन शतक बरोबर बावीस शतक, म्हणजे दोन हजार दोनशे.",dur:13000},
   {art:bigExpr("15×14 = 210"),cap:"Toy train: 15 coaches, har coach mein 14 bacche. Total?",hi:"राही एक टॉय ट्रेन देखती है। उसमें पंद्रह डिब्बे हैं, और हर डिब्बे में चौदह बच्चे बैठ सकते हैं। तो कुल कितने बच्चे बैठ सकते हैं? पंद्रह गुणा चौदह।",en:"Raahi sees a toy train. It has fifteen coaches, and each coach can seat fourteen children. So how many children can sit in total? Fifteen times fourteen.",mr:"राही एक टॉय ट्रेन पाहते. त्यात पंधरा डबे आहेत, आणि प्रत्येक डब्यात चौदा मुले बसू शकतात. तर एकूण किती मुले बसू शकतात? पंधरा गुणिले चौदा.",dur:13500},
   {art:bigExpr("15×14 = 100+40+50+20 = 210"),cap:"Box method: 15×14 = (10+5)×(10+4) = 100+40+50+20 = 210!",hi:"बड़े गुणा के लिए बॉक्स तरीका। पंद्रह को दस और पाँच में, चौदह को दस और चार में तोड़ो। फिर चारों गुणा करो — सौ, चालीस, पचास, बीस — सब जोड़ो, बराबर दो सौ दस।",en:"The box method for big multiplication. Split fifteen into ten and five, fourteen into ten and four. Then multiply all four — hundred, forty, fifty, twenty — add them all, equals two hundred ten.",mr:"मोठ्या गुणाकारासाठी बॉक्स पद्धत. पंधराला दहा आणि पाच मध्ये, चौदाला दहा आणि चार मध्ये विभागा. मग चारही गुणा करा — शंभर, चाळीस, पन्नास, वीस — सर्व जोडा, बरोबर दोनशे दहा.",dur:14000},
   {art:emoji("🚆"),cap:"15 coaches mein 210 bacche baith sakte hain!",hi:"तो पंद्रह डिब्बों वाली टॉय ट्रेन में कुल दो सौ दस बच्चे बैठ सकते हैं।",en:"So in the toy train with fifteen coaches, a total of two hundred ten children can sit.",mr:"तर पंधरा डब्यांच्या टॉय ट्रेनमध्ये एकूण दोनशे दहा मुले बसू शकतात.",dur:9500},
   {art:bigExpr("64×152 = 9728"),cap:"Vande Bharat: 64 flights, har mein 152 log. Box method se solve!",hi:"वंदे भारत मिशन में चौंसठ उड़ानें थीं, और हर उड़ान में एक सौ बावन लोग थे। बॉक्स तरीके से — चौंसठ गुणा एक सौ बावन बराबर नौ हज़ार सात सौ अट्ठाईस लोग।",en:"In the Vande Bharat mission there were sixty-four flights, and each flight carried one hundred fifty-two people. By the box method — sixty-four times one hundred fifty-two is nine thousand seven hundred twenty-eight people.",mr:"वंदे भारत मिशनमध्ये चौसष्ट उड्डाणे होती, आणि प्रत्येक उड्डाणात एकशे बावन्न लोक होते. बॉक्स पद्धतीने — चौसष्ट गुणिले एकशे बावन्न बरोबर नऊ हजार सातशे अठ्ठावीस लोक.",dur:14500},
   {art:emoji("➗"),cap:"Ab DIVISION seekhte hain — barabar hisso mein baatna.",hi:"अब भाग यानी division सीखते हैं। भाग का मतलब है किसी चीज़ को बराबर हिस्सों में बाँटना, या यह पता लगाना कि कितने बराबर समूह बनेंगे।",en:"Now let's learn division. Division means sharing something into equal parts, or finding out how many equal groups can be made.",mr:"आता भागाकार म्हणजे division शिकू. भागाकार म्हणजे एखादी गोष्ट समान भागांत वाटणे, किंवा किती समान गट बनतील हे शोधणे.",dur:12000},
   {art:bigExpr("324 ÷ 14 = ?"),cap:"324 bacche, har coach mein 14. Kitne coaches chahiye?",hi:"राही सोचती है — अगर उसके स्कूल से तीन सौ चौबीस बच्चे जाएँ, और हर डिब्बे में सिर्फ चौदह बच्चे बैठें, तो कितने डिब्बे चाहिए? तीन सौ चौबीस भाग चौदह।",en:"Raahi wonders — if three hundred twenty-four children go from her school, and each coach seats only fourteen, how many coaches are needed? Three hundred twenty-four divided by fourteen.",mr:"राही विचार करते — जर तिच्या शाळेतून तीनशे चोवीस मुले गेली, आणि प्रत्येक डब्यात फक्त चौदा बसली, तर किती डबे लागतील? तीनशे चोवीस भागिले चौदा.",dur:14000},
   {art:bigExpr("324 → −140 → −140 → −14 → −28"),cap:"Repeated subtraction: 14 ke bade groups baar-baar ghatao.",hi:"भाग करने का एक तरीका — बार-बार घटाना। पहले चौदह के दस गुना यानी एक सौ चालीस घटाओ, फिर से एक सौ चालीस, फिर चौदह, फिर अट्ठाईस — हर बार गिनते जाओ कितने डिब्बे लगे।",en:"One way to divide — repeated subtraction. First subtract ten times fourteen, that is one hundred forty, then again one hundred forty, then fourteen, then twenty-eight — each time count how many coaches were used.",mr:"भागाकाराचा एक मार्ग — वारंवार वजाबाकी. आधी चौदाच्या दहापट म्हणजे एकशे चाळीस वजा करा, मग पुन्हा एकशे चाळीस, मग चौदा, मग अठ्ठावीस — प्रत्येक वेळी किती डबे लागले ते मोजा.",dur:15000},
   {art:bigExpr("324 ÷ 14 = 23, remainder 2"),cap:"324 ÷ 14 = 23 coaches, aur 2 bacche bach jaate hain!",hi:"तीन सौ चौबीस भाग चौदह बराबर तेईस डिब्बे, और दो बच्चे बच जाते हैं। इन दो बचे हुए बच्चों के लिए एक और डिब्बा चाहिए होगा।",en:"Three hundred twenty-four divided by fourteen is twenty-three coaches, and two children are left over. These two leftover children will need one more coach.",mr:"तीनशे चोवीस भागिले चौदा बरोबर तेवीस डबे, आणि दोन मुले उरतात. या दोन उरलेल्या मुलांसाठी आणखी एक डबा लागेल.",dur:14000},
   {art:bigExpr("Bacha hua number = REMAINDER"),cap:"Division mein jo number bach jaata hai use REMAINDER kehte hain.",hi:"भाग में जो संख्या बच जाती है, उसे शेषफल यानी remainder कहते हैं। यहाँ शेषफल दो है।",en:"The number that is left over in a division is called the remainder. Here the remainder is two.",mr:"भागाकारात जी संख्या उरते, तिला शेष म्हणजे remainder म्हणतात. इथे शेष दोन आहे.",dur:10500},
   {art:bigExpr("960 ÷ 64 = 15"),cap:"960 log, har boat mein 64. 960 ÷ 64 = 15 boats, remainder 0!",hi:"एक नाव दौड़ में नौ सौ साठ लोग थे, और हर नाव में चौंसठ लोग बैठते हैं। नौ सौ साठ भाग चौंसठ बराबर पंद्रह नावें, और शेषफल शून्य — कोई नहीं बचा!",en:"In a boat race there were nine hundred sixty people, and each boat holds sixty-four. Nine hundred sixty divided by sixty-four is fifteen boats, and the remainder is zero — none left over!",mr:"एका नावेच्या शर्यतीत नऊशे साठ लोक होते, आणि प्रत्येक नावेत चौसष्ट बसतात. नऊशे साठ भागिले चौसष्ट बरोबर पंधरा नावा, आणि शेष शून्य — कोणीही उरले नाही!",dur:14000},
   {art:bigExpr("60 ÷ 10 = 6"),cap:"DIVIDING BY 10: 60 kg rice, 10 kg per sack = 6 sacks.",hi:"दस से भाग करना सीखते हैं। एक किसान के पास साठ किलो चावल है, और हर बोरी में दस किलो आता है। तो साठ भाग दस बराबर छह बोरियाँ चाहिए।",en:"Let's learn dividing by ten. A farmer has sixty kilograms of rice, and each sack holds ten kilograms. So sixty divided by ten is six sacks needed.",mr:"दहाने भाग करणे शिकू. एका शेतकऱ्याकडे साठ किलो तांदूळ आहे, आणि प्रत्येक पोत्यात दहा किलो येतो. तर साठ भागिले दहा बरोबर सहा पोती लागतील.",dur:13000},
   {art:bigExpr("600 ÷ 10 = 60"),cap:"Trick: 10 se bhaag = number ka aakhri 0 hata do!",hi:"एक आसान ट्रिक — किसी संख्या को दस से भाग देने के लिए, बस उसके आखिर का एक शून्य हटा दो। जैसे छह सौ भाग दस बराबर साठ।",en:"An easy trick — to divide a number by ten, just remove one zero from the end. Like six hundred divided by ten is sixty.",mr:"एक सोपी युक्ती — कोणत्याही संख्येला दहाने भागण्यासाठी, फक्त तिच्या शेवटचे एक शून्य काढा. जसे सहाशे भागिले दहा बरोबर साठ.",dur:12500},
   {art:bigExpr("600 ÷ 100 = 6"),cap:"DIVIDING BY 100: aakhri ke DO zero hata do!",hi:"इसी तरह, सौ से भाग देने के लिए आखिर के दो शून्य हटा दो। छह सौ भाग सौ बराबर छह।",en:"Similarly, to divide by hundred, remove two zeros from the end. Six hundred divided by hundred is six.",mr:"त्याचप्रमाणे, शंभरने भागण्यासाठी शेवटचे दोन शून्य काढा. सहाशे भागिले शंभर बरोबर सहा.",dur:11000},
   {art:bigExpr("40÷10=4<br>400÷10=40<br>400÷100=4"),cap:"Pattern: 400÷10=40, par 400÷100=4. Zero count matter karta hai!",hi:"एक पैटर्न देखो — चार सौ भाग दस बराबर चालीस, पर चार सौ भाग सौ बराबर सिर्फ चार। कितने शून्य हटाने हैं, इसका ध्यान रखो।",en:"See a pattern — four hundred divided by ten is forty, but four hundred divided by hundred is just four. Keep track of how many zeros to remove.",mr:"एक पॅटर्न पाहा — चारशे भागिले दहा बरोबर चाळीस, पण चारशे भागिले शंभर बरोबर फक्त चार. किती शून्य काढायचे याकडे लक्ष द्या.",dur:13000},
   {art:emoji("🍌"),cap:"870 kele, har bunch mein 10. 870 ÷ 10 = 87 bunches!",hi:"मंकू बंदर बाज़ार में आठ सौ सत्तर केले देखता है, और हर गुच्छे में दस केले हैं। तो आठ सौ सत्तर भाग दस बराबर सत्तासी गुच्छे।",en:"Manku the monkey sees eight hundred seventy bananas in the market, and each bunch has ten bananas. So eight hundred seventy divided by ten is eighty-seven bunches.",mr:"मंकू माकड बाजारात आठशे सत्तर केळी पाहतो, आणि प्रत्येक घडात दहा केळी आहेत. तर आठशे सत्तर भागिले दहा बरोबर सत्त्याऐंशी घड.",dur:13000},
   {art:bigExpr("1000 ÷ 10 = 100"),cap:"Rukhma Bi ₹1000 ko 10 grandchildren mein baante = ₹100 each.",hi:"रुखमा बी ईद पर एक हज़ार रुपये अपने दस पोते-पोतियों में बराबर बाँटना चाहती हैं। एक हज़ार भाग दस बराबर सौ रुपये हर एक को।",en:"Rukhma Bi wants to share one thousand rupees equally among her ten grandchildren on Eid. One thousand divided by ten is one hundred rupees each.",mr:"रुखमा बी ईदला एक हजार रुपये आपल्या दहा नातवंडांमध्ये समान वाटू इच्छितात. एक हजार भागिले दहा बरोबर शंभर रुपये प्रत्येकाला.",dur:13000},
   {art:emoji("🚂"),cap:"Punjab Mail: 6 coaches mein 3 carrying 96 passengers each.",hi:"भारत की सबसे पुरानी ट्रेन पंजाब मेल में शुरू में छह डिब्बे थे — तीन में यात्री, हर एक में छियानवे, और तीन सामान के लिए। तो कुल दो सौ अट्ठासी यात्री।",en:"India's oldest train, Punjab Mail, first had six coaches — three carrying passengers, ninety-six each, and three for goods. So a total of two hundred eighty-eight passengers.",mr:"भारतातील सर्वात जुनी ट्रेन पंजाब मेलमध्ये सुरुवातीला सहा डबे होते — तीन प्रवासी, प्रत्येकात शहाण्णव, आणि तीन सामानासाठी. तर एकूण दोनशे अठ्ठ्याऐंशी प्रवासी.",dur:14000},
   {art:bigExpr("24 coaches × 72 = 1728"),cap:"Ab 24 coaches, har mein 72 passengers = 1728 log!",hi:"अब वही ट्रेन एक सौ छह साल से चल रही है, और इसमें चौबीस डिब्बे हैं। हर डिब्बे में बहत्तर यात्री बैठते हैं। तो चौबीस गुणा बहत्तर बराबर एक हज़ार सात सौ अट्ठाईस लोग।",en:"Now that same train has been running for one hundred six years, and it has twenty-four coaches. Each coach seats seventy-two passengers. So twenty-four times seventy-two is one thousand seven hundred twenty-eight people.",mr:"आता तीच ट्रेन एकशे सहा वर्षे चालत आहे, आणि तिच्यात चोवीस डबे आहेत. प्रत्येक डब्यात बहात्तर प्रवासी बसतात. तर चोवीस गुणिले बहात्तर बरोबर एक हजार सातशे अठ्ठावीस लोक.",dur:14500},
   {art:emoji("🧱"),cap:"Brick kiln: 125 bricks per day. Ek mahine (30 din) mein?",hi:"केदार एक ईंट भट्ठे में काम करता है। भट्ठा एक दिन में एक सौ पच्चीस ईंटें बनाता है। तो एक महीने यानी तीस दिन में — एक सौ पच्चीस गुणा तीस बराबर तीन हज़ार सात सौ पचास ईंटें।",en:"Kedar works in a brick kiln. The kiln makes one hundred twenty-five bricks a day. So in a month, that is thirty days — one hundred twenty-five times thirty is three thousand seven hundred fifty bricks.",mr:"केदार एका वीटभट्टीत काम करतो. भट्टी एका दिवसात एकशे पंचवीस विटा बनवते. तर एका महिन्यात म्हणजे तीस दिवसांत — एकशे पंचवीस गुणिले तीस बरोबर तीन हजार सातशे पन्नास विटा.",dur:14500},
   {art:emoji("🚌"),cap:"Vehicles ki capacity: cycle 1, auto 3, car 5, bus zyada!",hi:"हर वाहन में अलग-अलग लोग बैठते हैं — साइकिल में एक, ऑटो में तीन, कार में पाँच, और बस में बहुत ज़्यादा। कुल लोग निकालने के लिए गुणा करो।",en:"Each vehicle holds a different number of people — one on a cycle, three in an auto, five in a car, and many more in a bus. To find total people, multiply.",mr:"प्रत्येक वाहनात वेगवेगळे लोक बसतात — सायकलवर एक, ऑटोत तीन, कारमध्ये पाच, आणि बसमध्ये खूप जास्त. एकूण लोक काढण्यासाठी गुणा करा.",dur:12500},
   {art:bigExpr("75 cycles × 1 = 75"),cap:"75 cycles, har mein 1 person = 75 log.",hi:"पचहत्तर साइकिलें, हर एक में एक व्यक्ति, तो कुल पचहत्तर लोग।",en:"Seventy-five cycles, one person each, so a total of seventy-five people.",mr:"पंच्याहत्तर सायकली, प्रत्येकात एक व्यक्ती, तर एकूण पंच्याहत्तर लोक.",dur:9500},
   {art:bigExpr("Half & Double: 12×14 = 6×28"),cap:"Chinnu's coins: half karo ek number, double karo doosra — product same!",hi:"एक मज़ेदार पैटर्न — अगर एक संख्या को आधा करो और दूसरी को दोगुना, तो गुणा का जवाब वही रहता है। जैसे बारह गुणा चौदह बराबर छह गुणा अट्ठाईस।",en:"A fun pattern — if you halve one number and double the other, the product stays the same. Like twelve times fourteen equals six times twenty-eight.",mr:"एक मजेशीर पॅटर्न — जर एका संख्येला निम्मे करा आणि दुसरीला दुप्पट, तर गुणाकाराचे उत्तर तेच राहते. जसे बारा गुणिले चौदा बरोबर सहा गुणिले अठ्ठावीस.",dur:13500},
   {art:emoji("💰"),cap:"₹750 ticket: ₹200 notes se, ₹50 notes se — kitne chahiye?",hi:"पाँच दोस्तों को साढ़े सात सौ रुपये का टिकट खरीदना है। बुज्जी के पास दो सौ के नोट हैं, मुन्ना के पास पचास के। सबको अलग-अलग गिनना होगा कि कितने नोट चाहिए।",en:"Five friends need to buy a ticket of seven hundred fifty rupees. Bujji has two hundred rupee notes, Munna has fifty rupee notes. Each must figure out how many notes are needed.",mr:"पाच मित्रांना साडेसातशे रुपयांचे तिकीट घ्यायचे आहे. बुज्जीकडे दोनशेच्या नोटा आहेत, मुन्नाकडे पन्नासच्या. प्रत्येकाला किती नोटा लागतील हे वेगळे मोजावे लागेल.",dur:14500},
   {art:bigExpr("750 ÷ 200 → remainder!"),cap:"₹200 notes se ₹750 poora nahi banta — change ki zaroorat!",hi:"साढ़े सात सौ रुपये को दो सौ के नोटों से पूरा नहीं बना सकते, क्योंकि भाग में शेषफल बचता है। जिनके पास ऐसे नोट हैं, उन्हें छुट्टे पैसे यानी change चाहिए होंगे।",en:"Seven hundred fifty rupees cannot be made exactly with two hundred rupee notes, because division leaves a remainder. Those with such notes will need change.",mr:"साडेसातशे रुपये दोनशेच्या नोटांनी अगदी बरोबर बनवता येत नाही, कारण भागाकारात शेष उरतो. ज्यांच्याकडे अशा नोटा आहेत, त्यांना सुटे पैसे म्हणजे change लागेल.",dur:14000},
   {art:emoji("🪙"),cap:"₹5 coins aur ₹2 coins se exact ₹750 ban sakta hai (no change)!",hi:"पर जिनके पास पाँच रुपये और दो रुपये के सिक्के हैं, वे बिल्कुल साढ़े सात सौ रुपये बना सकते हैं, बिना किसी change के। बस सिक्के गिनने में समय लगेगा!",en:"But those with five rupee and two rupee coins can make exactly seven hundred fifty rupees, without any change. It will just take time to count the coins!",mr:"पण ज्यांच्याकडे पाच रुपये आणि दोन रुपयांची नाणी आहेत, ते अगदी साडेसातशे रुपये बनवू शकतात, कोणत्याही change शिवाय. फक्त नाणी मोजायला वेळ लागेल!",dur:14000},
   {art:emoji("🎯🚂"),cap:"Yaad karo: guna ke liye splitting/box method, bhaag ke liye repeated subtraction.",hi:"चलो याद करते हैं — बड़े गुणा के लिए बॉक्स तरीका या splitting इस्तेमाल करो। और बड़े भाग के लिए बार-बार घटाना, और शेषफल यानी remainder का ध्यान रखो।",en:"Let's recap — for big multiplication use the box method or splitting. And for big division use repeated subtraction, and watch for the remainder.",mr:"चला आठवूया — मोठ्या गुणाकारासाठी बॉक्स पद्धत किंवा splitting वापरा. आणि मोठ्या भागाकारासाठी वारंवार वजाबाकी, आणि शेष म्हणजे remainder कडे लक्ष द्या.",dur:14000},
   {art:bigExpr("×10 → +1 zero<br>×100 → +2 zero"),cap:"Yaad karo: ×10 = ek 0 lagao, ×100 = do 0. ÷10 = ek 0 hatao.",hi:"चलो याद करते हैं — दस से गुणा में एक शून्य लगाओ, सौ से गुणा में दो शून्य। और दस से भाग में एक शून्य हटाओ, सौ से भाग में दो शून्य हटाओ।",en:"Let's recap — multiplying by ten add one zero, by hundred add two zeros. And dividing by ten remove one zero, by hundred remove two zeros.",mr:"चला आठवूया — दहाने गुणाकारात एक शून्य लावा, शंभरने गुणाकारात दोन शून्य. आणि दहाने भागाकारात एक शून्य काढा, शंभरने भागाकारात दोन शून्य काढा.",dur:14000},
   {art:emoji("🏆🚂"),cap:"Shabaash! Ab tum multiplication aur division dono ke champion ho!",hi:"शाबाश दोस्तों! अब तुम गुणा और भाग, दोनों के चैंपियन बन गए हो। ट्रांसपोर्ट म्यूज़ियम घूमते-घूमते बहुत कुछ सीखा — बड़े numbers का हिसाब अब तुम्हारे हाथ में है!",en:"Well done friends! Now you have become a champion in both multiplication and division. You learned so much touring the transport museum — big number calculations are now in your hands!",mr:"शाब्बास मित्रांनो! आता तुम्ही गुणाकार आणि भागाकार, दोन्हींचे चॅम्पियन झाला आहात. ट्रान्सपोर्ट म्युझियम फिरता फिरता खूप काही शिकलात — मोठ्या numbers चा हिशोब आता तुमच्या हातात आहे!",dur:14000},

 {id:'data',title:'Data Handling',emoji:'📊',color:C.mint,scenes:[
   {art:emoji("📊"),cap:"Chapter 14 — Data Handling! Jaankari (information) ko organize karna seekhenge.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम आखिरी चॅप्टर सीखेंगे — डेटा हैंडलिंग। इसमें हम सीखेंगे कि जानकारी यानी information को कैसे इकट्ठा करते हैं, व्यवस्थित करते हैं, और उससे कुछ समझते हैं।",en:"Namaste friends! I am Gattu. Today we learn the last chapter, Data Handling. We will learn how to collect information, organise it, and understand things from it.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण शेवटचा धडा शिकू — डेटा हँडलिंग. यात आपण शिकू की माहिती म्हणजे information कशी गोळा करायची, व्यवस्थित करायची, आणि त्यातून काहीतरी समजून घ्यायचे.",dur:13000},
   {art:bigExpr("DATA = Information"),cap:"DATA matlab jaankari — numbers, naam, ya koi bhi information.",hi:"डेटा का मतलब है जानकारी — जैसे संख्याएँ, नाम, या किसी भी तरह की सूचना जो हम इकट्ठा करते हैं।",en:"Data means information — like numbers, names, or any kind of information we collect.",mr:"डेटा म्हणजे माहिती — जसे संख्या, नावे, किंवा कोणत्याही प्रकारची माहिती जी आपण गोळा करतो.",dur:10000},
   {art:emoji("🙋"),cap:"Data collect karne ke liye ek achha SAWAAL poochna zaroori hai.",hi:"डेटा इकट्ठा करने के लिए सबसे पहले एक अच्छा सवाल पूछना ज़रूरी है — जो साफ हो और सही जवाब दिलाए।",en:"To collect data, first it is important to ask a good question — one that is clear and gets the right answer.",mr:"डेटा गोळा करण्यासाठी सर्वात आधी एक चांगला प्रश्न विचारणे महत्त्वाचे आहे — जो स्पष्ट असेल आणि योग्य उत्तर देईल.",dur:11000},
   {art:bigExpr("Kaunsa subject sabse pasand?"),cap:"Achha sawaal: 'Tumhe kaunsa 1 subject SABSE zyada pasand hai?'",hi:"जैसे — तुम्हें कौन सा एक विषय सबसे ज़्यादा पसंद है? यह एक अच्छा सवाल है, क्योंकि इसमें हर बच्चा सिर्फ एक जवाब देगा, जिससे गिनती आसान हो जाती है।",en:"For example — which one subject do you like the most? This is a good question, because each child gives only one answer, which makes counting easy.",mr:"जसे — तुला कोणता एक विषय सर्वात जास्त आवडतो? हा एक चांगला प्रश्न आहे, कारण यात प्रत्येक मूल फक्त एक उत्तर देईल, ज्यामुळे मोजणी सोपी होते.",dur:13000},
   {art:emoji("❓"),cap:"Bura sawaal: 'Tumhe kaunse subjects pasand hain?' — kai jawab aa jaayenge!",hi:"पर अगर पूछें — तुम्हें कौन-कौन से विषय पसंद हैं? तो हर बच्चा कई जवाब देगा, और गिनती उलझ जाएगी। इसीलिए सही शब्दों वाला सवाल चुनना ज़रूरी है।",en:"But if we ask — which subjects do you like? Then each child gives many answers, and counting gets confusing. That is why choosing a question with the right words matters.",mr:"पण जर विचारले — तुला कोणकोणते विषय आवडतात? तर प्रत्येक मूल अनेक उत्तरे देईल, आणि मोजणी गोंधळेल. म्हणूनच योग्य शब्द असलेला प्रश्न निवडणे महत्त्वाचे आहे.",dur:13500},
   {art:emoji("✏️"),cap:"Data record karne ke liye SHORT FORM use karo: M, L, T, A, P.E.",hi:"डेटा जल्दी लिखने के लिए छोटे रूप यानी short form इस्तेमाल करते हैं। जैसे M मैथ्स के लिए, L भाषा के लिए, A आर्ट्स के लिए।",en:"To record data quickly, we use short forms. Like M for Maths, L for Languages, A for Arts.",mr:"डेटा पटकन लिहिण्यासाठी लहान रूप म्हणजे short form वापरतो. जसे M गणितासाठी, L भाषेसाठी, A कलेसाठी.",dur:11000},
   {art:bigExpr("45 responses"),cap:"Class ke 45 bachchon ke jawab record kiye — ye hai RAW DATA.",hi:"अंजली और रोहन ने अपनी क्लास के पैंतालीस बच्चों के जवाब लिख लिए। इस बिना व्यवस्थित की गई जानकारी को कच्चा डेटा यानी raw data कहते हैं।",en:"Anjali and Rohan recorded the answers of forty-five children in their class. This unorganised information is called raw data.",mr:"अंजली आणि रोहनने त्यांच्या वर्गातील पंचेचाळीस मुलांची उत्तरे लिहून घेतली. या अव्यवस्थित माहितीला कच्चा डेटा म्हणजे raw data म्हणतात.",dur:13000},
   {art:emoji("😵"),cap:"Raw data (M, L, T, A, P.E. bikhre hue) samajhna MUSHKIL hai.",hi:"कच्चा डेटा जब बिखरा हुआ हो — M, L, T, A सब मिले-जुले — तो उसे देखकर कुछ समझना मुश्किल होता है। किसका जवाब सबसे ज़्यादा है, यह पता नहीं चलता।",en:"When raw data is scattered — M, L, T, A all mixed up — it is hard to understand anything from it. You can't tell which answer is the most common.",mr:"कच्चा डेटा जेव्हा विखुरलेला असतो — M, L, T, A सगळे मिसळलेले — तेव्हा त्यातून काही समजणे कठीण असते. कोणाचे उत्तर सर्वात जास्त आहे हे कळत नाही.",dur:13000},
   {art:emoji("📋"),cap:"Isliye data ko ORGANISE karo — ek TABLE banao!",hi:"इसीलिए हम डेटा को व्यवस्थित करते हैं — एक तालिका यानी table बनाकर। इसमें हर विषय के सामने उसकी गिनती लिख देते हैं।",en:"That is why we organise the data — by making a table. In it, we write the count in front of each subject.",mr:"म्हणूनच आपण डेटा व्यवस्थित करतो — एक तक्ता म्हणजे table बनवून. यात प्रत्येक विषयासमोर त्याची मोजणी लिहितो.",dur:11500},
   {art:emoji("✓"),cap:"TALLY MARKS: har jawab ke liye ek line (|), 5 pe cross (卌).",hi:"गिनती करने का एक आसान तरीका है टैली मार्क्स। हर जवाब के लिए एक खड़ी लाइन बनाओ, और पाँचवीं पर आड़ी काट दो। इससे पाँच-पाँच के समूह में गिनना आसान हो जाता है।",en:"An easy way to count is tally marks. Draw a line for each answer, and cross it at the fifth. This makes it easy to count in groups of five.",mr:"मोजण्याचा एक सोपा मार्ग म्हणजे टॅली मार्क्स. प्रत्येक उत्तरासाठी एक उभी रेषा काढा, आणि पाचव्याला आडवी कापा. यामुळे पाच-पाचच्या गटात मोजणे सोपे होते.",dur:13000},
   {art:emoji("📊"),cap:"Table se ab aasani se pata chalta hai — kaunsa subject sabse pasand.",hi:"तालिका बनाने के बाद अब आसानी से पता चल जाता है कि कौन सा विषय सबसे ज़्यादा पसंद किया गया, और कौन सा सबसे कम।",en:"After making the table, now we can easily tell which subject was liked the most, and which the least.",mr:"तक्ता बनवल्यानंतर आता सहज कळते की कोणता विषय सर्वात जास्त आवडला, आणि कोणता सर्वात कमी.",dur:11000},
   {art:bigExpr("MOST = sabse zyada"),cap:"MOST COMMON = jiski ginti sabse zyada ho.",hi:"सबसे आम यानी most common वह होता है जिसकी गिनती सबसे ज़्यादा हो। जैसे अगर मैथ्स को सबसे ज़्यादा बच्चों ने चुना, तो मैथ्स सबसे आम पसंद है।",en:"Most common is the one with the highest count. Like if Maths was chosen by the most children, then Maths is the most common favourite.",mr:"सर्वात सामान्य म्हणजे most common तो असतो ज्याची मोजणी सर्वात जास्त असते. जसे जर गणित सर्वात जास्त मुलांनी निवडले, तर गणित सर्वात सामान्य आवड आहे.",dur:12500},
   {art:bigExpr("LEAST = sabse kam"),cap:"LEAST COMMON = jiski ginti sabse kam ho.",hi:"सबसे कम आम यानी least common वह होता है जिसकी गिनती सबसे कम हो।",en:"Least common is the one with the lowest count.",mr:"सर्वात कमी सामान्य म्हणजे least common तो असतो ज्याची मोजणी सर्वात कमी असते.",dur:9500},
   {art:emoji("🧊"),cap:"COLOURFUL GOLAS: har bachche ne kaunse colour ka gola khaya, record karo.",hi:"अब एक और उदाहरण — रंगीन गोले। स्कूल की छुट्टी में बच्चे अपने पसंदीदा रंग का गोला खाते हैं। रोहन और अंजली ने रिकॉर्ड किया कि किसने कौन से रंग का गोला खाया।",en:"Now another example — colourful golas. During the school break, children eat a gola of their favourite colour. Rohan and Anjali recorded who ate which colour gola.",mr:"आता आणखी एक उदाहरण — रंगीत गोळे. शाळेच्या सुट्टीत मुले त्यांच्या आवडत्या रंगाचा गोळा खातात. रोहन आणि अंजलीने कोणी कोणत्या रंगाचा गोळा खाल्ला हे नोंदवले.",dur:14000},
   {art:emoji("🖍️"),cap:"Line drawing ko colour karke bhi data dikha sakte hain.",hi:"डेटा दिखाने का एक तरीका यह भी है — गोलों के चित्र बनाकर उन्हें सही रंग से भर दो। जितने ज़्यादा गोले उस रंग के, उतना पसंदीदा।",en:"One way to show data is this — draw pictures of golas and fill them with the right colour. The more golas of a colour, the more popular it is.",mr:"डेटा दाखवण्याचा एक मार्ग हाही आहे — गोळ्यांची चित्रे काढून त्यांना योग्य रंगाने भरा. जितके जास्त गोळे त्या रंगाचे, तितका आवडता.",dur:12500},
   {art:emoji("🖼️"),cap:"PICTOGRAPH: pictures se data dikhana. Har picture ek cheez!",hi:"चित्रों से डेटा दिखाने के तरीके को चित्रालेख यानी pictograph कहते हैं। इसमें हर छोटी तस्वीर किसी एक चीज़ को दर्शाती है।",en:"Showing data with pictures is called a pictograph. In it, each small picture represents one thing.",mr:"चित्रांनी डेटा दाखवण्याच्या पद्धतीला चित्रालेख म्हणजे pictograph म्हणतात. यात प्रत्येक लहान चित्र एका गोष्टीचे प्रतिनिधित्व करते.",dur:12000},
   {art:emoji("🍽️"),cap:"BAL MELA: 3 din tak fruit chaat aur sandwich bike — pictograph mein.",hi:"बाल मेले में तीन दिन तक फ्रूट चाट और सैंडविच बिके। अंजली और रोहन ने इसे चित्रालेख यानी pictograph में दर्ज किया — हर तस्वीर एक बिकी हुई चीज़ को दिखाती है।",en:"At the Bal Mela, fruit chaat and sandwiches were sold over three days. Anjali and Rohan recorded it in a pictograph — each picture shows one item sold.",mr:"बाल मेळ्यात तीन दिवस फ्रूट चाट आणि सँडविच विकले गेले. अंजली आणि रोहनने ते चित्रालेखात म्हणजे pictograph मध्ये नोंदवले — प्रत्येक चित्र एक विकलेली वस्तू दाखवते.",dur:14000},
   {art:emoji("🔢"),cap:"Pictograph se ginti karo: har din kitne bike, total kitne.",hi:"चित्रालेख से हम आसानी से गिन सकते हैं — किस दिन कितने बिके, और तीनों दिन मिलाकर कुल कितने। बस तस्वीरें गिनो।",en:"From a pictograph we can easily count — how many were sold each day, and the total across all days. Just count the pictures.",mr:"चित्रालेखातून आपण सहज मोजू शकतो — कोणत्या दिवशी किती विकले, आणि तिन्ही दिवस मिळून एकूण किती. फक्त चित्रे मोजा.",dur:12000},
   {art:emoji("📈"),cap:"Data se COMPARE karo: kaunse din sabse zyada sale hui?",hi:"डेटा से हम तुलना यानी compare भी कर सकते हैं — किस दिन सबसे ज़्यादा बिक्री हुई, किस चीज़ की माँग सबसे ज़्यादा थी।",en:"From data we can also compare — which day had the most sales, which item was in most demand.",mr:"डेटावरून आपण तुलनाही म्हणजे compare करू शकतो — कोणत्या दिवशी सर्वात जास्त विक्री झाली, कोणत्या वस्तूची मागणी सर्वात जास्त होती.",dur:11500},
   {art:emoji("♟️"),cap:"CHESS ya CRICKET: kaun sirf chess, kaun sirf cricket, kaun dono, kaun koi nahi.",hi:"एक और मज़ेदार activity — शतरंज या क्रिकेट। पता करो कि तुम्हारे कितने साथी सिर्फ शतरंज खेलते हैं, कितने सिर्फ क्रिकेट, कितने दोनों, और कितने कोई नहीं।",en:"Another fun activity — chess or cricket. Find out how many of your classmates play only chess, only cricket, both, or neither.",mr:"आणखी एक मजेशीर activity — बुद्धिबळ किंवा क्रिकेट. शोधा की तुमचे किती वर्गमित्र फक्त बुद्धिबळ खेळतात, किती फक्त क्रिकेट, किती दोन्ही, आणि किती काहीच नाही.",dur:14000},
   {art:bigExpr("Chess only | Cricket only<br>Both | Neither"),cap:"4 categories: sirf chess, sirf cricket, dono, koi nahi.",hi:"इस डेटा को चार श्रेणियों में बाँटते हैं — सिर्फ शतरंज, सिर्फ क्रिकेट, दोनों, और कोई नहीं। फिर हर श्रेणी में लड़के और लड़कियों की गिनती अलग-अलग करते हैं।",en:"We divide this data into four categories — only chess, only cricket, both, and neither. Then we count boys and girls separately in each category.",mr:"हा डेटा चार श्रेणींत विभागतो — फक्त बुद्धिबळ, फक्त क्रिकेट, दोन्ही, आणि काहीच नाही. मग प्रत्येक श्रेणीत मुले आणि मुलींची मोजणी वेगळी करतो.",dur:14000},
   {art:emoji("👦👧"),cap:"Boys aur girls ka data alag-alag likhkar compare kar sakte hain.",hi:"लड़कों और लड़कियों का डेटा अलग-अलग लिखने से हम तुलना कर सकते हैं — जैसे शतरंज लड़के ज़्यादा खेलते हैं या लड़कियाँ।",en:"By writing boys' and girls' data separately, we can compare — like whether boys or girls play chess more.",mr:"मुले आणि मुलींचा डेटा वेगळा लिहिल्याने आपण तुलना करू शकतो — जसे बुद्धिबळ मुले जास्त खेळतात की मुली.",dur:12000},
   {art:emoji("💡"),cap:"Data handling ke 3 steps: 1) Collect karo, 2) Organise karo, 3) Samjho.",hi:"डेटा हैंडलिंग के तीन मुख्य चरण हैं — पहला, डेटा इकट्ठा करो। दूसरा, उसे तालिका या चित्रालेख में व्यवस्थित करो। और तीसरा, उससे नतीजे निकालो और समझो।",en:"There are three main steps in data handling — first, collect the data. Second, organise it in a table or pictograph. And third, draw conclusions and understand from it.",mr:"डेटा हँडलिंगचे तीन मुख्य टप्पे आहेत — पहिला, डेटा गोळा करा. दुसरा, तो तक्त्यात किंवा चित्रालेखात व्यवस्थित करा. आणि तिसरा, त्यातून निष्कर्ष काढा आणि समजून घ्या.",dur:14500},
   {art:emoji("📝"),cap:"Ek achhe sawaal mein OPTIONS bhi saaf hone chahiye.",hi:"अच्छा सवाल पूछते समय विकल्प यानी options भी साफ होने चाहिए। जैसे विषयों की एक तयशुदा सूची दे दो, ताकि हर बच्चा उसी में से चुने।",en:"When asking a good question, the options should also be clear. Like give a fixed list of subjects, so every child chooses from that list.",mr:"चांगला प्रश्न विचारताना पर्याय म्हणजे options ही स्पष्ट असावेत. जसे विषयांची एक ठराविक यादी द्या, जेणेकरून प्रत्येक मूल त्यातूनच निवडेल.",dur:12000},
   {art:emoji("🔢📋"),cap:"Har response ke saamne tally lagao, phir tally gin kar number likho.",hi:"हर जवाब के सामने एक टैली मार्क लगाते जाओ। सारे जवाब आ जाने के बाद, टैली गिनकर हर विषय के सामने उसकी कुल संख्या लिख दो।",en:"Put a tally mark against each response as it comes. After all responses are in, count the tallies and write the total number against each subject.",mr:"प्रत्येक उत्तरासमोर एक टॅली मार्क लावत जा. सर्व उत्तरे आल्यावर, टॅली मोजून प्रत्येक विषयासमोर त्याची एकूण संख्या लिहा.",dur:13000},
   {art:emoji("🧊🌈"),cap:"Gola example mein: jis colour ke sabse zyada golas, wahi 'most eaten'.",hi:"गोले वाले उदाहरण में — जिस रंग के सबसे ज़्यादा गोले खाए गए, वही सबसे ज़्यादा खाया गया रंग है। अंजली और रोहन भी वही रंग खरीदेंगे जो सबसे लोकप्रिय हो।",en:"In the gola example — the colour with the most golas eaten is the most eaten colour. Anjali and Rohan will also buy the colour that is most popular.",mr:"गोळ्याच्या उदाहरणात — ज्या रंगाचे सर्वात जास्त गोळे खाल्ले गेले, तोच सर्वात जास्त खाल्लेला रंग आहे. अंजली आणि रोहनही तोच रंग विकत घेतील जो सर्वात लोकप्रिय असेल.",dur:14000},
   {art:emoji("📊📈"),cap:"Ek data ko table AUR pictograph dono mein dikha sakte ho.",hi:"एक ही डेटा को हम दो तरीकों से दिखा सकते हैं — तालिका में या चित्रालेख में। दोनों सही हैं, बस अलग-अलग तरीके हैं। जो ज़्यादा साफ लगे, वह चुनो।",en:"The same data can be shown in two ways — in a table or in a pictograph. Both are correct, just different ways. Choose whichever looks clearer.",mr:"एकाच डेटाला आपण दोन प्रकारे दाखवू शकतो — तक्त्यात किंवा चित्रालेखात. दोन्ही बरोबर आहेत, फक्त वेगळे मार्ग आहेत. जो जास्त स्पष्ट वाटेल तो निवडा.",dur:13500},
   {art:emoji("🤔📊"),cap:"Data se sawaal ka jawab dhundo: 'kitne zyada?', 'kaunsa jyada?'",hi:"व्यवस्थित डेटा से हम कई सवालों के जवाब दे सकते हैं — कितने ज़्यादा? कौन सा ज़्यादा पसंद? किस दिन ज़्यादा बिका? यही तो डेटा का असली फायदा है।",en:"From organised data we can answer many questions — how many more? which is liked more? which day sold more? This is the real benefit of data.",mr:"व्यवस्थित डेटावरून आपण अनेक प्रश्नांची उत्तरे देऊ शकतो — किती जास्त? कोणता जास्त आवडता? कोणत्या दिवशी जास्त विकला? हाच तर डेटाचा खरा फायदा आहे.",dur:13500},
   {art:emoji("🌍"),cap:"Data handling roz kaam aati hai: cricket scores, mausam, votes, sab data hai!",hi:"डेटा हैंडलिंग रोज़मर्रा की ज़िंदगी में बहुत काम आती है — क्रिकेट के स्कोर, मौसम की जानकारी, चुनाव के वोट — ये सब डेटा ही तो हैं, जिन्हें व्यवस्थित करके समझा जाता है।",en:"Data handling is very useful in everyday life — cricket scores, weather information, election votes — these are all data, which are organised and understood.",mr:"डेटा हँडलिंग रोजच्या जीवनात खूप उपयोगी आहे — क्रिकेटचे स्कोअर, हवामानाची माहिती, निवडणुकीचे मते — हे सर्व डेटाच आहेत, ज्यांना व्यवस्थित करून समजले जाते.",dur:14000},
   {art:emoji("🎯📋"),cap:"Yaad karo: achha sawaal → data collect → table/pictograph → samjho.",hi:"चलो पूरा तरीका याद करते हैं — पहले एक अच्छा और साफ सवाल बनाओ, फिर डेटा इकट्ठा करो, फिर उसे तालिका या चित्रालेख में व्यवस्थित करो, और आखिर में उससे नतीजे निकालो।",en:"Let's recap the whole process — first make a good and clear question, then collect the data, then organise it in a table or pictograph, and finally draw conclusions from it.",mr:"चला संपूर्ण प्रक्रिया आठवूया — आधी एक चांगला आणि स्पष्ट प्रश्न बनवा, मग डेटा गोळा करा, मग तो तक्त्यात किंवा चित्रालेखात व्यवस्थित करा, आणि शेवटी त्यातून निष्कर्ष काढा.",dur:15000},
   {art:emoji("🏆📊"),cap:"Shabaash! Ab tum data collect, organise aur samajh sakte ho!",hi:"शाबाश दोस्तों! अब तुम डेटा इकट्ठा करना, तालिका और चित्रालेख बनाना, और उससे नतीजे निकालना — सब कुछ सीख चुके हो। और इसी के साथ यह पूरी किताब भी पूरी हो गई। बहुत बढ़िया!",en:"Well done friends! Now you know how to collect data, make tables and pictographs, and draw conclusions from it. And with this, the whole book is complete too. Excellent work!",mr:"शाब्बास मित्रांनो! आता तुम्हाला डेटा गोळा करणे, तक्ता आणि चित्रालेख बनवणे, आणि त्यातून निष्कर्ष काढणे — सगळे येते. आणि याच्यासोबत हे संपूर्ण पुस्तकही पूर्ण झाले. खूप छान!",dur:14500},

 {id:'c_memory',title:'Data Storage and Memory',emoji:'💾',color:C.sky,scenes:[
   {art:emoji("💾"),cap:"Computer Chapter 1 — Data Storage and Memory! Computer kaise cheezein yaad rakhta hai.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम कंप्यूटर का पहला चॅप्टर सीखेंगे — डेटा स्टोरेज और मेमोरी। यानी कंप्यूटर चीज़ों को कैसे याद रखता है और कहाँ रखता है।",en:"Namaste friends! I am Gattu. Today we learn computer chapter one, Data Storage and Memory. That is, how a computer remembers things and where it keeps them.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण संगणकाचा पहिला धडा शिकू — डेटा स्टोरेज आणि मेमरी. म्हणजे संगणक गोष्टी कशा लक्षात ठेवतो आणि कुठे ठेवतो.",dur:12500},
   {art:emoji("🧠"),cap:"Jaise humara DIMAAG cheezein yaad rakhta hai, waise computer ki MEMORY hoti hai.",hi:"जैसे हमारा दिमाग हमारे दोस्तों के नाम, खाना, और पहाड़े याद रखता है — वैसे ही कंप्यूटर के पास भी मेमोरी होती है जो जानकारी याद रखती है।",en:"Just like our brain remembers our friends' names, food, and tables — a computer also has memory that remembers information.",mr:"जसा आपला मेंदू मित्रांची नावे, जेवण, आणि पाढे लक्षात ठेवतो — तसाच संगणकाकडेही मेमरी असते जी माहिती लक्षात ठेवते.",dur:12000},
   {art:bigExpr("Yaad rakhna + wapas laana = MEMORY"),cap:"MEMORY = jaankari ko store karna aur wapas laana (retrieve).",hi:"किसी जानकारी को याद रखने और ज़रूरत पड़ने पर वापस लाने की क्षमता को मेमोरी कहते हैं। कंप्यूटर की स्टोरेज कैपेसिटी को उसकी मेमोरी कहा जाता है।",en:"The ability to store information and get it back when needed is called memory. A computer's storage capacity is called its memory.",mr:"एखादी माहिती लक्षात ठेवण्याची आणि गरज पडल्यास परत आणण्याची क्षमता म्हणजे मेमरी. संगणकाच्या साठवण क्षमतेला त्याची मेमरी म्हणतात.",dur:12500},
   {art:bigExpr("DATA → Computer → INFORMATION"),cap:"DATA = facts/figures (input). INFORMATION = processed data (output).",hi:"डेटा का मतलब है तथ्य और आँकड़े, जो हम कंप्यूटर को देते हैं — यानी input। कंप्यूटर इसे प्रोसेस करके जो नतीजा देता है, उसे information यानी सूचना कहते हैं।",en:"Data means facts and figures that we give to the computer — that is input. When the computer processes it and gives a result, that is called information.",mr:"डेटा म्हणजे तथ्ये आणि आकडे, जे आपण संगणकाला देतो — म्हणजे input. संगणक ते प्रोसेस करून जे उत्तर देतो, त्याला information म्हणजे माहिती म्हणतात.",dur:13500},
   {art:bigExpr("0 aur 1"),cap:"Computer sirf 2 digits samajhta hai: 0 aur 1. Inhe BITS kehte hain.",hi:"कंप्यूटर सिर्फ दो अंक समझता है — शून्य और एक। इन्हीं दो अंकों को बाइनरी डिजिट यानी bits कहते हैं। कंप्यूटर की पूरी दुनिया इन्हीं दो अंकों पर चलती है।",en:"A computer understands only two digits — zero and one. These two digits are called binary digits, or bits. The whole computer world runs on just these two digits.",mr:"संगणक फक्त दोन अंक समजतो — शून्य आणि एक. या दोन अंकांना बायनरी डिजिट म्हणजे bits म्हणतात. संगणकाचे संपूर्ण जग याच दोन अंकांवर चालते.",dur:14000},
   {art:bigExpr("4 bits = 1 Nibble"),cap:"4 bits milkar ek NIBBLE banate hain.",hi:"चार bits मिलकर एक निबल यानी nibble बनाते हैं। निबल का इस्तेमाल पहले के कैलकुलेटर और छोटे प्रोसेसर में होता था।",en:"Four bits together make one nibble. Nibble was used in early calculators and small processors.",mr:"चार bits मिळून एक निबल म्हणजे nibble बनतात. निबलचा वापर पूर्वीच्या कॅल्क्युलेटर आणि लहान प्रोसेसरमध्ये होत असे.",dur:11500},
   {art:bigExpr("8 bits = 1 Byte"),cap:"8 bits milkar ek BYTE banate hain. Byte memory naapne ka unit hai.",hi:"आठ bits मिलकर एक बाइट यानी byte बनाते हैं। बाइट कंप्यूटर की मेमोरी नापने की सबसे बुनियादी इकाई है।",en:"Eight bits together make one byte. Byte is the most basic unit for measuring computer memory.",mr:"आठ bits मिळून एक बाइट म्हणजे byte बनतात. बाइट ही संगणकाची मेमरी मोजण्याची सर्वात मूलभूत एकक आहे.",dur:12000},
   {art:bigExpr("KB → MB → GB → TB"),cap:"Bade units: KB, MB, GB, TB — har agla 1024 guna bada!",hi:"बाइट से बड़ी इकाइयाँ हैं — किलोबाइट, मेगाबाइट, गीगाबाइट, टेराबाइट। हर अगली इकाई पिछली से एक हज़ार चौबीस गुना बड़ी होती है।",en:"Bigger units than byte are kilobyte, megabyte, gigabyte, terabyte. Each next unit is one thousand twenty-four times bigger than the previous.",mr:"बाइटपेक्षा मोठ्या एकके आहेत — किलोबाइट, मेगाबाइट, गिगाबाइट, टेराबाइट. प्रत्येक पुढची एकक मागच्यापेक्षा एक हजार चोवीसपट मोठी असते.",dur:14000},
   {art:bigExpr("1 KB = 1024 Bytes<br>1 MB = 1024 KB<br>1 GB = 1024 MB"),cap:"1 KB = 1024 Bytes, 1 MB = 1024 KB, 1 GB = 1024 MB, 1 TB = 1024 GB.",hi:"एक किलोबाइट बराबर एक हज़ार चौबीस बाइट। एक मेगाबाइट बराबर एक हज़ार चौबीस किलोबाइट। और इसी तरह गीगाबाइट और टेराबाइट भी बनते हैं।",en:"One kilobyte equals one thousand twenty-four bytes. One megabyte equals one thousand twenty-four kilobytes. And gigabyte and terabyte are formed the same way.",mr:"एक किलोबाइट बरोबर एक हजार चोवीस बाइट. एक मेगाबाइट बरोबर एक हजार चोवीस किलोबाइट. आणि याच पद्धतीने गिगाबाइट आणि टेराबाइटही बनतात.",dur:14000},
   {art:bigExpr("3 Types of Memory"),cap:"Memory 3 tarah ki hoti hai: Primary, ROM, aur Secondary.",hi:"कंप्यूटर की मेमोरी तीन तरह की होती है — पहली प्राइमरी मेमोरी यानी RAM, दूसरी रीड-ओनली मेमोरी यानी ROM, और तीसरी सेकेंडरी मेमोरी।",en:"A computer's memory is of three types — first primary memory or RAM, second read-only memory or ROM, and third secondary memory.",mr:"संगणकाची मेमरी तीन प्रकारची असते — पहिली प्रायमरी मेमरी म्हणजे RAM, दुसरी रीड-ओन्ली मेमरी म्हणजे ROM, आणि तिसरी सेकंडरी मेमरी.",dur:13500},
   {art:emoji("🧠⚡"),cap:"PRIMARY MEMORY = computer ki main working memory. CPU seedha use karta hai.",hi:"प्राइमरी मेमोरी कंप्यूटर की मुख्य काम करने वाली मेमोरी है। यहीं पर डेटा और निर्देश रखे जाते हैं, और कंप्यूटर का दिमाग यानी CPU इसे सीधे इस्तेमाल करता है।",en:"Primary memory is the computer's main working memory. Data and instructions are kept here, and the computer's brain, the CPU, uses it directly.",mr:"प्रायमरी मेमरी ही संगणकाची मुख्य काम करणारी मेमरी आहे. इथेच डेटा आणि सूचना ठेवल्या जातात, आणि संगणकाचा मेंदू म्हणजे CPU ती थेट वापरतो.",dur:13500},
   {art:bigExpr("RAM"),cap:"RAM = Random Access Memory. CPU koi bhi jagah SEEDHA access kar sakta hai.",hi:"प्राइमरी मेमोरी को RAM यानी रैंडम एक्सेस मेमोरी भी कहते हैं। क्योंकि CPU इसमें किसी भी जगह को सीधे और तुरंत एक्सेस कर सकता है — इसीलिए इसका नाम रैंडम एक्सेस है।",en:"Primary memory is also called RAM, Random Access Memory. Because the CPU can directly and instantly access any location in it — that is why it is called random access.",mr:"प्रायमरी मेमरीला RAM म्हणजे रँडम अॅक्सेस मेमरी असेही म्हणतात. कारण CPU त्यात कोणतीही जागा थेट आणि लगेच अॅक्सेस करू शकतो — म्हणूनच याचे नाव रँडम अॅक्सेस आहे.",dur:14000},
   {art:bigExpr("Power OFF → RAM khaali!"),cap:"RAM ki khaas baat: bijli jaate hi sab kuch MIT jaata hai!",hi:"RAM की एक खास बात है — जैसे ही कंप्यूटर बंद होता है या बिजली चली जाती है, RAM में रखा सारा डेटा मिट जाता है, गायब हो जाता है।",en:"A special thing about RAM — as soon as the computer is switched off or power goes, all the data kept in RAM is erased, it disappears.",mr:"RAM ची एक खास गोष्ट आहे — संगणक बंद होताच किंवा वीज गेल्यावर, RAM मध्ये ठेवलेला सर्व डेटा मिटतो, नाहीसा होतो.",dur:13000},
   {art:bigExpr("RAM = VOLATILE memory"),cap:"Isliye RAM ko VOLATILE memory kehte hain (power off = data gayab).",hi:"जो मेमोरी बिजली बंद होते ही अपना डेटा खो देती है, उसे वोलेटाइल मेमोरी कहते हैं। RAM एक वोलेटाइल मेमोरी है। RAM को read/write memory भी कहते हैं, क्योंकि इसमें हम पढ़ भी सकते हैं और लिख भी सकते हैं।",en:"The memory that loses its data as soon as the power is off is called volatile memory. RAM is a volatile memory. RAM is also called read/write memory, because we can both read from it and write to it.",mr:"जी मेमरी वीज बंद होताच आपला डेटा गमावते, तिला व्होलाटाइल मेमरी म्हणतात. RAM ही व्होलाटाइल मेमरी आहे. RAM ला read/write memory असेही म्हणतात, कारण त्यात आपण वाचूही शकतो आणि लिहूही शकतो.",dur:15000},
   {art:bigExpr("ROM"),cap:"ROM = Read-Only Memory. Sirf PADH sakte hain, aam taur pe likh nahi sakte.",hi:"दूसरी तरह की मेमोरी है ROM यानी रीड-ओनली मेमोरी। इससे जानकारी सिर्फ पढ़ी जा सकती है, आम तौर पर उसमें कुछ लिखा या बदला नहीं जा सकता। इसीलिए इसका नाम रीड-ओनली है।",en:"The second type of memory is ROM, Read-Only Memory. Information can only be read from it, and usually nothing can be written or changed in it. That is why it is called read-only.",mr:"दुसऱ्या प्रकारची मेमरी आहे ROM म्हणजे रीड-ओन्ली मेमरी. त्यातून माहिती फक्त वाचता येते, सहसा त्यात काही लिहिता किंवा बदलता येत नाही. म्हणूनच याचे नाव रीड-ओन्ली आहे.",dur:14500},
   {art:bigExpr("Power OFF → ROM safe!"),cap:"ROM ki khaas baat: bijli jaane par bhi data SAFE rehta hai!",hi:"ROM की खास बात यह है कि कंप्यूटर बंद होने पर भी इसमें रखा डेटा सुरक्षित रहता है, मिटता नहीं। यह ज़रूरी निर्देश हमेशा याद रखता है।",en:"The special thing about ROM is that even when the computer is switched off, the data kept in it stays safe, it does not erase. It always remembers important instructions.",mr:"ROM ची खास गोष्ट अशी की संगणक बंद झाल्यावरही त्यात ठेवलेला डेटा सुरक्षित राहतो, मिटत नाही. ते महत्त्वाच्या सूचना नेहमी लक्षात ठेवते.",dur:13500},
   {art:bigExpr("ROM = NON-VOLATILE memory"),cap:"Isliye ROM ko NON-VOLATILE memory kehte hain (power off bhi = data safe).",hi:"जो मेमोरी बिजली बंद होने पर भी अपना डेटा नहीं खोती, उसे नॉन-वोलेटाइल मेमोरी कहते हैं। ROM एक नॉन-वोलेटाइल मेमोरी है।",en:"The memory that does not lose its data even when the power is off is called non-volatile memory. ROM is a non-volatile memory.",mr:"जी मेमरी वीज बंद झाल्यावरही आपला डेटा गमावत नाही, तिला नॉन-व्होलाटाइल मेमरी म्हणतात. ROM ही नॉन-व्होलाटाइल मेमरी आहे.",dur:13500},
   {art:bigExpr("3 Types of ROM:<br>PROM • EPROM • EEPROM"),cap:"ROM 3 tarah ki hoti hai: PROM, EPROM, aur EEPROM.",hi:"ROM भी तीन तरह की होती है — पहली PROM, दूसरी EPROM, और तीसरी EEPROM। आजकल ऐसी ROM भी आती हैं जिन पर लिखा और मिटाया जा सकता है।",en:"ROM is also of three types — first PROM, second EPROM, and third EEPROM. Nowadays there are also ROMs on which data can be written and erased.",mr:"ROM ही तीन प्रकारची असते — पहिली PROM, दुसरी EPROM, आणि तिसरी EEPROM. आजकाल अशा ROM ही येतात ज्यांवर लिहिता आणि मिटवता येते.",dur:14000},
   {art:bigExpr("PROM = Programmable ROM"),cap:"PROM: ek baar likho, phir badal nahi sakte.",hi:"PROM यानी प्रोग्रामेबल रीड-ओनली मेमोरी। इसमें एक बार जानकारी लिखी जा सकती है, पर उसके बाद उसे बदला नहीं जा सकता।",en:"PROM means Programmable Read-Only Memory. Information can be written once, but after that it cannot be changed.",mr:"PROM म्हणजे प्रोग्रामेबल रीड-ओन्ली मेमरी. त्यात एकदा माहिती लिहिता येते, पण त्यानंतर ती बदलता येत नाही.",dur:12500},
   {art:bigExpr("EPROM = Erasable PROM"),cap:"EPROM: data ULTRAVIOLET light se mita sakte hain.",hi:"EPROM यानी इरेज़ेबल प्रोग्रामेबल रीड-ओनली मेमोरी। इसमें लिखा डेटा पराबैंगनी यानी अल्ट्रावायलेट रोशनी से मिटाया जा सकता है।",en:"EPROM means Erasable Programmable Read-Only Memory. The data written in it can be erased using ultraviolet light.",mr:"EPROM म्हणजे इरेजेबल प्रोग्रामेबल रीड-ओन्ली मेमरी. त्यात लिहिलेला डेटा अल्ट्राव्हायोलेट प्रकाशाने मिटवता येतो.",dur:13000},
   {art:bigExpr("EEPROM = Electrically Erasable"),cap:"EEPROM: data BIJLI (electrical signals) se mita sakte hain.",hi:"EEPROM यानी इलेक्ट्रिकली इरेज़ेबल प्रोग्रामेबल रीड-ओनली मेमोरी। इसमें डेटा बिजली के संकेतों यानी electrical signals से मिटाया जा सकता है।",en:"EEPROM means Electrically Erasable Programmable Read-Only Memory. In it, data can be erased using electrical signals.",mr:"EEPROM म्हणजे इलेक्ट्रिकली इरेजेबल प्रोग्रामेबल रीड-ओन्ली मेमरी. त्यात डेटा विजेच्या संकेतांनी म्हणजे electrical signals ने मिटवता येतो.",dur:13500},
   {art:emoji("💽"),cap:"SECONDARY MEMORY = extra storage, bahut sara data lambe samay ke liye.",hi:"तीसरी तरह की मेमोरी है सेकेंडरी मेमोरी, जिसे बाहरी यानी external memory भी कहते हैं। यह बहुत सारा डेटा लंबे समय तक रखने के लिए इस्तेमाल होती है।",en:"The third type of memory is secondary memory, also called external memory. It is used to keep a lot of data for a long time.",mr:"तिसऱ्या प्रकारची मेमरी आहे सेकंडरी मेमरी, जिला बाह्य म्हणजे external memory असेही म्हणतात. ती खूप सारा डेटा दीर्घकाळ ठेवण्यासाठी वापरली जाते.",dur:13500},
   {art:bigExpr("Secondary = Non-volatile<br>+ Bahut zyada storage"),cap:"Secondary memory non-volatile hai, CPU seedha use nahi karta.",hi:"सेकेंडरी मेमोरी नॉन-वोलेटाइल होती है, यानी बिजली बंद होने पर भी डेटा सुरक्षित रहता है। यह RAM से बहुत ज़्यादा डेटा रख सकती है, पर CPU इसे सीधे इस्तेमाल नहीं करता।",en:"Secondary memory is non-volatile, meaning data stays safe even when power is off. It can hold much more data than RAM, but the CPU does not use it directly.",mr:"सेकंडरी मेमरी नॉन-व्होलाटाइल असते, म्हणजे वीज बंद झाल्यावरही डेटा सुरक्षित राहतो. ती RAM पेक्षा खूप जास्त डेटा ठेवू शकते, पण CPU ती थेट वापरत नाही.",dur:14000},
   {art:emoji("🗄️"),cap:"HARD DISK: computer ke andar ki main storage. 500 GB, 1 TB, 2 TB tak!",hi:"सबसे मुख्य सेकेंडरी मेमोरी है हार्ड डिस्क। यह कंप्यूटर के अंदर होती है और बहुत सारा डेटा रख सकती है — जैसे पाँच सौ जीबी, एक टीबी, या दो टीबी तक।",en:"The main secondary memory is the hard disk. It is inside the computer and can hold a lot of data — like five hundred GB, one TB, or up to two TB.",mr:"सर्वात मुख्य सेकंडरी मेमरी आहे हार्ड डिस्क. ती संगणकाच्या आत असते आणि खूप सारा डेटा ठेवू शकते — जसे पाचशे जीबी, एक टीबी, किंवा दोन टीबीपर्यंत.",dur:14000},
   {art:bigExpr("Platters → Tracks → Sectors"),cap:"Hard disk mein PLATTERS (thaliyan) hoti hain, un par tracks aur sectors.",hi:"हार्ड डिस्क कई गोल थालियों से बनी होती है, जिन्हें platters कहते हैं। हर platter पर अनगिनत गोल घेरे होते हैं जिन्हें tracks कहते हैं, और ये tracks छोटे-छोटे हिस्सों में बँटे होते हैं जिन्हें sectors कहते हैं।",en:"A hard disk is made of several round plates called platters. Each platter has countless circles called tracks, and these tracks are divided into small parts called sectors.",mr:"हार्ड डिस्क अनेक गोल ताटल्यांनी बनलेली असते, ज्यांना platters म्हणतात. प्रत्येक platter वर असंख्य गोल वर्तुळे असतात ज्यांना tracks म्हणतात, आणि ही tracks लहान भागांत विभागलेली असतात ज्यांना sectors म्हणतात.",dur:15000},
   {art:bigExpr("Magnetic spot = 1<br>No spot = 0"),cap:"Data tiny magnetic spots ke roop mein store hota hai (spot=1, no spot=0).",hi:"हार्ड डिस्क पर डेटा छोटे-छोटे चुंबकीय धब्बों यानी magnetic spots के रूप में जमा होता है। जहाँ धब्बा है वहाँ एक, और जहाँ नहीं है वहाँ शून्य।",en:"On a hard disk, data is stored as tiny magnetic spots. Where there is a spot it means one, and where there is none it means zero.",mr:"हार्ड डिस्कवर डेटा लहान चुंबकीय ठिपक्यांच्या म्हणजे magnetic spots च्या रूपात साठवला जातो. जिथे ठिपका आहे तिथे एक, आणि जिथे नाही तिथे शून्य.",dur:13500},
   {art:emoji("🔌"),cap:"EXTERNAL HARD DISK: bahar wali portable hard disk, USB se jodo.",hi:"एक्सटर्नल हार्ड डिस्क एक पोर्टेबल स्टोरेज डिवाइस है, जिसे कंप्यूटर से USB या FireWire केबल से जोड़ा जाता है। इसमें बहुत सारा डेटा रखकर कहीं भी ले जा सकते हैं।",en:"An external hard disk is a portable storage device, connected to the computer with a USB or FireWire cable. You can store a lot of data in it and carry it anywhere.",mr:"एक्सटर्नल हार्ड डिस्क एक पोर्टेबल स्टोरेज डिव्हाइस आहे, जी संगणकाला USB किंवा FireWire केबलने जोडली जाते. त्यात खूप सारा डेटा ठेवून कुठेही नेता येतो.",dur:14000},
   {art:emoji("💿"),cap:"CD = Compact Disc. 700 MB tak data. Iski surface pe tracks/sectors hote hain.",hi:"CD यानी कॉम्पैक्ट डिस्क एक और आम स्टोरेज डिवाइस है। इसमें सात सौ एमबी तक डेटा रखा जा सकता है। इसकी सतह पर भी tracks और sectors होते हैं।",en:"CD, or Compact Disc, is another common storage device. Up to seven hundred MB of data can be kept in it. Its surface also has tracks and sectors.",mr:"CD म्हणजे कॉम्पॅक्ट डिस्क एक आणखी सामान्य स्टोरेज डिव्हाइस आहे. त्यात सातशे एमबीपर्यंत डेटा ठेवता येतो. त्याच्या पृष्ठभागावरही tracks आणि sectors असतात.",dur:13500},
   {art:bigExpr("CD-R vs CD-RW"),cap:"CD-R: ek baar likho (fir sirf read). CD-RW: baar-baar likho aur mitao.",hi:"CD दो तरह की होती हैं। CD-R में एक बार डेटा लिखा जा सकता है, फिर सिर्फ पढ़ा जा सकता है। और CD-RW में डेटा बार-बार मिटाकर नया लिखा जा सकता है — इसे erasable CD भी कहते हैं।",en:"CDs are of two types. In a CD-R, data can be written once, then only read. And in a CD-RW, data can be erased and rewritten many times — it is also called an erasable CD.",mr:"CD दोन प्रकारच्या असतात. CD-R मध्ये एकदा डेटा लिहिता येतो, मग फक्त वाचता येतो. आणि CD-RW मध्ये डेटा वारंवार मिटवून नवा लिहिता येतो — याला erasable CD असेही म्हणतात.",dur:14500},
   {art:emoji("📀"),cap:"DVD = Digital Versatile Disc. CD jaisi dikhti hai par 4.7 GB tak data!",hi:"DVD यानी डिजिटल वर्सटाइल डिस्क, CD जैसी ही दिखती है, पर इसमें बहुत ज़्यादा — चार दशमलव सात जीबी तक डेटा रखा जा सकता है। इसमें फिल्में और वीडियो भी रखे जाते हैं।",en:"DVD, or Digital Versatile Disc, looks like a CD, but can hold much more — up to four point seven GB of data. Movies and videos are also kept in it.",mr:"DVD म्हणजे डिजिटल व्हर्सटाइल डिस्क, CD सारखीच दिसते, पण त्यात खूप जास्त — चार पूर्णांक सात जीबीपर्यंत डेटा ठेवता येतो. त्यात चित्रपट आणि व्हिडिओही ठेवले जातात.",dur:14000},
   {art:emoji("🔵"),cap:"BLU-RAY DISC: CD/DVD jaisi, par 25 GB tak data! Blu-ray reader chahiye.",hi:"ब्लू-रे डिस्क भी CD या DVD जैसी दिखती है, पर इसमें पच्चीस जीबी तक डेटा रखा जा सकता है। इसे चलाने के लिए एक खास ब्लू-रे रीडर चाहिए होता है।",en:"A Blu-ray disc also looks like a CD or DVD, but it can hold up to twenty-five GB of data. A special Blu-ray reader is needed to play it.",mr:"ब्लू-रे डिस्कही CD किंवा DVD सारखी दिसते, पण त्यात पंचवीस जीबीपर्यंत डेटा ठेवता येतो. ती चालवण्यासाठी एक खास ब्लू-रे रीडर लागतो.",dur:13500},
   {art:emoji("🔦"),cap:"Blu-ray naam blue-violet laser se aaya (jo disc padhta hai).",hi:"ब्लू-रे का नाम उस नीली-बैंगनी लेज़र से आया है जो इस डिस्क को पढ़ती है। नीले रंग की किरण के कारण इसे ब्लू-रे कहते हैं।",en:"The name Blu-ray comes from the blue-violet laser that reads this disc. Because of the blue ray of light, it is called Blu-ray.",mr:"ब्लू-रे चे नाव त्या निळ्या-जांभळ्या लेझरवरून आले आहे जी ही डिस्क वाचते. निळ्या रंगाच्या किरणामुळे याला ब्लू-रे म्हणतात.",dur:12500},
   {art:emoji("🔌💾"),cap:"FLASH DRIVE (pen drive): chhoti, USB port mein lagao. 4 GB se 1 TB tak.",hi:"फ्लैश ड्राइव, जिसे पेन ड्राइव भी कहते हैं, एक बहुत छोटी और आसान स्टोरेज डिवाइस है। इसे कंप्यूटर के USB पोर्ट में लगाया जाता है। यह चार जीबी से लेकर एक टीबी तक की आती है।",en:"A flash drive, also called a pen drive, is a very small and easy storage device. It is plugged into the computer's USB port. It comes from four GB up to one TB.",mr:"फ्लॅश ड्राइव्ह, जिला पेन ड्राइव्ह असेही म्हणतात, एक खूप लहान आणि सोपे स्टोरेज डिव्हाइस आहे. ती संगणकाच्या USB पोर्टमध्ये लावली जाते. ती चार जीबीपासून एक टीबीपर्यंत येते.",dur:14500},
   {art:emoji("📷"),cap:"SD CARD: postage stamp jitni chhoti! Camera, mobile, music player mein.",hi:"SD कार्ड यानी सिक्योर डिजिटल कार्ड एक बहुत छोटी स्टोरेज डिवाइस है, डाक टिकट जितनी छोटी। यह डिजिटल कैमरा, मोबाइल फोन, और म्यूज़िक प्लेयर में इस्तेमाल होती है।",en:"An SD card, or Secure Digital card, is a very small storage device, as small as a postage stamp. It is used in digital cameras, mobile phones, and music players.",mr:"SD कार्ड म्हणजे सिक्युअर डिजिटल कार्ड एक खूप लहान स्टोरेज डिव्हाइस आहे, टपाल तिकिटाएवढे लहान. ते डिजिटल कॅमेरा, मोबाइल फोन, आणि म्युझिक प्लेयरमध्ये वापरले जाते.",dur:14000},
   {art:bigExpr("USB port"),cap:"USB = Universal Serial Bus. Mouse, keyboard, pen drive sab USB se judte hain.",hi:"USB का मतलब है यूनिवर्सल सीरियल बस। यह कंप्यूटर पर एक सॉकेट होता है जिसमें माउस, कीबोर्ड, पेन ड्राइव, और हार्ड डिस्क जैसी चीज़ें जोड़ी जाती हैं।",en:"USB means Universal Serial Bus. It is a socket on the computer into which things like a mouse, keyboard, pen drive, and hard disk are connected.",mr:"USB म्हणजे युनिव्हर्सल सीरियल बस. हे संगणकावर एक सॉकेट असते ज्यात माउस, कीबोर्ड, पेन ड्राइव्ह, आणि हार्ड डिस्कसारख्या गोष्टी जोडल्या जातात.",dur:13500},
   {art:emoji("💾🕰️"),cap:"FLOPPY DISK: purani storage device, ab use nahi hoti (CD/pen drive ne le li jagah).",hi:"फ्लॉपी डिस्क एक पुरानी स्टोरेज डिवाइस थी, जो चौकोर प्लास्टिक केस में होती थी। पहले यह बहुत लोकप्रिय थी, पर अब CD, DVD, और पेन ड्राइव ने इसकी जगह ले ली है।",en:"A floppy disk was an old storage device, in a square plastic case. It was very popular earlier, but now CD, DVD, and pen drives have replaced it.",mr:"फ्लॉपी डिस्क एक जुने स्टोरेज डिव्हाइस होते, जे चौकोनी प्लास्टिक केसमध्ये असे. पूर्वी ते खूप लोकप्रिय होते, पण आता CD, DVD, आणि पेन ड्राइव्हने त्याची जागा घेतली आहे.",dur:14000},
   {art:emoji("🧹"),cap:"COMPUTER MANNERS: CD/DVD ko cases mein rakho, careless handle mat karo.",hi:"एक ज़रूरी बात — कंप्यूटर मैनर्स। CD और DVD को हमेशा उनके केस या फोल्डर में संभालकर रखो। अगर लापरवाही से रखोगे, तो वे खराब हो सकती हैं और डेटा खो सकता है।",en:"An important thing — computer manners. Always keep CDs and DVDs carefully in their cases or folders. If you handle them carelessly, they can get damaged and data can be lost.",mr:"एक महत्त्वाची गोष्ट — कॉम्प्युटर मॅनर्स. CD आणि DVD नेहमी त्यांच्या केसमध्ये किंवा फोल्डरमध्ये काळजीपूर्वक ठेवा. जर निष्काळजीपणे ठेवाल, तर त्या खराब होऊ शकतात आणि डेटा गमावू शकतो.",dur:14500},
   {art:bigExpr("Chota → Bada:<br>CD < DVD < Pen drive < Hard disk"),cap:"Storage size yaad rakho: CD (700MB) < DVD (4.7GB) < Blu-ray (25GB) < Hard disk (TB).",hi:"स्टोरेज का आकार याद रखो — सबसे कम सीडी में, उससे ज़्यादा डीवीडी में, उससे ज़्यादा ब्लू-रे और पेन ड्राइव में, और सबसे ज़्यादा हार्ड डिस्क में।",en:"Remember the storage sizes — least in a CD, more in a DVD, even more in Blu-ray and pen drives, and the most in a hard disk.",mr:"स्टोरेजचा आकार लक्षात ठेवा — सर्वात कमी सीडीमध्ये, त्यापेक्षा जास्त डीव्हीडीमध्ये, त्यापेक्षा जास्त ब्लू-रे आणि पेन ड्राइव्हमध्ये, आणि सर्वात जास्त हार्ड डिस्कमध्ये.",dur:14000},
   {art:emoji("🎯"),cap:"Yaad karo: RAM=volatile, ROM=non-volatile. Bits→Byte→KB→MB→GB→TB.",hi:"चलो याद करते हैं — RAM वोलेटाइल है यानी बिजली जाने पर डेटा मिट जाता है। ROM नॉन-वोलेटाइल है यानी डेटा सुरक्षित रहता है। और इकाइयाँ हैं — bits, byte, फिर KB, MB, GB, TB।",en:"Let's recap — RAM is volatile, meaning data erases when power goes. ROM is non-volatile, meaning data stays safe. And the units are bits, byte, then KB, MB, GB, TB.",mr:"चला आठवूया — RAM व्होलाटाइल आहे म्हणजे वीज गेल्यावर डेटा मिटतो. ROM नॉन-व्होलाटाइल आहे म्हणजे डेटा सुरक्षित राहतो. आणि एकके आहेत — bits, byte, मग KB, MB, GB, TB.",dur:14500},
   {art:emoji("🏆💾"),cap:"Shabaash! Ab tum computer memory ke expert ho!",hi:"शाबाश दोस्तों! अब तुम कंप्यूटर की मेमोरी और स्टोरेज के बारे में सब कुछ जान गए हो — डेटा, बिट्स, RAM, ROM, हार्ड डिस्क, CD, DVD, पेन ड्राइव, सब कुछ। बहुत बढ़िया!",en:"Well done friends! Now you know everything about computer memory and storage — data, bits, RAM, ROM, hard disk, CD, DVD, pen drive, everything. Excellent!",mr:"शाब्बास मित्रांनो! आता तुम्हाला संगणकाच्या मेमरी आणि स्टोरेजबद्दल सर्व काही माहित झाले — डेटा, bits, RAM, ROM, हार्ड डिस्क, CD, DVD, पेन ड्राइव्ह, सर्व काही. खूप छान!",dur:14500},

 qa:[
   {q:"Memory kya hoti hai?",qe:"What is memory?",a:"Kisi jaankari ko store karne aur zaroorat par wapas laane ki capacity ko memory kehte hain. Computer ki storage capacity uski memory hai.",ae:"The ability to store information and get it back when needed is called memory. A computer's storage capacity is its memory."},
   {q:"Data aur Information mein kya farak hai?",qe:"What is the difference between Data and Information?",a:"Data facts aur figures hote hain jo hum computer ko dete hain (input). Computer inhe process karke jo result deta hai wo information hai (output).",ae:"Data are facts and figures we give to the computer (input). The result the computer produces after processing is information (output)."},
   {q:"Bit aur Byte kya hain?",qe:"What are Bit and Byte?",a:"Bit computer ka sabse chhota unit hai — sirf 0 ya 1. 8 bits milkar 1 byte banta hai. Byte memory naapne ka basic unit hai.",ae:"A bit is the smallest unit of a computer — only 0 or 1. 8 bits make 1 byte. Byte is the basic unit for measuring memory."},
   {q:"Computer memory naapne ke units likho.",qe:"Write the units for measuring computer memory.",a:"Byte sabse basic hai. Uske baad KB (kilobyte), MB (megabyte), GB (gigabyte), TB (terabyte). Har agla unit pichhle se 1024 guna bada.",ae:"Byte is the most basic. Then KB (kilobyte), MB (megabyte), GB (gigabyte), TB (terabyte). Each next unit is 1024 times bigger than the previous."},
   {q:"Memory ke 3 types kaunse hain?",qe:"What are the 3 types of memory?",a:"1) Primary memory (RAM), 2) Read-Only Memory (ROM), 3) Secondary memory (external).",ae:"1) Primary memory (RAM), 2) Read-Only Memory (ROM), 3) Secondary memory (external)."},
   {q:"RAM ki 2 khaas baatein batao.",qe:"Mention 2 characteristics of RAM.",a:"1) RAM volatile hai — power off hote hi data mit jaata hai. 2) RAM ko read/write memory kehte hain, ismein padh aur likh dono sakte hain. CPU ise seedha access karta hai.",ae:"1) RAM is volatile — its data erases as soon as the power is off. 2) RAM is called read/write memory, we can both read and write in it. The CPU accesses it directly."},
   {q:"Volatile aur Non-volatile memory mein farak?",qe:"What is the difference between Volatile and Non-volatile memory?",a:"Volatile memory (RAM) power off hone par data kho deti hai. Non-volatile memory (ROM, hard disk) power off hone par bhi data safe rakhti hai.",ae:"Volatile memory (RAM) loses its data when the power is off. Non-volatile memory (ROM, hard disk) keeps data safe even when the power is off."},
   {q:"ROM ke 3 types kaunse hain? Full form ke saath.",qe:"What are the 3 types of ROM, with full forms?",a:"1) PROM — Programmable Read-Only Memory. 2) EPROM — Erasable Programmable Read-Only Memory. 3) EEPROM — Electrically Erasable Programmable Read-Only Memory.",ae:"1) PROM — Programmable Read-Only Memory. 2) EPROM — Erasable Programmable Read-Only Memory. 3) EEPROM — Electrically Erasable Programmable Read-Only Memory."},
   {q:"EPROM aur EEPROM mein farak?",qe:"What is the difference between EPROM and EEPROM?",a:"EPROM ka data ultraviolet light se mitaya jaata hai. EEPROM ka data electrical signals se mitaya jaata hai.",ae:"EPROM data is erased using ultraviolet light. EEPROM data is erased using electrical signals."},
   {q:"Hard disk kaise bani hoti hai?",qe:"How is a hard disk made?",a:"Hard disk platters (gol thaliyon) se bani hoti hai. Har platter par tracks (gol ghere) hote hain, aur tracks sectors (chhote hisse) mein bante hain. Data magnetic spots ke roop mein store hota hai.",ae:"A hard disk is made of platters (round plates). Each platter has tracks (circles), and tracks are divided into sectors (small parts). Data is stored as magnetic spots."},
   {q:"5 secondary storage devices ke naam likho.",qe:"Write five examples of secondary storage devices.",a:"Hard disk, CD, DVD, Blu-ray disc, Flash drive (pen drive), aur SD card.",ae:"Hard disk, CD, DVD, Blu-ray disc, Flash drive (pen drive), and SD card."},
   {q:"CD-R aur CD-RW mein farak?",qe:"What is the difference between CD-R and CD-RW?",a:"CD-R mein data ek hi baar likh sakte hain, phir sirf padh sakte hain. CD-RW mein data baar-baar mita ke naya likh sakte hain (erasable CD).",ae:"In a CD-R, data can be written once, then only read. In a CD-RW, data can be erased and rewritten many times (erasable CD)."},
   {q:"CD, DVD aur Blu-ray ki storage capacity batao.",qe:"State the storage capacity of CD, DVD and Blu-ray.",a:"CD = 700 MB tak. DVD = 4.7 GB tak. Blu-ray = 25 GB tak. Blu-ray sabse zyada data rakhti hai.",ae:"CD = up to 700 MB. DVD = up to 4.7 GB. Blu-ray = up to 25 GB. Blu-ray holds the most data."},
   {q:"SD card kahaan use hota hai?",qe:"Where is an SD card used?",a:"SD card postage stamp jitna chhota hota hai. Ye digital camera, mobile phone, music player, aur e-book reader mein data store karne ke liye use hota hai.",ae:"An SD card is as small as a postage stamp. It is used to store data in digital cameras, mobile phones, music players, and e-book readers."},
   {q:"USB kya hai?",qe:"What is USB?",a:"USB ka full form Universal Serial Bus hai. Ye computer par ek port (socket) hai jismein mouse, keyboard, pen drive, aur hard disk jaisi devices jodte hain.",ae:"USB stands for Universal Serial Bus. It is a port (socket) on the computer into which devices like a mouse, keyboard, pen drive, and hard disk are connected."},
