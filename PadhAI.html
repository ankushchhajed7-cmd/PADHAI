<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PadhAI - Class 4 Maths</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#FBF8FF;--ink:#2D2350;--soft:#6B5E94;--purple:#7C5CFC;--purpleDark:#5B3FD6;--yellow:#FFC83D;--coral:#FF7A6B;--mint:#21C997;--sky:#4DB8FF;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:Nunito,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 14px 30px;-webkit-font-smoothing:antialiased;}
  .wrap{width:100%;max-width:440px;}
  .fred{font-family:Fredoka,system-ui,sans-serif;}
  .card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 12px 38px rgba(124,92,252,.16);}
  .btn{border:none;border-radius:18px;padding:14px 22px;font-size:18px;font-weight:800;font-family:Fredoka,system-ui;color:#fff;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.12);width:100%;}
  .btn:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .row{display:flex;gap:10px;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes pop{0%{transform:scale(.6) rotate(-6deg);opacity:0;}60%{transform:scale(1.1) rotate(2deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-7px) rotate(3deg);}}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(124,92,252,.35);}100%{box-shadow:0 0 0 18px rgba(124,92,252,0);}}
  .pop{animation:pop .6s ease;} .fade{animation:fade .5s ease;} .float{animation:floaty 3s ease-in-out infinite;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .link{background:none;border:none;color:var(--soft);font-weight:800;font-size:16px;cursor:pointer;font-family:Nunito;}
  .bar{width:100%;height:9px;background:#EADFFF;border-radius:9px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:var(--purple);border-radius:9px;width:0%;transition:width .3s;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#F6F2FF;border:3px solid #E6DCFF;border-radius:18px;padding:14px;margin-bottom:11px;cursor:pointer;font-family:Nunito;font-weight:800;font-size:17px;color:var(--ink);}
  .caption{font-weight:800;font-size:18px;line-height:1.55;text-align:center;min-height:88px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .stage{min-height:185px;display:flex;align-items:center;justify-content:center;}
  .seg{display:flex;background:#EFEAFF;border-radius:13px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:none;padding:9px 2px;border-radius:10px;font-weight:800;font-family:Nunito;font-size:13px;color:var(--soft);cursor:pointer;}
  .seg button.on{background:#fff;color:var(--purpleDark);box-shadow:0 2px 6px rgba(124,92,252,.2);}
  .mascot{position:relative;width:50px;height:50px;border-radius:50%;background:#FFF3D6;display:flex;align-items:center;justify-content:center;font-size:28px;margin:8px auto 0;}
  .mascot.talk{animation:bob .6s ease-in-out infinite,ring 1.4s ease-out infinite;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const C={purple:"#7C5CFC",purpleDark:"#5B3FD6",yellow:"#FFC83D",coral:"#FF7A6B",mint:"#21C997",sky:"#4DB8FF",soft:"#6B5E94",ink:"#2D2350"};
const app=document.getElementById("app");
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d){try{const x=localStorage.getItem(k);return x?JSON.parse(x):d;}catch(e){return d;}}

/* ---------- visuals ---------- */
function emoji(e){return `<div style="font-size:90px">${e}</div>`;}
function circleSVG(parts,shaded,vertical,size){size=size||150;const r=size/2-6,cx=size/2,cy=size/2;let p="";if(parts===1){p=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#FFE9D6" stroke="#fff" stroke-width="3"/>`;}else{for(let i=0;i<parts;i++){const off=vertical?Math.PI/2:0;const a0=(i/parts)*2*Math.PI-Math.PI/2+off,a1=((i+1)/parts)*2*Math.PI-Math.PI/2+off;const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);const lg=(a1-a0)>Math.PI?1:0;p+=`<path d="M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${lg} 1 ${x1} ${y1} Z" fill="${i<shaded?C.coral:'#FFE9D6'}" stroke="#fff" stroke-width="3"/>`;}}return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${p}<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.purpleDark}" stroke-width="3"/></svg>`;}
function barSVG(parts,shaded,equal,w){w=w||230;const h=58;let widths=[];if(equal){for(let i=0;i<parts;i++)widths.push(w/parts);}else{widths=[w*0.62,w*0.38];}let x=0,p="";widths.forEach((bw,i)=>{p+=`<rect x="${x}" y="4" width="${bw}" height="${h-8}" rx="8" fill="${i<shaded?C.mint:'#E7F8F1'}" stroke="#fff" stroke-width="3"/>`;x+=bw;});return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${p}<rect x="1" y="4" width="${w-2}" height="${h-8}" rx="8" fill="none" stroke="${C.purpleDark}" stroke-width="3"/></svg>`;}
function bigExpr(html){return `<div class="fred" style="font-size:42px;font-weight:700;color:${C.purpleDark};text-align:center">${html}</div>`;}
function column(a,b,op,res,carry){return `<div style="display:inline-block;text-align:right;font-family:Fredoka;font-weight:700;font-size:40px;color:${C.ink};line-height:1.12">${carry?`<div style="font-size:20px;color:${C.coral};text-align:right;height:24px">${carry}</div>`:`<div style="height:24px"></div>`}<div>${a}</div><div><span style="color:${C.purple}">${op}</span>&nbsp;${b}</div><div style="border-top:5px solid ${C.purpleDark};margin-top:4px;padding-top:4px;min-width:130px">${(res===''||res===undefined)?'?':res}</div></div>`;}
function pv(tens,ones){let t='';for(let i=0;i<tens;i++)t+=`<div style="width:12px;height:44px;background:${C.sky};border-radius:3px;border:1px solid #fff"></div>`;let o='';for(let i=0;i<ones;i++)o+=`<div style="width:14px;height:14px;background:${C.yellow};border-radius:50%;border:1px solid #fff"></div>`;return `<div style="display:flex;gap:24px;align-items:flex-end;justify-content:center">${tens>0?`<div style="text-align:center"><div style="display:flex;gap:3px">${t}</div><div style="font-weight:800;color:${C.soft};margin-top:6px;font-size:12px">TENS</div></div>`:''}<div style="text-align:center"><div style="display:flex;gap:4px;flex-wrap:wrap;max-width:100px;justify-content:center">${o}</div><div style="font-weight:800;color:${C.soft};margin-top:6px;font-size:12px">ONES</div></div></div>`;}
function groupsView(e,g,per){let boxes='';for(let i=0;i<g;i++){let inner='';for(let j=0;j<per;j++)inner+=`<span style="font-size:22px">${e}</span>`;boxes+=`<div style="border:3px dashed ${C.purple};border-radius:12px;padding:6px;display:flex;flex-wrap:wrap;gap:2px;max-width:110px;justify-content:center">${inner}</div>`;}return `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:330px;margin:0 auto">${boxes}</div>`;}

/* ============ CHAPTERS (cap=Hinglish, hi, en, mr) ============ */
function fec(f,e,c){const pill=(l,n,bg,fg)=>`<div style="background:${bg};border-radius:12px;padding:6px 10px;text-align:center;min-width:56px"><div style="font-size:11px;font-weight:800;color:${fg}">${l}</div><div class="fred" style="font-size:22px;font-weight:700;color:${fg}">${n}</div></div>`;return `<div style="display:flex;gap:8px;justify-content:center;margin-top:10px">${pill('Faces',f,'#E3FBF1','#13795b')}${pill('Edges',e,'#EAF1FF','#3a52b5')}${pill('Corners',c,'#FFF3D6','#a9791b')}</div>`;}
function solid(svg,f,e,c){return `<div>${svg}${fec(f,e,c)}</div>`;}
function shCube(){return `<svg width="130" height="120" viewBox="0 0 130 120"><polygon points="30,50 90,50 110,30 50,30" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="3"/><rect x="30" y="50" width="60" height="55" fill="#FFD0A6" stroke="#5B3FD6" stroke-width="3"/><polygon points="90,50 110,30 110,85 90,105" fill="#F4B07E" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function shCuboid(){return `<svg width="140" height="115" viewBox="0 0 140 115"><polygon points="22,55 100,55 122,35 44,35" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="3"/><rect x="22" y="55" width="78" height="48" fill="#FFD0A6" stroke="#5B3FD6" stroke-width="3"/><polygon points="100,55 122,35 122,83 100,103" fill="#F4B07E" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function shCyl(){return `<svg width="120" height="125" viewBox="0 0 120 125"><path d="M25,35 V95 A35,12 0 0 0 95,95 V35" fill="#A9D6FF" stroke="#5B3FD6" stroke-width="3"/><ellipse cx="60" cy="35" rx="35" ry="12" fill="#CDE9FF" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function shCone(){return `<svg width="120" height="125" viewBox="0 0 120 125"><polygon points="60,18 95,95 25,95" fill="#FFD0A6" stroke="#5B3FD6" stroke-width="3"/><ellipse cx="60" cy="95" rx="35" ry="12" fill="#F4B07E" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function shSphere(){return `<svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="42" fill="#FFC1B0" stroke="#5B3FD6" stroke-width="3"/><ellipse cx="60" cy="60" rx="42" ry="15" fill="none" stroke="#5B3FD6" stroke-width="2" stroke-dasharray="4 4"/><circle cx="46" cy="46" r="9" fill="#fff" opacity=".5"/></svg>`;}
function shPrism(){return `<svg width="150" height="120" viewBox="0 0 150 120"><polygon points="92,88 132,88 112,38 92,38" fill="none"/><line x1="42" y1="48" x2="112" y2="38" stroke="#5B3FD6" stroke-width="3"/><line x1="20" y1="98" x2="90" y2="88" stroke="#5B3FD6" stroke-width="3"/><line x1="62" y1="98" x2="132" y2="88" stroke="#5B3FD6" stroke-width="3"/><polygon points="20,98 62,98 42,48" fill="#D9F7E6" stroke="#5B3FD6" stroke-width="3"/><polygon points="90,88 132,88 112,38" fill="#BCEFD3" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function shPyr(){return `<svg width="140" height="120" viewBox="0 0 140 120"><polygon points="70,15 25,88 115,88" fill="#E5DBFF" stroke="#5B3FD6" stroke-width="3"/><polygon points="25,88 70,104 115,88 70,74" fill="#C9B8FF" stroke="#5B3FD6" stroke-width="3"/><line x1="70" y1="15" x2="70" y2="74" stroke="#5B3FD6" stroke-width="2" stroke-dasharray="3 3"/></svg>`;}
function shNet(){const s=30,sq=(x,y)=>`<rect x="${x}" y="${y}" width="${s}" height="${s}" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="2.5"/>`;return `<svg width="125" height="150" viewBox="0 0 125 150">${sq(48,8)}${sq(48,40)}${sq(16,40)}${sq(80,40)}${sq(48,72)}${sq(48,104)}</svg>`;}
function twoDrow(){return `<svg width="280" height="70" viewBox="0 0 280 70"><circle cx="35" cy="35" r="28" fill="#FFD0A6" stroke="#5B3FD6" stroke-width="3"/><polygon points="105,8 132,62 78,62" fill="#CDE9FF" stroke="#5B3FD6" stroke-width="3"/><rect x="150" y="8" width="54" height="54" fill="#D9F7E6" stroke="#5B3FD6" stroke-width="3"/><rect x="218" y="20" width="58" height="34" fill="#E5DBFF" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function solidsRow(){return `<div style="font-size:42px;letter-spacing:4px">🧊📦🥫🍦⚽</div>`;}
function shAngle(type){const cx=28,cy=88,len=88;let ang=type==='acute'?40:type==='right'?90:130;const rad=ang*Math.PI/180;const x2=cx+len*Math.cos(-rad),y2=cy+len*Math.sin(-rad);const arc=type==='right'?`<path d="M ${cx+20} ${cy} L ${cx+20} ${cy-20} L ${cx} ${cy-20}" fill="none" stroke="#FF7A6B" stroke-width="2.5"/>`:`<path d="M ${cx+26} ${cy} A 26 26 0 0 1 ${cx+26*Math.cos(-rad)} ${cy+26*Math.sin(-rad)}" fill="none" stroke="#FF7A6B" stroke-width="2.5"/>`;return `<svg width="130" height="105" viewBox="0 0 130 105"><line x1="${cx}" y1="${cy}" x2="${cx+len}" y2="${cy}" stroke="#5B3FD6" stroke-width="3.5"/><line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#5B3FD6" stroke-width="3.5"/>${arc}</svg>`;}
function circleRD(){const cx=75,cy=72,r=58;return `<svg width="150" height="148" viewBox="0 0 150 148"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#EAF4FF" stroke="#5B3FD6" stroke-width="3"/><line x1="${cx-r}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#FF7A6B" stroke-width="3"/><line x1="${cx}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#21C997" stroke-width="5"/><circle cx="${cx}" cy="${cy}" r="4" fill="#5B3FD6"/><text x="${cx+10}" y="${cy-8}" font-size="12" font-weight="700" fill="#13795b">radius</text><text x="${cx-r+4}" y="${cy+20}" font-size="12" font-weight="700" fill="#FF7A6B">diameter</text></svg>`;}
function quadRow(){return `<svg width="300" height="76" viewBox="0 0 300 76"><rect x="8" y="15" width="48" height="48" fill="#D9F7E6" stroke="#5B3FD6" stroke-width="2.5"/><rect x="76" y="24" width="62" height="32" fill="#CDE9FF" stroke="#5B3FD6" stroke-width="2.5"/><polygon points="180,14 210,38 180,62 150,38" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="2.5"/><polygon points="238,14 280,14 298,62 220,62" fill="#E5DBFF" stroke="#5B3FD6" stroke-width="2.5"/></svg>`;}
function rigidPic(){return `<svg width="270" height="94" viewBox="0 0 270 94"><polygon points="20,84 65,14 110,84" fill="#D9F7E6" stroke="#5B3FD6" stroke-width="3"/><polygon points="160,84 190,18 270,18 240,84" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="3"/></svg>`;}
function sqDiag(){return `<svg width="120" height="120" viewBox="0 0 120 120"><rect x="15" y="15" width="90" height="90" fill="#FFE4C4" stroke="#5B3FD6" stroke-width="3"/><line x1="15" y1="15" x2="105" y2="105" stroke="#FF7A6B" stroke-width="3"/></svg>`;}

function grid(rows,cols,mr,mc,e){let cells='';const sz=32;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const on=(r===mr&&c===mc);cells+=`<div style="width:${sz}px;height:${sz}px;border:2px solid #C9BEEF;display:flex;align-items:center;justify-content:center;font-size:18px;background:${on?'#FFF3D6':'#fff'}">${on?e:''}</div>`;}return `<div style="display:inline-grid;grid-template-columns:repeat(${cols},${sz}px);gap:3px">${cells}</div>`;}
function pairs(n){let s='';for(let i=0;i<n;i++){const lo=(n%2===1&&i===n-1);s+=`<div style="width:22px;height:22px;border-radius:50%;background:${lo?'#FF7A6B':'#7C5CFC'};border:2px solid #fff"></div>`;}return `<div style="display:inline-grid;grid-template-columns:repeat(2,26px);gap:7px">${s}</div>`;}
function gridDots(r,c){let s='';for(let i=0;i<r*c;i++)s+=`<div style="width:16px;height:16px;border-radius:50%;background:#21C997;border:1px solid #fff"></div>`;return `<div style="display:inline-grid;grid-template-columns:repeat(${c},20px);gap:4px">${s}</div>`;}
function place4(th,h,t,o){const col=(l,n,bg)=>`<div style="background:${bg};border-radius:10px;padding:6px 8px;text-align:center;min-width:46px"><div style="font-size:10px;font-weight:800;color:#5B3FD6">${l}</div><div class="fred" style="font-size:24px;color:#2D2350">${n}</div></div>`;return `<div style="display:flex;gap:6px;justify-content:center">${col('Th',th,'#E5DBFF')}${col('H',h,'#CDE9FF')}${col('T',t,'#E7F8F1')}${col('O',o,'#FFF3D6')}</div>`;}
function numline(start,end,pts){const w=300,x0=22,x1=278,span=end-start;let t='';pts.forEach(p=>{const x=x0+(p-start)/span*(x1-x0);t+=`<line x1="${x}" y1="34" x2="${x}" y2="54" stroke="#5B3FD6" stroke-width="3"/><text x="${x}" y="72" font-size="13" text-anchor="middle" fill="#2D2350" font-weight="700">${p}</text>`;});return `<svg width="${w}" height="82" viewBox="0 0 ${w} 82"><line x1="${x0}" y1="44" x2="${x1}" y2="44" stroke="#7C5CFC" stroke-width="4"/>${t}</svg>`;}
function miniRect(w,h){return `<svg width="${w}" height="${h}"><rect x="2" y="2" width="${w-4}" height="${h-4}" rx="4" fill="#CDE9FF" stroke="#5B3FD6" stroke-width="2.5"/></svg>`;}
function miniCirc(d){return `<svg width="${d}" height="${d}"><circle cx="${d/2}" cy="${d/2}" r="${d/2-3}" fill="#FFD0A6" stroke="#5B3FD6" stroke-width="2.5"/></svg>`;}
function viewsOf(top,front,side){const b=(l,s)=>`<div style="text-align:center"><div style="font-size:11px;font-weight:800;color:#6B5E94;margin-bottom:3px">${l}</div>${s}</div>`;return `<div style="display:flex;gap:12px;justify-content:center;align-items:flex-end">${b('Top',top)}${b('Front',front)}${b('Side',side)}</div>`;}
function gridLab(items){const sz=36;let cells='';for(let d=0;d<3;d++){const rowNum=3-d;for(let col=1;col<=3;col++){const it=(items||[]).find(o=>o.r===rowNum&&o.c===col);cells+=`<div style="width:${sz}px;height:${sz}px;border:2px solid #C9BEEF;display:flex;align-items:center;justify-content:center;font-size:19px;background:${it?'#FFF3D6':'#fff'}">${it?it.e:''}</div>`;}}return `<div style="display:inline-block;text-align:center"><div style="display:inline-grid;grid-template-columns:repeat(3,${sz}px);gap:3px">${cells}</div><div style="font-size:10px;font-weight:800;color:#6B5E94;margin-top:4px">Col 1&nbsp;&nbsp;Col 2&nbsp;&nbsp;Col 3 &nbsp;(Row 1 = neeche)</div></div>`;}
function stepPath(txt){return `<div style="font-size:30px;letter-spacing:3px;font-weight:800;color:#5B3FD6">${txt}</div>`;}

const CH=[
 {id:'shapes',title:'Shapes Around Us',emoji:'📐',color:C.sky,scenes:[
   {art:emoji("🐘"),cap:"Chapter 1 — Shapes Around Us! Har cheez mein koi shape hai.",hi:"नमस्ते दोस्तों! मैं हूँ गट्टू। आज हम पहला चॅप्टर सीखेंगे — शेप्स अराउंड अस। हमारे आसपास देखो — गेंद, डिब्बा, किताब, गिलास — हर चीज़ में कोई न कोई आकार छिपा है।",en:"Namaste friends! I am Gattu. Today we start chapter one, Shapes Around Us. Look around you — a ball, a box, a book, a glass — every single thing has some shape hidden in it.",mr:"नमस्कार मित्रांनो! मी गट्टू. आज आपण पहिला धडा शिकू — शेप्स अराउंड अस. आजूबाजूला पाहा — चेंडू, खोका, पुस्तक, ग्लास — प्रत्येक गोष्टीत काही ना काही आकार लपलेला आहे.",dur:9000},
   {art:emoji("🏛️"),cap:"Badi buildings shapes se banti hain — base, pillar, roof.",hi:"बड़ी-बड़ी इमारतें जैसे क़ुतुब मीनार और इंडिया गेट भी आकारों से ही बनती हैं। नीचे चौड़ा बेस, बीच में सीधे खंभे, और ऊपर छत — सब अलग-अलग shapes जोड़कर बनाई जाती हैं।",en:"Even huge buildings like Qutub Minar and India Gate are made from shapes. A wide base at the bottom, straight pillars in the middle, and a roof on top — all built by joining different shapes together.",mr:"कुतुबमिनार आणि इंडिया गेटसारख्या मोठ्या इमारतीही आकारांपासूनच बनतात. खाली रुंद पाया, मध्ये सरळ खांब, आणि वर छत — सगळे वेगवेगळे आकार जोडून बनवले जातात.",dur:9500},
   {art:emoji("🧱"),cap:"Har eent (brick) ek CUBOID hai — sab faces rectangle, flat.",hi:"देखो, हर ईंट एक क्यूबॉइड होती है। इसके छहों फेस यानी सतहें आयताकार और बिल्कुल सपाट होती हैं — इसीलिए ईंटें एक के ऊपर एक आसानी से जमती हैं।",en:"See, each brick is a cuboid. All six of its faces, that is its surfaces, are rectangular and perfectly flat — that is why bricks stack so neatly one on top of another.",mr:"पाहा, प्रत्येक वीट एक क्यूबॉइड असते. तिचे सहाही फेस म्हणजे पृष्ठभाग आयताकृती आणि अगदी सपाट असतात — म्हणूनच विटा एकावर एक सहज रचता येतात.",dur:9500},
   {art:`<div style="font-size:46px">📄 &nbsp; vs &nbsp; 📦</div>`,cap:"Do tarah ki shapes: FLAT (2D) kaagaz pe, aur SOLID (3D) jise pakad sako.",hi:"शेप्स दो तरह की होती हैं। एक — सपाट यानी टू-डी, जो कागज़ पर बनती हैं, जैसे गोल या चौकोर। दूसरी — ठोस यानी थ्री-डी, जिन्हें हम हाथ में पकड़ सकते हैं, जैसे डिब्बा या गेंद।",en:"Shapes are of two kinds. One is flat, called 2D, which we draw on paper, like a circle or a square. The other is solid, called 3D, which we can hold in our hand, like a box or a ball.",mr:"आकार दोन प्रकारचे असतात. एक — सपाट म्हणजे टू-डी, जे कागदावर काढतो, जसे वर्तुळ किंवा चौकोन. दुसरा — घन म्हणजे थ्री-डी, जे हातात धरता येतात, जसे खोका किंवा चेंडू.",dur:10000},
   {art:twoDrow(),cap:"2D (flat): circle, triangle, square, rectangle. Sirf length + width.",hi:"ये रहीं टू-डी सपाट shapes — गोल, त्रिकोण, चौकोर और आयत। इनमें सिर्फ लंबाई और चौड़ाई होती है, मोटाई नहीं — इसलिए इन्हें सिर्फ कागज़ पर बना सकते हैं, हाथ में नहीं पकड़ सकते।",en:"Here are the 2D flat shapes — circle, triangle, square and rectangle. They have only length and width, no thickness — so we can only draw them on paper, we cannot hold them.",mr:"ही आहेत टू-डी सपाट आकार — वर्तुळ, त्रिकोण, चौकोन आणि आयत. यांना फक्त लांबी आणि रुंदी असते, जाडी नाही — म्हणून ते फक्त कागदावर काढता येतात, हातात धरता येत नाहीत.",dur:9500},
   {art:solidsRow(),cap:"3D (solid): cube, cuboid, cylinder, cone, sphere. Length+width+height.",hi:"और ये रहीं थ्री-डी ठोस shapes — क्यूब, क्यूबॉइड, सिलिंडर, कोन और स्फियर। इनमें लंबाई, चौड़ाई और ऊँचाई तीनों होती हैं, इसीलिए ये जगह घेरती हैं और हाथ में आती हैं।",en:"And here are the 3D solid shapes — cube, cuboid, cylinder, cone and sphere. They have length, width and height, all three, which is why they take up space and we can hold them.",mr:"आणि ही आहेत थ्री-डी घन आकार — क्यूब, क्यूबॉइड, सिलिंडर, कोन आणि स्फिअर. यांना लांबी, रुंदी आणि उंची तिन्ही असतात, म्हणून ते जागा व्यापतात आणि हातात येतात.",dur:9500},
   {art:shCube(),cap:"Solid ke 3 parts: FACE (samtal hissa), EDGE (kinaara), CORNER (nukila kona).",hi:"हर ठोस आकार के तीन हिस्से होते हैं। फेस यानी सपाट या घुमावदार सतह। एज यानी वो रेखा जहाँ दो फेस मिलते हैं। और कॉर्नर यानी वो नुकीला बिंदु जहाँ कई एज आकर मिलते हैं।",en:"Every solid shape has three parts. A face is a flat or curved surface. An edge is the line where two faces meet. And a corner is the pointy spot where several edges meet.",mr:"प्रत्येक घन आकाराचे तीन भाग असतात. फेस म्हणजे सपाट किंवा वक्र पृष्ठभाग. एज म्हणजे जिथे दोन फेस मिळतात ती रेषा. आणि कॉर्नर म्हणजे जिथे अनेक एज मिळतात तो टोकदार बिंदू.",dur:11000},
   {art:solid(shCube(),6,12,8),cap:"CUBE (dice 🎲): 6 faces, 12 edges, 8 corners. Sab faces square.",hi:"यह है क्यूब, बिल्कुल पासे जैसा। इसके छह फेस होते हैं और सारे के सारे वर्ग यानी स्क्वायर। इसके बारह एज और आठ कॉर्नर होते हैं। इसकी लंबाई, चौड़ाई, ऊँचाई सब बराबर होती हैं।",en:"This is a cube, just like a dice. It has six faces and every one of them is a square. It has twelve edges and eight corners. Its length, width and height are all equal.",mr:"हा आहे क्यूब, अगदी फाशासारखा. याला सहा फेस असतात आणि सगळे चौरस. याला बारा एज आणि आठ कॉर्नर असतात. याची लांबी, रुंदी, उंची सगळी सारखी असते.",dur:11000},
   {art:solid(shCuboid(),6,12,8),cap:"CUBOID (box/eent 📦): 6 faces, 12 edges, 8 corners. Faces rectangle.",hi:"यह है क्यूबॉइड, जैसे माचिस की डिब्बी या ईंट। इसके भी छह फेस, बारह एज और आठ कॉर्नर होते हैं — बिल्कुल क्यूब जितने। पर फर्क यह है कि इसके फेस आयताकार होते हैं, वर्ग नहीं।",en:"This is a cuboid, like a matchbox or a brick. It also has six faces, twelve edges and eight corners — same as a cube. But the difference is that its faces are rectangles, not squares.",mr:"हा आहे क्यूबॉइड, जसे आगपेटी किंवा वीट. याला सुद्धा सहा फेस, बारा एज आणि आठ कॉर्नर असतात — क्यूबइतकेच. पण फरक हा की याचे फेस आयताकृती असतात, चौरस नाहीत.",dur:11000},
   {art:solid(shCyl(),3,2,0),cap:"CYLINDER (can 🥫): 2 flat + 1 curved face, 2 edges, 0 corners.",hi:"यह है सिलिंडर, जैसे गिलास या ठंडे पेय का डिब्बा। इसके दो सपाट गोल फेस होते हैं — ऊपर और नीचे, और बीच में एक घुमावदार फेस। इसके दो एज होते हैं पर एक भी कॉर्नर नहीं।",en:"This is a cylinder, like a glass or a cold drink can. It has two flat round faces — top and bottom, and one curved face in the middle. It has two edges but not a single corner.",mr:"हा आहे सिलिंडर, जसे ग्लास किंवा थंड पेयाचा डबा. याला दोन सपाट गोल फेस असतात — वर आणि खाली, आणि मध्ये एक वक्र फेस. याला दोन एज असतात पण एकही कॉर्नर नाही.",dur:11000},
   {art:solid(shCone(),2,1,1),cap:"CONE (ice-cream 🍦): 1 flat + 1 curved face, 1 edge, 1 corner.",hi:"यह है कोन, जैसे आइसक्रीम का कोन या जन्मदिन की टोपी। इसके नीचे एक सपाट गोल फेस और एक घुमावदार फेस होता है। इसका एक एज और ऊपर सिर्फ एक नुकीला कॉर्नर होता है।",en:"This is a cone, like an ice-cream cone or a birthday cap. It has one flat round face at the bottom and one curved face. It has one edge and just one pointy corner at the top.",mr:"हा आहे कोन, जसे आईस्क्रीम कोन किंवा वाढदिवसाची टोपी. याला खाली एक सपाट गोल फेस आणि एक वक्र फेस असतो. याला एक एज आणि वर फक्त एक टोकदार कॉर्नर असतो.",dur:11000},
   {art:solid(shSphere(),1,0,0),cap:"SPHERE (ball ⚽): 1 curved face, 0 edges, 0 corners. Bilkul gol!",hi:"यह है स्फियर, जैसे फुटबॉल या गेंद। यह पूरी तरह गोल होता है। इसका सिर्फ एक घुमावदार फेस होता है, और एक भी एज या कॉर्नर नहीं होता — इसीलिए यह लुढ़कता है।",en:"This is a sphere, like a football or a ball. It is perfectly round. It has only one curved face, and not a single edge or corner — that is why it rolls.",mr:"हा आहे स्फिअर, जसे फुटबॉल किंवा चेंडू. हा पूर्णपणे गोल असतो. याला फक्त एक वक्र फेस असतो, आणि एकही एज किंवा कॉर्नर नसतो — म्हणूनच तो घरंगळतो.",dur:10500},
   {art:solid(shPrism(),5,9,6),cap:"PRISM: dono sire same shape. Triangular prism: 5 faces, 9 edges, 6 corners.",hi:"यह है प्रिज़्म। इसकी खासियत यह है कि इसके दोनों सिरे एक जैसी shape के होते हैं, और बीच में आयताकार फेस होते हैं। त्रिकोणीय प्रिज़्म में दो त्रिकोण और तीन आयत — कुल पाँच फेस, नौ एज और छह कॉर्नर होते हैं।",en:"This is a prism. Its special feature is that both its ends are the same shape, with rectangular faces in between. A triangular prism has two triangles and three rectangles — five faces in all, nine edges and six corners.",mr:"हा आहे प्रिझम. याची खासियत म्हणजे याची दोन्ही टोके एकाच आकाराची असतात, आणि मध्ये आयताकृती फेस असतात. त्रिकोणी प्रिझममध्ये दोन त्रिकोण आणि तीन आयत — एकूण पाच फेस, नऊ एज आणि सहा कॉर्नर.",dur:12000},
   {art:shCube(),cap:"Cube aur cuboid bhi PRISM hain — inke dono sire same.",hi:"एक मज़े की बात — क्यूब और क्यूबॉइड भी असल में प्रिज़्म ही हैं! क्योंकि इनके दोनों सिरे भी एक जैसे होते हैं। क्यूब को स्क्वायर प्रिज़्म भी कह सकते हैं।",en:"Here is a fun fact — a cube and a cuboid are actually prisms too! Because their two ends are also the same. A cube can even be called a square prism.",mr:"एक मजेशीर गोष्ट — क्यूब आणि क्यूबॉइड हे खरं तर प्रिझमच आहेत! कारण यांची दोन्ही टोके सारखी असतात. क्यूबला स्क्वेअर प्रिझमही म्हणता येते.",dur:9500},
   {art:solid(shPyr(),5,8,5),cap:"PYRAMID: ek base + tikoni faces ek apex pe milti. Square pyramid: 5,8,5.",hi:"यह है पिरामिड, मिस्र के पिरामिडों जैसा। इसका एक आधार होता है, और बाकी तिकोनी फेस ऊपर जाकर एक नुकीले बिंदु पर मिलते हैं। वर्गाकार पिरामिड में पाँच फेस, आठ एज और पाँच कॉर्नर होते हैं।",en:"This is a pyramid, like the pyramids of Egypt. It has one base, and the rest are triangular faces that go up and meet at one pointy spot. A square pyramid has five faces, eight edges and five corners.",mr:"हा आहे पिरॅमिड, इजिप्तच्या पिरॅमिडसारखा. याला एक तळ असतो, आणि बाकीचे त्रिकोणी फेस वर जाऊन एका टोकदार बिंदूवर मिळतात. चौरस पिरॅमिडमध्ये पाच फेस, आठ एज आणि पाच कॉर्नर असतात.",dur:12000},
   {art:solid(shPyr(),4,6,4),cap:"Triangular pyramid: 4 faces (sab triangle), 6 edges, 4 corners.",hi:"अगर पिरामिड का आधार भी त्रिकोण हो, तो उसे त्रिकोणीय पिरामिड कहते हैं। इसके चारों फेस त्रिकोण होते हैं। इसमें कुल चार फेस, छह एज और चार कॉर्नर होते हैं।",en:"If a pyramid's base is also a triangle, it is called a triangular pyramid. All four of its faces are triangles. It has four faces, six edges and four corners in all.",mr:"जर पिरॅमिडचा तळसुद्धा त्रिकोण असेल, तर त्याला त्रिकोणी पिरॅमिड म्हणतात. याचे चारही फेस त्रिकोण असतात. यात एकूण चार फेस, सहा एज आणि चार कॉर्नर असतात.",dur:10500},
   {art:`<div style="display:flex;gap:6px;justify-content:center;align-items:center">${shPrism()}${shPyr()}</div>`,cap:"Farak: PRISM ke 2 same sire; PYRAMID mein 1 base + nukila top (apex).",hi:"अब प्रिज़्म और पिरामिड का फर्क याद रखो। प्रिज़्म के दोनों सिरे एक जैसे होते हैं। जबकि पिरामिड में नीचे सिर्फ एक आधार होता है और ऊपर एक नुकीला सिरा, जिसे apex कहते हैं।",en:"Now remember the difference between a prism and a pyramid. A prism has two ends that are the same. But a pyramid has just one base at the bottom and one pointy top, which is called the apex.",mr:"आता प्रिझम आणि पिरॅमिडमधला फरक लक्षात ठेवा. प्रिझमची दोन्ही टोके सारखी असतात. पण पिरॅमिडला खाली फक्त एक तळ आणि वर एक टोकदार टोक असते, ज्याला apex म्हणतात.",dur:11500},
   {art:shNet(),cap:"NET: solid ko kholke flat karo. Cube ka net = 6 squares.",hi:"नेट एक मज़ेदार चीज़ है। किसी ठोस आकार को खोलकर सपाट फैला दो, तो जो आकृति बनती है उसे नेट कहते हैं। क्यूब को खोलो तो उसका नेट छह वर्गों से बनता है।",en:"A net is a fun thing. When you open up a solid shape and spread it out flat, the figure you get is called its net. Open a cube and its net is made of six squares.",mr:"नेट ही एक मजेशीर गोष्ट आहे. एखादा घन आकार उघडून सपाट पसरवला, की जी आकृती तयार होते तिला नेट म्हणतात. क्यूब उघडला की त्याचे नेट सहा चौरसांचे बनते.",dur:11000},
   {art:`<div style="display:flex;gap:8px;align-items:center;justify-content:center">${shNet()}<div style="font-size:32px">➡️</div>${shCube()}</div>`,cap:"Net ko fold karo to wapas SOLID ban jata hai!",hi:"और जादू यह है — इसी नेट को वापस मोड़ दो, तो वही ठोस आकार फिर से बन जाता है! जैसे किसी डिब्बे को खोलो और फिर मोड़कर डिब्बा बना लो।",en:"And the magic is — fold that same net back, and the solid shape forms again! Just like opening a box flat and then folding it back into a box.",mr:"आणि जादू अशी — तेच नेट पुन्हा दुमडले, की तोच घन आकार पुन्हा तयार होतो! जसे एखादा खोका उघडून पुन्हा दुमडून खोका बनवणे.",dur:10500},
   {art:bigExpr("F + V − E = 2"),cap:"Jadui rishta! Faces + Corners − Edges = hamesha 2",hi:"अब एक बहुत जादुई नियम। किसी भी ठोस के फेस की संख्या जोड़ कॉर्नर की संख्या, फिर उसमें से एज की संख्या घटाओ — जवाब हमेशा दो ही आता है!",en:"Now a very magical rule. For any solid, add the number of faces and the number of corners, then subtract the number of edges — the answer is always two!",mr:"आता एक खूप जादूचा नियम. कोणत्याही घनाच्या फेसची संख्या अधिक कॉर्नरची संख्या, मग त्यातून एजची संख्या वजा करा — उत्तर नेहमी दोनच येते!",dur:11000},
   {art:bigExpr("Cube: 6+8−12 = 2<br>Sq.Pyramid: 5+5−8 = 2"),cap:"Cube: 6+8−12=2. Pyramid: 5+5−8=2. Har solid pe chalega!",hi:"देखो — क्यूब में छह फेस जोड़ आठ कॉर्नर घटाओ बारह एज, बराबर दो। पिरामिड में पाँच जोड़ पाँच घटाओ आठ, फिर भी दो। यह हर ठोस पर काम करता है — खुद try करके देखना!",en:"Look — in a cube, six faces plus eight corners minus twelve edges equals two. In a pyramid, five plus five minus eight, again two. It works for every solid — try it yourself!",mr:"पाहा — क्यूबमध्ये सहा फेस अधिक आठ कॉर्नर वजा बारा एज, बरोबर दोन. पिरॅमिडमध्ये पाच अधिक पाच वजा आठ, तरीही दोन. हे प्रत्येक घनावर चालते — स्वतः करून पाहा!",dur:12000},
   {art:`<div style="font-size:64px">🎲</div>${bigExpr("1↔6 &nbsp; 2↔5 &nbsp; 3↔4")}`,cap:"Dice trick: aamne-saamne ke faces ka jod hamesha 7!",hi:"पासे की एक प्यारी ट्रिक। पासे में आमने-सामने वाले फेस का जोड़ हमेशा सात होता है। एक के सामने छह, दो के सामने पाँच, और तीन के सामने चार।",en:"A lovely dice trick. On a dice, opposite faces always add up to seven. One is opposite six, two is opposite five, and three is opposite four.",mr:"फाशाची एक छान युक्ती. फाशावर समोरासमोरच्या फेसची बेरीज नेहमी सात असते. एकच्या समोर सहा, दोनच्या समोर पाच, आणि तीनच्या समोर चार.",dur:11000},
   {art:`<div style="display:flex;gap:6px;justify-content:center">${shPrism()}${shCuboid()}</div>`,cap:"Prism kai tarah ke: triangular, square, hexagonal — naam base ke shape se.",hi:"प्रिज़्म कई तरह के होते हैं — त्रिकोणीय, वर्गाकार, षट्कोणीय। इनका नाम इनके सिरे यानी base की shape से पड़ता है।",en:"Prisms come in many types — triangular, square, hexagonal. Their name comes from the shape of their end, the base.",mr:"प्रिझम अनेक प्रकारचे असतात — त्रिकोणी, चौरस, षटकोनी. यांचे नाव त्यांच्या टोकाच्या म्हणजे base च्या आकारावरून पडते.",dur:10000},
   {art:`<div style="display:flex;gap:6px;justify-content:center">${shPyr()}${shPyr()}</div>`,cap:"Pyramid bhi: triangular, square, pentagonal, hexagonal — base ke shape se naam.",hi:"पिरामिड भी कई तरह के — त्रिकोणीय, वर्गाकार, पंचकोणीय, षट्कोणीय। इनका नाम भी base की shape से पड़ता है।",en:"Pyramids too have types — triangular, square, pentagonal, hexagonal. Their name also comes from the base shape.",mr:"पिरॅमिडही अनेक प्रकारचे — त्रिकोणी, चौरस, पंचकोनी, षटकोनी. यांचे नावही base च्या आकारावरून पडते.",dur:10000},
   {art:`<div style="font-size:54px">📐 ✏️</div>`,cap:"ANGLE: jab do lines ek point pe milti hain, to angle banta hai.",hi:"अब एंगल यानी कोण सीखते हैं। जब दो रेखाएँ एक बिंदु पर मिलती हैं, तो उनके बीच जो खुलाव बनता है उसे एंगल कहते हैं।",en:"Now let's learn about angles. When two lines meet at a point, the opening between them is called an angle.",mr:"आता अँगल म्हणजे कोन शिकू. जेव्हा दोन रेषा एका बिंदूवर मिळतात, तेव्हा त्यांच्यातला फटीला अँगल म्हणतात.",dur:10000},
   {art:shAngle('right'),cap:"RIGHT ANGLE: ekdam corner jaisa (90°), jaise kitab ya khidki ka kona.",hi:"राइट एंगल यानी समकोण — यह बिल्कुल किताब या खिड़की के कोने जैसा सीधा कोना होता है। इसे नब्बे डिग्री कहते हैं।",en:"A right angle is a perfect square corner, like the corner of a book or a window. It is called ninety degrees.",mr:"राइट अँगल म्हणजे काटकोन — हा अगदी पुस्तक किंवा खिडकीच्या कोपऱ्यासारखा सरळ कोपरा असतो. याला नव्वद अंश म्हणतात.",dur:10000},
   {art:shAngle('acute'),cap:"ACUTE ANGLE: right angle se CHHOTA (nukila), jaise A ka upar wala kona.",hi:"एक्यूट एंगल यानी न्यून कोण — यह राइट एंगल से छोटा और नुकीला होता है। जैसे अंग्रेज़ी अक्षर A के ऊपर का कोना।",en:"An acute angle is smaller and sharper than a right angle. Like the pointed top of the letter A.",mr:"अॅक्यूट अँगल म्हणजे लघुकोन — हा राइट अँगलपेक्षा लहान आणि टोकदार असतो. जसे इंग्रजी A अक्षराचा वरचा कोपरा.",dur:10000},
   {art:shAngle('obtuse'),cap:"OBTUSE ANGLE: right angle se BADA (khula), jaise letter V kholdo.",hi:"ऑब्ट्यूज़ एंगल यानी अधिक कोण — यह राइट एंगल से बड़ा और ज़्यादा खुला होता है। जैसे V को और चौड़ा खोल दो।",en:"An obtuse angle is bigger and more open than a right angle. Like opening the letter V wider.",mr:"ऑब्ट्यूज अँगल म्हणजे विशालकोन — हा राइट अँगलपेक्षा मोठा आणि जास्त उघडा असतो. जसे V अधिक रुंद उघडणे.",dur:10000},
   {art:`<div style="display:flex;gap:18px">${shAngle('acute')}${shAngle('right')}${shAngle('obtuse')}</div>`,cap:"3 angles: chhota=acute, corner=right, bada=obtuse. Yaad rakho!",hi:"तीनों एक साथ याद रखो — छोटा कोण एक्यूट, कोने जैसा राइट, और बड़ा कोण ऑब्ट्यूज़।",en:"Remember all three together — small is acute, corner is right, big is obtuse.",mr:"तिन्ही एकत्र लक्षात ठेवा — लहान म्हणजे अॅक्यूट, कोपरा म्हणजे राइट, मोठा म्हणजे ऑब्ट्यूज.",dur:9000},
   {art:quadRow(),cap:"4-sided (quadrilateral) shapes: square, rectangle, rhombus, trapezium.",hi:"चार भुजाओं वाली shapes को quadrilateral कहते हैं — वर्ग, आयत, समचतुर्भुज और समलंब। सबके चार side और चार कोने होते हैं।",en:"Four-sided shapes are called quadrilaterals — square, rectangle, rhombus and trapezium. All have four sides and four corners.",mr:"चार बाजूंच्या आकारांना quadrilateral म्हणतात — चौरस, आयत, समभुज चौकोन आणि समलंब. सर्वांना चार बाजू आणि चार कोपरे असतात.",dur:10500},
   {art:quadRow(),cap:"Square: 4 equal sides + 4 right angles. Rectangle: 4 right angles.",hi:"वर्ग यानी square के चारों side बराबर होते हैं और चारों कोने राइट एंगल। आयत यानी rectangle के भी चारों कोने राइट एंगल, पर सामने वाले side बराबर।",en:"A square has four equal sides and four right angles. A rectangle also has four right angles, but only opposite sides are equal.",mr:"चौरसाच्या चारही बाजू समान आणि चारही कोपरे काटकोन. आयताचेही चारही कोपरे काटकोन, पण फक्त समोरासमोरच्या बाजू समान.",dur:11000},
   {art:quadRow(),cap:"Square ek khaas RECTANGLE hai — bas saare side barabar!",hi:"असल में वर्ग एक खास आयत ही है! फर्क सिर्फ इतना कि वर्ग के चारों side बराबर होते हैं।",en:"In fact, a square is a special rectangle! The only difference is that all four sides of a square are equal.",mr:"खरं तर चौरस हा एक खास आयतच आहे! फरक एवढाच की चौरसाच्या चारही बाजू समान असतात.",dur:9500},
   {art:bigExpr("Sides = Angles<br>3 side → 3 angle<br>4 side → 4 angle"),cap:"Rishta: jitne sides, utne hi angles (corners).",hi:"एक नियम याद रखो — किसी shape में जितने side होते हैं, उतने ही angle यानी कोने होते हैं। त्रिकोण में तीन, चौकोर में चार।",en:"Remember a rule — a shape has as many angles, or corners, as it has sides. A triangle has three, a quadrilateral has four.",mr:"एक नियम लक्षात ठेवा — आकाराला जेवढ्या बाजू, तेवढेच कोन म्हणजे कोपरे असतात. त्रिकोणाला तीन, चौकोनाला चार.",dur:10500},
   {art:rigidPic(),cap:"TRIANGLE sabse mazboot! Dabane pe shape nahi badalta. Rectangle badal jata hai.",hi:"त्रिकोण सबसे मज़बूत shape है — इसे दबाओ तो भी इसकी shape नहीं बदलती। पर आयत को दबाओ तो वह टेढ़ा हो जाता है। इसीलिए पुल और छतों में त्रिकोण इस्तेमाल होते हैं।",en:"A triangle is the strongest shape — push it and its shape does not change. But push a rectangle and it leans over. That is why triangles are used in bridges and roofs.",mr:"त्रिकोण सर्वात मजबूत आकार आहे — दाबला तरी त्याचा आकार बदलत नाही. पण आयत दाबला की तो वाकतो. म्हणूनच पूल आणि छतांमध्ये त्रिकोण वापरतात.",dur:11500},
   {art:sqDiag(),cap:"Square mein ek DIAGONAL line kheencho to 2 triangle ban jaate!",hi:"एक मज़ेदार बात — किसी वर्ग में एक कोने से दूसरे कोने तक तिरछी रेखा यानी diagonal खींचो, तो वह दो त्रिकोणों में बँट जाता है।",en:"A fun fact — draw a slanting line, a diagonal, from one corner of a square to the other, and it splits into two triangles.",mr:"एक मजेशीर गोष्ट — चौरसात एका कोपऱ्यापासून दुसऱ्या कोपऱ्यापर्यंत तिरकी रेषा म्हणजे diagonal काढली, की तो दोन त्रिकोणांत विभागतो.",dur:10500},
   {art:`<div style="font-size:64px">⚪ 🎯</div>`,cap:"CIRCLE: ek gol 2D shape. Iska beech ka point = CENTRE.",hi:"अब वृत्त यानी circle। यह एक गोल चपटी shape है। इसके ठीक बीच के बिंदु को centre यानी केंद्र कहते हैं।",en:"Now the circle. It is a round flat shape. The point right at its middle is called the centre.",mr:"आता वर्तुळ म्हणजे circle. हा एक गोल सपाट आकार आहे. याच्या अगदी मध्यबिंदूला centre म्हणजे केंद्र म्हणतात.",dur:9500},
   {art:circleRD(),cap:"RADIUS: centre se border tak. DIAMETER: ek kinare se doosre, centre se hoke.",hi:"केंद्र से किनारे तक की दूरी को radius यानी त्रिज्या कहते हैं। और एक किनारे से केंद्र होते हुए दूसरे किनारे तक की पूरी रेखा को diameter यानी व्यास कहते हैं।",en:"The distance from the centre to the border is the radius. The full line from one edge through the centre to the other edge is the diameter.",mr:"केंद्रापासून कडेपर्यंतच्या अंतराला radius म्हणजे त्रिज्या म्हणतात. आणि एका कडेपासून केंद्रातून दुसऱ्या कडेपर्यंतच्या रेषेला diameter म्हणजे व्यास म्हणतात.",dur:11500},
   {art:bigExpr("Diameter = 2 × Radius"),cap:"Rishta: Diameter hamesha Radius ka DOUBLE hota hai!",hi:"और एक प्यारा नियम — diameter हमेशा radius का दोगुना होता है। यानी व्यास बराबर दो गुना त्रिज्या।",en:"And a lovely rule — the diameter is always double the radius. That is, diameter equals two times radius.",mr:"आणि एक छान नियम — diameter नेहमी radius च्या दुप्पट असतो. म्हणजे व्यास बरोबर दोन गुणिले त्रिज्या.",dur:9500},
   {art:emoji("📦"),cap:"Recap: solids+counts, prism/pyramid types, angles, 4-sided shapes, triangle strong, circle (radius/diameter), net, F+V−E=2.",hi:"चलो सब दोहराते हैं — हर ठोस के फेस-एज-कॉर्नर; प्रिज़्म और पिरामिड के प्रकार; राइट, एक्यूट, ऑब्ट्यूज़ एंगल; चार भुजाओं वाली shapes; त्रिकोण सबसे मज़बूत; circle की radius और diameter; नेट; और फेस जोड़ कॉर्नर घटाओ एज बराबर दो।",en:"Let's recap everything — faces, edges, corners of solids; types of prisms and pyramids; right, acute and obtuse angles; four-sided shapes; the triangle is strongest; the circle's radius and diameter; nets; and faces plus corners minus edges equals two.",mr:"चला सर्व उजळणी करू — घनांचे फेस-एज-कॉर्नर; प्रिझम आणि पिरॅमिडचे प्रकार; राइट, अॅक्यूट, ऑब्ट्यूज अँगल; चार बाजूंचे आकार; त्रिकोण सर्वात मजबूत; वर्तुळाची radius आणि diameter; नेट; आणि फेस अधिक कॉर्नर वजा एज बरोबर दोन.",dur:12000},
   {art:emoji("🌟"),cap:"Shabaash! Ab Shapes Around Us ka quiz khelo aur perfect bano! 🎉",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब शेप्स अराउंड अस का क्विज़ खेलो — चौबीस सवाल हैं — और परफेक्ट बनो!",en:"Well done! You have learned the whole chapter. Now play the Shapes Around Us quiz — there are twenty-four questions — and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता शेप्स अराउंड अस चा क्विझ खेळ — चोवीस प्रश्न आहेत — आणि परफेक्ट हो!",dur:8500},

 {id:'views',title:'Hide and Seek (Views)',emoji:'👀',color:C.mint,scenes:[
   {art:emoji("🐘"),cap:"Chapter 2 — Hide and Seek! Ek cheez alag side se alag dikhti hai.",hi:"नमस्ते दोस्तों! आज हम दूसरा चॅप्टर सीखेंगे — हाइड एंड सीक यानी छुपन-छुपाई। इसमें हम सीखेंगे कि एक ही चीज़ अलग-अलग तरफ से देखने पर अलग कैसे दिखती है।",en:"Namaste friends! Today we learn chapter two, Hide and Seek. We will see how the same thing looks different when we view it from different sides.",mr:"नमस्कार मित्रांनो! आज आपण दुसरा धडा शिकू — हाइड अँड सीक म्हणजे लपाछपी. यात आपण शिकू की एकच गोष्ट वेगवेगळ्या बाजूंनी पाहिल्यावर वेगळी कशी दिसते.",dur:9500},
   {art:`<div style="font-size:54px">🙈🌳🏚️</div>`,cap:"Hide & seek: jo jahan chhupa hai, har koi use nahi dekh sakta.",hi:"छुपन-छुपाई में बच्चे अलग-अलग जगह छुपते हैं — पेड़ के पीछे, झाड़ी में, दीवार की ओट में। जो जहाँ खड़ा है, वहीं से जो दिखता है उतना ही देख पाता है।",en:"In hide and seek, children hide in different places — behind a tree, in a bush, behind a wall. Whoever stands somewhere can only see what is visible from that spot.",mr:"लपाछपीत मुले वेगवेगळ्या ठिकाणी लपतात — झाडामागे, झुडपात, भिंतीच्या आडोशाला. जो जिथे उभा आहे, तिथूनच जे दिसते तेवढेच पाहू शकतो.",dur:10500},
   {art:`<div style="font-size:50px">👁️ → 🧱</div>`,cap:"Same cheez ko alag jagah se dekho to alag roop dikhta hai.",hi:"एक खास बात — किसी एक ही चीज़ को अगर तुम अलग-अलग जगह से देखो, तो वह हर बार थोड़ी अलग दिखती है। यही इस चॅप्टर का मुख्य विचार है।",en:"Here is the key idea — if you look at one and the same thing from different places, it looks a little different each time. That is the main idea of this chapter.",mr:"एक खास गोष्ट — एकाच गोष्टीला जर तू वेगवेगळ्या ठिकाणाहून पाहिलेस, तर ती प्रत्येक वेळी थोडी वेगळी दिसते. हाच या धड्याचा मुख्य विचार आहे.",dur:10500},
   {art:viewsOf(miniRect(46,46),miniRect(46,30),miniRect(30,30)),cap:"3 khaas views: TOP (upar se), FRONT (saamne se), SIDE (bagal se).",hi:"किसी चीज़ को देखने के तीन खास तरीके हैं — टॉप व्यू यानी ऊपर से, फ्रंट व्यू यानी सामने से, और साइड व्यू यानी बगल से। इन तीनों को अच्छे से याद रखना।",en:"There are three special ways to look at a thing — the top view from above, the front view from the front, and the side view from the side. Remember these three well.",mr:"एखादी गोष्ट पाहण्याचे तीन खास मार्ग आहेत — टॉप व्ह्यू म्हणजे वरून, फ्रंट व्ह्यू म्हणजे समोरून, आणि साइड व्ह्यू म्हणजे बाजूने. हे तिन्ही नीट लक्षात ठेवा.",dur:11000},
   {art:`<div style="font-size:54px">🚁⬇️👁️</div>`,cap:"TOP VIEW: ekdam upar se neeche dekho — jaise chidiya ya drone.",hi:"टॉप व्यू का मतलब है किसी चीज़ को बिल्कुल ऊपर से नीचे की ओर देखना — जैसे आसमान में उड़ती चिड़िया या ड्रोन देखता है।",en:"Top view means looking at a thing straight down from above — like a bird flying in the sky or a drone sees it.",mr:"टॉप व्ह्यू म्हणजे एखादी गोष्ट अगदी वरून खाली पाहणे — जसे आकाशात उडणारा पक्षी किंवा ड्रोन पाहतो.",dur:9500},
   {art:`<div style="font-size:54px">😀➡️🧱</div>`,cap:"FRONT VIEW: cheez ke bilkul saamne khade hoke dekho.",hi:"फ्रंट व्यू का मतलब है किसी चीज़ के बिल्कुल सामने खड़े होकर सीधे देखना — जैसे तुम अपने सामने रखी किताब को देखते हो।",en:"Front view means standing right in front of a thing and looking straight at it — like you look at a book kept in front of you.",mr:"फ्रंट व्ह्यू म्हणजे एखाद्या गोष्टीच्या अगदी समोर उभे राहून सरळ पाहणे — जसे तू तुझ्यासमोर ठेवलेले पुस्तक पाहतोस.",dur:9500},
   {art:`<div style="font-size:54px">😀 ↔️ 📦</div>`,cap:"SIDE VIEW: cheez ke bagal (side) se dekho.",hi:"साइड व्यू का मतलब है किसी चीज़ को उसके बगल यानी किनारे से देखना। तब वही चीज़ टॉप या फ्रंट से अलग दिखती है।",en:"Side view means looking at a thing from its side. Then the same thing looks different from its top or front.",mr:"साइड व्ह्यू म्हणजे एखादी गोष्ट तिच्या बाजूने पाहणे. तेव्हा तीच गोष्ट टॉप किंवा फ्रंटपेक्षा वेगळी दिसते.",dur:9500},
   {art:`<div style="display:flex;gap:16px;align-items:center;justify-content:center"><div style="font-size:50px">🌳</div><div style="font-size:24px;color:#6B5E94">upar se →</div><div style="font-size:44px">🟢</div></div>`,cap:"Tree: saamne se 🌳 (tana+patte), upar se sirf gol hara blob 🟢!",hi:"एक मज़ेदार उदाहरण — पेड़ को सामने से देखो तो तना और पत्ते दिखते हैं। पर ऊपर से देखो तो वही पेड़ सिर्फ एक गोल हरा गुच्छा दिखता है, तना दिखता ही नहीं।",en:"A fun example — look at a tree from the front and you see the trunk and leaves. But from the top, the same tree looks like just a round green blob, you cannot see the trunk at all.",mr:"एक मजेशीर उदाहरण — झाड समोरून पाहिले तर खोड आणि पाने दिसतात. पण वरून पाहिले तर तेच झाड फक्त एक गोल हिरवा गुच्छा दिसते, खोड दिसतच नाही.",dur:11500},
   {art:`<div style="font-size:50px">🧱 👧👦👧</div>`,cap:"Mini, Bholu, Rani same brick draw karte — par teeno alag! Kyun?",hi:"किताब में मिनी, भोलू और रानी एक ही ईंट का चित्र बनाते हैं, पर तीनों के चित्र अलग-अलग बनते हैं। ऐसा इसलिए क्योंकि हर एक ने ईंट को अलग साइड से देखा।",en:"In the book Mini, Bholu and Rani draw the same brick, but all three drawings come out different. This is because each one looked at the brick from a different side.",mr:"पुस्तकात मिनी, भोलू आणि राणी एकाच विटेचे चित्र काढतात, पण तिघांची चित्रे वेगवेगळी होतात. कारण प्रत्येकाने वीट वेगळ्या बाजूने पाहिली.",dur:11000},
   {art:viewsOf(miniRect(50,30),miniRect(50,22),miniRect(26,22)),cap:"Brick ke 3 views: top (chowda), front (lamba patla), side (chhota).",hi:"ईंट के तीन व्यू देखो — ऊपर से वह चौड़ा आयत दिखती है, सामने से लंबा-पतला आयत, और बगल से छोटा आयत। तीनों एक ही ईंट के हैं!",en:"See the brick's three views — from the top it is a wide rectangle, from the front a long thin rectangle, and from the side a small rectangle. All three are of the same brick!",mr:"विटेचे तीन व्ह्यू पाहा — वरून ती रुंद आयत दिसते, समोरून लांब-पातळ आयत, आणि बाजूने लहान आयत. तिन्ही एकाच विटेचे आहेत!",dur:11500},
   {art:`<div style="display:flex;gap:14px;align-items:center;justify-content:center">${shCyl()}${viewsOf(miniCirc(34),miniRect(30,46),miniRect(30,46))}</div>`,cap:"Glass/can: upar se CIRCLE ⚪, saamne se RECTANGLE ▭.",hi:"गिलास या ठंडे पेय के डिब्बे को ऊपर से देखो तो वह गोल यानी circle दिखता है। पर सामने से देखो तो वही आयत यानी rectangle दिखता है।",en:"Look at a glass or a cold drink can from the top and it looks round, a circle. But from the front, the same thing looks like a rectangle.",mr:"ग्लास किंवा थंड पेयाचा डबा वरून पाहिला तर तो गोल म्हणजे circle दिसतो. पण समोरून पाहिला तर तीच गोष्ट आयत म्हणजे rectangle दिसते.",dur:11000},
   {art:`<div style="display:flex;gap:14px;align-items:center;justify-content:center"><div style="font-size:46px">📕</div>${viewsOf(miniRect(44,32),miniRect(44,30),miniRect(10,30))}</div>`,cap:"Book: upar se rectangle, side se sirf PATLI line!",hi:"किताब को ऊपर से देखो तो आयत दिखती है। पर बगल यानी साइड से देखो तो सिर्फ एक पतली रेखा दिखती है, क्योंकि किताब पतली होती है।",en:"Look at a book from the top and it is a rectangle. But from the side it looks like just a thin line, because a book is thin.",mr:"पुस्तक वरून पाहिले तर आयत दिसते. पण बाजूने म्हणजे साइडने पाहिले तर फक्त एक पातळ रेषा दिसते, कारण पुस्तक पातळ असते.",dur:11000},
   {art:`<div style="display:flex;gap:14px;align-items:center;justify-content:center">${shPyr()}${viewsOf(miniRect(30,30),'<div style=\"font-size:30px\">🔺</div>','<div style=\"font-size:30px\">🔺</div>')}</div>`,cap:"Pyramid: saamne/side se TRIANGLE, upar se SQUARE.",hi:"पिरामिड को सामने या बगल से देखो तो त्रिकोण दिखता है। पर ऊपर से देखो तो वर्ग यानी square दिखता है। एक ही चीज़, अलग व्यू!",en:"Look at a pyramid from the front or side and you see a triangle. But from the top you see a square. Same object, different views!",mr:"पिरॅमिड समोरून किंवा बाजूने पाहिला तर त्रिकोण दिसतो. पण वरून पाहिला तर चौरस म्हणजे square दिसतो. एकच गोष्ट, वेगळे व्ह्यू!",dur:11000},
   {art:`<div style="font-size:46px">🪑📺🛵🪖</div>`,cap:"Aaspass ki cheezein — chair, TV, scooter, helmet — sabke views alag.",hi:"अपने आसपास की चीज़ें देखो — कुर्सी, टीवी, बस, हेलमेट। हर चीज़ ऊपर, सामने और बगल से अलग दिखती है। पहचानो कि कौन-सा चित्र किस व्यू का है।",en:"Look at things around you — chair, TV, bus, helmet. Each looks different from the top, front and side. Identify which picture is which view.",mr:"आजूबाजूच्या गोष्टी पाहा — खुर्ची, टीव्ही, बस, हेल्मेट. प्रत्येक गोष्ट वरून, समोरून आणि बाजूने वेगळी दिसते. ओळखा की कोणते चित्र कोणत्या व्ह्यूचे आहे.",dur:11000},
   {art:`<div style="font-size:44px">📦📦📦</div>`,cap:"BOXY BUILDINGS: matchbox jodke building banao, uske views banao.",hi:"बॉक्सी बिल्डिंग्स खेल — खाली माचिस की डिब्बियाँ जोड़कर इमारत बनाओ। फिर उसका फ्रंट व्यू, बैक व्यू और टॉप व्यू बनाओ। हर तरफ से इमारत अलग दिखेगी।",en:"Boxy buildings game — join empty matchboxes to make a building. Then draw its front view, back view and top view. The building will look different from each side.",mr:"बॉक्सी बिल्डिंग्ज खेळ — रिकाम्या आगपेट्या जोडून इमारत बनवा. मग तिचा फ्रंट व्ह्यू, बॅक व्ह्यू आणि टॉप व्ह्यू काढा. प्रत्येक बाजूने इमारत वेगळी दिसेल.",dur:11500},
   {art:`<div style="font-size:46px">🏗️❓</div>`,cap:"Dost ko sirf views dikhao — wo guess kare kaunsi building hai!",hi:"एक मज़ेदार चुनौती — दोस्त को सिर्फ अपनी इमारत के व्यू दिखाओ, और उससे कहो कि बताए यह कौन-सी इमारत है। इससे व्यू पहचानना अच्छे से आ जाता है।",en:"A fun challenge — show your friend only the views of your building, and ask them to guess which building it is. This makes you good at recognising views.",mr:"एक मजेशीर आव्हान — मित्राला फक्त तुझ्या इमारतीचे व्ह्यू दाखव, आणि त्याला विचार की ही कोणती इमारत आहे. यामुळे व्ह्यू ओळखणे चांगले जमते.",dur:11000},
   {art:`<div style="font-size:48px">🐱🪟🏫</div>`,cap:"Cat finds Jagat: classroom mein desk ki position dhoondo.",hi:"अब एक नई बात — जगत की बिल्ली उसे ढूँढ रही है। क्लासरूम में हर डेस्क की एक जगह होती है, जिसे रो और डेस्क नंबर से बताते हैं।",en:"Now something new — Jagat's cat is looking for him. In a classroom each desk has a position, which we tell using the row and the desk number.",mr:"आता एक नवीन गोष्ट — जगतची मांजर त्याला शोधते आहे. वर्गात प्रत्येक बाकाची एक जागा असते, जी आपण रो आणि बाक नंबरने सांगतो.",dur:10500},
   {art:bigExpr("3rd desk · 1st row"),cap:"Position: 'pehli row ka teesra desk' — row + desk number.",hi:"जैसे जगत पहली रो के तीसरे डेस्क पर बैठा है। तो उसकी जगह बताने के लिए हम कहते हैं — पहली रो, तीसरा डेस्क। रो और नंबर दोनों ज़रूरी हैं।",en:"For example, Jagat sits at the third desk in the first row. So to tell his position we say — first row, third desk. Both the row and the number are needed.",mr:"उदाहरणार्थ, जगत पहिल्या रोच्या तिसऱ्या बाकावर बसला आहे. तर त्याची जागा सांगण्यासाठी आपण म्हणतो — पहिली रो, तिसरा बाक. रो आणि नंबर दोन्ही आवश्यक आहेत.",dur:11000},
   {art:grid(3,3,-1,-1,''),cap:"GRID GAME: position batane ka tareeka. ROW (aadi) + COLUMN (khadi).",hi:"ग्रिड गेम — जगह बताने का पक्का तरीका। ग्रिड में आड़ी लाइनों को रो कहते हैं, और खड़ी लाइनों को कॉलम कहते हैं। दोनों मिलकर सही खाना बताते हैं।",en:"Grid game — a sure way to tell a position. In a grid the across lines are called rows, and the up-down lines are called columns. Together they point to the exact box.",mr:"ग्रिड गेम — जागा सांगण्याचा पक्का मार्ग. ग्रिडमध्ये आडव्या ओळींना रो म्हणतात, आणि उभ्या ओळींना कॉलम म्हणतात. दोन्ही मिळून नेमका खाना दाखवतात.",dur:11500},
   {art:gridLab([{r:1,c:1,e:'⚽'}]),cap:"ROW 1 = sabse NEECHE. Ball bottom-left = Row 1, Column 1.",hi:"ध्यान दो — इस ग्रिड में रो की गिनती नीचे से शुरू होती है। सबसे नीचे की रो है रो 1। गेंद सबसे नीचे बाएँ कोने में है, यानी रो 1, कॉलम 1।",en:"Note carefully — in this grid the rows are counted from the bottom. The bottom row is Row 1. The ball is at the bottom-left corner, that is Row 1, Column 1.",mr:"नीट लक्ष द्या — या ग्रिडमध्ये रोची मोजणी खालून सुरू होते. सर्वात खालची रो म्हणजे रो 1. चेंडू सर्वात खालच्या डाव्या कोपऱ्यात आहे, म्हणजे रो 1, कॉलम 1.",dur:11500},
   {art:gridLab([{r:3,c:1,e:'✏️'},{r:3,c:3,e:'🧽'}]),cap:"Clues: pencil top-left (Row3,Col1), eraser top-right (Row3,Col3).",hi:"अब क्लू से चीज़ें रखो — पेंसिल सबसे ऊपर बाएँ कोने में, यानी रो 3, कॉलम 1। रबड़ सबसे ऊपर दाएँ कोने में, यानी रो 3, कॉलम 3।",en:"Now place things by clues — the pencil at the top-left corner, that is Row 3, Column 1. The eraser at the top-right corner, that is Row 3, Column 3.",mr:"आता क्लूने वस्तू ठेवा — पेन्सिल सर्वात वरच्या डाव्या कोपऱ्यात, म्हणजे रो 3, कॉलम 1. खोडरबर सर्वात वरच्या उजव्या कोपऱ्यात, म्हणजे रो 3, कॉलम 3.",dur:11500},
   {art:gridLab([{r:2,c:2,e:'🍎'},{r:3,c:2,e:'🍶'}]),cap:"Apple = beech (Row2,Col2). Bottle = Row3, Col2.",hi:"सेब ठीक बीच में है — दूसरी रो, दूसरा कॉलम। और पानी की बोतल तीसरी रो, दूसरे कॉलम में है। हर चीज़ की जगह रो और कॉलम से पक्की हो जाती है।",en:"The apple is right in the middle — second row, second column. And the water bottle is in the third row, second column. Each thing's place is fixed by its row and column.",mr:"सफरचंद अगदी मध्यभागी आहे — दुसरी रो, दुसरा कॉलम. आणि पाण्याची बाटली तिसऱ्या रो, दुसऱ्या कॉलममध्ये आहे. प्रत्येक गोष्टीची जागा रो आणि कॉलमने पक्की होते.",dur:11500},
   {art:bigExpr("Position = (Row, Column)"),cap:"Position hamesha aise likho: pehle ROW, phir COLUMN.",hi:"एक नियम याद रखो — जगह हमेशा ऐसे लिखते हैं — पहले रो, फिर कॉलम। जैसे रो 2, कॉलम 3। इस क्रम को मत बदलना।",en:"Remember a rule — a position is always written like this — first the row, then the column. Like Row 2, Column 3. Do not change this order.",mr:"एक नियम लक्षात ठेवा — जागा नेहमी अशी लिहितात — आधी रो, मग कॉलम. जसे रो 2, कॉलम 3. हा क्रम बदलू नका.",dur:10500},
   {art:`<div style="font-size:46px">🗺️🎯</div>`,cap:"TREASURE HUNT: object dhoondo — left/right/up/down chalke. Diagonal NAHI!",hi:"खजाने की खोज वाला खेल — ग्रिड में कोई चीज़ ढूँढो। तुम सिर्फ बाएँ, दाएँ, ऊपर या नीचे चल सकते हो। तिरछा यानी diagonal चलना मना है!",en:"A treasure hunt game — find a thing in the grid. You can move only left, right, up or down. Moving diagonally is not allowed!",mr:"खजिना शोधण्याचा खेळ — ग्रिडमध्ये एखादी गोष्ट शोधा. तुम्ही फक्त डावे, उजवे, वर किंवा खाली जाऊ शकता. तिरके म्हणजे diagonal जाणे मनाई आहे!",dur:11000},
   {art:stepPath("➡️➡️➡️➡️"),cap:"Steps gino: start se 4 step right = 4 steps door.",hi:"हर खाने को एक स्टेप गिनते हैं। जैसे शुरू से अगर 4 खाने दाएँ जाओ, तो वह 4 स्टेप दूर है। स्टेप गिनकर बता सकते हो चीज़ कितनी दूर है।",en:"We count each box as one step. For example, if you go 4 boxes to the right from the start, it is 4 steps away. By counting steps you can tell how far a thing is.",mr:"प्रत्येक खाना एक स्टेप मोजतो. जसे सुरुवातीपासून 4 खाने उजवीकडे गेलात, तर ती गोष्ट 4 स्टेप दूर आहे. स्टेप मोजून सांगू शकता की गोष्ट किती दूर आहे.",dur:11000},
   {art:`<div style="font-size:42px">🥭 vs 🍊</div>`,cap:"Do raaste alag ho sakte — jis mein KAM steps, wahi behtar!",hi:"किसी चीज़ तक पहुँचने के अलग-अलग रास्ते हो सकते हैं। जैसे आम तक एक रास्ता और संतरे तक दूसरा। जिस रास्ते में कम स्टेप लगें, वही छोटा और बेहतर रास्ता है।",en:"There can be different paths to reach a thing. Like one path to the mango and another to the orange. The path that takes fewer steps is the shorter and better path.",mr:"एखाद्या गोष्टीपर्यंत पोहोचण्याचे वेगवेगळे मार्ग असू शकतात. जसे आंब्यापर्यंत एक मार्ग आणि संत्र्यापर्यंत दुसरा. ज्या मार्गात कमी स्टेप लागतात, तोच लहान आणि चांगला मार्ग.",dur:11500},
   {art:`<div style="font-size:54px">🚁🏫</div>`,cap:"DRONE: upar se udte hue school ki photo = ek MAP jaisa dikhta!",hi:"ज्ञान के पास एक ड्रोन है जो उड़ते हुए फोटो लेता है। ऊपर से ली गई स्कूल की तस्वीर एक नक्शे यानी map जैसी दिखती है — सारी इमारतें ऊपर से दिखती हैं।",en:"Gyan has a drone that takes photos while flying. A picture of the school taken from above looks like a map — you can see all the buildings from the top.",mr:"ज्ञानकडे एक ड्रोन आहे जो उडताना फोटो काढतो. वरून घेतलेले शाळेचे चित्र नकाशासारखे म्हणजे map सारखे दिसते — सर्व इमारती वरून दिसतात.",dur:11000},
   {art:`<div style="font-size:46px">🏫🗺️</div>`,cap:"SIGHT MAP: school ka naksha — entrance, library, stage, classroom...",hi:"साइट मैप स्कूल का एक नक्शा होता है, जो ऊपर से दिखता है। इसमें एंट्रेंस, लाइब्रेरी, स्टेज, क्लासरूम, मेडिकल रूम जैसी जगहें दिखाई जाती हैं।",en:"A sight map is a map of the school, seen from above. It shows places like the entrance, library, stage, classrooms and the medical room.",mr:"साइट मॅप ही शाळेची नकाशा असते, जी वरून दिसते. यात एन्ट्रन्स, लायब्ररी, स्टेज, वर्ग, मेडिकल रूम अशा जागा दाखवल्या जातात.",dur:11000},
   {art:`<div style="font-size:46px">↩️↪️🚶</div>`,cap:"Map pe raasta: shortest route dhoondo, aur directions do (left/right turn).",hi:"नक्शे पर हम रास्ता ढूँढ सकते हैं। जिस रास्ते में सबसे कम मुड़ना और कम दूरी हो, वह सबसे छोटा रास्ता है। किसी को रास्ता बताने के लिए कहते हैं — बाएँ मुड़ो, दाएँ मुड़ो, सीधे जाओ।",en:"On a map we can find a path. The path with the least turning and shortest distance is the shortest route. To guide someone we say — turn left, turn right, go straight.",mr:"नकाशावर आपण मार्ग शोधू शकतो. ज्या मार्गात सर्वात कमी वळणे आणि कमी अंतर, तो सर्वात लहान मार्ग. कोणाला मार्ग सांगण्यासाठी म्हणतो — डावीकडे वळा, उजवीकडे वळा, सरळ जा.",dur:12000},
   {art:emoji("📦"),cap:"Recap: top/front/side views, object-views, desk position, grid (row,col), steps, map & directions.",hi:"चलो सब दोहराते हैं — टॉप, फ्रंट और साइड व्यू; एक चीज़ अलग साइड से अलग; डेस्क की जगह; ग्रिड में रो और कॉलम; स्टेप और छोटा रास्ता; और नक्शे पर दिशाएँ।",en:"Let's recap everything — top, front and side views; one thing looks different from different sides; desk position; rows and columns in a grid; steps and the shortest path; and directions on a map.",mr:"चला सर्व उजळणी करू — टॉप, फ्रंट आणि साइड व्ह्यू; एक गोष्ट वेगळ्या बाजूने वेगळी; बाकाची जागा; ग्रिडमध्ये रो आणि कॉलम; स्टेप आणि लहान मार्ग; आणि नकाशावर दिशा.",dur:12000},
   {art:emoji("🌟"),cap:"Shabaash! Ab Hide and Seek ka quiz khelo — 50+ sawaal — aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब हाइड एंड सीक का क्विज़ खेलो — पचास से ज़्यादा सवाल हैं — और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play the Hide and Seek quiz — more than fifty questions — and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता हाइड अँड सीक चा क्विझ खेळ — पन्नासहून जास्त प्रश्न आहेत — आणि परफेक्ट हो!",dur:8500},

 {id:'pattern',title:'Pattern Around Us',emoji:'🔁',color:C.purple,scenes:[
   {art:emoji("🐘"),cap:"Chapter 3 — Patterns Around Us! Cheezein groups mein gino, aur even-odd seekho.",hi:"नमस्ते दोस्तों! आज तीसरा चॅप्टर — पैटर्न अराउंड अस। इसमें हम सीखेंगे कि चीज़ों को समूह यानी groups में कैसे जल्दी गिनते हैं, और संख्याओं में even-odd का मज़ेदार पैटर्न।",en:"Namaste friends! Today is chapter three, Patterns Around Us. We will learn how to count things quickly using groups, and the fun even-odd pattern in numbers.",mr:"नमस्कार मित्रांनो! आज तिसरा धडा — पॅटर्न अराउंड अस. यात आपण शिकू की वस्तू गटांत म्हणजे groups मध्ये पटकन कशा मोजायच्या, आणि संख्यांमधला मजेशीर even-odd पॅटर्न.",dur:10500},
   {art:gridDots(4,5),cap:"Pattern = cheezein kisi NIYAM se sajana. Yeh ginti aasaan karta hai.",hi:"पैटर्न का मतलब है चीज़ों को किसी नियम से सजाना — जैसे बराबर पंक्तियों और कतारों में। ऐसा करने से गिनती बहुत आसान हो जाती है।",en:"A pattern means arranging things by a rule — like in equal rows and columns. Doing this makes counting much easier.",mr:"पॅटर्न म्हणजे वस्तू एखाद्या नियमाने मांडणे — जसे समान ओळी आणि रांगांत. असे केल्याने मोजणे खूप सोपे होते.",dur:10000},
   {art:gridDots(5,5),cap:"Gundappa ke coconut trees: barabar rows mein. Rows × per row se gino.",hi:"गुंडप्पा के नारियल के पेड़ बराबर पंक्तियों में लगे हैं। एक-एक गिनने के बजाय, पंक्ति में जितने हैं उन्हें पंक्तियों से गुणा करके जल्दी गिन सकते हैं।",en:"Gundappa's coconut trees stand in equal rows. Instead of counting one by one, multiply the number in a row by the number of rows to count quickly.",mr:"गुंडप्पाची नारळाची झाडे समान ओळींत आहेत. एक-एक मोजण्याऐवजी, एका ओळीतली संख्या ओळींनी गुणून पटकन मोजता येते.",dur:11000},
   {art:bigExpr("Har tree → 5 coconut<br>5, 10, 15, 20..."),cap:"Har tree se 5 coconut: 5 ke groups mein gino (skip counting).",hi:"गुंडप्पा हर पेड़ से पाँच नारियल तोड़ता है। तो कुल गिनने के लिए पाँच-पाँच के समूह में गिनो — पाँच, दस, पंद्रह, बीस। यही स्किप काउंटिंग है।",en:"Gundappa plucks five coconuts from each tree. So to count the total, count in groups of five — five, ten, fifteen, twenty. This is skip counting.",mr:"गुंडप्पा प्रत्येक झाडावरून पाच नारळ तोडतो. तर एकूण मोजण्यासाठी पाच-पाचच्या गटांत मोजा — पाच, दहा, पंधरा, वीस. हीच स्किप काउंटिंग.",dur:11500},
   {art:`<div style="font-size:42px">🍱🍱🍱</div>`,cap:"Muniamma ki trays: har tray same arrangement. Group se total gino.",hi:"मुनिअम्मा की हर ट्रे में लड्डू एक जैसे सजे हैं, और ट्रे एक के ऊपर एक रखी हैं। एक ट्रे गिनो, फिर ट्रे की संख्या से गुणा करके कुल निकालो।",en:"In each of Muniamma's trays the laddoos are arranged the same way, and the trays are stacked. Count one tray, then multiply by the number of trays for the total.",mr:"मुनिअम्माच्या प्रत्येक ट्रेमध्ये लाडू सारखे मांडले आहेत, आणि ट्रे एकावर एक ठेवल्या आहेत. एक ट्रे मोजा, मग ट्रेच्या संख्येने गुणून एकूण काढा.",dur:11000},
   {art:`<div style="font-size:40px">🪙🪙🪙💵</div>`,cap:"PATTERNS WITH MONEY: coins/notes ko group karke jaldi gino.",hi:"पैसों को भी पैटर्न में सजाते हैं। एक जैसे सिक्कों या नोटों को समूह में रखकर गिनना आसान हो जाता है — जैसे दस-दस के नोट अलग, पाँच-पाँच के सिक्के अलग।",en:"Money is also arranged in patterns. Grouping same coins or notes together makes counting easy — like tens together, fives together.",mr:"पैसेही पॅटर्नमध्ये मांडतात. सारखे नाणी किंवा नोटा गटांत ठेवून मोजणे सोपे होते — जसे दहा-दहाच्या नोटा वेगळ्या, पाच-पाचची नाणी वेगळी.",dur:11000},
   {art:bigExpr("₹36 = 10+10+10+5+1"),cap:"₹1, ₹2, ₹5, ₹10 jodke amount banao — jaise ₹36.",hi:"एक, दो, पाँच और दस रुपये के सिक्के-नोट जोड़कर कोई भी रकम बना सकते हैं। जैसे छत्तीस रुपये = दस और दस और दस और पाँच और एक।",en:"Using one, two, five and ten rupee coins and notes, you can make any amount. Like thirty-six rupees equals ten plus ten plus ten plus five plus one.",mr:"एक, दोन, पाच आणि दहा रुपयांची नाणी-नोटा जोडून कोणतीही रक्कम बनवता येते. जसे छत्तीस रुपये = दहा अधिक दहा अधिक दहा अधिक पाच अधिक एक.",dur:11000},
   {art:`<div style="font-size:38px">👧 vs 👦</div>`,cap:"TWO WAYS: Shirley aur Shiv coins ko alag groups mein ginte — total same!",hi:"शर्ली और शिव एक ही सिक्कों को अलग-अलग तरीके से समूह बनाकर गिनते हैं। समूह भले अलग हों, पर दोनों का कुल जोड़ एक ही आता है।",en:"Shirley and Shiv count the same coins by making groups in different ways. The groups may differ, but both get the same total.",mr:"शर्ली आणि शिव एकाच नाण्यांचे वेगवेगळ्या प्रकारे गट करून मोजतात. गट वेगळे असले तरी दोघांची एकूण बेरीज सारखीच येते.",dur:11000},
   {art:pairs(6),cap:"EVEN numbers: jinke poore do-do ke JODE (pairs) ban jayein.",hi:"अब सम यानी EVEN संख्या। जिन संख्याओं को दो-दो के पूरे जोड़ों में बाँट सकें, उन्हें even कहते हैं — कोई भी अकेला नहीं बचता। जैसे शिव ने अपने नंबर जोड़ों में सजाए।",en:"Now even numbers. Numbers that can be split into complete pairs of two are called even — none is left alone. Like Shiv arranged his numbers in pairs.",mr:"आता सम म्हणजे EVEN संख्या. ज्या संख्या दोन-दोनच्या पूर्ण जोड्यांत वाटता येतात त्यांना even म्हणतात — एकही एकटा उरत नाही. जसे शिवने आपले नंबर जोड्यांत मांडले.",dur:11500},
   {art:pairs(5),cap:"ODD numbers: jinme ek AKELA bach jaye, pair nahi banta.",hi:"विषम यानी ODD संख्या। जिन संख्याओं में जोड़े बनाने पर एक अकेला बच जाता है, उन्हें odd कहते हैं। जैसे शर्ली के नंबरों में हमेशा एक बचता था।",en:"Odd numbers. Numbers in which one is left alone when making pairs are called odd. Like Shirley's numbers always had one left over.",mr:"विषम म्हणजे ODD संख्या. जोड्या करताना ज्यात एक एकटा उरतो त्यांना odd म्हणतात. जसे शर्लीच्या नंबरांत नेहमी एक उरायचा.",dur:11500},
   {art:bigExpr("2 4 6 8 10 → <span style='color:#21C997'>EVEN</span>"),cap:"Even examples: 2, 4, 6, 8, 10... sab pair ban jaate.",hi:"दो, चार, छह, आठ, दस — ये सब even हैं, क्योंकि इनके पूरे जोड़े बन जाते हैं। एक भी अकेला नहीं बचता।",en:"Two, four, six, eight, ten — these are all even, because they form complete pairs. Not even one is left alone.",mr:"दोन, चार, सहा, आठ, दहा — हे सर्व even आहेत, कारण यांच्या पूर्ण जोड्या होतात. एकही एकटा उरत नाही.",dur:10000},
   {art:bigExpr("1 3 5 7 9 → <span style='color:#FF7A6B'>ODD</span>"),cap:"Odd examples: 1, 3, 5, 7, 9... har baar ek bachta.",hi:"एक, तीन, पाँच, सात, नौ — ये सब odd हैं, क्योंकि जोड़े बनाने पर हर बार एक अकेला बच जाता है।",en:"One, three, five, seven, nine — these are all odd, because when you make pairs one is always left alone.",mr:"एक, तीन, पाच, सात, नऊ — हे सर्व odd आहेत, कारण जोड्या करताना प्रत्येक वेळी एक एकटा उरतो.",dur:10000},
   {art:bigExpr("2,4,6,8,10,12...<br>times-2 table"),cap:"Times-2 (do ka pahada) ke saare numbers EVEN hote hain!",hi:"एक मज़ेदार बात — दो के पहाड़े के सारे नंबर even होते हैं। दो, चार, छह, आठ, दस — सब के सब सम। क्योंकि दो-दो जोड़ने से जोड़े बनते रहते हैं।",en:"A fun fact — all numbers in the times-two table are even. Two, four, six, eight, ten — all even. Because adding two each time keeps making pairs.",mr:"एक मजेशीर गोष्ट — दोनच्या पाढ्यातले सर्व नंबर even असतात. दोन, चार, सहा, आठ, दहा — सर्व सम. कारण दोन-दोन जोडल्याने जोड्या होत राहतात.",dur:11000},
   {art:`<div style="display:flex;gap:10px;justify-content:center;align-items:center"><div style="width:44px;height:44px;border-radius:50%;border:3px solid #FF7A6B;display:flex;align-items:center;justify-content:center;font-weight:800;color:#FF7A6B">5</div><div style="width:44px;height:44px;border:3px solid #21C997;display:flex;align-items:center;justify-content:center;font-weight:800;color:#13795b">8</div></div>`,cap:"Crayons game: ODD pe CIRCLE ⭕, EVEN pe SQUARE ⬜.",hi:"क्रेयॉन वाले खेल में — odd संख्या पर गोला यानी circle बनाओ, और even संख्या पर चौकोर यानी square बनाओ। जैसे पाँच पर गोला, आठ पर चौकोर।",en:"In the crayons game — draw a circle on an odd number, and a square on an even number. Like a circle on five, a square on eight.",mr:"क्रेयॉनच्या खेळात — odd संख्येवर गोल म्हणजे circle काढा, आणि even संख्येवर चौकोन म्हणजे square काढा. जसे पाचवर गोल, आठवर चौकोन.",dur:11000},
   {art:bigExpr("Aakhri digit dekho!<br><span style='color:#21C997'>0 2 4 6 8</span> = even<br><span style='color:#FF7A6B'>1 3 5 7 9</span> = odd"),cap:"Bada TRICK: number ka AAKHRI digit dekho. Bas!",hi:"सबसे काम की ट्रिक — किसी भी बड़े नंबर को even या odd पहचानने के लिए सिर्फ उसका आखिरी अंक देखो। आखिरी अंक शून्य, दो, चार, छह, आठ तो even; एक, तीन, पाँच, सात, नौ तो odd।",en:"The most useful trick — to tell if any big number is even or odd, just look at its last digit. If the last digit is zero, two, four, six, eight it is even; if one, three, five, seven, nine it is odd.",mr:"सर्वात उपयोगी युक्ती — कोणताही मोठा नंबर even की odd ओळखण्यासाठी फक्त त्याचा शेवटचा अंक पाहा. शेवटचा अंक शून्य, दोन, चार, सहा, आठ तर even; एक, तीन, पाच, सात, नऊ तर odd.",dur:12000},
   {art:bigExpr("30 46 78 154 300 → even<br>67 415 → odd"),cap:"Try: 30,46,78,154,300 = EVEN. 67,415 = ODD. (aakhri digit!)",hi:"देखो — तीस, छियालीस, अठहत्तर, एक सौ चौवन, तीन सौ — सब even, क्योंकि आखिरी अंक even है। सरसठ और चार सौ पंद्रह odd हैं, क्योंकि आखिरी अंक सात और पाँच है।",en:"See — thirty, forty-six, seventy-eight, one hundred fifty-four, three hundred — all even, because the last digit is even. Sixty-seven and four hundred fifteen are odd, because the last digits are seven and five.",mr:"पाहा — तीस, सेहेचाळीस, अठ्ठ्याहत्तर, एकशे चोपन्न, तीनशे — सर्व even, कारण शेवटचा अंक even आहे. सदुसष्ट आणि चारशे पंधरा odd आहेत, कारण शेवटचे अंक सात आणि पाच आहेत.",dur:12000},
   {art:bigExpr("20 21 22 23 24 25...<br>E O E O E O"),cap:"Ginti mein even-odd BAARI-BAARI aate: even, odd, even, odd...",hi:"शर्ली ने देखा कि गिनती में even और odd बारी-बारी आते हैं। बीस even, इक्कीस odd, बाईस even, तेईस odd — यही पैटर्न चलता रहता है।",en:"Shirley noticed that in counting, even and odd come turn by turn. Twenty even, twenty-one odd, twenty-two even, twenty-three odd — this pattern keeps going.",mr:"शर्लीने पाहिले की मोजताना even आणि odd आळीपाळीने येतात. वीस even, एकवीस odd, बावीस even, तेवीस odd — हाच पॅटर्न चालू राहतो.",dur:11000},
   {art:bigExpr("...even <span style='color:#FF7A6B'>7 (odd)</span> even..."),cap:"Kisi ODD ke aage-peeche dono EVEN hote hain!",hi:"शर्ली ने एक और बात देखी — किसी भी odd संख्या के ठीक पहले और ठीक बाद वाली, दोनों संख्याएँ even होती हैं। जैसे सात odd है, तो छह और आठ दोनों even।",en:"Shirley saw another thing — the number just before and just after any odd number are both even. Like seven is odd, so six and eight are both even.",mr:"शर्लीने आणखी एक गोष्ट पाहिली — कोणत्याही odd संख्येच्या अगदी आधीची आणि अगदी नंतरची, दोन्ही संख्या even असतात. जसे सात odd आहे, तर सहा आणि आठ दोन्ही even.",dur:11500},
   {art:bigExpr("...odd <span style='color:#21C997'>8 (even)</span> odd..."),cap:"Aur kisi EVEN ke aage-peeche dono ODD hote hain!",hi:"शिव ने सोचा — तो किसी even संख्या के पहले और बाद वाली दोनों संख्याएँ odd होंगी? बिल्कुल सही! जैसे आठ even है, तो सात और नौ दोनों odd।",en:"Shiv wondered — then the numbers before and after any even number will both be odd? Exactly right! Like eight is even, so seven and nine are both odd.",mr:"शिवने विचार केला — मग कोणत्याही even संख्येच्या आधीच्या आणि नंतरच्या दोन्ही संख्या odd असतील? अगदी बरोबर! जसे आठ even आहे, तर सात आणि नऊ दोन्ही odd.",dur:11500},
   {art:bigExpr("16 → even &nbsp; 61 → odd"),cap:"Digits 1 aur 6 se: 16 (even) aur 61 (odd) bante hain.",hi:"अगर सिर्फ अंक एक और छह से दो-अंकों की संख्या बनाएँ, तो बनती हैं सोलह और इकसठ। सोलह even है क्योंकि आखिरी अंक छह, और इकसठ odd है क्योंकि आखिरी अंक एक।",en:"If we make two-digit numbers using only the digits one and six, we get sixteen and sixty-one. Sixteen is even because its last digit is six, and sixty-one is odd because its last digit is one.",mr:"फक्त एक आणि सहा अंकांनी दोन-अंकी संख्या बनवल्या तर सोळा आणि एकसष्ट होतात. सोळा even कारण शेवटचा अंक सहा, आणि एकसष्ट odd कारण शेवटचा अंक एक.",dur:11500},
   {art:bigExpr("1 → 100<br>50 even · 50 odd"),cap:"1 se 100 tak: EVEN aur ODD barabar — 50-50!",hi:"एक से सौ तक की गिनती में even और odd संख्याएँ बराबर-बराबर होती हैं — पचास even और पचास odd। क्योंकि वे बारी-बारी से आती हैं।",en:"From one to one hundred, there are equal even and odd numbers — fifty even and fifty odd. Because they come turn by turn.",mr:"एक ते शंभरपर्यंत even आणि odd संख्या सारख्या असतात — पन्नास even आणि पन्नास odd. कारण त्या आळीपाळीने येतात.",dur:11000},
   {art:emoji("📦"),cap:"Recap: groups se ginti, money patterns, even (pairs) / odd, aakhri-digit trick, even-odd alternate.",hi:"चलो सब दोहराते हैं — समूह से जल्दी गिनती; पैसों के पैटर्न; even यानी जोड़े बनें, odd यानी एक बचे; आखिरी अंक की ट्रिक; और गिनती में even-odd बारी-बारी।",en:"Let's recap — counting quickly with groups; money patterns; even means pairs form, odd means one is left; the last-digit trick; and even-odd taking turns in counting.",mr:"चला सर्व उजळणी करू — गटांतून पटकन मोजणी; पैशांचे पॅटर्न; even म्हणजे जोड्या होतात, odd म्हणजे एक उरतो; शेवटच्या अंकाची युक्ती; आणि मोजताना even-odd आळीपाळीने.",dur:12000},
   {art:emoji("🌟"),cap:"Shabaash! Ab Patterns ka quiz khelo — 50+ sawaal — aur perfect bano!",hi:"शाबाश! तुमने पूरा चॅप्टर सीख लिया। अब पैटर्न का क्विज़ खेलो — पचास से ज़्यादा सवाल हैं — और परफेक्ट बनो!",en:"Well done! You learned the whole chapter. Now play the Patterns quiz — more than fifty questions — and become perfect!",mr:"शाब्बास! तू पूर्ण धडा शिकलास. आता पॅटर्नचा क्विझ खेळ — पन्नासहून जास्त प्रश्न आहेत — आणि परफेक्ट हो!",dur:8500},
